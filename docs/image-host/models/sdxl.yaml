# SDXL — bessere Qualitaet. Passt bei 16 GB locker bei 1024x1024 ohne CPU-Offload.
name: sdxl
backend: cuda13-diffusers       # explizite CUDA-13-Variante (Blackwell/sm_120)
f16: true
parameters:
  model: stabilityai/stable-diffusion-xl-base-1.0
step: 28
cfg_scale: 6.5
diffusers:
  cuda: true
  pipeline_type: StableDiffusionXLPipeline
  scheduler_type: k_dpmpp_2m
  enable_parameters: "negative_prompt,num_inference_steps"
