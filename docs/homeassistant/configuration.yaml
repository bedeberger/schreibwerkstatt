# Schreibwerkstatt — Home Assistant Sensor-Config
# In bestehende configuration.yaml mergen. Token + URL in secrets.yaml:
#   schreibwerkstatt_token: "Bearer sw_REPLACE_WITH_TOKEN"
#   schreibwerkstatt_url:   "https://app.example.com/metrics"
#
# Pattern-Hinweis: jeder Single-Match-Sensor nutzt
#   (regex_findall(...) + [default]) | first
# statt regex_findall_index — sonst IndexError beim ersten Render
# (REST-Daten noch nicht geladen) oder bei fehlender Metric.

rest:
  - resource: !secret schreibwerkstatt_url
    scan_interval: 60
    timeout: 15
    headers:
      Authorization: !secret schreibwerkstatt_token
      Accept: text/plain
    sensor:
      # ---- Build + User ----
      - name: Schreibwerkstatt Version
        unique_id: sw_version
        icon: mdi:tag
        value_template: >
          {{ (value | regex_findall('sw_build_info\{version="([^"]+)"\} 1') + ['unknown']) | first }}

      - name: Schreibwerkstatt Users Active
        unique_id: sw_users_active
        icon: mdi:account-check
        unit_of_measurement: User
        value_template: >
          {{ ((value | regex_findall('sw_users\{status="active"\} (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Users Invited
        unique_id: sw_users_invited
        icon: mdi:account-clock
        unit_of_measurement: User
        value_template: >
          {{ ((value | regex_findall('sw_users\{status="invited"\} (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Users Suspended
        unique_id: sw_users_suspended
        icon: mdi:account-cancel
        unit_of_measurement: User
        value_template: >
          {{ ((value | regex_findall('sw_users\{status="suspended"\} (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Active Users 24h
        unique_id: sw_active_users_24h
        icon: mdi:account-multiple
        unit_of_measurement: User
        value_template: >
          {{ ((value | regex_findall('sw_active_users_24h (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Active Users 7d
        unique_id: sw_active_users_7d
        icon: mdi:account-multiple-outline
        unit_of_measurement: User
        value_template: >
          {{ ((value | regex_findall('sw_active_users_7d (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      # ---- Content ----
      - name: Schreibwerkstatt Books
        unique_id: sw_books
        icon: mdi:book-multiple
        unit_of_measurement: "Bücher"
        value_template: >
          {{ ((value | regex_findall('sw_books (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Pages
        unique_id: sw_pages
        icon: mdi:file-document-multiple
        unit_of_measurement: Seiten
        value_template: >
          {{ ((value | regex_findall('sw_pages (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Chapters
        unique_id: sw_chapters
        icon: mdi:format-list-numbered
        unit_of_measurement: Kapitel
        value_template: >
          {{ ((value | regex_findall('sw_chapters (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Chars
        unique_id: sw_chars
        icon: mdi:counter
        unit_of_measurement: Zeichen
        value_template: >
          {{ ((value | regex_findall('sw_chars (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Words
        unique_id: sw_words
        icon: mdi:text
        unit_of_measurement: "Wörter"
        value_template: >
          {{ ((value | regex_findall('sw_words (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Normseiten
        unique_id: sw_normseiten
        icon: mdi:file-document-outline
        unit_of_measurement: Seiten
        value_template: >
          {{ ((value | regex_findall('sw_normseiten (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      # ---- Writing Activity (heute, app.timezone) ----
      - name: Schreibwerkstatt Writing Seconds Today
        unique_id: sw_writing_seconds_today
        icon: mdi:pencil-outline
        unit_of_measurement: s
        device_class: duration
        value_template: >
          {{ ((value | regex_findall('sw_writing_seconds_today (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Lektorat Seconds Today
        unique_id: sw_lektorat_seconds_today
        icon: mdi:book-edit-outline
        unit_of_measurement: s
        device_class: duration
        value_template: >
          {{ ((value | regex_findall('sw_lektorat_seconds_today (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      # ---- Job-Queue (In-Memory, resettet bei Server-Restart) ----
      - name: Schreibwerkstatt Jobs Running
        unique_id: sw_jobs_running
        icon: mdi:cog-sync
        value_template: >
          {{ ((value | regex_findall('sw_jobs_running (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      - name: Schreibwerkstatt Jobs Queued
        unique_id: sw_jobs_queued
        icon: mdi:tray-full
        value_template: >
          {{ ((value | regex_findall('sw_jobs_queued (\d+)')) + ['0']) | first | int(0) }}
        state_class: measurement

      # ---- Persistente Job-Historie (Sum über alle type/status) ----
      - name: Schreibwerkstatt Jobs Finished Total
        unique_id: sw_jobs_finished_total
        icon: mdi:check-all
        unit_of_measurement: Jobs
        value_template: >
          {% set vals = value | regex_findall('sw_jobs_finished_total\{[^}]+\}\s+(\d+)') %}
          {{ vals | map('int', 0) | sum }}
        state_class: total_increasing

      # ---- Tokens + Kosten (Sum über alle provider/model) ----
      - name: Schreibwerkstatt Cost USD Total
        unique_id: sw_cost_usd_total
        icon: mdi:currency-usd
        unit_of_measurement: USD
        device_class: monetary
        value_template: >
          {% set vals = value | regex_findall('sw_cost_usd_total\{[^}]+\}\s+([0-9.eE+-]+)') %}
          {{ (vals | map('float', 0) | sum) | round(4) }}
        state_class: total_increasing

      - name: Schreibwerkstatt Tokens In Total
        unique_id: sw_tokens_in_total
        icon: mdi:arrow-down-bold-box
        unit_of_measurement: tokens
        value_template: >
          {% set vals = value | regex_findall('sw_tokens_in_total\{[^}]+\}\s+(\d+)') %}
          {{ vals | map('int', 0) | sum }}
        state_class: total_increasing

      - name: Schreibwerkstatt Tokens Out Total
        unique_id: sw_tokens_out_total
        icon: mdi:arrow-up-bold-box
        unit_of_measurement: tokens
        value_template: >
          {% set vals = value | regex_findall('sw_tokens_out_total\{[^}]+\}\s+(\d+)') %}
          {{ vals | map('int', 0) | sum }}
        state_class: total_increasing

      - name: Schreibwerkstatt Cache Read Tokens
        unique_id: sw_cache_read_tokens_total
        icon: mdi:cached
        unit_of_measurement: tokens
        value_template: >
          {% set vals = value | regex_findall('sw_cache_read_tokens_total\{[^}]+\}\s+(\d+)') %}
          {{ vals | map('int', 0) | sum }}
        state_class: total_increasing

      - name: Schreibwerkstatt Cache Creation Tokens
        unique_id: sw_cache_creation_tokens_total
        icon: mdi:database-plus
        unit_of_measurement: tokens
        value_template: >
          {% set vals = value | regex_findall('sw_cache_creation_tokens_total\{[^}]+\}\s+(\d+)') %}
          {{ vals | map('int', 0) | sum }}
        state_class: total_increasing

      # ---- Block-Level-Merge (Stale-Write-Konflikte) ----
      - name: Schreibwerkstatt Merge Silent Total
        unique_id: sw_merge_silent_total
        icon: mdi:merge
        unit_of_measurement: merges
        value_template: >
          {{ ((value | regex_findall('sw_merge_silent_total (\d+)')) + ['0']) | first | int(0) }}
        state_class: total_increasing

      - name: Schreibwerkstatt Merge Conflicts Shown Total
        unique_id: sw_merge_conflict_shown_total
        icon: mdi:alert-decagram
        unit_of_measurement: conflicts
        value_template: >
          {{ ((value | regex_findall('sw_merge_conflict_shown_total (\d+)')) + ['0']) | first | int(0) }}
        state_class: total_increasing

      - name: Schreibwerkstatt Merge Conflicts Resolved Total
        unique_id: sw_merge_conflict_resolved_total
        icon: mdi:check-decagram
        unit_of_measurement: blocks
        value_template: >
          {% set vals = value | regex_findall('sw_merge_conflict_resolved_total\{[^}]+\}\s+(\d+)') %}
          {{ vals | map('int', 0) | sum }}
        state_class: total_increasing

      - name: Schreibwerkstatt Merge Fallback Overwrite Total
        unique_id: sw_merge_fallback_overwrite_total
        icon: mdi:content-save-alert
        unit_of_measurement: overwrites
        value_template: >
          {{ ((value | regex_findall('sw_merge_fallback_overwrite_total (\d+)')) + ['0']) | first | int(0) }}
        state_class: total_increasing

# ---- Abgeleitete Sensoren ----
template:
  - sensor:
      - name: Schreibwerkstatt Writing Today Minutes
        unique_id: sw_writing_today_min
        icon: mdi:pencil
        unit_of_measurement: min
        device_class: duration
        state_class: measurement
        state: >
          {{ (states('sensor.schreibwerkstatt_writing_seconds_today') | int(0) / 60) | round(1) }}

      - name: Schreibwerkstatt Lektorat Today Minutes
        unique_id: sw_lektorat_today_min
        icon: mdi:book-edit
        unit_of_measurement: min
        device_class: duration
        state_class: measurement
        state: >
          {{ (states('sensor.schreibwerkstatt_lektorat_seconds_today') | int(0) / 60) | round(1) }}

      - name: Schreibwerkstatt Cache Hit Ratio
        unique_id: sw_cache_hit_ratio
        icon: mdi:percent-outline
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set r = states('sensor.schreibwerkstatt_cache_read_tokens') | int(0) %}
          {% set i = states('sensor.schreibwerkstatt_tokens_in_total') | int(0) %}
          {{ ((r / i * 100) if i > 0 else 0) | round(1) }}
