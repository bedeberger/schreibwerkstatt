# ─────────────────────────────────────────────────────────────────────────────
# schreibwerkstatt — NPMplus / Nginx Proxy Manager: Proxy-Host-Setup
#
# Bei NPMplus erzeugt die UI das server{}-Gerüst, TLS (Let's Encrypt),
# HTTP→HTTPS-Redirect und das Default-`location /` selbst. Es bleiben nur die
# App-spezifischen Overrides. Die vollständige nackte-NGINX-Variante steht in
# deploy/nginx.conf — diese Datei ist die NPMplus-Übersetzung davon.
#
# ── 1. Proxy Host → Tab "Details" ────────────────────────────────────────────
#   Scheme ................. http        (die App terminiert kein TLS)
#   Forward Hostname/IP .... 127.0.0.1   (bzw. App-Container/-Host)
#   Forward Port ........... 3737
#   Cache Assets ........... AUS         (App-Shell/JS/CSS versioniert der
#                                         Service-Worker selbst — Proxy-Cache
#                                         erzeugt sonst Skew gegen den SW-Cache)
#   Block Common Exploits .. AN
#   Websockets Support ..... egal        (App nutzt SSE, keinen WS-Upgrade)
#
# ── 2. Proxy Host → Tab "SSL" ─────────────────────────────────────────────────
#   SSL-Zertifikat ......... Let's Encrypt anfordern
#   Force SSL .............. AN
#   HTTP/2 Support ......... AN
#   HSTS ................... AUS         (HSTS setzt die App via helmet selbst;
#                                         NPMplus-HSTS gäbe einen doppelten Header)
#
# ── 3. Proxy Host → Tab "Advanced" → "Custom Nginx Configuration" ─────────────
#   Den folgenden Block (bis zum Dateiende) dort einfügen. NPMplus platziert ihn
#   im server{}-Block; die Direktiven vererben in das generierte `location /`.
# ─────────────────────────────────────────────────────────────────────────────

# SSE-Streams (z. B. /admin/logs/stream, AI-Proxy-Streaming): nicht puffern und
# lange offen halten. Die App komprimiert selbst (compression-MW) und nimmt
# text/event-stream gezielt aus — ohne `proxy_buffering off` würde NPMplus die
# Stream-Chunks puffern und das Live-Flushing brechen.
proxy_buffering         off;
proxy_cache             off;
proxy_read_timeout      300s;
proxy_send_timeout      300s;

# Forwarded-Header — die App liest X-Forwarded-Proto via `trust proxy`.
# NPMplus setzt diese i. d. R. schon im generierten proxy.conf-Include; doppelt
# schadet nicht (spätere Deklaration im server-Block gewinnt) und ist robuster,
# falls eine NPMplus-Version sie mal nicht mitliefert.
proxy_set_header        X-Real-IP          $remote_addr;
proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header        X-Forwarded-Proto  $scheme;

# Upload-Limit: ZIP-Import (Buch-Migration .swbook + Ordner-Import) geht bis
# 200 MB. Deckt zugleich Seiten-Saves (10 MB), Recherche-PDFs (25 MB) und
# STT-Audio (5 MB) ab. Die App erzwingt die echten Per-Route-Limits selbst.
client_max_body_size 256m;
client_body_timeout  120s;

# Grosse ZIP-Importe direkt durchstreamen, statt sie erst komplett nach
# client_body_temp auf Platte zu puffern. Spürbar bei den 200-MB-Importen.
proxy_request_buffering off;

# Optional: Long-Cache für immutable Vendored-Assets (Libs + Fonts). Spart
# Round-Trips zum Node-Prozess. NPMplus stellt $forward_scheme/$server/$port
# bereit. Nur Vendor/Fonts — NICHT App-Shell/JS/CSS (s. o., SW-Versionierung).
# location ~* ^/(vendor|fonts)/ {
#     proxy_pass $forward_scheme://$server:$port;
#     proxy_hide_header Cache-Control;
#     add_header Cache-Control "public, max-age=31536000, immutable";
#     access_log off;
# }
