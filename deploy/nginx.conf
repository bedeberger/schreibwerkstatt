# ─────────────────────────────────────────────────────────────────────────────
# schreibwerkstatt — NGINX Reverse-Proxy (TLS-Terminierung vor der Node-App)
#
# Die App lauscht auf 127.0.0.1:3737 (siehe deploy/schreibwerkstatt.service) und
# erwartet, hinter einem TLS-terminierenden Proxy zu laufen
# (`app.set('trust proxy', 1)` → liest `X-Forwarded-Proto`).
#
# Installation:
#   1. Datei nach /etc/nginx/sites-available/schreibwerkstatt kopieren
#   2. <DOMAIN> + Zertifikatspfade ersetzen (bzw. `certbot --nginx` laufen lassen)
#   3. ln -s ../sites-available/schreibwerkstatt /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#
# Eigenheiten der App, die diese Config abdeckt:
#   • SSE-Streams (z. B. /admin/logs/stream, AI-Proxy-Streaming) → kein Buffering
#   • Buch-/Ordner-Import: ZIP-Uploads bis 200 MB an /jobs/{book,folder}-import
#   • STT-Diktat: rohe Audio-Segmente bis 5 MB an /stt/transcribe
#   • Kompression macht die App selbst (compression-MW) → NGINX-gzip aus,
#     sonst Doppel-Kompression + zerstörtes SSE-Flushing
# ─────────────────────────────────────────────────────────────────────────────

upstream schreibwerkstatt_app {
    server 127.0.0.1:3737;
    keepalive 32;
}

# HTTP → HTTPS (ACME-Challenge durchlassen, Rest umleiten)
server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name <DOMAIN>;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS setzt die App via helmet selbst — hier NICHT duplizieren, sonst
    # doppelter Header. Wer TLS ausschliesslich auf NGINX-Ebene terminiert und
    # helmet-HSTS deaktiviert, kann die Zeile aktivieren:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Upload-Limit ──────────────────────────────────────────────────────────
    # Deckt Seiten-Saves (10 MB), Recherche-PDFs (25 MB), Cover etc. ab.
    # Import-Routen heben das per-location auf 256 MB an (siehe unten).
    client_max_body_size 32m;
    client_body_timeout  120s;

    # ── Gzip aus ────────────────────────────────────────────────────────────────
    # Die App komprimiert selbst (compression-MW) und nimmt SSE/Streams gezielt
    # aus. NGINX-gzip würde doppelt komprimieren bzw. SSE-Flushing brechen.
    gzip off;

    # ── Proxy-Defaults (geteilt von allen location-Blöcken) ─────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;

    # SSE-tauglich: keine Pufferung, lange Timeouts, Verbindung offen halten.
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    # X-Accel-Buffering-Header der App respektieren (erlaubt selektives Flushing)
    proxy_set_header   Connection "";

    # ── Statische Assets: Long-Cache für immutable Vendored-Files ───────────────
    # Vendor-Libs + Fonts sind versioniert/unveränderlich; lange cachen entlastet
    # den Node-Prozess. (App-Shell/JS/CSS versioniert der Service-Worker selbst —
    # die nicht hier forciert cachen, sonst Skew gegen den SW-Cache.)
    location ~* ^/(vendor|fonts)/ {
        proxy_pass http://schreibwerkstatt_app;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── ZIP-Import: grosse Bodies (Buch-Migration .swbook + Ordner-Import) ──────
    location ~ ^/jobs/(book|folder)-import$ {
        proxy_pass http://schreibwerkstatt_app;
        client_max_body_size 256m;
        proxy_request_buffering off;   # Body durchstreamen statt erst auf Platte puffern
    }

    # ── Alles andere ────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://schreibwerkstatt_app;
    }
}
