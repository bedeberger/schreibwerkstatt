<!doctype html>
<!-- Mini-Harness für Playwright-Tests gegen pdfExportCard. Alpine wird als
     klassisches Script geladen (wie im Hauptbundle), Card-Modul danach via
     ESM. Backend-Mocks für /pdf-export/* in tests/server.js. -->
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>PDF-Export Harness</title>
  <link rel="stylesheet" href="/public/css/tokens.css">
  <link rel="stylesheet" href="/public/css/layout/base.css">
  <link rel="stylesheet" href="/public/css/components/buttons-badges.css">
  <link rel="stylesheet" href="/public/css/components/card-form/card-shell.css">
  <link rel="stylesheet" href="/public/css/components/card-form/form-elements.css">
  <link rel="stylesheet" href="/public/css/components/card-form/card-actions.css">
  <link rel="stylesheet" href="/public/css/layout/utilities.css">
  <link rel="stylesheet" href="/public/css/entities/entity-list.css">
  <link rel="stylesheet" href="/public/css/page/tree-history.css">
  <link rel="stylesheet" href="/public/css/analysis/heatmap.css">
  <link rel="stylesheet" href="/public/css/analysis/kontinuitaet.css">
  <link rel="stylesheet" href="/public/css/book/export-shared.css">
  <link rel="stylesheet" href="/public/css/book/pdf-export.css">
  <style>body { padding: 1rem; max-width: 1200px; margin: 0 auto; }</style>

  <!-- Alpine als globaler Script-Tag (gleich wie public/index.html) -->
  <script src="/public/vendor/alpine-3.15.12.min.js" defer></script>
</head>
<body>

<div id="root">
  <div id="partial-pdf-export"></div>
</div>

<script type="module">
  // Warten, bis Alpine via defer-Script geladen + initialisiert ist (window.Alpine
  // wird vor `alpine:init` gesetzt, aber `Alpine.data()` muss VOR Alpine.start
  // registriert sein. Wir hooken auf alpine:init.
  function whenAlpineReady(fn) {
    if (window.Alpine && typeof window.Alpine.data === 'function') return fn();
    document.addEventListener('alpine:init', fn, { once: true });
  }

  whenAlpineReady(async () => {
    const dict = await fetch('/public/js/i18n/de.json').then(r => r.json());
    function tStub(key, params = {}) {
      let s = dict[key] || key;
      for (const [k, v] of Object.entries(params || {})) s = s.replaceAll('{' + k + '}', v);
      return s;
    }

    window.__app = {
      selectedBookId: 1,
      selectedBookName: 'Test',
      showPdfExportCard: true,
      t: tStub,
      togglePdfExportCard() { this.showPdfExportCard = !this.showPdfExportCard; },
    };

    window.Alpine.magic('app', () => window.__app);

    // Nav-State lebt in Alpine.store('nav') (kein Root-Proxy mehr) — die Karte
    // liest selectedBookId/tree/pages direkt via $store.nav / Alpine.store('nav').
    window.Alpine.store('nav', { books: [], selectedBookId: 1, pages: [], tree: [] });

    // Combobox-Stub für die Harness — die echte Implementation lebt in
    // public/js/app.js (mid-file, nicht trivial extrahierbar). Tests interagieren
    // nicht mit Comboboxes; der Stub verhindert nur den "Alpine Expression Error:
    // combobox is not defined", der das gesamte Subtree-Rendering bricht.
    window.Alpine.data('combobox', () => ({
      open: false, value: null, options: [], close() {}, onKeydown() {}, init() {},
    }));

    // numInput ist eine echte Komponente (kein Stub) — die Umschlag-/Druck-Tab-
    // Tests prüfen Zahlen-Propagation in die Config.
    const { registerNumInput } = await import('/public/js/num-input.js');
    registerNumInput();

    // tabs ist eine echte Komponente — die Tab-Reihe nutzt x-data="tabs(...)".
    const { registerTabs } = await import('/public/js/tabs.js');
    registerTabs();

    // collapsible (lange Sektionen) + fileDrop (Cover-Upload) — vom Partial genutzt.
    const { registerCollapsible } = await import('/public/js/collapsible.js');
    registerCollapsible();
    const { registerFileDrop } = await import('/public/js/file-drop.js');
    registerFileDrop();

    const { registerPdfExportCard } = await import('/public/js/cards/pdf-export-card.js');
    registerPdfExportCard();

    // Partial in das DOM einhängen — appendChild via template (kein innerHTML).
    // Fragment-Includes (`<!-- @include NAME -->`) wie der App-Loader auflösen,
    // sonst bleiben die ausgelagerten Tab-Panels leer (app-ui.js#_resolveIncludes).
    const resolveIncludes = async (src, seen = new Set()) => {
      const re = /<!--\s*@include\s+([\w-]+)\s*-->/g;
      const out = [];
      let last = 0, m;
      while ((m = re.exec(src))) {
        out.push(src.slice(last, m.index));
        const frag = m[1];
        out.push(seen.has(frag) ? '' : await resolveIncludes(
          await fetch(`/public/partials/${frag}.html`).then(r => r.text()),
          new Set([...seen, frag]),
        ));
        last = re.lastIndex;
      }
      out.push(src.slice(last));
      return out.join('');
    };
    const html = await resolveIncludes(await fetch('/public/partials/pdf-export.html').then(r => r.text()));
    const tpl = document.createElement('template');
    tpl.innerHTML = html;
    const slot = document.getElementById('partial-pdf-export');
    slot.appendChild(tpl.content);
    window.Alpine.initTree(slot);
    window.__harnessReady = true;
  });
</script>

</body>
</html>
