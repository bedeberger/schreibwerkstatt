<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <title>Focus Editor Test Harness</title>
  <!-- Minimal-CSS für Focus-Tests: tokens.css (Custom-Props + @layer-Ordnung)
       + focus-mode.css (Dim-Regel + .focus-paragraph-active + Container-
       Basisstyles). Focus-Editor ist entkoppelt von .page-content-view —
       eigene Klasse `.focus-editor__content`, alle Styles in focus-mode.css.
       DOM unten spiegelt die reale Wrapper-Kette aus editor.html +
       editor-body-edit.html. -->

  <link rel="stylesheet" href="/public/css/tokens.css">
  <link rel="stylesheet" href="/public/css/editor/focus/focus-mode.css">
  <link rel="stylesheet" href="/public/css/components/job-toast.css">
  <link rel="stylesheet" href="/public/css/page/page-revision-viewer.css">
  <link rel="stylesheet" href="/public/css/components/user-chip.css">
  <style>
    body { margin: 0; font: 16px/1.6 system-ui, sans-serif; }
    #editor-card { height: 100vh; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="editor-card">
    <!-- Reale Wrapper-Kette aus partials/editor.html + partials/editor-body-edit.html.
         #partial-editor-body-edit ist im Real-DOM Host-Div mit display:contents
         (focus-mode.css). .page-editor-wrap enthält Toolbar (Zoom/Fullscreen) +
         contenteditable; im Focus-Mode wird beides geflattent. Ohne diese
         Schichten kann der Harness Höhen-Propagations-Bugs nicht sehen. -->
    <div class="editor-body-wrap">
      <div class="editor-preview-wrap">
        <!-- Phase-4f: contenteditable lebt im Focus-Cardroot
             (.focus-editor.is-active). Harness simuliert den aktiven Focus-
             Editor ohne Normal-Editor-Container (Test fokussiert
             ausschliesslich auf Focus-Verhalten). -->
        <div id="partial-editor-body-focus">
          <div class="focus-editor is-active">
            <div class="focus-editor__content" contenteditable="true"></div>
          </div>
        </div>
        <!-- View-Modus-Container hat im Real-DOM seinen eigenen Partial-Host;
             im Edit-Modus ist er via x-show display:none. Früher fing
             getScrollContainer() ihn via `:not([style*="display: none"])`-Race. -->
        <div id="partial-editor-body-view">
          <div class="page-content-view" style="display: none;"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { focusCardMethods } from '/public/js/editor/focus.js';

    // 60 Absätze mit genug Text, dass die Container weit über die Höhe scrollt.
    const editor = document.querySelector('.focus-editor__content');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('p');
      p.textContent = `Absatz ${i}: Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.`;
      editor.appendChild(p);
    }

    // Minimal-Harness, das Alpine.data('editorFocusCard') nachbildet. Die
    // Sub-Komponenten-Methoden (`focusCardMethods`) werden direkt gespread;
    // Root-State (editMode, editDirty …) liegt ebenfalls am Harness, weil
    // wir `window.__app = harness` setzen — die Sub-Methoden greifen über
    // window.__app auf die "Root"-Felder zu.
    const harness = {
      ...focusCardMethods,
      // Sub-State
      _focusState: 'idle',
      _focusGen: 0,
      _focusListeners: null,
      _focusVisibleBlocks: null,
      _focusRaf: null,
      // Root-gespiegelte Felder (sub-methods greifen via window.__app)
      focusActive: false,
      editMode: true,
      showEditorCard: true,
      checkDone: false,
      editDirty: false,
      editSaving: false,
      saveOffline: false,
      lastDraftSavedAt: null,
      _figurLookupOpen: false,
      _synonymMenuOpen: false,
      _synonymPickerOpen: false,
      $nextTick: (fn) => Promise.resolve().then(fn),
      startEdit() {
        this.editMode = true;
        // Spiegelt editor/edit.js::startEdit – Enter soll <p> erzeugen,
        // nicht den Chromium-Default <div>.
        try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch {}
      },
      cancelEdit() { this.editMode = false; this.editDirty = false; },
      quickSave: async function () {
        // Default-Stub: schnell, erfolgreich. Tests überschreiben diesen
        // Slot für Save-Failure-Szenarien (quickSave = async () => { throw ... }).
        this.editSaving = true;
        await Promise.resolve();
        this.editDirty = false;
        this.editSaving = false;
      },
      _flushDraftSaveNow() {},
      _stopAutosave() {},
      _uninstallOnlineRetry() {},
      closeSynonymMenu() {},
      closeSynonymPicker() {},
      closeFigurLookup() { this._figurLookupOpen = false; },
      updatePageView() {},
      closeFindings() {},
    };

    // Smooth-Scroll-Override deaktivieren: scroll-behavior:auto in CSS reicht
    // nicht – container.scrollBy({ behavior: 'smooth' }) überschreibt es. Wir
    // patchen scrollBy, damit Tests sofort am Endwert messen können.
    const origScrollBy = HTMLElement.prototype.scrollBy;
    HTMLElement.prototype.scrollBy = function (opts) {
      if (opts && typeof opts === 'object') {
        return origScrollBy.call(this, { ...opts, behavior: 'auto' });
      }
      return origScrollBy.apply(this, arguments);
    };

    window.harness = harness;
    // Sub-Methoden greifen auf `window.__app` zu (Root-Proxy); der Harness
    // bündelt Root- und Sub-Felder in einem Objekt.
    window.__app = harness;
    window.harnessReady = true;
  </script>
</body>
</html>
