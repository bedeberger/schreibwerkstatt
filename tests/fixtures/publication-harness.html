<!doctype html>
<!-- Mini-Harness für Playwright-Tests gegen den Publikation-Tab der
     bookSettingsCard. Alpine als klassisches Script, Card-Modul via ESM.
     Backend-Mocks für /publication/* + /jobs/epub-export in tests/server.js. -->
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Publikation Harness</title>
  <link rel="stylesheet" href="/public/css/tokens.css">
  <link rel="stylesheet" href="/public/css/layout/base.css">
  <link rel="stylesheet" href="/public/css/components/buttons-badges.css">
  <link rel="stylesheet" href="/public/css/components/card-form/card-shell.css">
  <link rel="stylesheet" href="/public/css/components/card-form/form-elements.css">
  <link rel="stylesheet" href="/public/css/components/card-form/card-actions.css">
  <link rel="stylesheet" href="/public/css/components/tabs.css">
  <link rel="stylesheet" href="/public/css/layout/utilities.css">
  <link rel="stylesheet" href="/public/css/book/book-settings.css">
  <style>body { padding: 1rem; max-width: 1200px; margin: 0 auto; } [x-cloak] { display: none !important; }</style>

  <script src="/public/vendor/alpine-3.15.12.min.js" defer></script>
</head>
<body>

<div id="root">
  <div id="partial-book-settings"></div>
</div>

<script type="module">
  function whenAlpineReady(fn) {
    if (window.Alpine && typeof window.Alpine.data === 'function') return fn();
    document.addEventListener('alpine:init', fn, { once: true });
  }

  whenAlpineReady(async () => {
    const dict = await fetch('/public/js/i18n/de.json').then(r => r.json());
    function tStub(key, params = {}) {
      let s = dict[key] || key;
      for (const [k, v] of Object.entries(params || {})) s = s.replaceAll('{' + k + '}', v);
      return s;
    }

    window.__app = {
      selectedBookId: 102,
      selectedBookName: 'Test-Buch',
      books: [{ id: 102, name: 'Test-Buch' }],
      showBookSettingsCard: true,
      appTimezone: 'Europe/Zurich',
      t: tStub,
      tError: (d) => (d && (d.error_code || d.error)) || 'error',
      formatLastRun: (iso) => iso || '',
      async loadBooks() {},
      async loadPages() {},
    };
    window.Alpine.magic('app', () => window.__app);

    // Nav-State lebt in Alpine.store('nav') (kein Root-Proxy mehr) — die Karte
    // liest selectedBookId/books direkt via $store.nav / Alpine.store('nav').
    window.Alpine.store('nav', { books: [{ id: 102, name: 'Test-Buch' }], selectedBookId: 102, pages: [], tree: [] });
    // Header-Donut-State lebt in Alpine.store('progress') — book-settings/settings.js
    // spiegelt is_finished + daily_goal_chars beim Speichern dorthin.
    window.Alpine.store('progress', { dailyProgressBookId: null, dailyProgressStats: [], dailyProgressIsFinished: false, dailyProgressDailyGoalChars: null, _dailyProgressLoadingBookId: null });
    // Shell-State (App-Meta) lebt in Alpine.store('shell') — book-settings/settings.js
    // liest Alpine.store('shell').promptConfig (Buchtyp-Combobox) + appTimezone.
    window.Alpine.store('shell', { uiLocale: 'de', appTimezone: 'Europe/Zurich', promptConfig: { buchtypen: { de: {} } } });
    // Config-Store (read-only Feature-Flags) — book-settings-context.html gated den
    // Faktencheck-Toggle via $store.config.factcheckEnabled.
    const { registerConfigStore } = await import('/public/js/cards/config-store.js');
    registerConfigStore();

    // Combobox-Stub (echte Impl lebt mid-file in app.js). Tests interagieren
    // nicht mit Comboboxes; Stub verhindert nur Expression-Errors.
    window.Alpine.data('combobox', () => ({
      open: false, value: null, options: [], close() {}, onKeydown() {}, init() {},
    }));

    const { registerNumInput } = await import('/public/js/num-input.js');
    registerNumInput();

    const { registerRadioGroup } = await import('/public/js/radio-group.js');
    registerRadioGroup();

    const { registerTabs } = await import('/public/js/tabs.js');
    registerTabs();

    // collapsible (lange Sektionen) + fileDrop (Cover-Upload) — vom Partial genutzt.
    const { registerCollapsible } = await import('/public/js/collapsible.js');
    registerCollapsible();
    const { registerFileDrop } = await import('/public/js/file-drop.js');
    registerFileDrop();

    const { registerBookSettingsCard } = await import('/public/js/cards/book-settings-card.js');
    registerBookSettingsCard();

    // Fragment-Includes (`<!-- @include NAME -->`) wie der App-Loader auflösen,
    // sonst bleiben die ausgelagerten Tab-Panels leer (app-ui.js#_resolveIncludes).
    const resolveIncludes = async (src, seen = new Set()) => {
      const re = /<!--\s*@include\s+([\w-]+)\s*-->/g;
      const out = [];
      let last = 0, m;
      while ((m = re.exec(src))) {
        out.push(src.slice(last, m.index));
        const frag = m[1];
        out.push(seen.has(frag) ? '' : await resolveIncludes(
          await fetch(`/public/partials/${frag}.html`).then(r => r.text()),
          new Set([...seen, frag]),
        ));
        last = re.lastIndex;
      }
      out.push(src.slice(last));
      return out.join('');
    };
    const html = await resolveIncludes(await fetch('/public/partials/book-settings.html').then(r => r.text()));
    const tpl = document.createElement('template');
    tpl.innerHTML = html;
    const slot = document.getElementById('partial-book-settings');
    slot.appendChild(tpl.content);
    window.Alpine.initTree(slot);

    // Produktion lädt book_publication beim Karten-Öffnen (onShow). Hier ist das
    // Show-Flag schon bei init true, also stösst die Lifecycle-Watch nicht an —
    // loadPublication explizit aufrufen, damit bookPublicationLoaded gesetzt ist
    // (savePublication speichert sonst bewusst nicht, um keinen leeren Full-
    // Replace-Upsert auszulösen). Nur diese eine Quelle, nicht der ganze onShow.
    const card = window.Alpine.$data(slot.querySelector('[x-data="bookSettingsCard"]'));
    // Buchtyp ist Pflichtfeld in saveActiveTab (_taxonomyError) — Produktion lädt
    // ihn via loadBookSettings. Hier nur loadPublication, also den Buchtyp setzen,
    // sonst blockt der Save-Gate und savePublication läuft nie.
    card.bookSettingsBuchtyp = 'roman';
    await card.loadPublication();

    window.__harnessReady = true;
  });
</script>

</body>
</html>
