<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <title>Collapsible Test Harness</title>
  <!-- Bootet echtes Alpine + die collapsible-Komponente, um das x-bind-Spread-
       Pattern (trigger/chevron/panel inkl. x-show) gegen die reale Alpine-
       Runtime zu verifizieren. tokens.css liefert [x-cloak] + .history-chevron. -->
  <link rel="stylesheet" href="/public/css/tokens.css">
  <link rel="stylesheet" href="/public/css/page/tree-history.css">
</head>
<body>
  <!-- Default geschlossen -->
  <div x-data="collapsible()" id="c1">
    <button type="button" id="trigger1" class="collapsible-toggle" x-bind="trigger">
      <span id="chev1" class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
      <span>Sektion 1</span>
    </button>
    <div id="panel1" x-bind="panel" x-cloak>Inhalt 1</div>
  </div>

  <!-- Initial offen -->
  <div x-data="collapsible(true)" id="c2">
    <button type="button" id="trigger2" class="collapsible-toggle" x-bind="trigger">
      <span id="chev2" class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
      <span>Sektion 2</span>
    </button>
    <div id="panel2" x-bind="panel" x-cloak>Inhalt 2</div>
  </div>

  <script type="module">
    import { registerCollapsible } from '/public/js/collapsible.js';
    document.addEventListener('alpine:init', () => registerCollapsible());
    window.harnessReady = true;
  </script>
  <script defer src="/public/vendor/alpine-3.15.12.min.js"></script>
</body>
</html>
