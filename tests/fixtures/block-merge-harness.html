<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <title>Block-Merge Test Harness</title>
  <!-- Minimal-CSS: tokens (x-cloak + Custom-Props) + das echte Konflikt-Modal-CSS.
       Harness testet den Block-Level-Merge (Engine + Auflösungs-UI) ohne Express/
       BookStack. mergeBlocks/buildResolvedHtml sind pure Client-Imports; das
       Konflikt-Modal-Markup ist eine Kopie von partials/conflict-resolution.html. -->
  <link rel="stylesheet" href="/public/css/tokens.css">
  <link rel="stylesheet" href="/public/css/editor/shared/conflict-resolution.css">
  <style>
    body { margin: 0; font: 16px/1.6 system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body>
  <div id="app" x-data="harness">
    <!-- Kopie aus partials/conflict-resolution.html (Root-Scope-Methoden hier am Harness). -->
    <div class="conflict-overlay" x-show="conflictResolution" x-cloak role="alert"
         aria-modal="true" @keydown.escape.window="conflictResolution && cancelConflictResolution()">
      <div class="conflict-modal">
        <header class="conflict-modal__head">
          <h2 class="conflict-modal__title" data-testid="conflict-title"
              x-text="t('edit.conflict.blocks.count', { count: conflictResolution?.conflicts?.length || 0 })"></h2>
        </header>
        <div class="conflict-modal__bulk">
          <button type="button" data-testid="bulk-local" @click="resolveAllConflicts('local')"
                  x-text="t('edit.conflict.bulk.takeAllLocal')"></button>
          <button type="button" data-testid="bulk-remote" @click="resolveAllConflicts('remote')"
                  x-text="t('edit.conflict.bulk.takeAllRemote')"></button>
        </div>
        <ul class="conflict-block-list">
          <template x-for="c in (conflictResolution?.conflicts || [])" :key="c.bid">
            <li class="conflict-block" :data-bid="c.bid">
              <div class="conflict-block__choices">
                <button type="button" class="choice-local" @click="resolveBlock(c.bid, 'local')"
                        :class="{ 'is-active': (conflictResolution.decisions[c.bid] || 'local') === 'local' }"
                        x-text="t('edit.conflict.block.takeLocal')"></button>
                <button type="button" class="choice-remote" @click="resolveBlock(c.bid, 'remote')"
                        :class="{ 'is-active': conflictResolution.decisions[c.bid] === 'remote' }"
                        x-text="t('edit.conflict.block.takeRemote')"></button>
                <button type="button" class="choice-both" @click="resolveBlock(c.bid, 'both')"
                        :class="{ 'is-active': conflictResolution.decisions[c.bid] === 'both' }"
                        x-text="t('edit.conflict.block.takeBoth')"></button>
              </div>
              <div class="conflict-block__previews">
                <pre class="conflict-block__code preview-local" x-text="c.local_html || '—'"></pre>
                <pre class="conflict-block__code preview-remote" x-text="c.remote_html || '—'"></pre>
              </div>
            </li>
          </template>
        </ul>
        <footer class="conflict-modal__actions">
          <button type="button" data-testid="cancel" @click="cancelConflictResolution()"
                  x-text="t('edit.conflict.cancel')"></button>
          <button type="button" class="primary" data-testid="apply" @click="submitConflictResolution()"
                  x-text="t('edit.conflict.apply')"></button>
        </footer>
      </div>
    </div>
  </div>

  <script type="module">
    import { mergeBlocks, mergedToHtml, buildResolvedHtml } from '/public/js/editor/shared/block-merge.js';

    // Minimal-i18n: nur die Konflikt-Keys, {count}/{params}-Interpolation.
    const STR = {
      'edit.conflict.blocks.count': '{count} Block/Blöcke wurden in beiden Versionen geändert.',
      'edit.conflict.block.takeLocal': 'Meine Version',
      'edit.conflict.block.takeRemote': 'Andere Version',
      'edit.conflict.block.takeBoth': 'Beide übereinander',
      'edit.conflict.bulk.takeAllLocal': 'Alle meine',
      'edit.conflict.bulk.takeAllRemote': 'Alle anderen',
      'edit.conflict.apply': 'Auflösung übernehmen',
      'edit.conflict.cancel': 'Abbrechen',
    };

    // Engine-Helfer im Browser-Scope für page.evaluate (Silent-Merge-Assertion).
    window.mergeBlocks = mergeBlocks;
    window.mergedToHtml = mergedToHtml;

    // Alpine ist eine IIFE (window.Alpine, auto-start via queueMicrotask). Daten
    // im alpine:init-Listener registrieren — Listener anhängen, DANN Alpine-Script
    // dynamisch laden (garantiert: Listener existiert vor Alpine.start()).
    document.addEventListener('alpine:init', () => {
    window.Alpine.data('harness', () => ({
      conflictResolution: null,
      // Letzte Auflösung (statt echtem Server-Save) — Test liest sie aus.
      lastResolved: null,
      lastMix: null,
      t(key, params = {}) {
        let s = STR[key] || key;
        for (const [k, v] of Object.entries(params)) s = s.replaceAll(`{${k}}`, String(v));
        return s;
      },
      // Konflikt aus einem mergeBlocks-Resultat öffnen (Test ruft das via evaluate).
      openConflict(merged, conflicts) {
        const decisions = {};
        for (const c of conflicts) decisions[c.bid] = 'local';
        this.conflictResolution = { merged, conflicts, decisions };
      },
      resolveBlock(bid, choice) {
        if (!this.conflictResolution) return;
        this.conflictResolution.decisions[bid] = choice;
      },
      resolveAllConflicts(choice) {
        if (!this.conflictResolution) return;
        for (const c of this.conflictResolution.conflicts) {
          this.conflictResolution.decisions[c.bid] = choice;
        }
      },
      submitConflictResolution() {
        const cr = this.conflictResolution;
        if (!cr) return;
        const mix = { local: 0, remote: 0, both: 0 };
        for (const c of cr.conflicts) {
          const ch = cr.decisions[c.bid] || 'local';
          if (mix[ch] != null) mix[ch]++;
        }
        this.lastResolved = buildResolvedHtml(cr.merged, cr.decisions);
        this.lastMix = mix;
        this.conflictResolution = null;
      },
      cancelConflictResolution() {
        this.conflictResolution = null;
      },
    }));
    });

    const s = document.createElement('script');
    s.src = '/public/vendor/alpine-3.14.9.min.js';
    s.addEventListener('load', () => { window.harnessReady = true; });
    document.head.appendChild(s);
  </script>
</body>
</html>
