name: CI + Deploy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks-and-unit:
    name: Static Checks + Unit-Tests
    runs-on: self-hosted
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DB_PATH: /tmp/lektorat-ci-${{ github.run_id }}.db

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Frische DB pro Run (self-hosted Runner persistiert sonst schreibwerkstatt.db)
        run: rm -f "$DB_PATH" "${DB_PATH}-shm" "${DB_PATH}-wal"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Syntax-Check (node --check auf allen JS-Dateien)
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! node --check "$f" 2>&1; then
              echo "::error file=$f::Syntaxfehler"
              fail=1
            fi
          done < <(find server.js logger.js lib routes db public/js scripts -type f -name '*.js' 2>/dev/null)
          exit $fail

      - name: Prompt-Config validieren
        run: node scripts/validate-prompt-config.js

      - name: Boot-Smoke (Server startet, /config → 401)
        run: node scripts/boot-smoke.js

      - name: Architektur-Guards (grep-basiert)
        run: |
          set -e
          status=0

          echo "→ Keine statischen Inline-Styles in HTML (style=\"...\")"
          hits=$(grep -rEn '(^|[[:space:]])style="' public/partials public/index.html 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::Statische Inline-Styles gefunden — bitte in style.css auslagern:"
            echo "$hits"
            status=1
          fi

          echo "→ Keine <style>-Blöcke in HTML"
          hits=$(grep -rn '<style' public/ 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::<style>-Blöcke gefunden — alle Styles gehören in public/style.css:"
            echo "$hits"
            status=1
          fi

          echo "→ JSON_ONLY-Konstante nur in public/js/prompts.js oder public/js/prompts/ (Kommentare ignoriert)"
          hits=$(grep -rHn 'JSON_ONLY' public/js routes lib 2>/dev/null \
                 | grep -v '^public/js/prompts.js:' \
                 | grep -v '^public/js/prompts/' \
                 | grep -Ev '//[^"]*JSON_ONLY' \
                 | grep -Ev '^[^:]+:[0-9]+:[[:space:]]*\*' || true)
          if [ -n "$hits" ]; then
            echo "::error::JSON_ONLY ausserhalb prompts.js / prompts/ referenziert — Prompts gehören nach public/js/prompts.js bzw. public/js/prompts/:"
            echo "$hits"
            status=1
          fi

          echo "→ callAI nur in routes/jobs/ und routes/chat.js"
          hits=$(grep -rln 'callAI(' routes lib 2>/dev/null \
                 | grep -v '^routes/jobs/' \
                 | grep -v '^routes/chat.js$' \
                 | grep -v '^lib/ai.js$' || true)
          if [ -n "$hits" ]; then
            echo "::error::callAI ausserhalb Job-Queue/Chat — KI-Calls müssen als Job-Typ implementiert werden:"
            echo "$hits"
            status=1
          fi

          echo "→ bsGet( für Listen (Pagination-Falle) — nur Warnung"
          grep -rEn 'bsGet\(.+/(books|pages|chapters|shelves)[^/]*\)' public/js 2>/dev/null \
            | grep -v 'bsGetAll' || echo "  (keine Treffer)"

          exit $status

      - name: Unit-Tests ausführen
        run: npm run test:unit

      - name: Integration-Tests ausführen (Job-Pipeline mit Mock-AI)
        run: npm run test:integration

  e2e:
    name: Playwright-E2E
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Playwright-Version ermitteln
        id: pw-version
        run: |
          ver=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright-Browser
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Chromium installieren (nur bei Cache-Miss)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E-Tests ausführen
        run: npx playwright test --reporter=list

  deploy:
    name: Deploy to LXC with bookstack
    needs: [checks-and-unit, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy
        run: bash deploy/deploy.sh
