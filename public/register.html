<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/schreibwerkstatt_icon.svg">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/landing.css">
  <script defer src="/js/plausible-init.js"></script>
</head>
<body>
  <main class="public-shell">
    <header class="public-header">
      <h1>{{title}}</h1>
      <p class="public-sub">{{subtitle}}</p>
    </header>

    <form id="register-form" class="public-form" novalidate>
      <label>
        <span>{{emailLabel}}</span>
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label>
        <span>{{nameLabel}}</span>
        <input type="text" name="displayName" autocomplete="name">
      </label>
      <label>
        <span>{{messageLabel}}</span>
        <textarea name="message" maxlength="500" rows="4"></textarea>
      </label>

      <div id="altcha-slot"></div>

      <div class="public-form-actions">
        <a class="public-btn-link" href="/landing">{{backToLanding}}</a>
        <button type="submit" class="public-btn public-btn--primary">{{submitLabel}}</button>
      </div>

      <p class="public-msg" id="register-msg" hidden></p>
    </form>

    <footer class="public-footer">
      <span>{{footerHint}}</span>
    </footer>
  </main>

  <script type="application/json" id="register-config">{{configJson}}</script>
  <script src="/js/register.js" defer></script>
</body>
</html>
