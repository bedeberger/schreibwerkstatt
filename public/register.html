<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/schreibwerkstatt_icon.svg">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body data-captcha-site-key="{{captchaSiteKey}}">
  <main class="public-shell">
    <header class="public-header">
      <h1>{{title}}</h1>
      <p class="public-sub">{{subtitle}}</p>
    </header>

    <form id="register-form" class="public-form" novalidate>
      <label>
        <span>{{emailLabel}}</span>
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label>
        <span>{{nameLabel}}</span>
        <input type="text" name="displayName" autocomplete="name">
      </label>
      <label>
        <span>{{messageLabel}}</span>
        <textarea name="message" maxlength="500" rows="4"></textarea>
      </label>

      <div id="captcha-slot" hidden>
        <div class="h-captcha" data-sitekey="{{captchaSiteKey}}"></div>
      </div>

      <div class="public-form-actions">
        <a class="public-btn-link" href="/landing">{{backToLanding}}</a>
        <button type="submit" class="public-btn public-btn--primary">{{submitLabel}}</button>
      </div>

      <p class="public-msg" id="register-msg" hidden></p>
    </form>

    <footer class="public-footer">
      <span>{{footerHint}}</span>
    </footer>
  </main>

  <script>
    (function () {
      var siteKey = document.body.dataset.captchaSiteKey || '';
      if (siteKey) {
        document.getElementById('captcha-slot').hidden = false;
        var s = document.createElement('script');
        s.src = 'https://js.hcaptcha.com/1/api.js';
        s.async = true; s.defer = true;
        document.head.appendChild(s);
      }
      var form = document.getElementById('register-form');
      var msg  = document.getElementById('register-msg');
      var I18N = {
        success:  {{i18nSuccessJson}},
        rateLimit:{{i18nRateLimitJson}},
        invalid:  {{i18nInvalidJson}},
        error:    {{i18nErrorJson}}
      };
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.hidden = true; msg.className = 'public-msg';
        var data = new FormData(form);
        var captchaToken = null;
        if (siteKey && typeof hcaptcha !== 'undefined') {
          try { captchaToken = hcaptcha.getResponse(); } catch {}
        }
        var payload = {
          email:       (data.get('email') || '').trim(),
          displayName: (data.get('displayName') || '').trim() || null,
          message:     (data.get('message') || '').trim() || null,
          captchaToken: captchaToken
        };
        try {
          var r = await fetch('/register', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (r.status === 202) {
            form.reset();
            msg.textContent = I18N.success;
            msg.className = 'public-msg public-msg--ok';
            msg.hidden = false;
            return;
          }
          var j = {}; try { j = await r.json(); } catch {}
          if (r.status === 429) {
            msg.textContent = I18N.rateLimit;
          } else if (r.status === 400) {
            msg.textContent = j.error_code === 'EMAIL_INVALID' ? I18N.invalid : I18N.error;
          } else {
            msg.textContent = I18N.error;
          }
          msg.className = 'public-msg public-msg--err';
          msg.hidden = false;
        } catch (ex) {
          msg.textContent = I18N.error;
          msg.className = 'public-msg public-msg--err';
          msg.hidden = false;
        }
      });
    }());
  </script>
</body>
</html>
