<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/css/share.css">
  <link rel="stylesheet" href="/css/components/manuscript-stream.css">
</head>
<body class="share-page">
  <a class="share-skip" href="#share-content">{{t_skip}}</a>
  <header class="share-header">
    <div class="share-header__inner">
      <div class="share-header__book">{{book_name}}</div>
      <h1 class="share-header__title">{{target_name}}</h1>
      <div class="share-header__author">{{t_by}} {{author_name}}</div>
    </div>
  </header>

  <div class="share-layout">
    <main id="share-content" class="share-main">
      {{intro_block}}
      {{toc_block}}
      <article class="share-content" id="share-article">{{content_html}}</article>
    </main>

    <aside class="share-comments" aria-label="{{t_comments}}">
      <h2 class="share-comments__heading">{{t_comments}}</h2>
      <ol class="share-comments__list">{{comments_html}}</ol>
      {{form_block}}
    </aside>
  </div>

  <footer class="share-footer">
    <a class="share-footer__link" href="{{app_url}}" target="_blank" rel="noopener noreferrer">{{app_name}}</a>
  </footer>

  <script id="share-config" type="application/json">{{config_json}}</script>
  <script src="/js/share-reader.js" type="module"></script>
</body>
</html>
