<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/css/share.css">
  <link rel="stylesheet" href="/css/components/manuscript-stream.css">
  <link rel="stylesheet" href="/css/components/comment-rail.css">
  <script src="/js/share-theme-init.js"></script>
</head>
<body class="share-page">
  <a class="share-skip" href="#share-content">{{t_skip}}</a>
  <header class="share-header">
    <div class="share-header__inner">
      <div class="share-header__book">{{book_name}}</div>
      <h1 class="share-header__title">{{target_name}}</h1>
      <div class="share-header__author">{{t_by}} {{author_name}}</div>
    </div>
    <div class="share-header__tools">
      <div id="share-actions" class="share-actions"></div>
      <div id="share-theme" class="share-theme"></div>
    </div>
  </header>

  <div class="share-layout {{layout_class}}">
    {{toc_block}}
    <main id="share-content" class="share-main">
      {{intro_block}}
      <article class="share-content {{article_class}}" id="share-article">{{content_html}}</article>
    </main>

    <!-- Verankerte Anmerkungen: schwebende Karten auf Höhe ihrer Textstelle
         (Google-Docs-Modell, vertikal positioniert via share-reader/layout.js).
         .share-comments__list ist die Positionierungs-Ebene. -->
    <aside class="share-comments" aria-label="{{t_comments}}">
      <ol class="share-comments__list">{{anchored_comments_html}}</ol>
    </aside>
  </div>

  <!-- Allgemeine Kommentare (nicht verankert) + eigenes Formular, ganz unten. -->
  <section class="share-general" id="share-general" aria-label="{{t_general_heading}}">
    <h2 class="share-general__heading">{{t_general_heading}}</h2>
    <ol class="share-general__list">{{general_comments_html}}</ol>
    {{form_block}}
  </section>

  <footer class="share-footer">
    <a class="share-footer__link" href="{{app_url}}" target="_blank" rel="noopener noreferrer">{{app_name}}</a>
  </footer>

  <script id="share-config" type="application/json">{{config_json}}</script>
  <script src="/js/share-reader.js" type="module"></script>
</body>
</html>
