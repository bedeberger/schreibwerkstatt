  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="stylesheet" href="css/tree-history.css">
  <link rel="stylesheet" href="css/tokens-est.css">
  <link rel="stylesheet" href="css/figuren.css">
  <link rel="stylesheet" href="vendor/jsmind-0.8.7.css">
  <link rel="stylesheet" href="css/figur-werkstatt.css">
  <link rel="stylesheet" href="css/zeitleiste.css">
  <link rel="stylesheet" href="css/entity-list.css">
  <link rel="stylesheet" href="css/szenen.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/feature-tiles.css">
  <link rel="stylesheet" href="css/heatmap.css">
  <link rel="stylesheet" href="css/tabs.css">

  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/synonyme.css">

  <link rel="stylesheet" href="css/book-overview/stats.css">
  <link rel="stylesheet" href="css/book-overview/coverage.css">
  <link rel="stylesheet" href="css/book-overview/review.css">
  <link rel="stylesheet" href="css/book-overview/domain.css">
  <link rel="stylesheet" href="css/book-overview/presence.css">
  <link rel="stylesheet" href="css/book-overview/kapitel.css">
  <link rel="stylesheet" href="css/book-overview/recent-actions.css">

  <link rel="preload" href="fonts/Inter.var.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/SourceSerif4.var.woff2" as="font" type="font/woff2" crossorigin>
  <script type="module" src="js/app.js"></script>
  <!-- vis-network und Chart.js werden lazy aus public/js/lazy-libs.js nachgeladen,
       sobald die jeweilige Karte (Figuren-Graph / BookStats) geöffnet wird. -->
  <!-- Alpine self-hosted statt CDN: spart externen Roundtrip beim First-Load,
       wird vom Service-Worker zusammen mit der Shell gecached und funktioniert
       offline (Zug-Szenario). Pin per Dateiname; bumpen + SHELL_CACHE erhöhen. -->
  <script defer src="vendor/alpine-3.14.9.min.js"></script>
  <!-- Geteilter Tooltip-Layer für [data-tip]. -->
  <script defer src="js/tooltip.js"></script>
  <!-- Privacy-friendly analytics by Plausible (self-hosted). Nur auf Produktion (kein localhost/.local). -->
  <script defer src="js/plausible-init.js"></script>
</head>
<body x-data="lektorat"
      @keydown.ctrl.enter.window="if (showEditorCard && !checkLoading && !focusMode) runCheck()"
      @keydown.ctrl.s.prevent.window="if (editMode) quickSave()"
      @keydown.meta.s.prevent.window="if (editMode) quickSave()"
      @keydown.window="handleShortcutsHotkey($event); handleFocusHotkey($event); handleNavHotkey($event); handleFindingsHotkey($event); handleTreeKeydown($event)"
      @app-update-available.window="updateAvailable = true">

<a class="skip-link" href="#main-content" x-text="t('a11y.skipToMain')"></a>

<div class="session-banner" x-show="sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.expired')"></span>
  <a class="session-banner-btn" :href="'/auth/login?returnTo=' + encodeURIComponent(location.pathname + location.search)" x-text="t('session.relogin')"></a>
</div>

<div class="session-banner" x-show="bookstackTokenInvalid && !sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.bookstackTokenInvalid')"></span>
  <button type="button" class="session-banner-btn" @click="openTokenChange()" x-text="t('profile.changeToken')"></button>
</div>

<div class="session-banner" x-show="serverOffline && !sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.serverOffline')"></span>
  <button type="button" class="session-banner-btn" @click="location.reload()" x-text="t('session.retry')"></button>
</div>

<div class="session-banner session-banner--offline" x-show="isOffline && !sessionExpired && !serverOffline" x-cloak>
  <span class="session-banner-text" x-text="t('session.offlineMode')"></span>
</div>

<div class="session-banner" x-show="updateAvailable && !sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.updateAvailable')"></span>
  <button type="button" class="session-banner-btn" @click="applyUpdate()" x-text="t('session.applyUpdate')"></button>
</div>

<div class="site-header-row">
  <div class="site-header-center">
    <h1 @click="resetView()" class="site-title" :data-tip="t('app.titleReset')">
      <img src="bookstack_lektorat_icon.svg" alt="" class="site-logo" width="64" height="64">
      BookStack Lektorat
    </h1>
    <p class="subtitle"><span x-text="t('app.subtitle')"></span></p>
  </div>
  <div class="header-actions" x-show="currentUser">
    <div class="header-action-cluster">
      <div id="partial-komplett-status"></div>
    </div>
    <div id="partial-avatar-menu"></div>
  </div>
</div>
<div class="dev-banner" x-show="devMode" x-cloak x-text="t('dev.banner')"></div>

<div id="partial-token-setup"></div>

<!-- Bücherliste & Seitenauswahl -->
<div class="card card--book-selector" x-show="showBookCard" x-cloak>
  <label x-text="t('book.label')"></label>
  <div class="row book-selector-row">
    <div x-data="combobox({ placeholder: t('book.chooseBook'), compact: false, footer: { label: () => t('book.create.action'), action: () => openCreateBook() } })"
         x-modelable="value" x-model="selectedBookId"
         x-effect="options = books.map(b => ({value: String(b.id), label: b.name}))"
         @combobox-change="resetView();"></div>
    <a :href="selectedBookUrl || '#'" target="_blank" rel="noopener" class="btn-bookstack-link" :class="{ 'btn-bookstack-link--hidden': !selectedBookUrl }" :tabindex="selectedBookUrl ? 0 : -1" :aria-hidden="!selectedBookUrl" :data-tip="t('book.openInBookstack')" x-text="t('book.bookstack')"></a>
  </div>

  <!-- Hero-Palette-Trigger: Power-User-Eintritt zu allen Features (⌘K / Strg+K). -->
  <button type="button"
          class="palette-hero"
          x-show="selectedBookId"
          x-cloak
          @click="openPalette()"
          :data-tip="t('palette.openHint')"
          :aria-label="t('palette.openHint')">
    <span class="palette-hero-icon" aria-hidden="true" x-text="isMac ? '⌘' : 'Ctrl'"></span>
    <span class="palette-hero-text" x-text="t('palette.hero.text')"></span>
    <kbd class="palette-hero-kbd" x-text="isMac ? '⌘K' : 'Ctrl+K'"></kbd>
  </button>

  <!-- BookStack-Volltextsuche (im aktuellen Buch) -->
  <div class="bookstack-search" x-show="selectedBookId" x-cloak>
    <div class="bookstack-search-input-wrap">
      <input type="text"
             class="bookstack-search-input"
             x-model="bookstackSearch"
             @input="onBookstackSearchInput()"
             @keydown.escape="clearBookstackSearch(); $event.target.blur()"
             @keydown.enter.prevent="selectActiveBookstackHit()"
             @keydown.arrow-down="onBookstackSearchKeydown($event)"
             @keydown.arrow-up="onBookstackSearchKeydown($event)"
             :placeholder="t('book.search.placeholder')"
             :aria-label="t('book.search.placeholder')"
             :data-tip="t('book.search.placeholderTitle')">
      <button type="button" class="bookstack-search-clear"
              x-show="bookstackSearch"
              @mousedown.prevent="clearBookstackSearch()"
              :data-tip="t('book.search.clear')"
              :aria-label="t('book.search.clear')">×</button>
    </div>
    <div class="bookstack-search-results" x-show="bookstackSearch.trim().length >= 2">
      <div class="bookstack-search-status" x-show="bookstackSearchLoading" x-text="t('book.search.loading')"></div>
      <div class="bookstack-search-status bookstack-search-status--error" x-show="!bookstackSearchLoading && bookstackSearchError" x-text="bookstackSearchError"></div>
      <div class="bookstack-search-empty" x-show="!bookstackSearchLoading && !bookstackSearchError && bookstackSearched && bookstackSearchResults.length === 0" x-text="t('book.search.noResults')"></div>
      <template x-for="(hit, hitIdx) in bookstackSearchResults" :key="hit.id">
        <div class="bookstack-search-item" :class="{ 'is-current': currentPage && currentPage.id === hit.id, 'is-active': hitIdx === bookstackSearchActiveIndex }" :data-bs-idx="hitIdx" x-show="!bookstackSearchLoading" @click="selectPageFromBookstackSearch(hit)">
          <div class="bookstack-search-item-title" x-html="escPreserveStrong(hit.preview_html?.name || hit.name)"></div>
          <div class="bookstack-search-item-snippet" x-html="escPreserveStrong(hit.preview_html?.content || '')" x-show="hit.preview_html?.content"></div>
        </div>
      </template>
    </div>
  </div>

</div>

<div class="layout">
<div class="layout-sidebar">
  <div id="partial-sidebar"></div>
</div><!-- end layout-sidebar -->
<div class="layout-main" id="main-content" tabindex="-1">
<div id="partial-bookoverview"></div>
<div id="partial-buchreview"></div>
<div id="partial-kapitelreview"></div>
<div id="partial-figuren"></div>
<div id="partial-figur-werkstatt"></div>
<div id="partial-szenen"></div>
<div id="partial-ereignisse"></div>
<div id="partial-orte"></div>
<div id="partial-kontinuitaet"></div>
<div id="partial-bookstats"></div>
<div id="partial-stil-heatmap"></div>
<div id="partial-fehler-heatmap"></div>
<div class="editor-chat-wrap" :class="{ 'editor-chat-split': showEditorCard && (showChatCard || showIdeenCard) }">
  <div id="partial-editor" class="display-contents"></div>
  <div id="partial-chat" class="display-contents"></div>
  <div id="partial-ideen" class="display-contents"></div>
</div>
<div id="partial-book-settings"></div>
<div id="partial-finetune-export"></div>
<div id="partial-export"></div>
<div id="partial-pdf-export"></div>
<div id="partial-buchorganizer"></div>
<div id="partial-user-settings"></div>
<!-- Edit-Toolbar (Bubble + Slash) – teleportiert nach <body>, hier nur Scope-Host -->
<div id="partial-editor-toolbar"></div>
<div id="partial-editor-find"></div>
<div id="partial-editor-figur-lookup"></div>
<div id="partial-editor-synonyme"></div>
<div id="partial-editor-focus"></div>
<div id="partial-shortcuts"></div>
<div id="partial-palette"></div>

<!-- Globale Sidebar-Tooltips (position: fixed; per Hover aus dem Sidebar-
     Markup gefüttert). Hier oben, nicht im Sidebar-Partial — sonst
     dupliziert sich das Markup wenn die Sidebar irgendwann mehrfach gemountet
     wird. -->
<div x-show="showTokLegend"
     x-transition:enter="tok-tt-enter" x-transition:enter-start="tok-tt-hidden" x-transition:enter-end="tok-tt-visible"
     x-transition:leave="tok-tt-enter" x-transition:leave-start="tok-tt-visible" x-transition:leave-end="tok-tt-hidden"
     :style="`left:${tokLegendPos.x}px; top:${tokLegendPos.y - 8}px`"
     class="tok-tooltip"
     @mouseleave="_hideTokTip()"
     x-cloak>
  <div class="tok-tt-row" x-text="tokTooltipData ? t('tok.words', { n: (tokTooltipData.words >= 1000 ? '~' + Math.round(tokTooltipData.words/1000) + 'k' : tokTooltipData.words) }) : ''"></div>
  <div class="tok-tt-row" x-show="tokTooltipData" x-text="tokTooltipData ? t('tok.normseiten', { n: (Math.round((tokTooltipData.chars||0)/1500 * 10) / 10).toLocaleString(_numLocale, { minimumFractionDigits: 1, maximumFractionDigits: 1 }) }) : ''"></div>
  <div class="tok-tt-row" x-show="tokTooltipData && !tokTooltipData._chapterOnly" x-text="tokTooltipData ? t('tok.tokens', { n: (tokTooltipData.tok >= 1000 ? Math.round(tokTooltipData.tok/1000) + 'k' : tokTooltipData.tok) }) : ''"></div>
</div>
<div x-show="showPageStatusTip"
     x-transition:enter="tok-tt-enter" x-transition:enter-start="tok-tt-hidden" x-transition:enter-end="tok-tt-visible"
     x-transition:leave="tok-tt-enter" x-transition:leave-start="tok-tt-visible" x-transition:leave-end="tok-tt-hidden"
     :style="`left:${pageStatusTipPos.x}px; top:${pageStatusTipPos.y - 8}px`"
     class="tok-tooltip page-status-tip"
     x-cloak>
  <template x-for="line in pageStatusTipLines" :key="line">
    <div class="tok-tt-row" x-text="line"></div>
  </template>
</div>

</div><!-- end layout-main -->
</div><!-- end layout -->

<!-- Confirm-/Prompt-Dialog (Ersatz für window.confirm + window.prompt;
     siehe appConfirm / appPrompt in app-chrome.js) -->
<div class="confirm-overlay" x-show="confirmDialogOpen" x-cloak
     @keydown.escape.window="if (confirmDialogOpen) _resolveConfirmDialog(false)"
     @click.self="_resolveConfirmDialog(false)">
  <div class="confirm-dialog" role="alertdialog" aria-modal="true" :aria-label="confirmDialogMessage">
    <div class="confirm-dialog-message" x-text="confirmDialogMessage"></div>
    <input type="text" class="confirm-dialog-input"
           x-show="confirmDialogInput"
           x-model="confirmDialogInputValue"
           :placeholder="confirmDialogInputPlaceholder"
           @keydown.enter.prevent="_resolveConfirmDialog(true)"
           x-init="$watch('confirmDialogOpen', v => { if (v && confirmDialogInput) $nextTick(() => { $el.focus(); $el.select(); }); })">
    <div class="confirm-dialog-actions">
      <button type="button" class="confirm-dialog-btn confirm-dialog-btn--cancel"
              x-show="confirmDialogCancelLabel"
              @click="_resolveConfirmDialog(false)" x-text="confirmDialogCancelLabel"></button>
      <button type="button" class="confirm-dialog-btn"
              :class="confirmDialogDanger ? 'confirm-dialog-btn--danger' : 'confirm-dialog-btn--primary'"
              @click="_resolveConfirmDialog(true)"
              x-init="$watch('confirmDialogOpen', v => { if (v && !confirmDialogInput) $nextTick(() => $el.focus()); })"
              x-text="confirmDialogConfirmLabel"></button>
    </div>
  </div>
</div>

<!-- Buch-erstellen-Modal (Trigger: Combobox-Footer "+ Neues Buch …") -->
<div class="book-create-overlay" x-show="bookCreateOpen" x-cloak
     @keydown.escape.window="if (bookCreateOpen && !bookCreateBusy) cancelCreateBook()"
     @click.self="if (!bookCreateBusy) cancelCreateBook()">
  <div class="book-create-dialog" role="dialog" aria-modal="true" :aria-label="t('book.create.title')">
    <div class="book-create-title" x-text="t('book.create.title')"></div>
    <input type="text"
           class="book-create-input"
           x-model="bookCreateName"
           maxlength="255"
           :placeholder="t('book.create.namePlaceholder')"
           :aria-label="t('book.create.nameLabel')"
           :disabled="bookCreateBusy"
           @keydown.enter.prevent="submitCreateBook()">
    <div class="book-create-error" x-show="bookCreateError" x-cloak x-text="bookCreateError"></div>
    <div class="book-create-actions">
      <button type="button" class="book-create-btn book-create-btn--cancel"
              :disabled="bookCreateBusy"
              @click="cancelCreateBook()"
              x-text="t('book.create.cancel')"></button>
      <button type="button" class="book-create-btn book-create-btn--primary"
              :disabled="bookCreateBusy || !bookCreateName.trim()"
              @click="submitCreateBook()">
        <span x-show="!bookCreateBusy" x-text="t('book.create.submit')"></span>
        <span x-show="bookCreateBusy" x-cloak x-text="t('book.create.submitting')"></span>
      </button>
    </div>
  </div>
</div>

<!-- Job-Queue Footer -->
<div class="job-queue-bar" x-show="jobQueueItems.length > 0" x-cloak aria-live="polite" aria-atomic="false">
  <span class="job-queue-label" x-text="t('jobQueue.label')"></span>
  <template x-for="job in (jobQueueExpanded ? jobQueueItems : jobQueueItems.slice(0, 3))" :key="job.id">
    <div class="job-queue-pill" :class="'job-queue-pill--' + job.status" @click="navigateToJob(job)" :data-tip="t('jobQueue.jumpTo')">
      <span class="job-queue-pill-label" x-text="t(job.label, job.labelParams)"></span>
      <span class="job-queue-pill-status" x-text="t(job.statusText, job.statusParams)"></span>
      <template x-if="job.status === 'running' && job.progress > 0">
        <span class="job-queue-pill-progress" x-text="job.progress + '%'"></span>
      </template>
      <button type="button" class="job-queue-cancel-btn" @click.stop="cancelJob(job.id)" :data-tip="t('jobQueue.cancel')" :aria-label="t('jobQueue.cancel')">&#x2715;</button>
    </div>
  </template>
  <button type="button"
          class="job-queue-toggle-btn"
          x-show="jobQueueItems.length > 3"
          @click="jobQueueExpanded = !jobQueueExpanded"
          :data-tip="jobQueueExpanded ? t('jobQueue.collapse') : t('jobQueue.expand', { count: jobQueueItems.length - 3 })"
          :aria-label="jobQueueExpanded ? t('jobQueue.collapse') : t('jobQueue.expand', { count: jobQueueItems.length - 3 })"
          x-text="jobQueueExpanded ? '−' : '+' + (jobQueueItems.length - 3)"></button>
</div>

</body>
</html>
