<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/schreibwerkstatt_icon.svg">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
  <main class="public-shell">
    <header class="public-header">
      <h1>{{appName}}</h1>
      <p class="public-sub">{{subtitle}}</p>
    </header>

    <section class="public-actions">
      <a class="public-btn public-btn--primary" href="/login">{{loginLabel}}</a>
      <a class="public-btn" href="/register">{{registerLabel}}</a>
    </section>

    <footer class="public-footer">
      <span>{{footer}}</span>
    </footer>
  </main>
</body>
</html>
