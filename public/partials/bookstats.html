<!-- Buchentwicklung -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/book-stats-card.js. Der
  `showBookStatsCard`-Flag bleibt im Root (Hash-Router, Exklusivität),
  fachlicher State + Chart.js-Lifecycle leben in dieser Komponente.
-->
<div class="card card--bookstats" x-data="bookStatsCard" x-show="$app.showBookStatsCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('bookstats.title')"></span>
      <div class="card-subline" x-show="bookStatsData.length > 0 && !bookStatsLoading">
        <span class="card-timestamp" x-text="$app.t('bookstats.lastSnapshot', { date: (bookStatsData[bookStatsData.length - 1]?.recorded_at?.split('-').reverse().join('.') || '') })"></span>
      </div>
    </div>
    <div class="card-header-aside">
      <div class="card-actions">
        <button type="button" @click="syncBookStats()" :disabled="bookStatsLoading">
          <span x-show="bookStatsLoading" class="spinner"></span>
          <span x-text="bookStatsLoading ? '' : $app.t('bookstats.sync')"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Sync-Status -->
  <div x-show="bookStatsSyncStatus" class="card-status" x-html="bookStatsSyncStatus"></div>

  <!-- Metrik- & Zeitraum-Umschalter -->
  <div x-show="bookStatsData.length > 0 || (writingTimeData?.daily?.length > 0) || (lektoratTimeData?.daily?.length > 0) || (sttTimeData?.daily?.length > 0)" class="book-stats-controls">
    <div x-data="combobox($app.t('bookstats.metric'))"
         x-modelable="value" x-model="bookStatsMetric"
         x-effect="options = [
           {value:'chars',               label: $app.t('bookstats.metric.chars')},
           {value:'normseiten',          label: $app.t('bookstats.metric.normseiten')},
           {value:'words',               label: $app.t('bookstats.metric.words')},
           {value:'page_count',          label: $app.t('bookstats.metric.pages')},
           {value:'tok',                 label: $app.t('bookstats.metric.tok')},
           {value:'unique_words',        label: $app.t('bookstats.metric.unique')},
           {value:'delta_chars',         label: $app.t('bookstats.metric.deltaChars')},
           {value:'delta_words',         label: $app.t('bookstats.metric.delta')},
           {value:'avg_sentence_len',    label: $app.t('bookstats.metric.avgSentence')},
           {value:'pages_per_chapter',   label: $app.t('bookstats.metric.pagesPerChapter')},
           {value:'avg_lix',             label: $app.t('bookstats.metric.lix')},
           {value:'avg_flesch_de',       label: $app.t('bookstats.metric.flesch')},
           {value:'writing_minutes',     label: $app.t('bookstats.metric.writingMinutes')},
           {value:'writing_cumulative',  label: $app.t('bookstats.metric.writingCumulative')},
           {value:'lektorat_minutes',    label: $app.t('bookstats.metric.lektoratMinutes')},
           {value:'lektorat_cumulative', label: $app.t('bookstats.metric.lektoratCumulative')},
           {value:'stt_minutes',         label: $app.t('bookstats.metric.sttMinutes')},
           {value:'stt_cumulative',      label: $app.t('bookstats.metric.sttCumulative')},
           {value:'stt_chars',           label: $app.t('bookstats.metric.sttChars')}
         ]"
         @combobox-change="$nextTick(() => renderStatsChart())"
         >
    </div>
    <div class="btn-group">
      <template x-for="r in [{v:7,k:'7'},{v:30,k:'30'},{v:90,k:'90'},{v:365,k:'365'},{v:0,k:'all'}]" :key="r.v">
        <button type="button" class="btn-compact" :class="{ primary: bookStatsRange === r.v }"
          @click="bookStatsRange = r.v; renderStatsChart()" x-text="$app.t('bookstats.range.' + r.k)"></button>
      </template>
    </div>
  </div>

  <!-- Diagramm -->
  <div x-show="bookStatsData.length > 0 || (writingTimeData?.daily?.length > 0) || (lektoratTimeData?.daily?.length > 0) || (sttTimeData?.daily?.length > 0)" class="book-stats-chart-wrap">
    <canvas id="book-stats-chart" role="img" :aria-label="$app.t('bookstats.chartFallback')"><span x-text="$app.t('bookstats.chartFallback')"></span></canvas>
  </div>

  <!-- Aktuelle Stats (letzter Snapshot) -->
  <div x-show="bookStatsData.length > 0" class="book-stats-current">
    <span class="tok-badge tok-neutral"
      x-text="(bookStatsData[bookStatsData.length - 1]?.chars ?? 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') + ' ' + $app.t('bookstats.unit.z')"></span>
    <span class="tok-badge tok-neutral"
      :data-tip="$app.t('bookstats.metric.normseiten')"
      x-text="(Math.round(((bookStatsData[bookStatsData.length - 1]?.chars ?? 0) / 1500) * 10) / 10).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + $app.t('bookstats.unit.ns')"></span>
    <span class="tok-badge tok-neutral"
      x-text="(bookStatsData[bookStatsData.length - 1]?.words ?? 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') + ' ' + $app.t('bookstats.unit.w')"></span>
    <span class="tok-badge tok-neutral"
      x-text="bookStatsData[bookStatsData.length - 1]?.page_count + ' ' + $app.t('bookstats.unit.s')"></span>
    <span class="tok-badge tok-neutral"
      x-text="(bookStatsData[bookStatsData.length - 1]?.tok ?? 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') + ' ' + $app.t('bookstats.unit.t')"></span>
    <span class="tok-badge tok-neutral" x-show="bookStatsDelta !== null"
      x-text="(bookStatsDelta >= 0 ? '+' : '') + (bookStatsDelta ?? 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') + ' ' + $app.t('bookstats.unit.delta')"></span>
    <span class="tok-badge tok-neutral" x-show="bookStatsCoverage !== null"
      x-text="$app.t('bookstats.coverage', { pct: (bookStatsCoverage?.pct ?? 0), checked: (bookStatsCoverage?.checked_pages ?? 0), total: (bookStatsCoverage?.total_pages ?? 0) })"></span>
    <span class="tok-badge tok-neutral" x-show="bookStatsData[bookStatsData.length - 1]?.avg_sentence_len != null"
      x-text="$app.t('bookstats.avgSentenceBadge', { n: (bookStatsData[bookStatsData.length - 1]?.avg_sentence_len ?? 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) })"></span>
    <span class="tok-badge tok-neutral" x-show="bookStatsData[bookStatsData.length - 1]?.chapter_count > 0"
      x-text="$app.t('bookstats.pagesPerChapterBadge', { n: ((bookStatsData[bookStatsData.length - 1]?.page_count / bookStatsData[bookStatsData.length - 1]?.chapter_count) || 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) })"></span>
    <span class="tok-badge tok-neutral" x-show="(writingTimeData?.total_seconds ?? 0) > 0"
      x-text="$app.t('bookstats.writingTotal', { h: ((writingTimeData?.total_seconds ?? 0) / 3600).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) })"></span>
    <span class="tok-badge tok-neutral" x-show="(writingTimeData?.active_days ?? 0) > 0"
      x-text="$app.t('bookstats.writingAvg', { m: Math.round((writingTimeData?.total_seconds ?? 0) / 60 / (writingTimeData?.active_days || 1)).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') })"></span>
    <span class="tok-badge tok-neutral" x-show="(lektoratTimeData?.total_seconds ?? 0) > 0"
      x-text="$app.t('bookstats.lektoratTotal', { h: ((lektoratTimeData?.total_seconds ?? 0) / 3600).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) })"></span>
    <span class="tok-badge tok-neutral" x-show="(lektoratTimeData?.active_days ?? 0) > 0"
      x-text="$app.t('bookstats.lektoratAvg', { m: Math.round((lektoratTimeData?.total_seconds ?? 0) / 60 / (lektoratTimeData?.active_days || 1)).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') })"></span>
    <span class="tok-badge tok-neutral" x-show="(sttTimeData?.total_seconds ?? 0) > 0"
      x-text="$app.t('bookstats.sttTotal', { h: ((sttTimeData?.total_seconds ?? 0) / 3600).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) })"></span>
    <span class="tok-badge tok-neutral" x-show="(sttTimeData?.total_chars ?? 0) > 0"
      x-text="$app.t('bookstats.sttChars', { n: (sttTimeData?.total_chars ?? 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') })"></span>
  </div>

  <!-- Leer-Zustand -->
  <div x-show="!bookStatsData.length && !(writingTimeData?.daily?.length > 0) && !(lektoratTimeData?.daily?.length > 0) && !(sttTimeData?.daily?.length > 0) && !bookStatsLoading" class="muted-msg muted-msg--spaced" x-text="$app.t('bookstats.emptyState')"></div>
</div>
