    <!-- TTS-Tab: Text-to-Speech / Proof-Listening (Notebook-Editor) -->
    <section x-show="adminSettingsTab === 'tts'" class="admin-settings-section">
      <p class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.tts.hint')"></p>
      <div x-data="settingField({ k: 'tts.enabled', type: 'toggle', base: 'tts.enabled' })"></div>
      <div x-data="settingField({ k: 'tts.host', type: 'url', base: 'tts.host', help: true })"></div>
      <div x-data="settingField({ k: 'tts.model', base: 'tts.model', help: true })"></div>
      <div x-data="settingField({ k: 'tts.voice', base: 'tts.voice', help: true })"></div>
      <div x-data="settingField({ k: 'tts.voice.de', label: 'admin.settings.tts.voiceDe.label', phKey: 'admin.settings.tts.voice.placeholder', help: 'admin.settings.tts.voiceLocale.help' })"></div>
      <div x-data="settingField({ k: 'tts.voice.en', label: 'admin.settings.tts.voiceEn.label', phKey: 'admin.settings.tts.voice.placeholder', help: 'admin.settings.tts.voiceLocale.help' })"></div>
      <div x-data="settingField({ k: 'tts.format', type: 'select', base: 'tts.format', help: true, opts: [{ value: 'mp3', label: 'MP3' }, { value: 'opus', label: 'Opus' }, { value: 'aac', label: 'AAC' }, { value: 'flac', label: 'FLAC' }, { value: 'wav', label: 'WAV' }, { value: 'pcm', label: 'PCM' }] })"></div>
      <div x-data="settingField({ k: 'tts.speed', type: 'num', base: 'tts.speed', num: { step: 0.05, min: 0.25, max: 4, decimals: 2 }, help: true })"></div>
      <div x-data="settingField({ k: 'tts.pause.fragment_ms', type: 'num', base: 'tts.pauseFragmentMs', num: { integer: true, min: 0, max: 5000 }, help: true })"></div>
      <div x-data="settingField({ k: 'tts.pause.paragraph_ms', type: 'num', base: 'tts.pauseParagraphMs', num: { integer: true, min: 0, max: 5000 }, help: true })"></div>
      <div x-data="settingField({ k: 'tts.api_key', type: 'password', base: 'tts.apiKey', help: true })"></div>
      <div class="admin-settings-actions">
        <button type="button" @click="adminSettingsTest('tts')" x-text="$app.t('admin.settings.test.tts')"></button>
      </div>
    </section>
