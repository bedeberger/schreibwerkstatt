<!-- EPUB-Export — Scope + EPUB-Settings + Trigger -->
<!--
  Alpine.data-Sub-Komponente — public/js/cards/epub-export-card.js.
  Cover/Titelei/Autor-Bio leben buch-weit in BookSettings → Publikation-Tab;
  diese Karte spiegelt nur die EPUB-Reflow-Toggles + den Export.
  Pattern-Konformität (DESIGN.md): Combobox statt <select>, .card-form-row,
  .card-header > .card-actions, .card-status / .card-form-saved / .card-form-error.
-->
<div class="card card--epubexport epub-export-card" x-data="epubExportCard" x-show="$app.showEpubExportCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('epubExport.title')"></span>
    <div class="card-actions">
      <div class="epubx-scope-picker" x-show="!exporting">
        <div x-data="combobox({ placeholder: $app.t('export.scope.label'), compact: false })"
             x-modelable="value" x-model="exportScope"
             x-effect="options = exportScopeOptions()"></div>
        <div x-show="exportScope === 'chapter'"
             x-data="combobox({ placeholder: $app.t('export.scope.pickChapter'), compact: false })"
             x-modelable="value" x-model="exportChapterId"
             x-effect="options = exportChapterOptions()"></div>
        <button type="button"
                class="kapitel-include-subs-btn"
                x-show="exportScope === 'chapter' && selectedChapterHasSubs()"
                @click="exportIncludeSubchapters = !exportIncludeSubchapters"
                :class="{ primary: exportIncludeSubchapters }"
                :aria-pressed="exportIncludeSubchapters"
                :data-tip="$app.t('epubExport.includeSubchaptersTip')">
          <svg class="icon" aria-hidden="true">
            <use :href="exportIncludeSubchapters ? '/icons.svg?v=687#check' : '/icons.svg?v=687#chevron-down'"/>
          </svg>
          <span x-text="$app.t('epubExport.includeSubchapters')"></span>
        </button>
        <div x-show="exportScope === 'page'"
             x-data="combobox({ placeholder: $app.t('export.scope.pickPage'), compact: false })"
             x-modelable="value" x-model="exportPageId"
             x-effect="options = exportPageOptions()"></div>
      </div>
      <button type="button"
              class="primary"
              x-show="!exporting"
              :disabled="!$app.selectedBookId"
              :data-tip="!$app.selectedBookId ? $app.t('epubExport.export.noBookHint') : ''"
              @click="exportEpub()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=636#download"/></svg>
        <span x-text="$app.t('epubExport.export')"></span>
      </button>
      <button type="button"
              x-show="exporting"
              @click="cancelExport()">
        <span class="spinner"></span>
        <span x-text="$app.t('epubExport.cancel')"></span>
      </button>
    </div>
  </div>

  <p class="card-form-hint" x-text="$app.t('epubExport.hint')"></p>

  <div class="card-form-grid">
    <!-- Typografie -->
    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('epubExport.section.typography')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('epubExport.cssStyle')"></label>
        <div x-data="combobox($app.t('epubExport.cssStyle'))"
             x-modelable="value" x-model="pub.epub_css_style"
             x-effect="options = publicationCssOptions()"></div>
      </div>
      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('epubExport.field.fontSize')"></label>
        <div x-data="combobox($app.t('epubExport.field.fontSize'))"
             x-modelable="value" x-model="pub.epub_font_size"
             x-effect="options = fontSizeOptions()"></div>
      </div>
      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('epubExport.field.lineHeight')"></label>
        <div x-data="combobox($app.t('epubExport.field.lineHeight'))"
             x-modelable="value" x-model="pub.epub_line_height"
             x-effect="options = lineHeightOptions()"></div>
      </div>
      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('epubExport.field.paragraphStyle')"></label>
        <div x-data="combobox($app.t('epubExport.field.paragraphStyle'))"
             x-modelable="value" x-model="pub.epub_paragraph_style"
             x-effect="options = paragraphStyleOptions()"></div>
      </div>
      <div class="card-form-row" x-show="pub.epub_paragraph_style !== 'spaced'">
        <label class="card-form-label" x-text="$app.t('epubExport.field.indentSize')"></label>
        <div x-data="combobox($app.t('epubExport.field.indentSize'))"
             x-modelable="value" x-model="pub.epub_indent_size"
             x-effect="options = indentSizeOptions()"></div>
      </div>
      <div class="card-form-row">
        <label class="book-settings-option">
          <input type="checkbox" x-model="pub.epub_justify" :disabled="!canEditPublication()">
          <span x-text="$app.t('epubExport.justify')"></span>
        </label>
      </div>
      <div class="card-form-row">
        <label class="book-settings-option">
          <input type="checkbox" x-model="pub.epub_hyphenation" :disabled="!canEditPublication()">
          <span x-text="$app.t('epubExport.field.hyphenation')"></span>
        </label>
      </div>
      <div class="card-form-row">
        <label class="book-settings-option">
          <input type="checkbox" x-model="pub.epub_drop_caps" :disabled="!canEditPublication()">
          <span x-text="$app.t('epubExport.field.dropCaps')"></span>
        </label>
      </div>
    </section>

    <!-- Struktur -->
    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('epubExport.section.structure')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('epubExport.field.titlepageMode')"></label>
        <div x-data="combobox($app.t('epubExport.field.titlepageMode'))"
             x-modelable="value" x-model="pub.epub_titlepage_mode"
             x-effect="options = titlepageModeOptions()"></div>
      </div>
      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('epubExport.field.sceneSep')"></label>
        <div x-data="combobox($app.t('epubExport.field.sceneSep'))"
             x-modelable="value" x-model="pub.epub_scene_separator"
             x-effect="options = sceneSeparatorOptions()"></div>
      </div>
      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('epubExport.field.numbering')"></label>
        <div x-data="combobox($app.t('epubExport.field.numbering'))"
             x-modelable="value" x-model="pub.epub_chapter_numbering"
             x-effect="options = chapterNumberingOptions()"></div>
      </div>
      <div class="card-form-row" x-show="pub.epub_chapter_numbering !== 'none'">
        <label class="card-form-label" x-text="$app.t('epubExport.field.numberingMode')"></label>
        <div x-data="combobox($app.t('epubExport.field.numberingMode'))"
             x-modelable="value" x-model="pub.epub_chapter_numbering_mode"
             x-effect="options = chapterNumberingModeOptions()"></div>
      </div>
      <div class="card-form-row">
        <label class="book-settings-option">
          <input type="checkbox" x-model="pub.epub_chapter_pagebreak" :disabled="!canEditPublication()">
          <span x-text="$app.t('epubExport.field.chapterPagebreak')"></span>
        </label>
      </div>
      <div class="card-form-row">
        <label class="book-settings-option">
          <input type="checkbox" x-model="pub.epub_nest_pages_in_toc" :disabled="!canEditPublication()">
          <span x-text="$app.t('epubExport.field.nestPagesInToc')"></span>
        </label>
      </div>
      <div class="card-form-row">
        <label class="card-form-label" for="epubx-toc" x-text="$app.t('epubExport.tocTitle')"></label>
        <input type="text" id="epubx-toc" class="card-form-input" x-model="pub.epub_toc_title"
               maxlength="100" :placeholder="$app.t('epubExport.tocTitlePlaceholder')"
               :disabled="!canEditPublication()" data-spellcheck="spelling">
      </div>
    </section>

    <!-- Metadaten (OPF) -->
    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('epubExport.section.metadata')"></h3>
      <p class="card-form-field-note" x-text="$app.t('epubExport.metadataHint')"></p>

      <div class="card-form-row">
        <label class="card-form-label" for="epubx-rights" x-text="$app.t('epubExport.field.rights')"></label>
        <input type="text" id="epubx-rights" class="card-form-input" x-model="pub.epub_rights"
               maxlength="500" :disabled="!canEditPublication()" data-spellcheck="spelling">
      </div>
      <div class="card-form-row">
        <label class="card-form-label" for="epubx-pubdate" x-text="$app.t('epubExport.field.pubdate')"></label>
        <input type="text" id="epubx-pubdate" class="card-form-input" x-model="pub.epub_pubdate"
               maxlength="10" :placeholder="$app.t('epubExport.field.pubdatePlaceholder')"
               :disabled="!canEditPublication()">
      </div>
      <div class="card-form-row">
        <label class="card-form-label" for="epubx-translator" x-text="$app.t('epubExport.field.translator')"></label>
        <input type="text" id="epubx-translator" class="card-form-input" x-model="pub.epub_translator"
               maxlength="200" :disabled="!canEditPublication()">
      </div>
      <div class="card-form-row">
        <label class="card-form-label" for="epubx-illustrator" x-text="$app.t('epubExport.field.illustrator')"></label>
        <input type="text" id="epubx-illustrator" class="card-form-input" x-model="pub.epub_illustrator"
               maxlength="200" :disabled="!canEditPublication()">
      </div>
      <div class="card-form-row">
        <label class="card-form-label" for="epubx-editor" x-text="$app.t('epubExport.field.editorName')"></label>
        <input type="text" id="epubx-editor" class="card-form-input" x-model="pub.epub_editor_name"
               maxlength="200" :disabled="!canEditPublication()">
      </div>
      <div class="card-form-row">
        <label class="card-form-label" for="epubx-uuid" x-text="$app.t('epubExport.field.uuid')"></label>
        <input type="text" id="epubx-uuid" class="card-form-input" x-model="pub.epub_uuid"
               maxlength="100" :placeholder="$app.t('epubExport.field.uuidPlaceholder')"
               :disabled="!canEditPublication()">
      </div>

      <div class="card-actions" x-show="canEditPublication()">
        <span class="card-form-saved" x-show="savedAt" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('epubExport.saved')"></span>
        <button type="button" :disabled="saving" @click="savePublication()">
          <span x-show="saving" class="spinner"></span>
          <span x-text="saving ? $app.t('common.saving') : $app.t('common.save')"></span>
        </button>
      </div>
    </section>

    <p class="card-form-hint">
      <span x-text="$app.t('epubExport.metaHint')"></span>
      <span class="internal-link" @click="openBookSettings()" x-text="$app.t('epubExport.metaLink')"></span>
    </p>

    <!-- Progress / Errors -->
    <div class="epubx-progress" x-show="exporting || (exportProgress > 0 && !exportError)">
      <div class="progress-bar-wrap">
        <div class="progress-bar" :style="{ '--progress': exportProgress + '%' }"></div>
      </div>
      <p class="card-form-field-note" x-text="exportStatus"></p>
    </div>
    <p class="card-form-error" x-show="exportError" x-text="exportError"></p>
  </div>
</div>
