<!-- Admin: Backend-Migration (Phase 8 BookStack-Exit) -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/admin-backend-migration-card.js.
  `showAdminBackendMigrationCard` + `toggleAdminBackendMigrationCard` im Root.
  Nur sichtbar bei $app.currentUser.role === 'admin'.
-->
<div class="card card--admin-backend-migration" x-data="adminBackendMigrationCard" x-show="$app.showAdminBackendMigrationCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('admin.migrate.title')"></span>
    <div class="card-actions">
      <button type="button" @click="loadStatus()" :disabled="loading" x-text="$app.t('common.refresh')"></button>
    </div>
  </div>

  <p class="card-form-error" x-show="error" x-text="error"></p>

  <section class="admin-migrate-status">
    <h3 class="book-settings-stats-title" x-text="$app.t('admin.migrate.status.title')"></h3>
    <p>
      <span class="muted-msg muted-msg--sm" x-text="$app.t('admin.migrate.status.current')"></span>
      <code x-text="currentBackend || '?'"></code>
    </p>
    <p x-show="sourceReadOnly">
      <span class="muted-msg muted-msg--sm" x-text="$app.t('admin.migrate.status.readOnly')"></span>
      <code x-text="sourceReadOnly"></code>
      <button type="button" class="danger" @click="clearReadOnly()" :disabled="loading" x-text="$app.t('admin.migrate.clearReadOnly')"></button>
    </p>
  </section>

  <section class="admin-migrate-form" x-show="!loading">
    <h3 class="book-settings-stats-title" x-text="$app.t('admin.migrate.form.title')"></h3>
    <p class="muted-msg muted-msg--sm" x-text="$app.t('admin.migrate.form.hint')"></p>

    <label>
      <span x-text="$app.t('admin.migrate.form.source')"></span>
      <select x-model="formSource" disabled>
        <option value="bookstack">bookstack</option>
      </select>
    </label>
    <label>
      <span x-text="$app.t('admin.migrate.form.target')"></span>
      <select x-model="formTarget" disabled>
        <option value="localdb">localdb</option>
      </select>
    </label>
    <label>
      <span x-text="$app.t('admin.migrate.form.bookId')"></span>
      <input type="number" min="1" x-model="formBookId" :placeholder="$app.t('admin.migrate.form.bookIdPlaceholder')">
    </label>
    <label class="checkbox-row">
      <input type="checkbox" x-model="formSetReadOnly">
      <span x-text="$app.t('admin.migrate.form.setReadOnly')"></span>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" x-model="formCutover">
      <span x-text="$app.t('admin.migrate.form.cutover')"></span>
    </label>

    <div class="admin-migrate-actions">
      <button type="button" @click="start()" :disabled="loading" x-text="$app.t('admin.migrate.start')"></button>
    </div>
  </section>

  <section class="admin-migrate-progress" x-show="loading || statusHtml">
    <div class="progress-bar" :style="{ '--progress': (progress || 0) + '%' }"></div>
    <p x-html="statusHtml"></p>
  </section>

  <section class="admin-migrate-result" x-show="result">
    <h4 x-text="$app.t('admin.migrate.result.title')"></h4>
    <p>
      <span x-text="$app.t('admin.migrate.result.summary', { books: result?.books || 0, chapters: result?.chapters || 0, pages: result?.pages || 0 })"></span>
    </p>
    <p x-show="result?.cutoverDone" class="muted-msg muted-msg--sm" x-text="$app.t('admin.migrate.result.cutoverDone')"></p>
    <p x-show="result && !result.cutoverDone" class="muted-msg muted-msg--sm" x-text="$app.t('admin.migrate.result.noCutover')"></p>
  </section>
</div>
