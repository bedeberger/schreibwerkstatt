<!-- Welt-Fakten / Weltregeln (read-only) -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/world-facts-card.js.
  Daten stammen aus der Komplettanalyse; kein Edit-Pfad. Gruppiert nach Kategorie.
-->
<div class="card card--weltfakten" x-data="worldFactsCard" x-show="$app.showWorldFactsCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('weltfakten.title')"></span>
      <div class="card-subline" x-show="$app.alleAktualisierenLastRun && !wfLoading">
        <span class="card-timestamp" x-text="$app.t('common.asOf', { date: $app.alleAktualisierenLastRun })"></span>
      </div>
    </div>
  </div>

  <div x-show="fakten.length === 0 && !wfLoading" class="card-empty">
    <p class="card-empty-text" x-text="$app.t('weltfakten.empty')"></p>
    <button type="button" class="primary card-empty-cta"
            @click="$app.alleAktualisieren()"
            :disabled="$app.alleAktualisierenLoading || !$app.selectedBookId">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#rotate-cw"/></svg>
      <span x-text="$app.t('header.updateAll')"></span>
    </button>
  </div>

  <!-- Skeleton während Loading vor erstem Datensatz -->
  <div x-show="wfLoading && fakten.length === 0" class="entity-skeleton entity-list--accented" x-cloak>
    <template x-for="i in 6" :key="i">
      <div class="entity-skeleton-row">
        <span class="entity-skeleton-cell entity-skeleton-cell--anchor"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--title"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--meta"></span>
      </div>
    </template>
  </div>

  <!-- Filter-Leiste -->
  <div x-show="fakten.length > 0" class="filter-bar">
    <span class="filter-search-wrap">
      <input type="text" x-model="wfFilters.suche" :placeholder="$app.t('common.search')" :aria-label="$app.t('common.search')" class="filter-search-input">
      <button type="button" class="search-clear--icon" x-show="wfFilters.suche" @click="wfFilters.suche=''" :aria-label="$app.t('search.clear')" :data-tip="$app.t('search.clear')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg></button>
    </span>
    <div x-show="wfSeiteListe.length > 0"
         x-data="combobox($app.t('weltfakten.filterKapitel'), $app.t('common.all'))"
         x-modelable="value" x-model="wfFilters.seite"
         x-effect="options = wfSeiteListe.map(s => ({ value: s, label: s }))"></div>
    <div class="tabs tabs--scrollable" role="tablist" :aria-label="$app.t('weltfakten.title')">
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': wfFilters.kategorie === '' }"
              @click="wfFilters.kategorie = ''">
        <span x-text="$app.t('common.all')"></span>
        <span class="tabs-btn-count" x-text="fakten.length"></span>
      </button>
      <template x-for="k in wfKategorieListe" :key="k">
        <button type="button" class="tabs-btn"
                :class="{ 'tabs-btn--active': wfFilters.kategorie === k }"
                @click="wfFilters.kategorie = wfFilters.kategorie === k ? '' : k">
          <svg class="icon" aria-hidden="true"><use :href="'/icons.svg?v=636#' + wfKatIcon(k)"/></svg>
          <span x-text="wfKatLabel(k)"></span>
          <span class="tabs-btn-count" x-text="wfKatCount(k)"></span>
        </button>
      </template>
    </div>
    <span class="filter-count" x-text="wfFiltered.length + ' / ' + fakten.length"></span>
  </div>

  <!-- Fakten nach Kategorie gruppiert -->
  <div x-show="fakten.length > 0" class="weltfakten-groups">
    <template x-for="g in wfGrouped" :key="g.kategorie">
      <div class="weltfakten-group">
        <button type="button" class="collapsible-toggle weltfakten-group-head"
                x-show="!wfFilters.kategorie"
                @click="wfToggleGroup(g.kategorie)"
                :aria-expanded="wfGroupOpen(g.kategorie)">
          <span class="history-chevron" :class="{ open: wfGroupOpen(g.kategorie) }" aria-hidden="true">›</span>
          <span class="tag entity-typ-tag weltfakten-kat-tag">
            <svg class="icon" aria-hidden="true"><use :href="'/icons.svg?v=636#' + wfKatIcon(g.kategorie)"/></svg>
            <span x-text="wfKatLabel(g.kategorie)"></span>
          </span>
          <span class="weltfakten-group-count" x-text="g.fakten.length"></span>
        </button>
        <div x-show="wfGroupOpen(g.kategorie)" x-cloak class="entity-list entity-list--accented">
          <template x-for="f in g.fakten" :key="f.id">
            <div class="weltfakten-row" :class="{ 'weltfakten-row--nosubj': !f.subjekt }">
              <span x-show="f.subjekt" class="weltfakten-subjekt" x-text="f.subjekt"></span>
              <div class="weltfakten-row-body">
                <span class="weltfakten-fakt" x-text="f.fakt"></span>
                <div class="weltfakten-row-meta" x-show="f.kapitel?.length || f.seite">
                  <template x-for="k in (f.kapitel || [])" :key="k">
                    <span class="kapitel-badge kapitel-badge--primary internal-link" @click="$app.openKapitelByName(k)" x-text="k"></span>
                  </template>
                  <span x-show="f.seite" class="weltfakten-seite" x-text="f.seite"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>
