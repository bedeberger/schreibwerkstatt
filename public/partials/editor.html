<!-- Seiteneditor & Lektorat -->
<div class="card" id="editor-card" x-show="showEditorCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-title" x-text="t('editor.title', { name: currentPage?.name || '–' })"></span>
      <div class="card-subline">
        <span class="save-indicator" x-show="lastSavedLabel()"
              :class="{ 'save-indicator--draft': lastSavedKind() === 'draft', 'save-indicator--offline': saveOffline }"
              x-text="lastSavedKind() === 'draft' ? t('editor.draft', { when: lastSavedLabel() }) : t('editor.saved', { when: lastSavedLabel() })"
              :data-tip="lastSavedKind() === 'draft' ? t('editor.draftTitle') : t('editor.savedTitle')"></span>
        <span class="card-subline-sep" aria-hidden="true" x-show="lastSavedLabel() && currentPage?.url">·</span>
        <a x-show="currentPage?.url" :href="currentPage?.url" target="_blank" rel="noopener" class="card-subline-link" x-text="t('editor.openInBookstack')"></a>
        <span class="card-subline-sep" aria-hidden="true" x-show="currentPage?.url && currentPage?.revision_count > 0">·</span>
        <a x-show="currentPage?.url && currentPage?.revision_count > 0" :href="currentPage?.url + '/revisions'" target="_blank" rel="noopener" class="card-subline-link" :data-tip="t('editor.revisionsTitle')" x-text="t('editor.revisions', { n: currentPage?.revision_count })"></a>
        <span x-show="focusMode && editMode" class="focus-live-counter">
          <span x-text="t('editor.focus.counterTotal', { words: focusCountWords, chars: focusCountChars })"></span>
          <span class="focus-live-counter--today"
                x-text="t('editor.focus.counterToday', { wordsDelta: focusCountWordsDelta, charsDelta: focusCountCharsDelta })"></span>
        </span>
      </div>
    </div>
    <div class="card-header-aside">
      <span x-show="currentPage && tokEsts[currentPage.id]" class="tok-stats">
        <template x-if="tokEsts[currentPage?.id]?.words > 0">
          <span class="display-contents">
            <span class="tok-badge tok-neutral"
              x-text="tokEsts[currentPage.id]?.chars >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].chars/1000) + 'k Z' : tokEsts[currentPage.id]?.chars + ' Z'"></span>
            <span class="tok-badge tok-neutral"
              :data-tip="t('bookstats.metric.normseiten')"
              x-text="(Math.round((tokEsts[currentPage.id]?.chars || 0) / 1500 * 10) / 10).toLocaleString(uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + t('bookstats.unit.ns')"></span>
            <span class="tok-badge tok-neutral"
              x-text="tokEsts[currentPage.id]?.words >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].words/1000) + 'k W' : tokEsts[currentPage.id]?.words + ' W'"></span>
            <span class="tok-badge"
              :class="tokEsts[currentPage.id]?.tok > 16000 ? 'tok-high' : tokEsts[currentPage.id]?.tok > 4000 ? 'tok-med' : 'tok-ok'"
              x-text="tokEsts[currentPage.id]?.tok >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].tok/1000) + 'k T' : '~' + tokEsts[currentPage.id]?.tok + ' T'"
              ></span>
          </span>
        </template>
        <template x-if="tokEsts[currentPage?.id] && tokEsts[currentPage.id].words === 0">
          <span class="tok-badge tok-empty" x-text="t('sidebar.empty')"></span>
        </template>
      </span>
      <div class="card-actions">
      <template x-if="!editMode">
        <span class="display-contents">
          <button type="button" @click="runCheck()" :disabled="checkLoading || currentPageEmpty" :data-tip="currentPageEmpty ? t('editor.btn.pageEmpty') : t('editor.btn.checkTitle')" x-text="t('editor.btn.check')"></button>
          <button type="button" @click="startEdit()" :disabled="checkLoading || saveApplying != null || originalHtml === null" :data-tip="t('editor.btn.editTitle')" x-text="t('editor.btn.edit')"></button>
          <button type="button" @click="startFocusEdit()" :disabled="checkLoading || saveApplying != null || originalHtml === null" :data-tip="t('editor.btn.focusTitle')" x-text="t('editor.btn.focus')"></button>
          <button type="button" @click="closeFindings()" x-show="checkDone" :data-tip="t('editor.btn.exitCheckTitle')" x-text="t('editor.btn.exitCheck')"></button>
          <button type="button" class="success" @click="saveCorrections()" :disabled="saveApplying != null" x-show="(correctedHtml && selectedFindings.some(v => v)) || saveApplying != null">
            <span x-show="saveApplying != null" class="spinner"></span><span x-text="saveApplying != null ? t('editor.btn.saveCorrectionsProgress') : t('editor.btn.saveCorrections')"></span>
          </button>
          <button type="button" @click="toggleChatCard()" :class="{ primary: showChatCard }" :disabled="currentPageEmpty" :data-tip="t('editor.btn.chatTitle')">
            <span x-text="t('editor.btn.chat')"></span>
            <span class="btn-count" x-show="currentPageChatSessionCount > 0" x-text="currentPageChatSessionCount" :data-tip="t('editor.btn.chatCountTitle', { n: currentPageChatSessionCount })"></span>
          </button>
          <button type="button" @click="toggleIdeenCard()" :class="{ primary: showIdeenCard }" :data-tip="t('ideen.title')">
            <span x-text="t('ideen.title')"></span>
            <span class="btn-count" x-show="currentPageIdeenOpenCount > 0" x-text="currentPageIdeenOpenCount" :data-tip="t('ideen.openCountTitle', { n: currentPageIdeenOpenCount })"></span>
          </button>
        </span>
      </template>
      <template x-if="editMode">
        <span class="display-contents">
          <button type="button" class="success" @click="saveEdit()" :disabled="editSaving" :data-tip="t('editor.btn.saveEditTitle')">
            <span x-show="editSaving" class="spinner"></span><span x-text="editSaving ? t('common.saving') : t('common.save')"></span>
          </button>
          <button type="button" @click="cancelEdit()" :disabled="editSaving" x-text="t('common.cancel')"></button>
          <button type="button" @click="closeFindings()" x-show="checkDone && !focusMode" :data-tip="t('editor.btn.exitCheckTitle')" x-text="t('editor.btn.exitCheck')"></button>
          <button type="button" @click="toggleFocusMode()" :class="{ primary: focusMode }" :data-tip="focusMode ? t('editor.btn.leaveFocusTitle') : t('editor.btn.enterFocusTitle')" x-text="focusMode ? t('editor.btn.leaveFocus') : t('editor.btn.focusShort')"></button>
        </span>
      </template>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap" x-show="checkProgress > 0 || saveApplying != null">
    <div class="progress-bar" :style="{ '--progress': (checkProgress || saveApplying || 0) + '%' }"></div>
  </div>
  <div class="card-status" x-show="checkStatus" x-html="checkStatus"></div>
  <div id="status" x-html="statusHtml"></div>

  <!-- Figurenkontext-Panel (collapsible) -->
  <template x-if="chapterFigures.length > 0">
    <div class="figure-context-panel">
      <div class="figure-context-header" @click="showChapterFigures = !showChapterFigures">
        <span class="figure-context-title">
          <span class="figure-context-icon">F</span>
          <span x-text="t('editor.figuresInChapter', { n: chapterFigures.length })"></span>
        </span>
        <span class="history-chevron" :class="{ open: showChapterFigures }">›</span>
      </div>
      <div x-show="showChapterFigures" x-cloak class="figure-context-body">
        <template x-for="(fig, fi) in chapterFigures" :key="fi">
          <span class="figure-context-chip" x-data="{ show: false }" @mouseenter="show = true" @mouseleave="show = false">
            <span x-text="fig.kurzname || fig.name"></span>
            <span x-show="fig.typ" class="tag" x-text="t('figuren.type.' + fig.typ)"></span>
            <span x-show="fig.geburtstag" class="tag" x-text="'* ' + fig.geburtstag"></span>
            <div x-show="show" x-cloak class="figure-context-tooltip">
              <div class="figure-context-tooltip-name" x-text="fig.name"></div>
              <div x-show="fig.geburtstag" class="figure-context-tooltip-row"><span class="figure-context-label" x-text="t('figurLookup.geburt')"></span> <span x-text="fig.geburtstag"></span></div>
              <div x-show="fig.beruf" class="figure-context-tooltip-row"><span class="figure-context-label" x-text="t('figuren.field.beruf')"></span> <span x-text="fig.beruf"></span></div>
              <div x-show="fig.geschlecht" class="figure-context-tooltip-row"><span class="figure-context-label" x-text="t('editor.field.geschlecht')"></span> <span x-text="fig.geschlecht"></span></div>
              <div x-show="fig.beschreibung" class="figure-context-tooltip-desc" x-text="fig.beschreibung"></div>
            </div>
          </span>
        </template>
      </div>
    </div>
  </template>

  <!-- Preview + optional Befunde: Layout wird zum Split, sobald geprüft wurde.
       editMode zeigt contenteditable statt Preview (Findings bleiben rechts sichtbar). -->
  <div class="editor-body-wrap" :class="checkDone ? 'lektorat-split' : ''">
    <div class="editor-preview-wrap" :class="checkDone ? 'lektorat-split-preview' : ''">
      <div id="partial-editor-body-edit"></div>
      <div id="partial-editor-body-view"></div>
    </div>
    <div id="partial-editor-findings" class="display-contents"></div>
  </div>

  <!-- Verlauf dieser Seite (Partial → pageHistoryCard) -->
  <div id="partial-page-history" class="display-contents"></div>
</div>
