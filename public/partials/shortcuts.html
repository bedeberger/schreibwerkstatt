<!-- Tastenkürzel-Overlay (natives <dialog>) -->
<dialog id="shortcuts-dialog" class="shortcuts-panel"
        x-ref="shortcutsDialog"
        @cancel.prevent="closeShortcutsOverlay()"
        @click="if ($event.target === $el) closeShortcutsOverlay()">
  <div class="shortcuts-header">
    <span class="shortcuts-title" x-text="t('shortcuts.title')"></span>
    <button type="button" class="shortcuts-close" x-ref="shortcutsCloseBtn" @click="closeShortcutsOverlay()" :data-tip="t('common.close')" :aria-label="t('common.close')">&#x2715;</button>
  </div>

    <div class="shortcuts-section">
      <div class="shortcuts-section-title" x-text="t('shortcuts.section.global')"></div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd>K</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.palette')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd>?</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.help')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.esc')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.escape')"></span>
      </div>
    </div>

    <div class="shortcuts-section">
      <div class="shortcuts-section-title" x-text="t('shortcuts.section.search')"></div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd>P</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.searchTree')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd x-text="t('shortcuts.key.shift')"></kbd>+<kbd>F</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.searchBook')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.esc')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.searchClear')"></span>
      </div>
    </div>

    <div class="shortcuts-section">
      <div class="shortcuts-section-title" x-text="t('shortcuts.section.editor')"></div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.ctrl')"></kbd>+<kbd x-text="t('shortcuts.key.enter')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.runCheck')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd>S</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.saveEdit')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd>B</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.bold')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd>I</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.italic')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.rightClick')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.synonym')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd x-text="t('shortcuts.key.click')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.figurLookup')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd>F</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.find')"></span>
      </div>
    </div>

    <div class="shortcuts-section">
      <div class="shortcuts-section-title" x-text="t('shortcuts.section.focus')"></div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd x-text="t('shortcuts.key.shift')"></kbd>+<kbd>E</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.focusToggle')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.esc')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.focusExit')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.cmdCtrl')"></kbd>+<kbd>L</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.focusRecenter')"></span>
      </div>
    </div>

    <div class="shortcuts-section">
      <div class="shortcuts-section-title" x-text="t('shortcuts.section.navigation')"></div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.tab')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.skipLink')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.arrows')"></kbd> / <kbd x-text="t('shortcuts.key.enter')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.treeArrows')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.arrowsLR')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.treeChapter')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.alt')"></kbd>+<kbd>J</kbd> / <kbd x-text="t('shortcuts.key.alt')"></kbd>+<kbd>K</kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.findingsNav')"></span>
      </div>
    </div>

    <div class="shortcuts-section">
      <div class="shortcuts-section-title" x-text="t('shortcuts.section.mindmap')"></div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.arrows')"></kbd> <kbd x-text="t('shortcuts.key.arrowsLR')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.mindmapNav')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.tab')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.mindmapAddChild')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.enter')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.mindmapAddSibling')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.f2')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.mindmapRename')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.del')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.mindmapDelete')"></span>
      </div>
      <div class="shortcuts-row">
        <span class="shortcuts-keys"><kbd x-text="t('shortcuts.key.rightClick')"></kbd></span>
        <span class="shortcuts-desc" x-text="t('shortcuts.item.mindmapMenu')"></span>
      </div>
    </div>

  <div class="shortcuts-footer" x-text="t('shortcuts.footer')"></div>
</dialog>
