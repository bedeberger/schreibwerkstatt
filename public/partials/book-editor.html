<!-- Bucheditor: ganzes Buch als scrollbarer Stream.
     Alpine.data-Sub-Komponente — siehe public/js/cards/book-editor-card.js. -->
<div class="card card--bookeditor" x-data="bookEditorCard" x-show="$app.showBookEditorCard" x-cloak
     @keydown="onCardKeydown($event)">
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('bookEditor.title')"></span>
      <div class="card-subline">
        <span x-show="dirtyCount > 0" class="book-editor-counter book-editor-counter--dirty"
              x-text="$app.t('bookEditor.dirtyCount', { n: dirtyCount })"></span>
        <span x-show="savingCount > 0" class="book-editor-counter book-editor-counter--saving"
              x-text="$app.t('bookEditor.savingCount', { n: savingCount })"></span>
        <span x-show="blocks.length > 0 && dirtyCount === 0 && savingCount === 0"
              class="book-editor-counter book-editor-counter--clean"
              x-text="$app.t('bookEditor.allSaved')"></span>
      </div>
    </div>
    <div class="card-header-aside">
      <div class="card-actions">
        <button type="button" @click="outlineOpen = !outlineOpen"
                :class="{ primary: outlineOpen }"
                :data-tip="$app.t('bookEditor.btn.outlineTitle')"
                x-text="$app.t('bookEditor.btn.outline')"></button>
        <button type="button" @click="openFind()"
                :data-tip="$app.t('bookEditor.btn.findTitle')"
                x-text="$app.t('bookEditor.btn.find')"></button>
        <button type="button" class="success" @click="saveAllDirty()"
                :disabled="saveAllRunning || dirtyCount === 0"
                :data-tip="$app.t('bookEditor.btn.saveAllTitle')">
          <span x-show="saveAllRunning" class="spinner"></span>
          <span x-text="saveAllRunning ? $app.t('bookEditor.btn.saveAllProgress', { done: saveAllDone, total: saveAllTotal }) : $app.t('bookEditor.btn.saveAll')"></span>
        </button>
      </div>
    </div>
  </div>

  <div x-show="loading" class="card-status">
    <span class="spinner"></span>
    <span x-text="$app.t('bookEditor.loading')"></span>
  </div>
  <div x-show="loadError" class="card-status book-editor-load-error" x-text="loadError"></div>

  <div class="book-editor-layout" :class="{ 'book-editor-layout--no-outline': !outlineOpen }"
       x-show="!loading && blocks.length > 0">

    <!-- Outline / Inhaltsverzeichnis -->
    <aside class="book-editor-outline" x-show="outlineOpen" x-cloak>
      <div class="book-editor-outline-title" x-text="$app.t('bookEditor.outline.title')"></div>
      <nav class="book-editor-outline-nav" :aria-label="$app.t('bookEditor.outline.title')">
        <template x-for="node in outlineNodes" :key="node.kind === 'chapter' ? ('c-' + node.chapterId) : ('s-' + (node.pages?.[0]?.pageId || 0))">
          <div class="book-editor-outline-group">

            <template x-if="node.kind === 'chapter'">
              <button type="button"
                      class="book-editor-outline-chapter"
                      :class="{ 'book-editor-outline-chapter--collapsed': !!collapsedChapters[node.chapterId] }"
                      @click="toggleChapterCollapse(node.chapterId)">
                <span class="book-editor-outline-chevron" x-text="collapsedChapters[node.chapterId] ? '›' : '⌄'"></span>
                <span class="book-editor-outline-chapter-name" x-text="node.name"></span>
                <span class="book-editor-outline-count" x-text="node.pages.length"></span>
              </button>
            </template>

            <template x-if="node.kind === 'chapter' && !collapsedChapters[node.chapterId]">
              <ul class="book-editor-outline-pages">
                <template x-for="pg in node.pages" :key="pg.pageId">
                  <li>
                    <button type="button"
                            class="book-editor-outline-page"
                            :class="{
                              'book-editor-outline-page--active': visiblePageId === pg.pageId,
                              ['book-editor-outline-page--' + outlinePageStatus(pg.block)]: !!outlinePageStatus(pg.block),
                            }"
                            @click="scrollToBlock(pg.pageId)">
                      <span class="book-editor-outline-dot" aria-hidden="true"></span>
                      <span class="book-editor-outline-page-name" x-text="pg.name"></span>
                    </button>
                  </li>
                </template>
              </ul>
            </template>

            <template x-if="node.kind === 'solos'">
              <ul class="book-editor-outline-pages book-editor-outline-pages--solo">
                <template x-for="pg in node.pages" :key="pg.pageId">
                  <li>
                    <button type="button"
                            class="book-editor-outline-page"
                            :class="{
                              'book-editor-outline-page--active': visiblePageId === pg.pageId,
                              ['book-editor-outline-page--' + outlinePageStatus(pg.block)]: !!outlinePageStatus(pg.block),
                            }"
                            @click="scrollToBlock(pg.pageId)">
                      <span class="book-editor-outline-dot" aria-hidden="true"></span>
                      <span class="book-editor-outline-page-name" x-text="pg.name"></span>
                    </button>
                  </li>
                </template>
              </ul>
            </template>

          </div>
        </template>
      </nav>
    </aside>

    <div class="book-editor-stream">
    <template x-for="block in blocks" :key="block.kind === 'chapter' ? ('c-' + block.chapterId) : ('p-' + block.pageId)">
      <div class="book-editor-row">

        <template x-if="block.kind === 'chapter'">
          <div class="book-editor-chapter-header">
            <span class="book-editor-chapter-name" x-text="block.name"></span>
          </div>
        </template>

        <template x-if="block.kind === 'page'">
          <div class="book-editor-page-card"
               :data-outline-page-id="block.pageId"
               :class="{
                 'book-editor-page-card--active': activePageId === block.pageId,
                 'book-editor-page-card--dirty': block.dirty,
                 'book-editor-page-card--saving': block.saving,
                 'book-editor-page-card--conflict': !!block.conflict,
                 'book-editor-page-card--error': !!block.saveError,
               }">
            <div class="book-editor-page-header">
              <span class="book-editor-page-name" x-text="block.name"></span>
              <span class="book-editor-page-status"
                    :class="'book-editor-page-status--' + blockStatusKey(block)"
                    x-html="blockStatusLine(block)"></span>
            </div>

            <!-- Body wird imperativ via _mountBlockEl gefüllt; _maybeRehydrate
                 refresht inaktive Blöcke bei externen Mutationen (Find/Replace,
                 Reload). HTML-Quelle ist BookStack-Proxy (server-cleant). -->
            <div class="book-editor-page-body"
                 :data-book-editor-page="block.pageId"
                 :contenteditable="activePageId === block.pageId"
                 :spellcheck="!$app.languagetoolEnabled"
                 x-init="_mountBlockEl($el, block)"
                 x-effect="_maybeRehydrate($el, block)"
                 @mousedown="_onBlockMousedown(block, $event)"
                 @click="activateBlock(block)"
                 @keydown="onBlockKeydown(block, $event)"
                 @input="_onBlockInput(block, $event)"
                 @paste="_onBlockPaste(block, $event)"
                 @copy="_onBlockCopy(block, $event)"
                 @cut="_onBlockCut(block, $event)"></div>

            <div x-show="block.conflict" x-cloak class="book-editor-conflict">
              <svg class="icon book-editor-conflict__icon" aria-hidden="true"><use href="/icons.svg?v=636#alert-triangle"/></svg>
              <span x-text="$app.t('bookEditor.conflict.banner', {
                user: block.conflict?.remoteUserName || $app.t('edit.conflict.unknownUser')
              })"></span>
              <button type="button" class="danger" @click="resolveConflictOverwrite(block)"
                      x-text="$app.t('bookEditor.conflict.overwrite')"></button>
              <button type="button" @click="resolveConflictTakeRemote(block)"
                      x-text="$app.t('bookEditor.conflict.takeRemote')"></button>
            </div>
          </div>
        </template>

      </div>
    </template>
    </div>
  </div>

  <div x-show="!loading && blocks.length === 0 && !loadError" class="card-status"
       x-text="$app.t('bookEditor.empty')"></div>

  <!-- Find / Replace Bar — teleportiert nach <body>, damit position:fixed greift. -->
  <template x-teleport="body">
    <div x-show="findOpen && $app.showBookEditorCard" x-cloak
         class="book-editor-find"
         role="dialog"
         aria-modal="true"
         :aria-label="$app.t('bookEditor.find.title')"
         @keydown.escape.stop="closeFind()"
         @mousedown.stop>
      <div class="book-editor-find-row">
        <input type="text"
               class="book-editor-find-input"
               x-model="findTerm"
               @input="onFindInput()"
               @keydown="onFindKeydown($event)"
               :placeholder="$app.t('bookEditor.find.placeholder')"
               :aria-label="$app.t('bookEditor.find.placeholder')">
        <span class="book-editor-find-count"
              x-text="findTerm
                ? (findMatches.length > 0
                    ? $app.t('find.counter', { i: findIndex + 1, n: findMatches.length })
                    : $app.t('find.noMatches'))
                : ''"></span>
        <button type="button" class="book-editor-find-btn" @click="findPrev()"
                :disabled="findMatches.length === 0"
                :data-tip="$app.t('find.prev')" :aria-label="$app.t('find.prev')">&#x2191;</button>
        <button type="button" class="book-editor-find-btn" @click="findNext()"
                :disabled="findMatches.length === 0"
                :data-tip="$app.t('find.next')" :aria-label="$app.t('find.next')">&#x2193;</button>
        <button type="button" class="book-editor-find-btn"
                :class="{ 'book-editor-find-btn--active': findCaseSensitive }"
                @click="findCaseSensitive = !findCaseSensitive; recomputeFindMatches()"
                :data-tip="$app.t('find.caseSensitive')" :aria-label="$app.t('find.caseSensitive')"
                :aria-pressed="findCaseSensitive">Aa</button>
        <button type="button" class="book-editor-find-btn"
                :class="{ 'book-editor-find-btn--active': findWholeWord }"
                @click="findWholeWord = !findWholeWord; recomputeFindMatches()"
                :data-tip="$app.t('find.wholeWord')" :aria-label="$app.t('find.wholeWord')"
                :aria-pressed="findWholeWord">W</button>
        <button type="button" class="book-editor-find-close" @click="closeFind()"
                :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">&#x2715;</button>
      </div>
      <div class="book-editor-find-row">
        <input type="text"
               class="book-editor-find-input book-editor-find-input--replace"
               x-model="findReplace"
               @keydown.escape.stop="closeFind()"
               :placeholder="$app.t('find.replacePlaceholder')"
               :aria-label="$app.t('find.replacePlaceholder')">
        <button type="button" class="book-editor-find-btn book-editor-find-btn--text"
                @click="replaceCurrent()"
                :disabled="findMatches.length === 0"
                x-text="$app.t('find.replace')"></button>
        <button type="button" class="book-editor-find-btn book-editor-find-btn--text"
                @click="replaceAll()"
                :disabled="findMatches.length === 0"
                x-text="$app.t('find.replaceAll')"></button>
      </div>
    </div>
  </template>
</div>
