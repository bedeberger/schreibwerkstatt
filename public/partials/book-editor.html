<!-- Bucheditor: ganzes Buch als scrollbarer Stream.
     Alpine.data-Sub-Komponente — siehe public/js/cards/book-editor-card.js. -->
<div class="card card--bookeditor" x-data="bookEditorCard" x-show="$app.showBookEditorCard" x-cloak
     @keydown="onCardKeydown($event)">
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('bookEditor.title')"></span>
      <div class="card-subline">
        <span x-show="dirtyCount > 0" class="book-editor-counter book-editor-counter--dirty"
              x-text="$app.t('bookEditor.dirtyCount', { n: dirtyCount })"></span>
        <span x-show="savingCount > 0" class="book-editor-counter book-editor-counter--saving"
              x-text="$app.t('bookEditor.savingCount', { n: savingCount })"></span>
        <span x-show="blocks.length > 0 && dirtyCount === 0 && savingCount === 0"
              class="book-editor-counter book-editor-counter--clean"
              x-text="$app.t('bookEditor.allSaved')"></span>
      </div>
    </div>
    <div class="card-header-aside">
      <div class="card-actions">
        <button type="button" class="icon-btn icon-btn--ghost" @click="outlineOpen = !outlineOpen"
                :class="{ 'is-active': outlineOpen }"
                :data-tip="$app.t('bookEditor.btn.outlineTitle')"
                :aria-label="$app.t('bookEditor.btn.outline')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#list"/></svg>
        </button>
        <button type="button" class="icon-btn icon-btn--ghost" @click="openFind()"
                :data-tip="$app.t('bookEditor.btn.findTitle')"
                :aria-label="$app.t('bookEditor.btn.find')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#search"/></svg>
        </button>
        <span class="icon-btn-badge-wrap" x-show="commentThreads.length > 0" x-cloak>
          <button type="button" class="icon-btn icon-btn--ghost" @click="toggleCommentRail()"
                  :class="{ 'is-active': commentRailVisible }"
                  :aria-pressed="commentRailVisible"
                  :data-tip="$app.t('share.rail.toggle')" :aria-label="$app.t('share.rail.toggle')">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#users"/></svg>
          </button>
          <span class="icon-btn-badge" x-text="commentThreads.length"
                :data-tip="$app.t('share.openCommentsTitle', { n: commentThreads.length })"></span>
        </span>
        <span class="icon-btn-badge-wrap">
          <button type="button" class="icon-btn icon-btn--ghost icon-btn--success" @click="saveAllDirty()"
                  :disabled="saveAllRunning || dirtyCount === 0"
                  :data-tip="saveAllRunning ? $app.t('bookEditor.btn.saveAllProgress', { done: saveAllDone, total: saveAllTotal }) : $app.t('bookEditor.btn.saveAllTitle')"
                  :aria-label="$app.t('bookEditor.btn.saveAll')">
            <span x-show="saveAllRunning" class="spinner"></span>
            <svg x-show="!saveAllRunning" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#check"/></svg>
          </button>
          <span class="icon-btn-badge" x-show="dirtyCount > 0" x-text="dirtyCount"></span>
        </span>
        <button type="button" class="icon-btn icon-btn--ghost"
                :aria-pressed="bookEditorFullscreen"
                @click="toggleBookEditorFullscreen()"
                :aria-label="bookEditorFullscreen ? $app.t('bookEditor.fullscreenExit.tip') : $app.t('bookEditor.fullscreen.tip')"
                :data-tip="bookEditorFullscreen ? $app.t('bookEditor.fullscreenExit.tip') : $app.t('bookEditor.fullscreen.tip')">
          <svg class="icon" aria-hidden="true"><use :href="bookEditorFullscreen ? '/icons.svg?v=693#minimize-2' : '/icons.svg?v=693#maximize-2'"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div x-show="loading" class="card-status">
    <span class="spinner"></span>
    <span x-text="$app.t('bookEditor.loading')"></span>
  </div>
  <div x-show="loadError" class="card-status book-editor-load-error" x-text="loadError"></div>

  <div class="book-editor-layout"
       :class="{ 'book-editor-layout--no-outline': !outlineOpen,
                 'book-editor-layout--comments': commentRailVisible && commentThreads.length }"
       x-show="!loading && blocks.length > 0">

    <!-- Outline / Inhaltsverzeichnis -->
    <aside class="book-editor-outline" x-show="outlineOpen" x-cloak>
      <div class="book-editor-outline-title" x-text="$app.t('bookEditor.outline.title')"></div>
      <nav class="book-editor-outline-nav" :aria-label="$app.t('bookEditor.outline.title')">
        <template x-for="node in outlineNodes" :key="node.kind === 'chapter' ? ('c-' + node.chapterId) : ('s-' + (node.pages?.[0]?.pageId || 0))">
          <div class="book-editor-outline-group">

            <template x-if="node.kind === 'chapter'">
              <button type="button"
                      class="book-editor-outline-chapter"
                      :class="{ 'book-editor-outline-chapter--collapsed': !!collapsedChapters[node.chapterId] }"
                      @click="toggleChapterCollapse(node.chapterId)">
                <span class="book-editor-outline-chevron" x-text="collapsedChapters[node.chapterId] ? '›' : '⌄'"></span>
                <span class="book-editor-outline-chapter-name" x-text="node.name"></span>
                <span class="book-editor-outline-count" x-text="node.pages.length"></span>
              </button>
            </template>

            <template x-if="node.kind === 'chapter' && !collapsedChapters[node.chapterId]">
              <ul class="book-editor-outline-pages">
                <template x-for="pg in node.pages" :key="pg.pageId">
                  <li>
                    <button type="button"
                            class="book-editor-outline-page"
                            :class="{
                              'book-editor-outline-page--active': visiblePageId === pg.pageId,
                              ['book-editor-outline-page--' + outlinePageStatus(pg.block)]: !!outlinePageStatus(pg.block),
                            }"
                            @click="scrollToBlock(pg.pageId)">
                      <span class="book-editor-outline-dot" aria-hidden="true"></span>
                      <span class="book-editor-outline-page-name" x-text="pg.name"></span>
                    </button>
                  </li>
                </template>
              </ul>
            </template>

            <template x-if="node.kind === 'solos'">
              <ul class="book-editor-outline-pages book-editor-outline-pages--solo">
                <template x-for="pg in node.pages" :key="pg.pageId">
                  <li>
                    <button type="button"
                            class="book-editor-outline-page"
                            :class="{
                              'book-editor-outline-page--active': visiblePageId === pg.pageId,
                              ['book-editor-outline-page--' + outlinePageStatus(pg.block)]: !!outlinePageStatus(pg.block),
                            }"
                            @click="scrollToBlock(pg.pageId)">
                      <span class="book-editor-outline-dot" aria-hidden="true"></span>
                      <span class="book-editor-outline-page-name" x-text="pg.name"></span>
                    </button>
                  </li>
                </template>
              </ul>
            </template>

          </div>
        </template>
      </nav>
    </aside>

    <div class="book-editor-stream">
    <template x-for="block in blocks" :key="block.kind === 'chapter' ? ('c-' + block.chapterId) : ('p-' + block.pageId)">
      <div class="book-editor-row">

        <template x-if="block.kind === 'chapter'">
          <div class="book-editor-chapter-header">
            <span class="book-editor-chapter-name" x-text="block.name"></span>
          </div>
        </template>

        <template x-if="block.kind === 'page'">
          <div class="book-editor-page-card"
               :data-outline-page-id="block.pageId"
               :class="{
                 'book-editor-page-card--active': activePageId === block.pageId,
                 'book-editor-page-card--dirty': block.dirty,
                 'book-editor-page-card--saving': block.saving,
                 'book-editor-page-card--conflict': !!block.conflict,
                 'book-editor-page-card--error': !!block.saveError,
               }">
            <div class="book-editor-page-header">
              <span class="book-editor-page-name" x-text="block.name"></span>
              <span class="book-editor-page-status"
                    :class="'book-editor-page-status--' + blockStatusKey(block)"
                    x-html="blockStatusLine(block)"></span>
            </div>

            <!-- Body wird imperativ via _mountBlockEl gefüllt; _maybeRehydrate
                 refresht inaktive Blöcke bei externen Mutationen (Find/Replace,
                 Reload). HTML-Quelle ist BookStack-Proxy (server-cleant). -->
            <div class="book-editor-page-body"
                 :data-book-editor-page="block.pageId"
                 :contenteditable="activePageId === block.pageId"
                 :spellcheck="!$app.languagetoolEnabled"
                 x-init="_mountBlockEl($el, block)"
                 x-effect="_maybeRehydrate($el, block)"
                 @mousedown="_onBlockMousedown(block, $event)"
                 @click="activateBlock(block)"
                 @keydown="onBlockKeydown(block, $event)"
                 @input="_onBlockInput(block, $event)"
                 @paste="_onBlockPaste(block, $event)"
                 @copy="_onBlockCopy(block, $event)"
                 @cut="_onBlockCut(block, $event)"></div>

            <div x-show="block.conflict" x-cloak class="book-editor-conflict">
              <svg class="icon book-editor-conflict__icon" aria-hidden="true"><use href="/icons.svg?v=690#alert-triangle"/></svg>
              <span x-text="$app.t('bookEditor.conflict.banner', {
                user: block.conflict?.remoteUserName || $app.t('edit.conflict.unknownUser')
              })"></span>
              <button type="button" class="danger" @click="resolveConflictOverwrite(block)"
                      x-text="$app.t('bookEditor.conflict.overwrite')"></button>
              <button type="button" @click="resolveConflictTakeRemote(block)"
                      x-text="$app.t('bookEditor.conflict.takeRemote')"></button>
            </div>
          </div>
        </template>

      </div>
    </template>
    </div>

    <!-- Kommentar-Leiste: verankerte Leser-Kommentare des ganzen Buchs (reuse
         .comment-rail*-Optik). Methoden in editor/book-editor-comments.js. -->
    <aside class="comment-rail book-editor-comments"
           x-show="commentRailVisible && commentThreads.length" x-cloak
           :aria-label="$app.t('share.rail.title')">
      <div class="comment-rail__head">
        <span class="comment-rail__title" x-text="$app.t('share.comments.countLabel', { count: commentThreads.length })"></span>
        <button type="button" class="icon-btn icon-btn--ghost" @click="toggleCommentRail()"
                :data-tip="$app.t('share.rail.collapse')" :aria-label="$app.t('share.rail.collapse')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg>
        </button>
      </div>

      <template x-for="thread in commentThreads" :key="thread.root.id">
        <div class="comment-rail__thread"
             :class="{ 'comment-rail__thread--selected': commentSelectedRootId === thread.root.id,
                       'comment-rail__thread--resolved': thread.root.resolved_at }">

          <div class="comment-rail__anchor internal-link" role="button" tabindex="0"
               @click="selectCommentThread(thread.root.id)"
               @keydown.enter.prevent="selectCommentThread(thread.root.id)">
            <span class="comment-rail__quote" x-show="!thread.changed"
                  x-text="'„' + (thread.root.anchor_quote || '') + '“'"></span>
            <template x-if="thread.changed">
              <div class="comment-rail__changed">
                <span class="comment-rail__changed-badge" x-text="$app.t('share.comments.textChanged')"></span>
                <div class="comment-rail-diff" x-show="thread._diffHtml" x-html="thread._diffHtml"></div>
                <span class="comment-rail__quote comment-rail__quote--stale" x-show="!thread._diffHtml"
                      x-text="'„' + (thread.root.anchor_quote || '') + '“'"></span>
              </div>
            </template>
          </div>

          <div class="comment-rail__comment">
            <div class="comment-rail__meta">
              <span x-text="commentAuthorLabel(thread.root)"></span>
              <span x-show="thread.root.resolved_at" class="comment-rail__resolved"
                    x-text="$app.t('share.comments.resolved')"></span>
            </div>
            <div class="comment-rail__body" x-text="thread.root.body"></div>
          </div>

          <template x-for="r in thread.replies" :key="r.id">
            <div class="comment-rail__comment comment-rail__comment--reply"
                 :class="{ 'comment-rail__comment--author': r.author_email }">
              <div class="comment-rail__meta"><span x-text="commentAuthorLabel(r)"></span></div>
              <div class="comment-rail__body" x-text="r.body"></div>
              <button type="button" class="comment-rail__link" @click="deleteBookComment(r)"
                      x-text="$app.t('common.delete')"></button>
            </div>
          </template>

          <template x-if="commentSelectedRootId === thread.root.id">
            <div class="comment-rail__foot">
              <div class="comment-rail__actions">
                <button type="button" class="comment-rail__link"
                        :disabled="commentSavingResolve === thread.root.id"
                        @click="toggleCommentResolve(thread.root)"
                        x-text="thread.root.resolved_at ? $app.t('share.comments.reopen') : $app.t('share.comments.resolve')"></button>
                <button type="button" class="comment-rail__link comment-rail__link--danger"
                        @click="deleteBookComment(thread.root)"
                        x-text="$app.t('common.delete')"></button>
              </div>
              <form class="comment-rail__reply" @submit.prevent="replyToCommentRoot(thread)">
                <textarea x-model="commentReplyDrafts[thread.root.id]" rows="2"
                          :placeholder="$app.t('share.comments.replyPlaceholder')"
                          maxlength="4000" data-spellcheck="spelling"
                          class="comment-rail__textarea"></textarea>
                <button type="submit" class="btn-compact"
                        :disabled="commentSavingReply === thread.root.id || !(commentReplyDrafts[thread.root.id] || '').trim()"
                        x-text="$app.t('share.comments.send')"></button>
              </form>
            </div>
          </template>
        </div>
      </template>
    </aside>
  </div>

  <div x-show="!loading && blocks.length === 0 && !loadError" class="card-status"
       x-text="$app.t('bookEditor.empty')"></div>

  <!-- Find / Replace Bar — teleportiert in die Karten-Wurzel (nicht <body>),
       damit die Bar im Native-Vollbild Teil des Top-Layers bleibt; position:fixed
       greift weiterhin (die Karte hat keinen persistenten Transform). -->
  <template x-teleport=".card--bookeditor">
    <div x-show="findOpen && $app.showBookEditorCard" x-cloak
         class="book-editor-find"
         role="dialog"
         aria-modal="true"
         :aria-label="$app.t('bookEditor.find.title')"
         @keydown.escape.stop="closeFind()"
         @mousedown.stop>
      <div class="book-editor-find-row">
        <input type="text"
               class="book-editor-find-input"
               x-model="findTerm"
               @input="onFindInput()"
               @keydown="onFindKeydown($event)"
               :placeholder="$app.t('bookEditor.find.placeholder')"
               :aria-label="$app.t('bookEditor.find.placeholder')">
        <span class="book-editor-find-count"
              x-text="findTerm
                ? (findMatches.length > 0
                    ? $app.t('find.counter', { i: findIndex + 1, n: findMatches.length })
                    : $app.t('find.noMatches'))
                : ''"></span>
        <button type="button" class="book-editor-find-btn" @click="findPrev()"
                :disabled="findMatches.length === 0"
                :data-tip="$app.t('find.prev')" :aria-label="$app.t('find.prev')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#chevron-up"/></svg></button>
        <button type="button" class="book-editor-find-btn" @click="findNext()"
                :disabled="findMatches.length === 0"
                :data-tip="$app.t('find.next')" :aria-label="$app.t('find.next')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#chevron-down"/></svg></button>
        <button type="button" class="book-editor-find-btn"
                :class="{ 'book-editor-find-btn--active': findCaseSensitive }"
                @click="findCaseSensitive = !findCaseSensitive; recomputeFindMatches()"
                :data-tip="$app.t('find.caseSensitive')" :aria-label="$app.t('find.caseSensitive')"
                :aria-pressed="findCaseSensitive">Aa</button>
        <button type="button" class="book-editor-find-btn"
                :class="{ 'book-editor-find-btn--active': findWholeWord }"
                @click="findWholeWord = !findWholeWord; recomputeFindMatches()"
                :data-tip="$app.t('find.wholeWord')" :aria-label="$app.t('find.wholeWord')"
                :aria-pressed="findWholeWord">W</button>
        <button type="button" class="book-editor-find-close" @click="closeFind()"
                :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
      </div>
      <div class="book-editor-find-row">
        <input type="text"
               class="book-editor-find-input book-editor-find-input--replace"
               x-model="findReplace"
               @keydown.escape.stop="closeFind()"
               :placeholder="$app.t('find.replacePlaceholder')"
               :aria-label="$app.t('find.replacePlaceholder')">
        <button type="button" class="book-editor-find-btn book-editor-find-btn--text"
                @click="replaceCurrent()"
                :disabled="findMatches.length === 0"
                x-text="$app.t('find.replace')"></button>
        <button type="button" class="book-editor-find-btn book-editor-find-btn--text"
                @click="replaceAll()"
                :disabled="findMatches.length === 0"
                x-text="$app.t('find.replaceAll')"></button>
      </div>
    </div>
  </template>
</div>
