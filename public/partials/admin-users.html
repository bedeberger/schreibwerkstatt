<!-- Admin-User-Verwaltung -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/admin-users-card.js.
  `showAdminUsersCard` + `toggleAdminUsersCard` im Root. Nur sichtbar bei
  $store.session.currentUser.role === 'admin' — Frontend-Guard zusaetzlich zum
  Server-side requireAdmin (lib/admin-mw.js).
-->
<div class="card card--admin-users" x-data="adminUsersCard" x-show="$app.showAdminUsersCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('admin.users.title')"></span>
    <div class="card-actions">
      <button type="button" class="icon-btn icon-btn--ghost" @click="adminUsersLoad()" :disabled="adminUsersLoading" :data-tip="$app.t('common.refresh')" :aria-label="$app.t('common.refresh')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg></button>
    </div>
  </div>

  <div x-show="adminUsersLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>
  <div x-show="adminUsersError" class="error-msg" x-text="adminUsersError"></div>

  <!-- Tab-Navigation Users / Invites / Requests -->
  <nav class="admin-users-tabs" role="tablist">
    <button type="button" role="tab"
            :class="adminUsersTab === 'users' ? 'is-active' : ''"
            @click="adminUsersTab = 'users'"
            x-text="$app.t('admin.users.tab.users')"></button>
    <button type="button" role="tab"
            :class="adminUsersTab === 'invites' ? 'is-active' : ''"
            @click="adminUsersTab = 'invites'"
            x-text="$app.t('admin.users.tab.invites')"></button>
    <button type="button" role="tab"
            :class="adminUsersTab === 'requests' ? 'is-active' : ''"
            @click="adminUsersTab = 'requests'"
            x-text="$app.t('admin.users.tab.requests')"></button>
  </nav>

  <div class="card-form-grid" x-show="!adminUsersLoading && adminUsersTab === 'users'">

    <!-- Invite-Sektion -->
    <fieldset class="admin-users-invite">
      <legend x-text="$app.t('admin.users.invite')"></legend>
      <div class="admin-users-invite-row">
        <input type="email" x-model="adminUsersInviteEmail"
               :placeholder="$app.t('admin.users.invite.emailPlaceholder')"
               :disabled="adminUsersInviting">
        <div x-data="combobox({ placeholder: $app.t('admin.users.role'), compact: false })"
             x-modelable="value" x-model="adminUsersInviteRole"
             x-effect="options = [
               { value: 'user',  label: $app.t('admin.users.role.user') },
               { value: 'admin', label: $app.t('admin.users.role.admin') },
             ]"></div>
        <button type="button" @click="adminUsersInvite()" :disabled="adminUsersInviting || !adminUsersInviteEmail">
          <span x-text="adminUsersInviting ? $app.t('common.saving') : $app.t('admin.users.invite.submit')"></span>
        </button>
      </div>
      <div class="admin-users-invite-result" x-show="adminUsersInviteResult">
        <span class="muted-msg muted-msg--sm" x-text="$app.t('admin.users.invite.created', { email: adminUsersInviteResult?.email })"></span>
        <span class="muted-msg muted-msg--sm"
              x-show="adminUsersInviteResult?.mail?.sent"
              x-text="$app.t('admin.users.invite.mailSent')"></span>
        <span class="muted-msg muted-msg--sm"
              x-show="adminUsersInviteResult && adminUsersInviteResult.mail && !adminUsersInviteResult.mail.sent"
              x-text="$app.t('admin.users.invite.mailerDisabledHint')"></span>
        <div class="admin-users-invite-url">
          <code x-text="adminUsersInviteResult?.url"></code>
          <button x-data="copyButton({ text: () => adminUsersInviteResult?.url })"></button>
        </div>
      </div>
    </fieldset>

    <!-- User-Tabelle -->
    <div class="table-scroll" x-show="adminUsersList.length">
    <table class="admin-users-table"
           x-data="sortableTable({
             rows: () => adminUsersList,
             defaultKey: 'email',
             persistKey: 'admin.users',
             types: { last_seen_at: 'date' },
           })">
      <thead>
        <tr>
          <th class="sortable-th" :class="sortClass('email')" :aria-sort="ariaSort('email')"
              @click="sortBy('email')" x-text="$app.t('admin.users.email')"></th>
          <th class="sortable-th" :class="sortClass('global_role')" :aria-sort="ariaSort('global_role')"
              @click="sortBy('global_role')" x-text="$app.t('admin.users.role')"></th>
          <th x-text="$app.t('admin.users.aiProvider')"></th>
          <th class="sortable-th" :class="sortClass('status')" :aria-sort="ariaSort('status')"
              @click="sortBy('status')" x-text="$app.t('admin.users.status')"></th>
          <th class="sortable-th" :class="sortClass('last_seen_at')" :aria-sort="ariaSort('last_seen_at')"
              @click="sortBy('last_seen_at')" x-text="$app.t('admin.users.lastLogin')"></th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="u in sorted" :key="u.email">
          <tr>
            <td>
              <div x-text="u.display_name || u.email"></div>
              <div class="muted-msg muted-msg--sm" x-text="u.email"></div>
            </td>
            <td>
              <div x-data="combobox($app.t('admin.users.role'))"
                   x-effect="value = u.global_role; options = [
                     { value: 'user',  label: $app.t('admin.users.role.user') },
                     { value: 'admin', label: $app.t('admin.users.role.admin') },
                   ]"
                   @combobox-change="if ($event.detail && $event.detail !== u.global_role) adminUsersUpdate(u, { global_role: $event.detail })"></div>
            </td>
            <td>
              <div x-data="combobox($app.t('admin.users.aiProvider'))"
                   x-effect="value = u.ai_provider_override || ''; options = [
                     { value: '',        label: $app.t('admin.users.aiProvider.global', { provider: adminUsersGlobalProvider }) },
                     { value: 'claude',        label: 'claude' },
                     { value: 'ollama',        label: 'ollama' },
                     { value: 'openai-compat', label: 'openai-compat' },
                   ]"
                   @combobox-change="if ($event.detail !== (u.ai_provider_override || '')) adminUsersUpdate(u, { ai_provider_override: $event.detail || null })"></div>
            </td>
            <td>
              <span class="badge" :class="'badge--status-' + u.status" x-text="$app.t('admin.users.status.' + u.status)"></span>
            </td>
            <td>
              <span class="muted-msg muted-msg--sm" x-text="u.last_seen_at ? new Date(u.last_seen_at).toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone }) : '—'"></span>
            </td>
            <td class="admin-users-actions">
              <button type="button"
                      @click="adminUsersUpdate(u, { status: u.status === 'suspended' ? 'active' : 'suspended' })"
                      x-text="u.status === 'suspended' ? $app.t('admin.users.reactivate') : $app.t('admin.users.suspend')"></button>
              <button type="button" @click="adminUsersToggleAudit(u)"
                      x-text="adminUsersAuditEmail === u.email ? $app.t('admin.users.auditClose') : $app.t('admin.users.audit')"></button>
              <button type="button" class="danger" @click="adminUsersDelete(u)"
                      x-show="u.email !== $store.session.currentUser?.email"
                      x-text="$app.t('admin.users.delete')"></button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    </div>

    <!-- Audit-Drawer -->
    <div class="admin-users-audit" x-show="adminUsersAuditEmail">
      <h3 x-text="$app.t('admin.users.auditTitle', { email: adminUsersAuditEmail })"></h3>
      <ul>
        <template x-for="ev in adminUsersAuditEvents" :key="ev.id">
          <li>
            <span class="badge" :class="'badge--event-' + ev.event" x-text="ev.event"></span>
            <span class="muted-msg muted-msg--sm" x-text="new Date(ev.created_at).toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone })"></span>
            <span class="muted-msg" x-show="ev.ip" x-text="' • ' + ev.ip"></span>
            <pre class="admin-users-meta" x-show="ev.meta_json" x-text="ev.meta_json"></pre>
          </li>
        </template>
        <li x-show="!adminUsersAuditEvents.length" class="muted-msg" x-text="$app.t('admin.users.auditEmpty')"></li>
      </ul>
    </div>

  </div>

  <!-- Eingeladene-Benutzer-Tab -->
  <div class="card-form-grid" x-show="!adminUsersLoading && adminUsersTab === 'invites'">

    <div class="admin-users-requests-filter">
      <button type="button" class="icon-btn icon-btn--ghost" @click="adminUsersInvitesLoad()" :disabled="adminUsersInvitesLoading" :data-tip="$app.t('common.refresh')" :aria-label="$app.t('common.refresh')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg></button>
    </div>

    <div x-show="adminUsersInvitesLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

    <!-- Reminder-Result -->
    <div class="admin-users-invite-result" x-show="adminUsersInvitesResult">
      <span class="muted-msg muted-msg--sm"
            x-show="adminUsersInvitesResult?.mail?.sent"
            x-text="$app.t('admin.users.invites.reminderSent')"></span>
      <span class="muted-msg muted-msg--sm"
            x-show="adminUsersInvitesResult && !adminUsersInvitesResult.cooldown && !adminUsersInvitesResult?.mail?.sent"
            x-text="$app.t('admin.users.invites.reminderMailerDisabled')"></span>
      <span class="muted-msg muted-msg--sm"
            x-show="adminUsersInvitesResult?.cooldown"
            x-text="$app.t('admin.users.invites.reminderCooldown', { hours: Math.ceil((adminUsersInvitesResult?.retryAfter || 0) / 3600) })"></span>
    </div>

    <div class="table-scroll" x-show="adminUsersInvitesList.length">
    <table class="admin-users-table"
           x-data="sortableTable({
             rows: () => adminUsersInvitesList,
             defaultKey: 'invited_at',
             defaultDir: 'desc',
             persistKey: 'admin.users.invites',
             types: { invited_at: 'date', expires_at: 'date', last_clicked_at: 'date', last_reminder_at: 'date' },
           })">
      <thead>
        <tr>
          <th class="sortable-th" :class="sortClass('email')" :aria-sort="ariaSort('email')"
              @click="sortBy('email')" x-text="$app.t('admin.users.email')"></th>
          <th class="sortable-th" :class="sortClass('global_role')" :aria-sort="ariaSort('global_role')"
              @click="sortBy('global_role')" x-text="$app.t('admin.users.role')"></th>
          <th class="sortable-th" :class="sortClass('invited_at')" :aria-sort="ariaSort('invited_at')"
              @click="sortBy('invited_at')" x-text="$app.t('admin.users.invites.invitedAt')"></th>
          <th class="sortable-th" :class="sortClass('expires_at')" :aria-sort="ariaSort('expires_at')"
              @click="sortBy('expires_at')" x-text="$app.t('admin.users.invites.expiresAt')"></th>
          <th class="sortable-th" :class="sortClass('last_clicked_at')" :aria-sort="ariaSort('last_clicked_at')"
              @click="sortBy('last_clicked_at')" x-text="$app.t('admin.users.invites.clickStatus')"></th>
          <th class="sortable-th" :class="sortClass('last_reminder_at')" :aria-sort="ariaSort('last_reminder_at')"
              @click="sortBy('last_reminder_at')" x-text="$app.t('admin.users.invites.reminderStatus')"></th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="inv in sorted" :key="inv.id">
          <tr>
            <td>
              <div x-text="inv.email"></div>
              <div class="muted-msg muted-msg--sm" x-show="inv.invited_by" x-text="$app.t('admin.users.invites.invitedBy', { email: inv.invited_by })"></div>
            </td>
            <td><span class="badge" x-text="$app.t('admin.users.role.' + inv.global_role)"></span></td>
            <td>
              <span class="muted-msg muted-msg--sm" x-text="inv.invited_at ? new Date(inv.invited_at).toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone }) : '—'"></span>
            </td>
            <td>
              <span class="badge" :class="inv.expired ? 'badge--status-suspended' : ''"
                    x-text="inv.expires_at ? new Date(inv.expires_at).toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone }) : '—'"></span>
            </td>
            <td>
              <span x-show="!inv.last_clicked_at" class="badge" x-text="$app.t('admin.users.invites.click.never')"></span>
              <span x-show="inv.last_clicked_at" class="badge badge--status-active"
                    x-text="$app.t('admin.users.invites.click.clicked', { count: inv.click_count, at: new Date(inv.last_clicked_at).toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone }) })"></span>
            </td>
            <td>
              <span x-show="!inv.last_reminder_at" class="muted-msg muted-msg--sm" x-text="$app.t('admin.users.invites.reminder.never')"></span>
              <span x-show="inv.last_reminder_at" class="muted-msg muted-msg--sm"
                    x-text="$app.t('admin.users.invites.reminder.last', { count: inv.reminder_count, at: new Date(inv.last_reminder_at).toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone }) })"></span>
            </td>
            <td class="admin-users-actions">
              <button x-data="copyButton({ text: () => inv.invite_url?.startsWith('http') ? inv.invite_url : location.origin + inv.invite_url, label: () => window.__app.t('admin.users.invites.copyUrl') })"></button>
              <button type="button" @click="adminUsersInviteRemind(inv)"
                      :disabled="inv.expired || adminUsersInvitesBusy === inv.id"
                      x-text="$app.t('admin.users.invites.remind')"></button>
              <button type="button" class="danger" @click="adminUsersInviteRevoke(inv)"
                      :disabled="adminUsersInvitesBusy === inv.id"
                      x-text="$app.t('admin.users.invites.revoke')"></button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    </div>

    <p class="muted-msg" x-show="!adminUsersInvitesLoading && !adminUsersInvitesList.length"
       x-text="$app.t('admin.users.invites.empty')"></p>
  </div>

  <!-- Registration-Requests-Tab -->
  <div class="card-form-grid" x-show="!adminUsersLoading && adminUsersTab === 'requests'">

    <div class="admin-users-requests-filter">
      <span x-text="$app.t('admin.users.requests.statusFilter')"></span>
      <div x-data="combobox($app.t('admin.users.requests.statusFilter'))"
           x-modelable="value" x-model="adminUsersRequestsStatus"
           x-effect="options = [
             { value: 'pending',  label: $app.t('admin.users.requests.status.pending') },
             { value: 'approved', label: $app.t('admin.users.requests.status.approved') },
             { value: 'denied',   label: $app.t('admin.users.requests.status.denied') },
             { value: 'expired',  label: $app.t('admin.users.requests.status.expired') },
             { value: 'all',      label: $app.t('admin.users.requests.status.all') },
           ]"></div>
      <button type="button" class="icon-btn icon-btn--ghost" @click="adminUsersRequestsLoad()" :disabled="adminUsersRequestsLoading" :data-tip="$app.t('common.refresh')" :aria-label="$app.t('common.refresh')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg></button>
    </div>

    <div x-show="adminUsersRequestsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

    <!-- Approve-Result mit Invite-URL (falls Mailer disabled) -->
    <div class="admin-users-invite-result" x-show="adminUsersRequestsResult">
      <span class="muted-msg muted-msg--sm"
            x-show="adminUsersRequestsResult?.mail?.sent"
            x-text="$app.t('admin.users.requests.mailSent')"></span>
      <span class="muted-msg muted-msg--sm"
            x-show="!adminUsersRequestsResult?.mail?.sent"
            x-text="$app.t('admin.users.requests.mailerDisabledHint')"></span>
      <div class="admin-users-invite-url" x-show="adminUsersRequestsResult?.inviteUrl">
        <code x-text="adminUsersRequestsResult?.inviteUrl"></code>
        <button x-data="copyButton({ text: () => adminUsersRequestsResult?.inviteUrl })"></button>
      </div>
    </div>

    <div class="table-scroll" x-show="adminUsersRequestsList.length">
    <table class="admin-users-table"
           x-data="sortableTable({
             rows: () => adminUsersRequestsList,
             defaultKey: 'created_at',
             defaultDir: 'desc',
             persistKey: 'admin.users.requests',
             types: { created_at: 'date' },
           })">
      <thead>
        <tr>
          <th class="sortable-th" :class="sortClass('email')" :aria-sort="ariaSort('email')"
              @click="sortBy('email')" x-text="$app.t('admin.users.requests.email')"></th>
          <th class="sortable-th" :class="sortClass('display_name')" :aria-sort="ariaSort('display_name')"
              @click="sortBy('display_name')" x-text="$app.t('admin.users.requests.name')"></th>
          <th x-text="$app.t('admin.users.requests.message')"></th>
          <th class="sortable-th" :class="sortClass('created_at')" :aria-sort="ariaSort('created_at')"
              @click="sortBy('created_at')" x-text="$app.t('admin.users.requests.createdAt')"></th>
          <th class="sortable-th" :class="sortClass('status')" :aria-sort="ariaSort('status')"
              @click="sortBy('status')" x-text="$app.t('admin.users.status')"></th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="req in sorted" :key="req.id">
          <tr>
            <td x-text="req.email"></td>
            <td x-text="req.display_name || '—'"></td>
            <td>
              <span x-show="!req.message" class="muted-msg muted-msg--sm">—</span>
              <pre class="admin-users-meta" x-show="req.message" x-text="req.message"></pre>
            </td>
            <td>
              <span class="muted-msg muted-msg--sm" x-text="new Date(req.created_at + 'Z').toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone })"></span>
              <span class="muted-msg muted-msg--sm" x-show="req.ip" x-text="' • ' + req.ip"></span>
            </td>
            <td>
              <span class="badge" :class="'badge--status-' + req.status" x-text="$app.t('admin.users.requests.status.' + req.status)"></span>
            </td>
            <td class="admin-users-actions">
              <template x-if="req.status === 'pending'">
                <span>
                  <button type="button"
                          @click="adminUsersApproveRequest(req, 'user')"
                          :disabled="adminUsersRequestsBusy === req.id"
                          x-text="$app.t('admin.users.requests.approve')"></button>
                  <button type="button" class="danger"
                          @click="adminUsersDenyRequest(req)"
                          :disabled="adminUsersRequestsBusy === req.id"
                          x-text="$app.t('admin.users.requests.deny')"></button>
                </span>
              </template>
              <template x-if="req.status !== 'pending'">
                <span class="muted-msg muted-msg--sm">
                  <span x-show="req.reviewed_at"
                        x-text="new Date(req.reviewed_at + 'Z').toLocaleString(($store.shell.uiLocale === 'en' ? 'en-US' : 'de-CH'), { timeZone: $store.shell.appTimezone }) + (req.reviewed_by ? ' · ' + req.reviewed_by : '')"></span>
                  <span x-show="req.review_reason" x-text="' · ' + req.review_reason"></span>
                </span>
              </template>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    </div>

    <p class="muted-msg" x-show="!adminUsersRequestsLoading && !adminUsersRequestsList.length"
       x-text="$app.t('admin.users.requests.empty')"></p>
  </div>
</div>
