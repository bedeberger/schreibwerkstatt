<!-- Admin-User-Verwaltung -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/admin-users-card.js.
  `showAdminUsersCard` + `toggleAdminUsersCard` im Root. Nur sichtbar bei
  $app.currentUser.role === 'admin' — Frontend-Guard zusaetzlich zum
  Server-side requireAdmin (lib/admin-mw.js).
-->
<div class="card card--admin-users" x-data="adminUsersCard" x-show="$app.showAdminUsersCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('admin.users.title')"></span>
    <div class="card-actions">
      <button type="button" @click="adminUsersLoad()" :disabled="adminUsersLoading" x-text="$app.t('common.refresh')"></button>
    </div>
  </div>

  <div x-show="adminUsersLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>
  <div x-show="adminUsersError" class="error-msg" x-text="adminUsersError"></div>

  <!-- Phase 4a2: Tab-Navigation Users / Requests -->
  <nav class="admin-users-tabs" role="tablist">
    <button type="button" role="tab"
            :class="adminUsersTab === 'users' ? 'is-active' : ''"
            @click="adminUsersTab = 'users'"
            x-text="$app.t('admin.users.tab.users')"></button>
    <button type="button" role="tab"
            :class="adminUsersTab === 'requests' ? 'is-active' : ''"
            @click="adminUsersTab = 'requests'"
            x-text="$app.t('admin.users.tab.requests')"></button>
  </nav>

  <div class="card-form-grid" x-show="!adminUsersLoading && adminUsersTab === 'users'">

    <!-- Invite-Sektion -->
    <fieldset class="admin-users-invite">
      <legend x-text="$app.t('admin.users.invite')"></legend>
      <div class="admin-users-invite-row">
        <input type="email" x-model="adminUsersInviteEmail"
               :placeholder="$app.t('admin.users.invite.emailPlaceholder')"
               :disabled="adminUsersInviting">
        <div x-data="combobox($app.t('admin.users.role'))"
             x-modelable="value" x-model="adminUsersInviteRole"
             x-effect="options = [
               { value: 'user',  label: $app.t('admin.users.role.user') },
               { value: 'admin', label: $app.t('admin.users.role.admin') },
             ]"></div>
        <button type="button" @click="adminUsersInvite()" :disabled="adminUsersInviting || !adminUsersInviteEmail">
          <span x-text="adminUsersInviting ? $app.t('common.saving') : $app.t('admin.users.invite.submit')"></span>
        </button>
      </div>
      <div class="admin-users-invite-result" x-show="adminUsersInviteResult">
        <span class="muted-msg muted-msg--sm" x-text="$app.t('admin.users.invite.created', { email: adminUsersInviteResult?.email })"></span>
        <div class="admin-users-invite-url">
          <code x-text="adminUsersInviteResult?.url"></code>
          <button type="button" @click="adminUsersCopyInviteUrl()" x-text="adminUsersCopied ? $app.t('common.copied') : $app.t('common.copy')"></button>
        </div>
      </div>
    </fieldset>

    <!-- User-Tabelle -->
    <table class="admin-users-table" x-show="adminUsersList.length">
      <thead>
        <tr>
          <th x-text="$app.t('admin.users.email')"></th>
          <th x-text="$app.t('admin.users.role')"></th>
          <th x-text="$app.t('admin.users.status')"></th>
          <th x-text="$app.t('admin.users.lastLogin')"></th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="u in adminUsersList" :key="u.email">
          <tr>
            <td>
              <div x-text="u.display_name || u.email"></div>
              <div class="muted-msg muted-msg--sm" x-text="u.email"></div>
            </td>
            <td>
              <div x-data="combobox($app.t('admin.users.role'))"
                   x-modelable="value"
                   :x-init="'$watch(\'value\', v => { if (v && v !== ' + JSON.stringify(u.global_role) + ') adminUsersUpdate(' + JSON.stringify(u) + ', { global_role: v }); })'"
                   :value="u.global_role"
                   x-effect="options = [
                     { value: 'user',  label: $app.t('admin.users.role.user') },
                     { value: 'admin', label: $app.t('admin.users.role.admin') },
                   ]"></div>
            </td>
            <td>
              <span class="badge" :class="'badge--status-' + u.status" x-text="$app.t('admin.users.status.' + u.status)"></span>
            </td>
            <td>
              <span class="muted-msg muted-msg--sm" x-text="u.last_seen_at ? new Date(u.last_seen_at).toLocaleString(($app.uiLocale === 'en' ? 'en-US' : 'de-CH')) : '—'"></span>
            </td>
            <td class="admin-users-actions">
              <button type="button"
                      @click="adminUsersUpdate(u, { status: u.status === 'suspended' ? 'active' : 'suspended' })"
                      x-text="u.status === 'suspended' ? $app.t('admin.users.reactivate') : $app.t('admin.users.suspend')"></button>
              <button type="button" @click="adminUsersToggleAudit(u)"
                      x-text="adminUsersAuditEmail === u.email ? $app.t('admin.users.auditClose') : $app.t('admin.users.audit')"></button>
              <button type="button" class="danger" @click="adminUsersDelete(u)"
                      x-show="u.email !== $app.currentUser?.email"
                      x-text="$app.t('admin.users.delete')"></button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <!-- Audit-Drawer -->
    <div class="admin-users-audit" x-show="adminUsersAuditEmail">
      <h3 x-text="$app.t('admin.users.auditTitle', { email: adminUsersAuditEmail })"></h3>
      <ul>
        <template x-for="ev in adminUsersAuditEvents" :key="ev.id">
          <li>
            <span class="badge" :class="'badge--event-' + ev.event" x-text="ev.event"></span>
            <span class="muted-msg muted-msg--sm" x-text="new Date(ev.created_at).toLocaleString(($app.uiLocale === 'en' ? 'en-US' : 'de-CH'))"></span>
            <span class="muted-msg" x-show="ev.ip" x-text="' • ' + ev.ip"></span>
            <pre class="admin-users-meta" x-show="ev.meta_json" x-text="ev.meta_json"></pre>
          </li>
        </template>
        <li x-show="!adminUsersAuditEvents.length" class="muted-msg" x-text="$app.t('admin.users.auditEmpty')"></li>
      </ul>
    </div>

  </div>

  <!-- Phase 4a2: Registration-Requests-Tab -->
  <div class="card-form-grid" x-show="!adminUsersLoading && adminUsersTab === 'requests'">

    <div class="admin-users-requests-filter">
      <span x-text="$app.t('admin.users.requests.statusFilter')"></span>
      <div x-data="combobox($app.t('admin.users.requests.statusFilter'))"
           x-modelable="value" x-model="adminUsersRequestsStatus"
           x-effect="options = [
             { value: 'pending',  label: $app.t('admin.users.requests.status.pending') },
             { value: 'approved', label: $app.t('admin.users.requests.status.approved') },
             { value: 'denied',   label: $app.t('admin.users.requests.status.denied') },
             { value: 'expired',  label: $app.t('admin.users.requests.status.expired') },
             { value: 'all',      label: $app.t('admin.users.requests.status.all') },
           ]"></div>
      <button type="button" @click="adminUsersRequestsLoad()" :disabled="adminUsersRequestsLoading" x-text="$app.t('common.refresh')"></button>
    </div>

    <div x-show="adminUsersRequestsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

    <!-- Approve-Result mit Invite-URL (falls Mailer disabled) -->
    <div class="admin-users-invite-result" x-show="adminUsersRequestsResult">
      <span class="muted-msg muted-msg--sm"
            x-show="adminUsersRequestsResult?.mail?.sent"
            x-text="$app.t('admin.users.requests.mailSent')"></span>
      <span class="muted-msg muted-msg--sm"
            x-show="!adminUsersRequestsResult?.mail?.sent"
            x-text="$app.t('admin.users.requests.mailerDisabledHint')"></span>
      <div class="admin-users-invite-url" x-show="adminUsersRequestsResult?.inviteUrl">
        <code x-text="adminUsersRequestsResult?.inviteUrl"></code>
        <button type="button"
                @click="adminUsersCopyRequestInviteUrl(adminUsersRequestsResult.id, adminUsersRequestsResult.inviteUrl)"
                x-text="adminUsersRequestsCopiedId === adminUsersRequestsResult?.id ? $app.t('common.copied') : $app.t('common.copy')"></button>
      </div>
    </div>

    <table class="admin-users-table" x-show="adminUsersRequestsList.length">
      <thead>
        <tr>
          <th x-text="$app.t('admin.users.requests.email')"></th>
          <th x-text="$app.t('admin.users.requests.name')"></th>
          <th x-text="$app.t('admin.users.requests.message')"></th>
          <th x-text="$app.t('admin.users.requests.createdAt')"></th>
          <th x-text="$app.t('admin.users.status')"></th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="req in adminUsersRequestsList" :key="req.id">
          <tr>
            <td x-text="req.email"></td>
            <td x-text="req.display_name || '—'"></td>
            <td>
              <span x-show="!req.message" class="muted-msg muted-msg--sm">—</span>
              <pre class="admin-users-meta" x-show="req.message" x-text="req.message"></pre>
            </td>
            <td>
              <span class="muted-msg muted-msg--sm" x-text="new Date(req.created_at + 'Z').toLocaleString(($app.uiLocale === 'en' ? 'en-US' : 'de-CH'))"></span>
              <span class="muted-msg muted-msg--sm" x-show="req.ip" x-text="' • ' + req.ip"></span>
            </td>
            <td>
              <span class="badge" :class="'badge--status-' + req.status" x-text="$app.t('admin.users.requests.status.' + req.status)"></span>
            </td>
            <td class="admin-users-actions">
              <template x-if="req.status === 'pending'">
                <span>
                  <button type="button"
                          @click="adminUsersApproveRequest(req, 'user')"
                          :disabled="adminUsersRequestsBusy === req.id"
                          x-text="$app.t('admin.users.requests.approve')"></button>
                  <button type="button" class="danger"
                          @click="adminUsersDenyRequest(req)"
                          :disabled="adminUsersRequestsBusy === req.id"
                          x-text="$app.t('admin.users.requests.deny')"></button>
                </span>
              </template>
              <template x-if="req.status !== 'pending'">
                <span class="muted-msg muted-msg--sm">
                  <span x-show="req.reviewed_at"
                        x-text="new Date(req.reviewed_at + 'Z').toLocaleString(($app.uiLocale === 'en' ? 'en-US' : 'de-CH')) + (req.reviewed_by ? ' · ' + req.reviewed_by : '')"></span>
                  <span x-show="req.review_reason" x-text="' · ' + req.review_reason"></span>
                </span>
              </template>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <p class="muted-msg" x-show="!adminUsersRequestsLoading && !adminUsersRequestsList.length"
       x-text="$app.t('admin.users.requests.empty')"></p>
  </div>
</div>
