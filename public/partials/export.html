<!-- Buch-Export -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/export-card.js.
  `showExportCard` bleibt im Root, fachlicher State in dieser Komponente.
-->
<div class="card card--export" x-data="exportCard" x-show="$app.showExportCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('book.export.title')"></span>
  </div>

  <p class="book-export-hint" x-text="$app.t('book.export.hint')"></p>

  <div class="book-export-scope">
    <label class="book-export-scope-label" x-text="$app.t('export.scope.label')"></label>
    <div x-data="combobox({ placeholder: $app.t('export.scope.label'), compact: false })"
         x-modelable="value" x-model="exportScope"
         x-effect="options = exportScopeOptions()"></div>
    <div x-show="exportScope === 'chapter'"
         x-data="combobox({ placeholder: $app.t('export.scope.pickChapter'), compact: false })"
         x-modelable="value" x-model="exportChapterId"
         x-effect="options = exportChapterOptions()"></div>
    <div x-show="exportScope === 'page'"
         x-data="combobox({ placeholder: $app.t('export.scope.pickPage'), compact: false })"
         x-modelable="value" x-model="exportPageId"
         x-effect="options = exportPageOptions()"></div>
  </div>

  <div class="book-export-buttons">
    <template x-for="fmt in ['pdf','docx-normseite','html','txt','md']" :key="fmt">
      <button type="button"
              :class="{ 'is-running': bookExportLoading === fmt }"
              :disabled="!!bookExportLoading || !$store.nav.selectedBookId"
              @click="bookExport(fmt)">
        <span x-show="bookExportLoading === fmt" class="spinner"></span>
        <svg x-show="bookExportLoading !== fmt" class="icon" aria-hidden="true"><use href="/icons.svg?v=690#download"/></svg>
        <span x-text="$app.t('book.export.' + fmt)"></span>
      </button>
    </template>
    <button type="button"
            class="primary"
            :disabled="!$store.nav.selectedBookId"
            @click="_handoffToPdfCustom()"
            x-text="$app.t('book.export.pdfCustom')"></button>
    <button type="button"
            class="primary"
            :disabled="!$store.nav.selectedBookId"
            @click="_handoffToEpubCustom()"
            x-text="$app.t('book.export.epubCustom')"></button>
    <button type="button"
            class="primary"
            :disabled="!$store.nav.selectedBookId"
            @click="_handoffToDocxCustom()"
            x-text="$app.t('book.export.docxCustom')"></button>
  </div>

  <div class="book-export-migration">
    <label class="book-export-scope-label" x-text="$app.t('book.export.migrationTitle')"></label>
    <p class="book-export-hint" x-text="$app.t('book.export.migrationHint')"></p>

    <div class="form-stack book-export-migration-options">
      <label class="form-check">
        <input type="checkbox" id="migrate-analysis" name="migrate-analysis" x-model="migrateAnalysis">
        <span>
          <span class="form-check-title" x-text="$app.t('book.export.migrate.analysis')"></span>
          <span class="form-check-desc" x-text="$app.t('book.export.migrate.analysis.desc')"></span>
        </span>
      </label>
      <label class="form-check">
        <input type="checkbox" id="migrate-lektorat" name="migrate-lektorat" x-model="migrateLektorat">
        <span>
          <span class="form-check-title" x-text="$app.t('book.export.migrate.lektorat')"></span>
          <span class="form-check-desc" x-text="$app.t('book.export.migrate.lektorat.desc')"></span>
        </span>
      </label>
      <label class="form-check">
        <input type="checkbox" id="migrate-chats" name="migrate-chats" x-model="migrateChats">
        <span>
          <span class="form-check-title" x-text="$app.t('book.export.migrate.chats')"></span>
          <span class="form-check-desc" x-text="$app.t('book.export.migrate.chats.desc')"></span>
        </span>
      </label>
    </div>

    <button type="button"
            :class="{ 'is-running': bookExportLoading === 'swbook' }"
            :disabled="!!bookExportLoading || !$store.nav.selectedBookId"
            @click="migrateExport()">
      <span x-show="bookExportLoading === 'swbook'" class="spinner"></span>
      <svg x-show="bookExportLoading !== 'swbook'" class="icon" aria-hidden="true"><use href="/icons.svg?v=690#download"/></svg>
      <span x-text="$app.t('book.export.swbook')"></span>
    </button>
  </div>

  <div class="card-status"
       x-show="bookExportLoading"
       x-text="$app.t('book.export.running', { fmt: (bookExportLoading || '').toUpperCase() })"></div>
  <div class="card-status card-status--error"
       x-show="bookExportError"
       x-text="bookExportError"></div>
</div>
