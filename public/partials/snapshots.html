<!-- Manuskript-Meilensteine („Fassung 1/2/3").
     Alpine.data-Sub-Komponente — siehe public/js/cards/snapshots-card.js.
     `showSnapshotsCard` bleibt im Root (Hash-Router + Exklusivitaet),
     fachlicher State in dieser Komponente. -->
<div class="card card--snapshots" x-data="snapshotsCard" x-show="$app.showSnapshotsCard" x-cloak>
  <div class="card-header">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('snapshots.title')"></span>
    </div>
    <div class="card-actions">
      <button type="button" class="icon-btn icon-btn--ghost"
              @click="captureSnapshot()"
              :disabled="capturing || !$app.selectedBookId"
              :data-tip="capturing ? $app.t('snapshots.saving') : $app.t('snapshots.save')"
              :aria-label="$app.t('snapshots.save')">
        <span x-show="capturing" class="spinner"></span>
        <svg x-show="!capturing" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#plus"/></svg>
      </button>
    </div>
  </div>

  <p class="form-lead" x-text="$app.t('snapshots.lead')"></p>

  <!-- Neue Fassung: optionaler Name + Notiz. -->
  <div class="snapshots-capture">
    <input type="text" class="snapshots-capture__label"
           x-model="newLabel"
           data-spellcheck="spelling"
           maxlength="120"
           :placeholder="$app.t('snapshots.labelPlaceholder')">
    <input type="text" class="snapshots-capture__desc"
           x-model="newDescription"
           data-spellcheck="spelling"
           maxlength="1000"
           :placeholder="$app.t('snapshots.descPlaceholder')">
    <button type="button" class="btn-compact snapshots-capture__btn"
            @click="captureSnapshot()"
            :disabled="capturing || !$app.selectedBookId"
            x-text="capturing ? $app.t('snapshots.saving') : $app.t('snapshots.save')"></button>
  </div>

  <div x-show="loading" x-cloak class="muted-msg" x-text="$app.t('snapshots.loading')"></div>
  <div x-show="!loading && !snapshots.length" x-cloak class="muted-msg" x-text="$app.t('snapshots.empty')"></div>

  <!-- Fassungs-Liste. -->
  <div x-show="!loading && snapshots.length" x-cloak class="table-scroll">
    <table class="entity-grid-table snapshots-table"
           x-data="sortableTable({
             rows: () => snapshots,
             defaultKey: 'created_at',
             persistKey: 'book.snapshots',
             types: { seq: 'number', created_at: 'date', chars: 'number', pages: 'number', chapters: 'number' },
           })">
      <thead>
        <tr>
          <th class="sortable-th" :class="sortClass('seq')" :aria-sort="ariaSort('seq')"
              @click="sortBy('seq')" x-text="$app.t('snapshots.col.fassung')"></th>
          <th class="sortable-th" :class="sortClass('created_at')" :aria-sort="ariaSort('created_at')"
              @click="sortBy('created_at')" x-text="$app.t('snapshots.col.date')"></th>
          <th x-show="$app.bookSharedFlags?.[$app.selectedBookId]" x-text="$app.t('snapshots.col.author')"></th>
          <th class="snapshots-num sortable-th" :class="sortClass('chars')" :aria-sort="ariaSort('chars')"
              @click="sortBy('chars')" x-text="$app.t('snapshots.col.chars')"></th>
          <th class="snapshots-num sortable-th" :class="sortClass('pages')" :aria-sort="ariaSort('pages')"
              @click="sortBy('pages')" x-text="$app.t('snapshots.col.pages')"></th>
          <th class="snapshots-num sortable-th" :class="sortClass('chapters')" :aria-sort="ariaSort('chapters')"
              @click="sortBy('chapters')" x-text="$app.t('snapshots.col.chapters')"></th>
          <th x-text="$app.t('snapshots.col.actions')"></th>
        </tr>
      </thead>
      <tbody>
        <template x-for="s in sorted" :key="s.id">
          <tr>
            <td>
              <span x-text="fassungLabel(s)"></span>
              <span x-show="s.description" class="snapshots-desc" :data-tip="s.description"
                    x-text="s.description"></span>
            </td>
            <td x-text="$app.formatDate(s.created_at)"></td>
            <td x-show="$app.bookSharedFlags?.[$app.selectedBookId]">
              <span class="user-chip" x-show="s.user_email"
                    :class="{ 'user-chip--self': isOwn(s) }" :data-tip="s.user_email">
                <span class="user-chip__avatar"
                      :style="`--avatar-hue: ${$app.userAvatarHue(s.user_email)}`"
                      x-text="$app.userInitials(s.user_email)"></span>
                <span class="user-chip__name"
                      x-text="isOwn(s) ? $app.t('snapshots.byYou') : $app.userDisplayName(s.user_email)"></span>
              </span>
            </td>
            <td class="snapshots-num" x-text="formatNum(s.chars)"></td>
            <td class="snapshots-num" x-text="formatNum(s.pages)"></td>
            <td class="snapshots-num" x-text="formatNum(s.chapters)"></td>
            <td>
              <div class="snapshots-actions">
                <button type="button" class="btn-compact"
                        @click="openSnapshot(s)"
                        x-text="$app.t('snapshots.open')"></button>
                <button type="button" class="btn-compact"
                        @click="restoreSnapshot(s)"
                        :disabled="restoringId === s.id || deletingId === s.id"
                        x-text="restoringId === s.id ? $app.t('snapshots.restoring') : $app.t('snapshots.restore')"></button>
                <button type="button" class="btn-compact snapshots-del-btn"
                        @click="deleteSnapshot(s)"
                        :disabled="deletingId === s.id || restoringId === s.id"
                        x-text="deletingId === s.id ? $app.t('snapshots.deleting') : $app.t('snapshots.delete')"></button>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Vergleich zweier Fassungen. -->
  <section x-show="snapshots.length >= 2" x-cloak class="snapshots-compare">
    <h3 class="snapshots-compare__title" x-text="$app.t('snapshots.compareTitle')"></h3>
    <div class="snapshots-compare__pickers">
      <div class="snapshots-picker">
        <label class="snapshots-picker__label" x-text="$app.t('snapshots.compareFrom')"></label>
        <div x-data="combobox($app.t('snapshots.compareFrom'))"
             x-modelable="value" x-model="compareFrom"
             x-effect="options = snapshots.map(s => ({ value: String(s.id), label: snapOptionLabel(s) }))"
             @combobox-change="runCompare()"></div>
      </div>
      <div class="snapshots-picker">
        <label class="snapshots-picker__label" x-text="$app.t('snapshots.compareTo')"></label>
        <div x-data="combobox($app.t('snapshots.compareTo'))"
             x-modelable="value" x-model="compareTo"
             x-effect="options = snapshots.map(s => ({ value: String(s.id), label: snapOptionLabel(s) }))"
             @combobox-change="runCompare()"></div>
      </div>
    </div>

    <div x-show="diffLoading" x-cloak class="muted-msg" x-text="$app.t('snapshots.diffLoading')"></div>
    <div x-show="diffError" x-cloak class="muted-msg muted-msg--error"
         x-text="$app.t('snapshots.diffError') + ' ' + diffError"></div>

    <template x-if="diff && !diffLoading && !diffError">
      <div class="snapshots-diff">
        <div class="snapshots-summary">
          <span class="badge badge-ok" x-show="diff.summary.added"
                x-text="$app.t('snapshots.summary.added', { n: diff.summary.added })"></span>
          <span class="badge badge-err" x-show="diff.summary.removed"
                x-text="$app.t('snapshots.summary.removed', { n: diff.summary.removed })"></span>
          <span class="badge badge-warn" x-show="diff.summary.changed"
                x-text="$app.t('snapshots.summary.changed', { n: diff.summary.changed })"></span>
          <span class="badge" x-show="diff.summary.renamed"
                x-text="$app.t('snapshots.summary.renamed', { n: diff.summary.renamed })"></span>
          <span class="badge" x-show="diff.summary.moved"
                x-text="$app.t('snapshots.summary.moved', { n: diff.summary.moved })"></span>
          <span class="tag snapshots-summary__chars"
                x-text="$app.t('snapshots.charsDelta', { d: formatDelta(diff.summary.charsTo - diff.summary.charsFrom) })"></span>
        </div>

        <label class="form-check snapshots-showall">
          <input type="checkbox" x-model="showUnchanged">
          <span x-text="$app.t('snapshots.showUnchanged')"></span>
        </label>

        <div x-show="!visibleEntries().length" class="muted-msg" x-text="$app.t('snapshots.noChanges')"></div>

        <ul class="snapshots-entries">
          <template x-for="(entry, idx) in visibleEntries()" :key="entryKey(entry, idx)">
            <li class="snapshots-entry" :class="'snapshots-entry--' + entry.status">
              <div class="snapshots-entry__head internal-link"
                   @click="toggleEntry(entry, idx)">
                <span class="badge" :class="{
                        'badge-ok': entry.status === 'added',
                        'badge-err': entry.status === 'removed',
                        'badge-warn': entry.status === 'changed',
                      }" x-text="statusLabel(entry)"></span>
                <span class="snapshots-entry__name" x-text="entry.name || $app.t('snapshots.untitled')"></span>
                <span class="snapshots-entry__path" x-text="chapterPathLabel(entry.chapterPath)"></span>
                <span class="tag" x-show="entry.renamed"
                      x-text="$app.t('snapshots.renamedTag', { old: entry.oldName })"></span>
                <span class="tag" x-show="entry.moved"
                      x-text="$app.t('snapshots.movedTag', { from: chapterPathLabel(entry.oldChapterPath) })"></span>
                <span class="history-chevron" :class="{ open: !!expanded[entryKey(entry, idx)] }" aria-hidden="true"></span>
              </div>
              <div x-show="expandLoading[entryKey(entry, idx)]" x-cloak class="muted-msg muted-msg--sm"
                   x-text="$app.t('snapshots.diffLoading')"></div>
              <template x-if="expanded[entryKey(entry, idx)] !== undefined && !expandLoading[entryKey(entry, idx)]">
                <div class="snapshots-entry__diff">
                  <div x-show="!expanded[entryKey(entry, idx)]" class="muted-msg muted-msg--sm"
                       x-text="$app.t('snapshots.noTextChange')"></div>
                  <template x-if="expanded[entryKey(entry, idx)]">
                    <div>
                      <div class="revision-diff-header" aria-hidden="true">
                        <span x-text="$app.t('editor.revisions.viewer.colPrev')"></span>
                        <span x-text="$app.t('editor.revisions.viewer.colThis')"></span>
                      </div>
                      <div class="revision-diff-body" x-html="expanded[entryKey(entry, idx)]"></div>
                    </div>
                  </template>
                </div>
              </template>
            </li>
          </template>
        </ul>
      </div>
    </template>
  </section>

  <!-- Reader: Fassung nur-lesend oeffnen (Modal-Charakter). -->
  <div class="snapshot-reader" x-show="readerOpen" x-cloak
       @keydown.escape.window="readerOpen && closeReader()"
       role="dialog" aria-modal="true" :aria-label="$app.t('snapshots.reader.title')">
    <div class="snapshot-reader__backdrop" @click="closeReader()"></div>
    <div class="snapshot-reader__panel">
      <header class="snapshot-reader__header">
        <div class="snapshot-reader__titles">
          <span class="snapshot-reader__title" x-text="readerSnap ? fassungLabel(readerSnap) : ''"></span>
          <span class="snapshot-reader__date" x-show="readerSnap"
                x-text="readerSnap ? $app.formatDate(readerSnap.created_at) : ''"></span>
        </div>
        <button type="button" class="icon-btn icon-btn--ghost" @click="closeReader()"
                :aria-label="$app.t('snapshots.reader.close')" :data-tip="$app.t('snapshots.reader.close')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg>
        </button>
      </header>

      <!-- Export-Leiste: Schnell-Formate (Download-Links) + PDF (Profil + Job). -->
      <div class="snapshot-reader__export">
        <span class="snapshot-reader__export-label" x-text="$app.t('snapshots.export.heading')"></span>
        <template x-for="f in quickFormats()" :key="f">
          <a class="btn-compact" :href="exportUrl(f)" x-text="formatLabel(f)"></a>
        </template>
        <div class="snapshot-reader__pdf" x-show="pdfProfiles.length">
          <div x-data="combobox($app.t('snapshots.export.pdfProfile'))"
               x-modelable="value" x-model="pdfProfileId"
               x-effect="options = pdfProfiles.map(p => ({ value: String(p.id), label: p.name }))"></div>
          <button type="button" class="btn-compact" @click="exportPdf()"
                  :disabled="pdfExporting || !pdfProfileId"
                  x-text="pdfExporting ? $app.t('snapshots.export.creating') : $app.t('snapshots.export.pdfCreate')"></button>
        </div>
        <span class="muted-msg muted-msg--sm" x-show="!pdfProfiles.length"
              x-text="$app.t('snapshots.export.pdfNoProfiles')"></span>
      </div>
      <div class="snapshot-reader__status" x-show="pdfStatus" x-cloak x-text="pdfStatus"></div>
      <div class="snapshot-reader__status muted-msg--error" x-show="pdfError" x-cloak x-text="pdfError"></div>
      <p class="snapshot-reader__hint" x-text="$app.t('snapshots.reader.hint')"></p>

      <!-- Body: Kapitel-Ueberschriften + Seiten im Buchsatz. -->
      <div class="snapshot-reader__body">
        <div x-show="readerLoading" class="muted-msg" x-text="$app.t('snapshots.reader.loading')"></div>
        <div x-show="!readerLoading && !readerSections.length" class="muted-msg"
             x-text="$app.t('snapshots.reader.empty')"></div>
        <template x-for="s in readerSections" :key="s.key">
          <div>
            <template x-if="s.kind === 'chapter'">
              <div class="snapshot-reader__chapter" :class="'snapshot-reader__chapter--d' + s.depth"
                   x-text="s.name || $app.t('snapshots.untitled')"></div>
            </template>
            <template x-if="s.kind === 'page'">
              <article class="snapshot-reader__page">
                <div class="snapshot-reader__page-name" x-show="s.name" x-text="s.name"></div>
                <div class="page-content-view" x-html="s.html"></div>
              </article>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
