      <!-- Kapitel-Tab -->
      <div class="export-tab-panel" x-bind="panel('chapter')">
        <div class="card-form-grid">
          <p class="card-form-section-divider" x-text="$app.t('pdfExport.chapter.group.numbering')"></p>
          <div class="card-form-row">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.numbering')"></label>
            <div class="card-form-field">
              <div x-data="combobox($app.t('pdfExport.chapter.numbering'))"
                   x-modelable="value" x-model="activeProfile.config.chapter.numbering"
                   x-effect="options = [{ value: 'none', label: $app.t('pdfExport.chapter.num.none') }, { value: 'arabic', label: '1, 2, 3' }, { value: 'roman', label: 'I, II, III' }, { value: 'word', label: $app.t('pdfExport.chapter.num.word') }]"
></div>
            </div>
          </div>
          <div class="card-form-row" x-show="activeProfile.config.chapter.numbering !== 'none'">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.numberingMode')"></label>
            <div class="card-form-field">
              <div x-data="combobox($app.t('pdfExport.chapter.numberingMode'))"
                   x-modelable="value" x-model="activeProfile.config.chapter.numberingMode"
                   x-effect="options = [{ value: 'nested', label: $app.t('pdfExport.chapter.numberingMode.nested') }, { value: 'flat', label: $app.t('pdfExport.chapter.numberingMode.flat') }]"
></div>
            </div>
          </div>
          <div class="card-form-row card-form-row--top"
               x-show="activeProfile.config.chapter.numbering !== 'none'">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.unnumberedChapters')"></label>
            <div class="card-form-field">
              <div x-data="combobox({ placeholder: $app.t('pdfExport.chapter.unnumberedPick'), multiple: true })"
                   x-modelable="value" x-model="activeProfile.config.chapter.unnumberedChapterIds"
                   x-effect="options = unnumberedChapterPickOptions()"></div>
              <div class="export-chip-row" x-show="unnumberedChapterChips().length">
                <template x-for="chip in unnumberedChapterChips()" :key="chip.id">
                  <span class="export-chip">
                    <span x-text="chip.label"></span>
                    <button type="button" class="export-chip-remove"
                            :aria-label="$app.t('common.remove')"
                            @click="removeUnnumberedChapter(chip.id)"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
                  </span>
                </template>
              </div>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.chapter.unnumberedHint')"></p>
            </div>
          </div>
          <div class="card-form-row card-form-row--top">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.skipPageCounterChapters')"></label>
            <div class="card-form-field">
              <div x-data="combobox({ placeholder: $app.t('pdfExport.chapter.skipPageCounterPick'), multiple: true })"
                   x-modelable="value" x-model="activeProfile.config.chapter.skipPageCounterChapterIds"
                   x-effect="options = skipPageCounterChapterPickOptions()"></div>
              <div class="export-chip-row" x-show="skipPageCounterChapterChips().length">
                <template x-for="chip in skipPageCounterChapterChips()" :key="chip.id">
                  <span class="export-chip">
                    <span x-text="chip.label"></span>
                    <button type="button" class="export-chip-remove"
                            :aria-label="$app.t('common.remove')"
                            @click="removeSkipPageCounterChapter(chip.id)"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
                  </span>
                </template>
              </div>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.chapter.skipPageCounterChaptersHint')"></p>
            </div>
          </div>
          <div class="card-form-row card-form-row--top">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.skipPageCounterPages')"></label>
            <div class="card-form-field">
              <div x-data="combobox({ placeholder: $app.t('pdfExport.chapter.skipPageCounterPagePick'), multiple: true })"
                   x-modelable="value" x-model="activeProfile.config.chapter.skipPageCounterPageIds"
                   x-effect="options = skipPageCounterPagePickOptions()"></div>
              <div class="export-chip-row" x-show="skipPageCounterPageChips().length">
                <template x-for="chip in skipPageCounterPageChips()" :key="chip.id">
                  <span class="export-chip">
                    <span x-text="chip.label"></span>
                    <button type="button" class="export-chip-remove"
                            :aria-label="$app.t('common.remove')"
                            @click="removeSkipPageCounterPage(chip.id)"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
                  </span>
                </template>
              </div>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.chapter.skipPageCounterPagesHint')"></p>
            </div>
          </div>
          <p class="card-form-section-divider" x-text="$app.t('pdfExport.chapter.group.appearance')"></p>
          <div class="card-form-row">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.breakBefore')"></label>
            <div class="card-form-field">
              <div x-data="combobox($app.t('pdfExport.chapter.breakBefore'))"
                   x-modelable="value" x-model="activeProfile.config.chapter.breakBefore"
                   x-effect="options = [{ value: 'always', label: $app.t('pdfExport.chapter.break.always') }, { value: 'right-page', label: $app.t('pdfExport.chapter.break.rightPage') }, { value: 'none', label: $app.t('pdfExport.chapter.break.none') }]"
></div>
            </div>
          </div>
          <div class="card-form-row">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.titleStyle')"></label>
            <div class="card-form-field">
              <div x-data="combobox($app.t('pdfExport.chapter.titleStyle'))"
                   x-modelable="value" x-model="activeProfile.config.chapter.titleStyle"
                   x-effect="options = [{ value: 'centered-large', label: $app.t('pdfExport.chapter.style.centeredLarge') }, { value: 'left-rule', label: $app.t('pdfExport.chapter.style.leftRule') }, { value: 'minimal', label: $app.t('pdfExport.chapter.style.minimal') }]"
></div>
            </div>
          </div>
          <div class="card-form-row">
            <label class="card-form-label" x-text="$app.t('pdfExport.chapter.spaceBeforeMm')"></label>
            <div class="card-form-field">
              <input type="text" x-data="numInput({ step: 1, min: 0, max: 200 })" x-modelable="value" x-model="activeProfile.config.chapter.spaceBeforeMm" class="pdfx-num-input">
            </div>
          </div>
          <div class="card-form-row">
            <label class="card-form-label">&nbsp;</label>
            <div class="card-form-field">
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.chapter.blankPageAfter">
                <span x-text="$app.t('pdfExport.chapter.blankPageAfter')"></span>
              </label>
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.chapter.dropCap">
                <span x-text="$app.t('pdfExport.chapter.dropCap')"></span>
              </label>
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.chapter.titleRule">
                <span x-text="$app.t('pdfExport.chapter.titleRule')"></span>
              </label>
              <label class="pdfx-check" x-show="activeProfile.config.chapter.pageStructure === 'nested'">
                <input type="checkbox" x-model="activeProfile.config.chapter.pageTitleRule">
                <span x-text="$app.t('pdfExport.chapter.pageTitleRule')"></span>
              </label>
              <label class="pdfx-check" x-show="activeProfile.config.chapter.breakBefore !== 'none'">
                <input type="checkbox" x-model="activeProfile.config.chapter.breakBeforeSubchapter">
                <span x-text="$app.t('pdfExport.chapter.breakBeforeSubchapter')"></span>
              </label>
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.chapter.firstChapterOnRecto">
                <span x-text="$app.t('pdfExport.chapter.firstChapterOnRecto')"></span>
              </label>
            </div>
          </div>

          <div class="collapsible-wrap" x-data="collapsible()">
            <button type="button" class="collapsible-toggle" x-bind="trigger">
              <span class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
              <span x-text="$app.t('pdfExport.chapter.pageStructureLegend')"></span>
            </button>
            <div x-bind="panel" x-cloak class="collapsible-section">
              <p class="card-form-field-note" x-text="$app.t('pdfExport.chapter.pageStructureHint')"></p>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.chapter.pageStructure')"></label>
                <div class="card-form-field">
                  <div x-data="combobox($app.t('pdfExport.chapter.pageStructure'))"
                       x-modelable="value" x-model="activeProfile.config.chapter.pageStructure"
                       x-effect="options = [{ value: 'flatten', label: $app.t('pdfExport.chapter.struct.flatten') }, { value: 'nested', label: $app.t('pdfExport.chapter.struct.nested') }]"
></div>
                </div>
              </div>
              <div class="card-form-row" x-show="activeProfile.config.chapter.pageStructure === 'nested'">
                <label class="card-form-label">&nbsp;</label>
                <div class="card-form-field">
                  <label class="pdfx-check">
                    <input type="checkbox" x-model="activeProfile.config.chapter.pageBreakBetweenPages">
                    <span x-text="$app.t('pdfExport.chapter.pageBreakBetweenPages')"></span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
