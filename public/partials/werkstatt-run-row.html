<!-- Geteilte Run-Zeile der KI-Lauf-Historie (Datum + Knotenpfad/Modell-Tags +
     Chevron + Löschen). kind steckt in r.kind → openRun/deleteRun generisch;
     knoten_pfad ist brainstorm-only und via x-show gegated (bei Consistency leer).
     Erwartet `r` aus dem umschliessenden x-for. -->
<div class="history-item" :class="{ 'history-item--open': selectedRunId === r.id }"
     @click="openRun(r.id, r.kind)">
  <span class="history-date" x-text="formatRunDate(r.created_at)"></span>
  <span x-show="r.knoten_pfad" class="tag" x-text="r.knoten_pfad"></span>
  <span x-show="r.model" class="tag" x-text="r.model"></span>
  <span class="history-chevron" :class="{ open: selectedRunId === r.id }">›</span>
  <button type="button" class="history-item-delete"
          @click.stop="deleteRun(r.id, r.kind)"
          :data-tip="$app.t('common.deleteEntry')"
          :aria-label="$app.t('common.deleteEntry')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#trash"/></svg></button>
</div>
