<!-- Avatar-Menu: Identität, Theme, Shortcuts, Profil, Provider, Logout -->
<div class="avatar-menu-wrap" @click.outside="showAvatarMenu = false" @keydown.escape.window="showAvatarMenu = false">
  <button type="button"
          class="avatar-btn"
          :class="{ 'avatar-btn--active': showAvatarMenu }"
          @click="showAvatarMenu = !showAvatarMenu"
          :data-tip="currentUser?.name || currentUser?.email || ''"
          :aria-label="currentUser?.name || currentUser?.email || ''"
          aria-haspopup="menu"
          :aria-expanded="showAvatarMenu">
    <template x-if="currentUser?.picture">
      <img class="avatar-btn-img" :src="currentUser.picture" :alt="currentUser?.name || currentUser?.email || ''" referrerpolicy="no-referrer" @error="currentUser.picture = null">
    </template>
    <template x-if="!currentUser?.picture">
      <span class="avatar-btn-initials" x-text="_avatarInitials()"></span>
    </template>
  </button>

  <div class="avatar-menu-panel" x-show="showAvatarMenu" x-cloak role="menu">
    <div class="avatar-menu-header">
      <template x-if="currentUser?.picture">
        <img class="avatar-menu-header-img" :src="currentUser.picture" :alt="currentUser?.name || currentUser?.email || ''" referrerpolicy="no-referrer" @error="currentUser.picture = null">
      </template>
      <template x-if="!currentUser?.picture">
        <span class="avatar-menu-header-avatar" x-text="_avatarInitials()"></span>
      </template>
      <div class="avatar-menu-header-text">
        <div class="avatar-menu-name" x-text="currentUser?.name || currentUser?.email"></div>
        <div class="avatar-menu-email" x-show="currentUser?.name && currentUser?.email && currentUser.name !== currentUser.email" x-text="currentUser?.email"></div>
      </div>
    </div>

    <div class="avatar-menu-section">
      <div class="avatar-menu-label" x-text="t('header.theme')"></div>
      <div class="theme-segmented" role="group" :aria-label="t('header.theme')">
        <template x-for="opt in ['auto','light','dark']" :key="opt">
          <button type="button"
                  class="theme-segmented-btn"
                  :class="{ 'is-active': themePref === opt }"
                  @click="setTheme(opt)"
                  :aria-pressed="themePref === opt"
                  x-text="t({ auto: 'theme.auto', light: 'theme.light', dark: 'theme.dark' }[opt])"></button>
        </template>
      </div>
    </div>

    <div class="avatar-menu-divider"></div>

    <button type="button" class="avatar-menu-item" role="menuitem" @click="showAvatarMenu = false; toggleShortcutsOverlay()">
      <span class="avatar-menu-item-label" x-text="t('shortcuts.title')"></span>
      <span class="avatar-menu-item-key">?</span>
    </button>

    <button type="button" class="avatar-menu-item" role="menuitem" @click="showAvatarMenu = false; toggleUserSettingsCard()">
      <span class="avatar-menu-item-label" x-text="t('header.profile')"></span>
    </button>

    <button type="button" class="avatar-menu-item" role="menuitem"
            x-show="currentUser?.role === 'admin'"
            @click="showAvatarMenu = false; toggleAdminUsersCard()">
      <span class="avatar-menu-item-label" x-text="t('admin.users.title')"></span>
    </button>

    <button type="button" class="avatar-menu-item" role="menuitem"
            x-show="currentUser?.role === 'admin'"
            @click="showAvatarMenu = false; toggleAdminSettingsCard()">
      <span class="avatar-menu-item-label" x-text="t('admin.settings.title')"></span>
    </button>

    <button type="button" class="avatar-menu-item" role="menuitem"
            x-show="currentUser?.role === 'admin'"
            @click="showAvatarMenu = false; toggleAdminUsageCard()">
      <span class="avatar-menu-item-label" x-text="t('admin.usage.title')"></span>
    </button>

    <button type="button" class="avatar-menu-item" role="menuitem"
            x-show="currentUser?.role === 'admin'"
            @click="showAvatarMenu = false; toggleAdminCategoriesCard()">
      <span class="avatar-menu-item-label" x-text="t('admin.categories.title')"></span>
    </button>

    <button type="button" class="avatar-menu-item" role="menuitem"
            x-show="currentUser?.role === 'admin'"
            @click="showAvatarMenu = false; toggleAdminBackendMigrationCard()">
      <span class="avatar-menu-item-label" x-text="t('admin.migrate.title')"></span>
    </button>

    <div class="avatar-menu-divider"></div>

    <div class="avatar-menu-provider" :data-tip="t('header.providerTitle')">
      <span class="avatar-menu-provider-dot"></span>
      <span x-text="apiProvider === 'ollama' ? 'Ollama · ' + ollamaModel : apiProvider === 'llama' ? 'Llama · ' + llamaModel : 'Claude · ' + claudeModel"></span>
    </div>

    <a href="/auth/logout" class="avatar-menu-item avatar-menu-item--logout" role="menuitem" x-text="t('header.logout')" @click="logout($event)"></a>
  </div>
</div>
