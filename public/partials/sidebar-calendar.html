<!-- Diary-Calendar-Sidebar. Sichtbar bei isTagebuch() && sidebarMode === 'calendar'.
     Monats-Grid (Montag-Start) mit Tag-Cells; Tag mit Page = klickbar gefüllt,
     leerer Tag = grau. Header zeigt Monats-Label + Prev/Next-Stepper +
     Combobox zum Sprung auf Monat mit Einträgen. -->
<div class="sidebar-calendar" x-show="isTagebuch() && sidebarMode === 'calendar'" x-cloak>
  <div class="sidebar-calendar-header">
    <button type="button" class="icon-btn"
            @click="diaryCalendarStep(-1)"
            :data-tip="t('calendar.prevMonth')"
            :aria-label="t('calendar.prevMonth')">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#chevron-left"/></svg>
    </button>
    <span class="sidebar-calendar-month-label" x-text="diaryCalendarMonthLabel()"></span>
    <button type="button" class="icon-btn"
            @click="diaryCalendarStep(1)"
            :data-tip="t('calendar.nextMonth')"
            :aria-label="t('calendar.nextMonth')">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#chevron-right"/></svg>
    </button>
  </div>

  <button type="button" class="sidebar-calendar-today"
          x-show="canEdit() && !diaryHasTodayEntry()"
          @click="createDiaryEntryToday()"
          :data-tip="t('calendar.todayTip')">
    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#plus"/></svg>
    <span x-text="t('calendar.today')"></span>
  </button>

  <div class="sidebar-calendar-jumpwrap"
       x-show="diaryCalendarMonths().length > 1">
    <div x-data="combobox(t('calendar.jumpPlaceholder'))"
         x-modelable="value"
         x-model="_diaryCalendarJumpModel"
         x-effect="options = diaryCalendarMonths().map(m => ({ value: m.key, label: `${diaryCalendarLabelForMonth(m)} (${m.count})` }))"
         @combobox-change="diaryCalendarJumpTo($event.detail.value); _diaryCalendarJumpModel = ''"></div>
  </div>

  <div class="sidebar-calendar-weekdays">
    <template x-for="(d, di) in diaryCalendarWeekdayLabels()" :key="di">
      <span class="sidebar-calendar-weekday" x-text="d"></span>
    </template>
  </div>

  <div class="sidebar-calendar-grid">
    <template x-for="(cell, ci) in diaryCalendarMonthGrid()" :key="ci">
      <button type="button"
              class="sidebar-calendar-day"
              :class="{
                'sidebar-calendar-day--out': !cell.inMonth,
                'sidebar-calendar-day--has-page': cell.hasPage,
                'sidebar-calendar-day--today': cell.isToday,
                'sidebar-calendar-day--active': cell.hasPage && currentPage && cell.page && currentPage.id === cell.page.id,
              }"
              :disabled="!cell.hasPage"
              :data-tip="cell.hasPage ? cell.page.name : ''"
              @click="selectDiaryCalendarDay(cell)">
        <span x-text="cell.dayNum"></span>
      </button>
    </template>
  </div>

  <!-- „An diesem Tag": Einträge vom selben MM-DD aus Vorjahren (rein lesend). -->
  <div class="diary-anniversary">
    <button type="button"
            class="collapsible-toggle"
            @click="toggleDiaryAnniversaryOpen()"
            :aria-expanded="diaryAnniversaryOpen">
      <span class="history-chevron" :class="{ open: diaryAnniversaryOpen }">›</span>
      <span x-text="t('diary.anniversary.title')"></span>
    </button>
    <div x-show="diaryAnniversaryOpen" x-cloak>
      <template x-if="diaryAnniversaryEntries().length === 0">
        <p class="diary-anniversary-empty" x-text="t('diary.anniversary.empty')"></p>
      </template>
      <ul class="diary-anniversary-list">
        <template x-for="entry in diaryAnniversaryEntries()" :key="entry.key">
          <li>
            <button type="button" class="diary-anniversary-item" @click="selectPage(entry.page)">
              <span class="diary-anniversary-meta">
                <span class="badge" x-text="diaryAnniversaryYearsAgoLabel(entry.yearsAgo)"></span>
                <span class="diary-anniversary-weekday" x-text="entry.weekday + ', ' + entry.year"></span>
              </span>
              <span class="diary-anniversary-preview" x-show="entry.preview" x-text="entry.preview"></span>
            </button>
          </li>
        </template>
      </ul>
    </div>
  </div>

  <!-- Zeitraum-Suche: Von/Bis-Datumsfilter über die Diary-Seiten (clientseitig). -->
  <div class="diary-range">
    <div class="diary-range-header">
      <span class="diary-range-title" x-text="t('diary.range.title')"></span>
      <button type="button" class="search-clear--icon diary-range-clear"
              x-show="diaryRangeFrom || diaryRangeTo"
              @click="diaryRangeFrom = ''; diaryRangeTo = ''"
              :aria-label="t('search.clear')" :data-tip="t('search.clear')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg>
      </button>
    </div>
    <div class="diary-range-fields">
      <label class="diary-range-field">
        <span x-text="t('diary.range.from')"></span>
        <input type="date" x-model="diaryRangeFrom">
      </label>
      <label class="diary-range-field">
        <span x-text="t('diary.range.to')"></span>
        <input type="date" x-model="diaryRangeTo">
      </label>
    </div>
    <template x-if="diaryRangeFrom && diaryRangeTo && diaryRangeEntries().length === 0">
      <p class="diary-anniversary-empty" x-text="t('diary.range.empty')"></p>
    </template>
    <ul class="diary-anniversary-list" x-show="diaryRangeEntries().length > 0">
      <template x-for="entry in diaryRangeEntries()" :key="entry.key">
        <li>
          <button type="button" class="diary-anniversary-item" @click="selectPage(entry.page)">
            <span class="diary-anniversary-meta">
              <span class="diary-anniversary-weekday" x-text="entry.dateLabel"></span>
            </span>
            <span class="diary-anniversary-preview" x-show="entry.preview" x-text="entry.preview"></span>
          </button>
        </li>
      </template>
    </ul>
  </div>
</div>
