<!-- Kapitel-Review: Makrobewertung + verdichtete Seitenstatistik eines Kapitels -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/kapitel-review-card.js.
  `showKapitelReviewCard` bleibt am Root. Fachlicher State + Job-Flow in der
  Sub. `newPageTitle/newPageCreating/newPageError` bleiben am Root (von
  createKapitelPage() in der Sub via $root gelesen/geschrieben).
-->
<div class="card card--kapitel" x-data="kapitelReviewCard" x-show="$app.showKapitelReviewCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="kapitelReviewSelectedChapter()?.name || $app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('kapitelReview.title')"></span>
      <div class="card-subline" x-show="kapitelReviewLastEditAt()">
        <span x-show="kapitelReviewLastEditAt()" x-text="$app.t('kapitelReview.lastEdit', { when: $app.formatDate(kapitelReviewLastEditAt()) })"></span>
      </div>
    </div>
    <div class="card-header-aside">
      <span x-show="kapitelReviewChapterStats()" class="tok-stats">
        <template x-if="kapitelReviewChapterStats()?.words > 0">
          <span class="display-contents">
            <span class="tok-badge tok-neutral"
              x-text="kapitelReviewChapterStats().chars >= 1000 ? '~' + Math.round(kapitelReviewChapterStats().chars/1000) + 'k Z' : kapitelReviewChapterStats().chars + ' Z'"></span>
            <span class="tok-badge tok-neutral"
              :data-tip="$app.t('bookstats.metric.normseiten')"
              x-text="(Math.round((kapitelReviewChapterStats().chars || 0) / 1500 * 10) / 10).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + $app.t('bookstats.unit.ns')"></span>
            <span class="tok-badge tok-neutral"
              x-text="kapitelReviewChapterStats().words >= 1000 ? '~' + Math.round(kapitelReviewChapterStats().words/1000) + 'k W' : kapitelReviewChapterStats().words + ' W'"></span>
            <span class="tok-badge"
              :class="kapitelReviewChapterStats().tok > 16000 ? 'tok-high' : kapitelReviewChapterStats().tok > 4000 ? 'tok-med' : 'tok-ok'"
              x-text="kapitelReviewChapterStats().tok >= 1000 ? '~' + Math.round(kapitelReviewChapterStats().tok/1000) + 'k T' : '~' + kapitelReviewChapterStats().tok + ' T'"></span>
          </span>
        </template>
        <template x-if="kapitelReviewChapterStats() && kapitelReviewChapterStats().words === 0">
          <span class="tok-badge tok-empty" x-text="$app.t('sidebar.empty')"></span>
        </template>
      </span>
      <div class="card-actions">
        <button type="button"
                class="icon-btn icon-btn--ghost"
                x-show="kapitelReviewHasSubchapters($app.kapitelReviewChapterId)"
                @click="setKapitelReviewIncludeSubchapters($app.kapitelReviewChapterId, !kapitelReviewIncludeSubchapters($app.kapitelReviewChapterId))"
                :class="{ 'is-active': kapitelReviewIncludeSubchapters($app.kapitelReviewChapterId) }"
                :aria-pressed="kapitelReviewIncludeSubchapters($app.kapitelReviewChapterId)"
                :data-tip="$app.t('kapitelReview.includeSubchaptersTip')"
                :aria-label="$app.t('kapitelReview.includeSubchapters')">
          <svg class="icon" aria-hidden="true">
            <use :href="kapitelReviewIncludeSubchapters($app.kapitelReviewChapterId) ? '/icons.svg?v=693#check' : '/icons.svg?v=693#chevron-down'"/>
          </svg>
        </button>
        <button type="button"
                class="icon-btn icon-btn--ghost"
                @click="runKapitelReview()"
                :disabled="kapitelReviewLoading || !$app.kapitelReviewChapterId"
                :data-tip="kapitelReviewOut ? $app.t('kapitelReview.rerun') : $app.t('kapitelReview.start')"
                :aria-label="kapitelReviewOut ? $app.t('kapitelReview.rerun') : $app.t('kapitelReview.start')">
          <span x-show="kapitelReviewLoading" class="spinner"></span>
          <svg x-show="!kapitelReviewLoading" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg>
        </button>
        <span class="action-overflow" @click.outside="kapitelReviewMenuOpen = false" @keydown.escape.window="kapitelReviewMenuOpen = false">
          <span class="icon-btn-badge-wrap">
            <button type="button" class="icon-btn icon-btn--ghost"
                    :class="{ 'is-active': kapitelReviewMenuOpen }"
                    @click="kapitelReviewMenuOpen = !kapitelReviewMenuOpen"
                    aria-haspopup="menu" :aria-expanded="kapitelReviewMenuOpen"
                    :data-tip="$app.t('editor.btn.moreActions')" :aria-label="$app.t('editor.btn.moreActions')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#more-horizontal"/></svg>
            </button>
            <span class="icon-btn-badge" x-show="($app.chapterIdeenCounts[$app.kapitelReviewChapterId] || 0) > 0" x-text="$app.chapterIdeenCounts[$app.kapitelReviewChapterId]"></span>
          </span>
          <div class="context-menu context-menu--dropdown" x-show="kapitelReviewMenuOpen" x-cloak role="menu">
            <button type="button" class="context-menu-item context-menu-item--icon"
                    :class="{ 'context-menu-item--on': $app.showIdeenCard && $app.ideenScope === 'chapter' }"
                    role="menuitem"
                    :disabled="!$app.kapitelReviewChapterId"
                    @click="$app.toggleChapterIdeenCard($app.kapitelReviewChapterId); kapitelReviewMenuOpen = false">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#lightbulb"/></svg>
              <span x-text="$app.t('ideen.chapter.toggle')"></span>
              <span class="btn-count" x-show="($app.chapterIdeenCounts[$app.kapitelReviewChapterId] || 0) > 0" x-text="$app.chapterIdeenCounts[$app.kapitelReviewChapterId]"></span>
            </button>
            <button type="button" class="context-menu-item context-menu-item--icon" role="menuitem"
                    x-show="($app.chapterPlotBeatCounts[$app.kapitelReviewChapterId] || 0) > 0"
                    @click="$app.openPlotBoard(); kapitelReviewMenuOpen = false">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#list-tree"/></svg>
              <span x-text="$app.t('plot.title')"></span>
              <span class="btn-count" x-text="$app.chapterPlotBeatCounts[$app.kapitelReviewChapterId]" :data-tip="$app.t('plot.chapterBeatsCountTitle', { n: $app.chapterPlotBeatCounts[$app.kapitelReviewChapterId] })"></span>
            </button>
            <button type="button" class="context-menu-item context-menu-item--icon" role="menuitem"
                    x-show="$app.canEdit() && $app.kapitelReviewChapterId"
                    @click="$app.openShareLinksForChapter($app.kapitelReviewChapterId); kapitelReviewMenuOpen = false">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#share-2"/></svg>
              <span x-text="$app.t('share.btn.shareChapter')"></span>
            </button>
          </div>
        </span>
      </div>
    </div>
  </div>

  <!-- Seitenstatistik des gewählten Kapitels – klickbar zur Seite -->
  <template x-if="kapitelReviewSelectedChapter()">
    <div class="kapitel-pages-section">
      <div class="kapitel-pages-heading" x-text="$app.t('kapitelReview.pagesHeading', { n: kapitelReviewSelectedChapter().pages.length })"></div>
      <div class="kapitel-empty-hint"
           x-show="kapitelReviewSelectedChapter().pages.length === 0 && kapitelReviewSubchapterTree($app.kapitelReviewChapterId).length === 0"
           x-text="$app.t('kapitelReview.emptyHint')"></div>
      <div class="kapitel-pages-list" x-show="kapitelReviewSelectedChapter().pages.length > 0">
        <template x-for="page in kapitelReviewSelectedChapter().pages" :key="page.id">
          <div class="kapitel-page-row" @click="$app.selectPage(page)" :data-tip="$app.pageStatusTooltip(page).join(' · ')">
            <span class="kapitel-page-name">
              <span class="page-status-dot" :class="'page-status-' + $app.pageStatus(page)"></span>
              <span x-text="page.name"></span>
            </span>
            <span class="kapitel-page-edited" x-show="page.updated_at" x-text="$app.formatDate(page.updated_at)"></span>
            <span class="kapitel-page-stats">
              <template x-if="$app.tokEsts[page.id] && $app.tokEsts[page.id].words > 0">
                <span class="display-contents">
                  <span class="tok-badge tok-neutral"
                    x-text="$app.tokEsts[page.id].chars >= 1000 ? '~' + Math.round($app.tokEsts[page.id].chars / 1000) + 'k Z' : $app.tokEsts[page.id].chars + ' Z'"></span>
                  <span class="tok-badge tok-neutral"
                    :data-tip="$app.t('bookstats.metric.normseiten')"
                    x-text="(Math.round(($app.tokEsts[page.id].chars || 0) / 1500 * 10) / 10).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + $app.t('bookstats.unit.ns')"></span>
                  <span class="tok-badge tok-neutral"
                    x-text="$app.tokEsts[page.id].words >= 1000 ? '~' + Math.round($app.tokEsts[page.id].words / 1000) + 'k W' : $app.tokEsts[page.id].words + ' W'"></span>
                  <span class="tok-badge"
                    :class="$app.tokEsts[page.id].tok > 16000 ? 'tok-high' : $app.tokEsts[page.id].tok > 4000 ? 'tok-med' : 'tok-ok'"
                    x-text="$app.tokEsts[page.id].tok >= 1000 ? '~' + Math.round($app.tokEsts[page.id].tok / 1000) + 'k T' : '~' + $app.tokEsts[page.id].tok + ' T'"></span>
                </span>
              </template>
              <template x-if="$app.tokEsts[page.id] && $app.tokEsts[page.id].words === 0">
                <span class="tok-badge tok-empty" x-text="$app.t('sidebar.empty')"></span>
              </template>
            </span>
          </div>
        </template>
      </div>

      <!--
        Sub-Kapitel-Section: ganze Section klappbar (Section-Toggle), pro Sub
        eigenes Collapse fuer dessen Page-Liste. Chevron toggelt, Name-Klick
        navigiert in das jeweilige Sub-Kapitel (kapitelReviewChapterId-Switch).
      -->
      <template x-if="kapitelReviewSubchapterTree($app.kapitelReviewChapterId).length > 0">
        <div class="kapitel-subchapters" x-data="collapsible(true)">
          <button type="button" class="collapsible-toggle kapitel-subchapters-heading" x-bind="trigger">
            <span class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
            <span x-text="$app.t('kapitelReview.subchaptersHeading', { n: kapitelReviewSubchapterTree($app.kapitelReviewChapterId).length })"></span>
          </button>
          <div class="kapitel-subchapters-body" x-bind="panel" x-cloak>
            <template x-for="sub in kapitelReviewSubchapterTree($app.kapitelReviewChapterId)" :key="sub.id">
              <div class="kapitel-subchapter" :style="{ '--sub-depth': sub.depthOffset }">
                <div class="kapitel-subchapter-header">
                  <button type="button"
                          class="kapitel-subchapter-chevron"
                          @click="toggleSubchapterOpen(sub.id)"
                          :aria-expanded="isSubchapterOpen(sub.id)"
                          :aria-label="$app.t(isSubchapterOpen(sub.id) ? 'sidebar.collapseAll' : 'sidebar.expandAll')">
                    <span class="history-chevron" :class="{ open: isSubchapterOpen(sub.id) }">›</span>
                  </button>
                  <span class="kapitel-subchapter-name internal-link"
                        role="button" tabindex="0"
                        @click="$app.kapitelReviewChapterId = String(sub.id)"
                        :data-tip="$app.t('kapitelReview.openSubchapterTip', { name: sub.name })"
                        x-text="sub.name"></span>
                  <span class="tag" x-text="sub.pages.length === 1 ? $app.t('sidebar.pagesCountOne') : $app.t('sidebar.pagesCount', { n: sub.pages.length })"></span>
                </div>
                <div class="kapitel-pages-list" x-show="isSubchapterOpen(sub.id) && sub.pages.length > 0" x-cloak>
                  <template x-for="page in sub.pages" :key="page.id">
                    <div class="kapitel-page-row" @click="$app.selectPage(page)" :data-tip="$app.pageStatusTooltip(page).join(' · ')">
                      <span class="kapitel-page-name">
                        <span class="page-status-dot" :class="'page-status-' + $app.pageStatus(page)"></span>
                        <span x-text="page.name"></span>
                      </span>
                      <span class="kapitel-page-edited" x-show="page.updated_at" x-text="$app.formatDate(page.updated_at)"></span>
                      <span class="kapitel-page-stats">
                        <template x-if="$app.tokEsts[page.id] && $app.tokEsts[page.id].words > 0">
                          <span class="display-contents">
                            <span class="tok-badge tok-neutral"
                              x-text="$app.tokEsts[page.id].chars >= 1000 ? '~' + Math.round($app.tokEsts[page.id].chars / 1000) + 'k Z' : $app.tokEsts[page.id].chars + ' Z'"></span>
                            <span class="tok-badge tok-neutral"
                              :data-tip="$app.t('bookstats.metric.normseiten')"
                              x-text="(Math.round(($app.tokEsts[page.id].chars || 0) / 1500 * 10) / 10).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + $app.t('bookstats.unit.ns')"></span>
                            <span class="tok-badge tok-neutral"
                              x-text="$app.tokEsts[page.id].words >= 1000 ? '~' + Math.round($app.tokEsts[page.id].words / 1000) + 'k W' : $app.tokEsts[page.id].words + ' W'"></span>
                            <span class="tok-badge"
                              :class="$app.tokEsts[page.id].tok > 16000 ? 'tok-high' : $app.tokEsts[page.id].tok > 4000 ? 'tok-med' : 'tok-ok'"
                              x-text="$app.tokEsts[page.id].tok >= 1000 ? '~' + Math.round($app.tokEsts[page.id].tok / 1000) + 'k T' : '~' + $app.tokEsts[page.id].tok + ' T'"></span>
                          </span>
                        </template>
                        <template x-if="$app.tokEsts[page.id] && $app.tokEsts[page.id].words === 0">
                          <span class="tok-badge tok-empty" x-text="$app.t('sidebar.empty')"></span>
                        </template>
                      </span>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!--
        Beide "Anlegen"-Forms im Grid: 2 Spalten (Input / Button), Forms via
        display:contents, damit Buttons über beide Zeilen gleichbreit
        ausgerichtet werden. Horizontaler Trenner zwischen Seite und Kapitel.
      -->
      <div class="kapitel-add-forms">
        <form class="kapitel-new-page" @submit.prevent="createKapitelPage()">
          <input type="text"
                 class="kapitel-new-page-input"
                 x-model="$app.newPageTitle"
                 :placeholder="$app.t('kapitelReview.newPagePlaceholder')"
                 :aria-label="$app.t('kapitelReview.newPagePlaceholder')"
                 :disabled="$app.newPageCreating"
                 data-spellcheck="spelling">
          <button type="submit"
                  :disabled="$app.newPageCreating || !$app.newPageTitle.trim()">
            <span x-show="$app.newPageCreating" class="spinner"></span>
            <span x-text="$app.t('kapitelReview.newPageAdd')"></span>
          </button>
        </form>
        <div class="error-msg" x-show="$app.newPageError" x-text="$app.newPageError"></div>

        <hr class="kapitel-add-divider">

        <form class="kapitel-new-page" @submit.prevent="createSiblingChapter()">
          <input type="text"
                 class="kapitel-new-page-input"
                 x-model="$app.newChapterTitle"
                 :placeholder="$app.t('kapitelReview.newChapterPlaceholder')"
                 :aria-label="$app.t('kapitelReview.newChapterPlaceholder')"
                 :disabled="$app.newChapterCreating"
                 data-spellcheck="spelling">
          <button type="submit"
                  :disabled="$app.newChapterCreating || !$app.newChapterTitle.trim()">
            <span x-show="$app.newChapterCreating" class="spinner"></span>
            <span x-text="$app.t('kapitelReview.newChapterAdd')"></span>
          </button>
        </form>
        <div class="error-msg" x-show="$app.newChapterError" x-text="$app.newChapterError"></div>
      </div>
    </div>
  </template>

  <div class="progress-bar-wrap" x-show="kapitelReviewProgress > 0">
    <div class="progress-bar" :style="{ '--progress': kapitelReviewProgress + '%' }"></div>
  </div>
  <div class="card-status" x-html="kapitelReviewStatus"></div>
  <div x-html="kapitelReviewOut"></div>

  <!-- Verlauf für das aktuell gewählte Kapitel -->
  <div x-show="kapitelReviewCurrentHistory().length > 0" class="card-history-section">
    <div class="history-heading" x-text="$app.t('kapitelReview.history')"></div>
    <template x-for="entry in kapitelReviewCurrentHistory()" :key="entry.id">
      <div>
        <div class="history-item" :class="{ 'history-item--open': selectedKapitelReviewId === entry.id }"
             @click="selectedKapitelReviewId = selectedKapitelReviewId === entry.id ? null : entry.id">
          <span class="history-date" x-text="$app.formatDate(entry.reviewed_at)"></span>
          <span x-show="entry.review_json?.gesamtnote" class="badge badge-ok review-stars"
            :data-tip="noteTip(entry.review_json?.gesamtnote)"
            x-html="renderStars(entry.review_json?.gesamtnote)"></span>
          <span class="tag" x-text="entry.model"></span>
          <span class="history-chevron" :class="{ open: selectedKapitelReviewId === entry.id }">›</span>
        </div>
        <div x-show="selectedKapitelReviewId === entry.id" class="history-detail">
          <div x-html="entry.review_json ? _renderKapitelReviewHtml(entry.review_json) : ''"></div>
          <button type="button" class="btn-delete-history" @click.stop="deleteKapitelReview(entry.id)" :data-tip="$app.t('common.deleteEntry')" x-text="$app.t('common.deleteEntry')"></button>
        </div>
      </div>
    </template>
  </div>
</div>
