<!-- Buchbewertung -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/book-review-card.js.
  `showBookReviewCard` bleibt am Root; fachlicher State (Loading/Progress/
  Status/Out/selectedBookReviewId, PollTimer) lebt in der Sub.
  bookReviewHistory bleibt im Root (tree.js/loadPages schreibt, user-settings
  liest beim Danger-Reset).
-->
<div class="card" x-data="bookReviewCard" x-show="$app.showBookReviewCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('review.title', { name: $app.selectedBookName })"></span>
    <div class="card-actions">
      <button type="button" @click="runBookReview()" :disabled="bookReviewLoading">
        <span x-show="bookReviewLoading" class="spinner"></span>
        <span x-text="bookReviewOut ? $app.t('review.rerun') : $app.t('review.start')"></span>
      </button>
    </div>
  </div>
  <div class="progress-bar-wrap" x-show="bookReviewProgress > 0">
    <div class="progress-bar" :style="{ '--progress': bookReviewProgress + '%' }"></div>
  </div>
  <div class="card-status" x-html="bookReviewStatus"></div>
  <div x-html="bookReviewOut"></div>

  <!-- Buchbewertungs-Verlauf -->
  <div x-show="$app.bookReviewHistory.length > 0"
       class="card-history-section"
       :class="{ 'card-history-section--borderless': !bookReviewOut }">
    <div class="history-heading" x-text="$app.t('review.history')"></div>
    <template x-for="entry in $app.bookReviewHistory" :key="entry.id">
      <div>
        <div class="history-item" :class="{ 'history-item--open': selectedBookReviewId === entry.id }"
             @click="selectedBookReviewId = selectedBookReviewId === entry.id ? null : entry.id">
          <span class="history-date" x-text="$app.formatDate(entry.reviewed_at)"></span>
          <span x-show="entry.review_json?.gesamtnote" class="badge badge-ok review-stars"
            x-html="renderStars(entry.review_json?.gesamtnote)"></span>
          <span class="tag" x-text="entry.model"></span>
          <span class="history-chevron" :class="{ open: selectedBookReviewId === entry.id }">›</span>
        </div>
        <div x-show="selectedBookReviewId === entry.id" class="history-detail">
          <div x-html="entry.review_json ? _renderReviewHtml(entry.review_json) : ''"></div>
          <button type="button" class="btn-delete-history" @click.stop="$app.deleteBookReview(entry.id)" :data-tip="$app.t('common.deleteEntry')" x-text="$app.t('common.deleteEntry')"></button>
        </div>
      </div>
    </template>
  </div>
</div>
