<!-- Fehler-Heatmap: Fehlertyp × Kapitel, aggregiert aus jüngstem page_check pro Seite -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/fehler-heatmap-card.js. Der
  `showFehlerHeatmapCard`-Flag bleibt im Root (Hash-Router, Exklusivität),
  fachlicher State lebt in dieser Komponente.
-->
<div class="card card--heatmap" x-data="fehlerHeatmapCard" x-show="$app.showFehlerHeatmapCard" x-cloak>
  <div class="card-header">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('fehlerHeatmap.title')"></span>
    </div>
    <div class="card-actions">
      <div class="tabs">
        <button type="button"
                :class="{ 'tabs-btn--active': fehlerHeatmapMode === 'open' }"
                class="tabs-btn"
                @click="setFehlerHeatmapMode('open')"
                x-text="$app.t('fehlerHeatmap.mode.open')"></button>
        <button type="button"
                :class="{ 'tabs-btn--active': fehlerHeatmapMode === 'applied' }"
                class="tabs-btn"
                @click="setFehlerHeatmapMode('applied')"
                x-text="$app.t('fehlerHeatmap.mode.applied')"></button>
        <button type="button"
                :class="{ 'tabs-btn--active': fehlerHeatmapMode === 'all' }"
                class="tabs-btn"
                @click="setFehlerHeatmapMode('all')"
                x-text="$app.t('fehlerHeatmap.mode.all')"></button>
      </div>
    </div>
  </div>

  <div x-show="fehlerHeatmapStatus" class="card-status" x-html="fehlerHeatmapStatus"></div>

  <div x-show="!fehlerHeatmapLoading && (!fehlerHeatmapData?.chapters || fehlerHeatmapData.chapters.length === 0)"
       class="muted-msg muted-msg--spaced" x-text="$app.t('fehlerHeatmap.emptyState')"></div>

  <template x-if="fehlerHeatmapData?.chapters?.length > 0">
    <div class="heatmap-wrap">
      <div class="heatmap-legend" x-text="$app.t('fehlerHeatmap.legend')"></div>

      <div class="heatmap-scroll">
        <table class="heatmap-table">
          <thead>
            <tr class="heatmap-cluster-row">
              <th class="heatmap-rowhead" colspan="2"></th>
              <template x-for="cluster in fehlerHeatmapClusters" :key="cluster.key">
                <th class="heatmap-cluster-head"
                    :colspan="cluster.typen.length"
                    x-text="$app.t('fehlerHeatmap.cluster.' + cluster.key)"></th>
              </template>
            </tr>
            <tr>
              <th class="heatmap-rowhead" x-text="$app.t('fehlerHeatmap.chapter')"></th>
              <th class="heatmap-numcol" x-text="$app.t('fehlerHeatmap.coverage')"></th>
              <template x-for="(typ, idx) in fehlerHeatmapTypen" :key="typ">
                <th :data-tip="$app.t('fehlerHeatmap.typ.' + typ)"
                    :class="{ 'heatmap-cluster-start': fehlerHeatmapClusterStarts.includes(idx) }">
                  <span x-text="$app.t('fehlerHeatmap.typ.' + typ)"></span>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="ch in fehlerHeatmapData.chapters" :key="fehlerHeatmapChapterKey(ch)">
              <tr>
                <th class="heatmap-rowhead" scope="row">
                  <span class="heatmap-rowhead-main"
                        :class="{ 'internal-link': ch.chapter_id != null }"
                        @click="ch.chapter_id != null && fehlerHeatmapJumpToChapter(ch)"
                        x-text="fehlerHeatmapChapterName(ch)"></span>
                  <span class="heatmap-rowhead-sub" x-text="$app.t('fehlerHeatmap.words', { n: (ch.words || 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH') })"></span>
                </th>
                <td class="heatmap-numcol">
                  <span x-text="$app.t('fehlerHeatmap.coverageLabel', { checked: ch.pages_checked, total: ch.pages_total })"></span>
                  <span class="heatmap-coverage">
                    <span class="heatmap-coverage-bar" :style="{ '--coverage': fehlerHeatmapCoveragePct(ch) + '%' }"></span>
                  </span>
                </td>
                <template x-for="(typ, idx) in fehlerHeatmapTypen" :key="typ">
                  <td class="heatmap-cell heatmap-cell--clickable"
                      :class="[
                        ('heatmap-cell--' + fehlerHeatmapCellKind(fehlerHeatmapChapterKey(ch), typ, fehlerHeatmapCoveragePct(ch))),
                        { 'heatmap-cell--active': activeFehlerDetailKey === fehlerHeatmapChapterKey(ch) + ':' + typ,
                          'heatmap-cluster-start': fehlerHeatmapClusterStarts.includes(idx) }
                      ]"
                      :style="fehlerHeatmapCellVars(fehlerHeatmapChapterKey(ch), typ, fehlerHeatmapCoveragePct(ch))"
                      :data-tip="fehlerHeatmapCellTooltip(fehlerHeatmapChapterKey(ch), typ)"
                      @click="toggleFehlerHeatmapDetail(fehlerHeatmapChapterKey(ch), typ)"
                      x-text="fehlerHeatmapCellLabel(fehlerHeatmapChapterKey(ch), typ)">
                  </td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Detail-Panel: aufklappbar bei Klick auf Zelle -->
      <template x-if="fehlerHeatmapActiveDetail()">
        <div class="heatmap-detail">
          <div class="heatmap-detail-header">
            <span class="heatmap-detail-title"
                  x-text="$app.t('fehlerHeatmap.detail.title', {
                    typ: $app.t('fehlerHeatmap.typ.' + fehlerHeatmapActiveDetail().typ),
                    chapter: fehlerHeatmapActiveDetail().chapterName,
                  })"></span>
            <button type="button" class="heatmap-detail-close"
                    @click="activeFehlerDetailKey = null"
                    x-text="$app.t('common.close')"></button>
          </div>
          <div class="heatmap-detail-list">
            <template x-for="page in fehlerHeatmapActiveDetail().pages" :key="page.page_id">
              <div class="heatmap-detail-page">
                <div class="heatmap-detail-page-header">
                  <span class="tag internal-link"
                        @click="fehlerHeatmapJumpToPage(page.page_id)"
                        x-text="page.page_name"></span>
                  <span class="heatmap-detail-page-count" x-text="$app.t('fehlerHeatmap.detail.countLabel', { n: page.count })"></span>
                </div>
                <template x-for="(s, i) in page.samples" :key="i">
                  <div class="heatmap-detail-sample">
                    <span class="heatmap-detail-original" x-text="s.original"></span>
                    <template x-if="s.korrektur">
                      <span class="heatmap-detail-korrektur" x-text="s.korrektur"></span>
                    </template>
                    <template x-if="s.erklaerung">
                      <div class="heatmap-detail-erklaerung" x-text="s.erklaerung"></div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
