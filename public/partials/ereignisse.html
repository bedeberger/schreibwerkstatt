<!-- Globale Ereignisse -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/ereignisse-card.js.
  Fachdaten (globalZeitstrahl) leben in Alpine.store('catalog') und werden
  über den Root-Proxy als $app.globalZeitstrahl exponiert. ereignisseFilters
  bleibt am Root (app-navigation schreibt darauf). Meta-State + UI-Helper
  (filteredEreignisse, ereignisseKapitelListe, ereignisseSeitenListe,
  ereignisseSubtypListe, formatEventDate, eventSpanYears) leben hier in der
  Sub-Komponente.
-->
<div class="card card--ereignisse" x-data="ereignisseCard" x-show="$app.showEreignisseCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('events.title')"></span>
      <div class="card-subline" x-show="$app.alleAktualisierenLastRun && !ereignisseLoading && !zeitstrahlConsolidating">
        <span class="card-timestamp" x-text="$app.t('common.asOf', { date: $app.alleAktualisierenLastRun })"></span>
      </div>
    </div>
  </div>

  <!-- Fortschritt Ermittlung -->
  <div x-show="ereignisseLoading && ereignisseProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="{ '--progress': ereignisseProgress + '%' }"></div>
  </div>
  <div x-show="ereignisseStatus && !zeitstrahlConsolidating" class="card-status" x-html="ereignisseStatus"></div>

  <!-- Fortschritt Konsolidierung -->
  <div x-show="zeitstrahlConsolidating && zeitstrahlProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="{ '--progress': zeitstrahlProgress + '%' }"></div>
  </div>
  <div x-show="zeitstrahlStatus && !ereignisseLoading" class="card-status" x-html="zeitstrahlStatus"></div>

  <!-- Leer-Hinweis -->
  <div x-show="$app.globalZeitstrahl.length === 0 && !zeitstrahlConsolidating && !ereignisseLoading" class="card-status" x-text="$app.t('common.noDataYet')"></div>

  <!-- Filter -->
  <div x-show="$app.globalZeitstrahl.length > 0" class="filter-bar">
    <span class="filter-search-wrap">
      <input type="text" x-model="$app.ereignisseFilters.suche" :placeholder="$app.t('common.search')" :aria-label="$app.t('common.search')" class="filter-search-input">
      <button type="button" class="search-clear--icon" x-show="$app.ereignisseFilters.suche" @click="$app.ereignisseFilters.suche=''" :aria-label="$app.t('search.clear')" :data-tip="$app.t('search.clear')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=636#x"/></svg></button>
    </span>
    <div x-data="catalogFilter('figur')"
         x-modelable="value" x-model="$app.ereignisseFilters.figurId"
         x-effect="options = $app.figuren.filter(f => $app.globalZeitstrahl.some(ev => ev.figuren.some(fr => fr.id === f.id))).map(f => ({value: f.id, label: f.kurzname || f.name}))"
         >
    </div>
    <div x-data="catalogFilter('subtyp')"
         x-modelable="value" x-model="$app.ereignisseFilters.subtyp"
         x-effect="options = ereignisseSubtypListe().map(s => ({value: s, label: $app.t('events.subtyp.' + s)}))"
         >
    </div>
    <div x-data="catalogFilter('chapter')"
         x-modelable="value" x-model="$app.ereignisseFilters.kapitel"
         x-effect="options = ereignisseKapitelListe().map(k => ({value: k, label: k}))"
         @combobox-change="$app.ereignisseFilters.seite = ''"
         >
    </div>
    <div x-data="catalogFilter('page')"
         x-modelable="value" x-model="$app.ereignisseFilters.seite"
         x-effect="_disabled = !$app.ereignisseFilters.kapitel || ereignisseSeitenListe().length === 0; options = ereignisseSeitenListe().map(s => ({value: s, label: s}))"
         :class="{'combobox-wrap--disabled': _disabled}"
         >
    </div>
    <span class="filter-count" x-text="filteredEreignisse().length + ' / ' + $app.globalZeitstrahl.length"></span>
  </div>

  <!-- Zeitleiste -->
  <div x-show="$app.globalZeitstrahl.length > 0" class="global-zeitstrahl-body global-zeitstrahl-body--card">
    <template x-for="(ev, i) in filteredEreignisse()" :key="ev.id ?? i">
      <div class="gz-item"
           :class="[
             ev.typ === 'extern' ? 'gz-item--extern' : '',
             'gz-item--subtyp-' + (ev.subtyp || 'sonstiges'),
             eventSpanYears(ev) > 0 ? 'gz-item--span' : '',
             ev.datum_year == null && ev.story_tag == null ? 'gz-item--unknown' : '',
             ev.manually_edited ? 'gz-item--manual' : '',
           ]"
           :style="eventSpanYears(ev) > 0 ? ('--span-years:' + eventSpanYears(ev)) : null">
        <div class="gz-marker" :class="ev.typ === 'extern' ? 'gz-marker--extern' : ''"></div>
        <div class="gz-content">
          <div class="gz-datum-row">
            <span class="gz-datum" x-text="formatEventDate(ev)"></span>
            <span class="gz-subtyp-badge"
                  :class="'gz-subtyp-badge--' + (ev.subtyp || 'sonstiges')">
              <svg class="icon gz-subtyp-icon" aria-hidden="true"><use :href="'/icons.svg?v=636#' + subtypIcon(ev.subtyp || 'sonstiges')"/></svg>
              <span x-text="$app.t('events.subtyp.' + (ev.subtyp || 'sonstiges'))"></span>
            </span>
            <template x-if="ev.typ === 'extern'">
              <span class="gz-extern-badge" x-text="$app.t('events.worldEvent')"></span>
            </template>
            <template x-if="ev.manually_edited">
              <span class="gz-manual-badge" :title="$app.t('events.manuallyEdited')" x-text="$app.t('events.manuallyEdited')"></span>
            </template>
          </div>
          <div class="gz-ereignis" x-text="ev.ereignis"></div>
          <!-- Multi-Kapitel-Liste: jeder Eintrag ist klickbar; Bug behoben,
               der bisher immer kapitel[0] genutzt hat. -->
          <div x-show="Array.isArray(ev.kapitel) ? ev.kapitel.length : ev.kapitel" class="gz-kapitel">
            <template x-for="(kap, ki) in (Array.isArray(ev.kapitel) ? ev.kapitel : (ev.kapitel ? [ev.kapitel] : []))" :key="ki">
              <span class="gz-kapitel-link internal-link" x-text="kap" @click="gotoEventKapitel(ev, kap, null)"></span>
            </template>
          </div>
          <div x-show="Array.isArray(ev.seiten) ? ev.seiten.length : ev.seite" class="gz-seite">
            <template x-for="(s, si) in (Array.isArray(ev.seiten) ? ev.seiten : (ev.seite ? [ev.seite] : []))" :key="si">
              <span>
                <template x-if="si > 0"><span> · </span></template>
                <span class="internal-link" @click="gotoEventKapitel(ev, Array.isArray(ev.kapitel) ? ev.kapitel[0] : ev.kapitel, s)" x-text="s"></span>
              </span>
            </template>
          </div>
          <div x-show="ev.bedeutung" class="gz-bedeutung" x-text="ev.bedeutung"></div>
          <div class="gz-figuren-row">
            <template x-for="(fref, fi) in ev.figuren" :key="fi">
              <span class="gz-figur-badge internal-link" :class="'gz-figur-badge--' + (fref.typ || 'andere')" x-text="fref.name" @click="$app.openFigurById(fref.id)"></span>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
