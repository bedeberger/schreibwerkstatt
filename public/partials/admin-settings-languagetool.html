    <!-- LanguageTool-Tab: self-hosted Spellcheck-Server -->
    <section x-show="adminSettingsTab === 'languagetool'" class="admin-settings-section">
      <p class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.languagetool.hint')"></p>
      <div x-data="settingField({ k: 'languagetool.enabled', type: 'toggle', base: 'languagetool.enabled' })"></div>
      <div x-data="settingField({ k: 'languagetool.url', type: 'url', base: 'languagetool.url', help: true })"></div>
      <div x-data="settingField({ k: 'languagetool.picky', type: 'toggle', base: 'languagetool.picky', help: true })"></div>
      <div x-data="settingField({ k: 'languagetool.debounce_ms', type: 'num', base: 'languagetool.debounce', num: { integer: true, min: 200, max: 10000 }, help: true })"></div>
      <div class="admin-settings-actions">
        <button type="button" @click="adminSettingsTest('languagetool')" x-text="$app.t('admin.settings.test.languagetool')"></button>
      </div>
    </section>
