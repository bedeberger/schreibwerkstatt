<!-- Meine Statistik: aggregierte Schreib-Kennzahlen ueber alle eigenen Buecher.
     Alpine.data-Sub-Komponente — siehe public/js/cards/my-stats-card.js.
     User-bound (role='owner'), nicht buch-bound.
     Layout reuse: Tile-Grid + Tile-Atome der Buch-Übersicht (.overview-grid /
     .overview-tile / .overview-hero-* / .overview-substat* / .overview-streak-* /
     .overview-weekday-* / .overview-consistency-*). Akzent = globaler
     var(--color-accent), wie in der Buch-Übersicht. -->
<div class="card card--mystats" x-data="myStatsCard" x-show="$app.showMyStatsCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('mystats.title')"></span>
  </div>

  <p class="mystats-allbooks-note" x-text="$app.t('mystats.allBooksNote')"></p>

  <!-- Globaler Zeitraum-Filter: Presets (30/90/365 T, alles) ODER freie Von/Bis-Auswahl.
       Steuert die ganze Karte. Lifetime-Werte (Bücher/Kapitel/Wortschatz, Lesbarkeit,
       Meilensteine) bleiben Gesamtwerte (Hinweis-Tag). -->
  <div class="mystats-range" x-show="!myStatsLoading && !myStatsError && myStatsData && myStatsData.books > 0" x-cloak>
    <div class="btn-group">
      <template x-for="r in [{v:30,k:'30'},{v:90,k:'90'},{v:365,k:'365'},{v:0,k:'all'}]" :key="r.v">
        <button type="button" class="btn-compact"
                :class="{ primary: !myStatsFrom && !myStatsTo && myStatsRangeDays === r.v }"
                @click="myStatsSetPreset(r.v)"
                x-text="$app.t('mystats.range.' + r.k)"></button>
      </template>
    </div>
    <div class="mystats-range-custom">
      <input type="date" class="mystats-date-input" x-model="myStatsFrom"
             @change="myStatsRangeDays = 0; _onRangeChange()"
             :max="myStatsTo || null" :aria-label="$app.t('mystats.rangeFrom')">
      <span class="mystats-range-sep" aria-hidden="true">–</span>
      <input type="date" class="mystats-date-input" x-model="myStatsTo"
             @change="myStatsRangeDays = 0; _onRangeChange()"
             :min="myStatsFrom || null" :aria-label="$app.t('mystats.rangeToLabel')">
      <button type="button" class="btn-compact" x-show="myStatsFrom || myStatsTo"
              @click="myStatsSetPreset(0)" x-text="$app.t('mystats.rangeClear')"></button>
    </div>
  </div>

  <div x-show="myStatsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>
  <p x-show="myStatsError" x-cloak class="card-form-error" x-text="myStatsError"></p>
  <p x-show="myStatsIsEmpty" x-cloak class="muted-msg" x-text="$app.t('mystats.empty')"></p>

  <div class="overview-grid" x-show="!myStatsLoading && !myStatsError && myStatsData && myStatsData.books > 0">
    <!-- HERO: Zeichen gross + Sekundär-Kennzahlen inline -->
    <template x-if="myStatsData && myStatsData.books > 0">
    <div class="overview-tile overview-tile--hero">
      <div class="overview-tile-label" x-text="myStatsWindowActive ? $app.t('mystats.volumeInRange') : $app.t('mystats.volume')"></div>
      <div class="overview-hero-row">
        <div class="overview-hero-num">
          <span class="overview-hero-value" x-text="_myStatsFmt(myStatsVolume().chars)"></span>
          <span class="overview-hero-unit" x-text="$app.t('mystats.chars')"></span>
        </div>
        <div class="overview-substats">
          <div class="overview-substat">
            <span class="overview-substat-value" x-text="myStatsNormpages()"></span>
            <span class="overview-substat-unit" x-text="$app.t('mystats.normpages')"></span>
          </div>
          <div class="overview-substat">
            <span class="overview-substat-value" x-text="_myStatsFmt(myStatsVolume().words)"></span>
            <span class="overview-substat-unit" x-text="$app.t('mystats.words')"></span>
          </div>
          <div class="overview-substat">
            <span class="overview-substat-value" x-text="_myStatsFmt(myStatsVolume().pages)"></span>
            <span class="overview-substat-unit" x-text="$app.t('mystats.pages')"></span>
          </div>
          <div class="overview-substat">
            <span class="overview-substat-value" x-text="myStatsWritingTime()"></span>
            <span class="overview-substat-unit" x-text="$app.t('mystats.writingTime')"></span>
          </div>
        </div>
      </div>

      <!-- Gesamt-Kennzahlen (immer all-time, auch bei aktivem Zeitraum): Bücher,
           Kapitel, Wortschatz sind Bestandswerte, kein Zeitraum-Zuwachs. -->
      <div class="overview-substats mystats-state-row">
        <div class="overview-substat">
          <span class="overview-substat-value" x-text="_myStatsFmt(myStatsData.books)"></span>
          <span class="overview-substat-unit" x-text="$app.t('mystats.books')"></span>
        </div>
        <div class="overview-substat">
          <span class="overview-substat-value" x-text="_myStatsFmt(myStatsData.chapters)"></span>
          <span class="overview-substat-unit" x-text="$app.t('mystats.chapters')"></span>
        </div>
        <div class="overview-substat" x-show="myStatsData.unique_words > 0">
          <span class="overview-substat-value" x-text="_myStatsFmt(myStatsData.unique_words)"></span>
          <span class="overview-substat-unit" x-text="$app.t('mystats.uniqueWords')"></span>
        </div>
        <span class="mystats-alltime-tag" x-show="myStatsWindowActive" x-text="$app.t('mystats.allTimeTag')"></span>
      </div>

      <!-- Diese Woche vs. letzte Woche (geschriebene Zeichen) — nur ohne aktiven Zeitraum -->
      <div class="mystats-week-delta" x-show="!myStatsWindowActive && (myStatsWeekDelta().thisWeek !== 0 || myStatsWeekDelta().lastWeek !== 0)">
        <span class="overview-trend-pct"
              :class="myStatsWeekDelta().thisWeek > 0 ? 'overview-trend-pct--up' : myStatsWeekDelta().thisWeek < 0 ? 'overview-trend-pct--down' : ''"
              x-text="(myStatsWeekDelta().thisWeek >= 0 ? '+' : '') + _myStatsFmt(myStatsWeekDelta().thisWeek)"></span>
        <span class="mystats-week-delta-label" x-text="$app.t('mystats.thisWeek')"></span>
        <span class="mystats-week-delta-prev"
              x-text="$app.t('mystats.lastWeek', { n: _myStatsFmt(myStatsWeekDelta().lastWeek) })"></span>
      </div>
    </div>
    </template>

    <!-- Schreibrhythmus (Streak-Heatmap + Ziel-Modus), Wochentags-Muster und
         Session-Kennzahlen ausgelagert wg. 250-LOC-Partial-Limit.
         display:contents-Wrapper → Tiles bleiben Grid-Kinder. -->
    <div id="partial-my-stats-rhythm"></div>

    <!-- Insight-Tiles (Lesbarkeit, Aufwand, Pro-Buch-Zeit) ausgelagert wg.
         250-LOC-Partial-Limit. display:contents-Wrapper → Tiles bleiben Grid-Kinder. -->
    <div id="partial-my-stats-insights"></div>

    <!-- Pro-Buch-Ziele: geschriebener Umfang + Gesamtziel-Erreichung pro Buch. -->
    <div id="partial-my-stats-book-goals"></div>

    <!-- Meilensteine: erreichte Badges + nächstes Ziel -->
    <template x-if="myStatsData && myStatsData.books > 0 && (myStatsMilestones().achieved.length || myStatsMilestones().next)">
      <div class="overview-tile overview-tile--medium">
        <div class="overview-tile-label">
          <span x-text="$app.t('mystats.milestones')"></span>
          <span class="mystats-alltime-tag" x-show="myStatsWindowActive" x-text="$app.t('mystats.allTimeTag')"></span>
        </div>
        <div class="mystats-badges">
          <template x-for="m in myStatsMilestones().achieved" :key="m.category">
            <span class="mystats-badge" x-text="myStatsMilestoneLabel(m.category, m.target)"></span>
          </template>
        </div>
        <template x-if="myStatsMilestones().next">
          <div class="mystats-milestone-next">
            <div class="mystats-milestone-next-head">
              <span x-text="$app.t('mystats.nextGoal')"></span>
              <span x-text="myStatsMilestoneLabel(myStatsMilestones().next.category, myStatsMilestones().next.target)"></span>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar" :style="{ '--progress': myStatsMilestones().next.progress + '%' }"></div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Entwicklung über die Zeit -->
    <template x-if="myStatsHasChart">
      <div class="overview-tile overview-tile--wide mystats-chart-tile">
        <div class="overview-tile-label" x-text="$app.t('mystats.development')"></div>
        <div class="mystats-controls">
          <div class="btn-group">
            <template x-for="m in [{v:'total',k:'total'},{v:'byBook',k:'byBook'}]" :key="m.v">
              <button type="button" class="btn-compact" :class="{ primary: myStatsChartMode === m.v }"
                      @click="myStatsChartMode = m.v; renderMyStatsChart()"
                      x-text="$app.t('mystats.chart.' + m.k)"></button>
            </template>
          </div>
          <div class="btn-group">
            <template x-for="g in [{v:'day',k:'day'},{v:'week',k:'week'},{v:'month',k:'month'}]" :key="g.v">
              <button type="button" class="btn-compact" :class="{ primary: myStatsChartGran === g.v }"
                      @click="myStatsChartGran = g.v; renderMyStatsChart()"
                      x-text="$app.t('mystats.gran.' + g.k)"></button>
            </template>
          </div>
          <div x-data="combobox($app.t('mystats.metric'))"
               x-modelable="value" x-model="myStatsMetric"
               x-effect="options = [
                 {value:'chars',         label: $app.t('mystats.metric.chars')},
                 {value:'normseiten',    label: $app.t('mystats.metric.normseiten')},
                 {value:'words',         label: $app.t('mystats.metric.words')},
                 {value:'unique_words',  label: $app.t('mystats.metric.uniqueWords')},
                 {value:'page_count',    label: $app.t('mystats.metric.pages')},
                 {value:'chapter_count', label: $app.t('mystats.metric.chapters')},
                 {value:'writing',       label: $app.t('mystats.metric.writing')},
                 {value:'lektorat',      label: $app.t('mystats.metric.lektorat')}
               ]"
               @combobox-change="$nextTick(() => renderMyStatsChart())"></div>
          <div class="btn-group" x-show="myStatsMetric === 'writing' || myStatsMetric === 'lektorat'" x-cloak>
            <template x-for="c in [{v:false,k:'daily'},{v:true,k:'cumulative'}]" :key="String(c.v)">
              <button type="button" class="btn-compact" :class="{ primary: myStatsCumulative === c.v }"
                      @click="myStatsCumulative = c.v; renderMyStatsChart()"
                      x-text="$app.t('mystats.cumul.' + c.k)"></button>
            </template>
          </div>
        </div>
        <div class="mystats-chart-wrap">
          <canvas id="my-stats-chart" role="img" :aria-label="$app.t('mystats.chartFallback')"><span x-text="$app.t('mystats.chartFallback')"></span></canvas>
        </div>
      </div>
    </template>
  </div>
</div>
