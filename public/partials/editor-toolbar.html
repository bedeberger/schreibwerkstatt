<!-- Edit-Toolbar: Bubble (Inline auf Selektion) + Slash (Block-Transforms).
     Beides nach <body> teleportiert, damit position:fixed nicht von einem
     transformierten Eltern-Container (Card) eingefangen wird.
     Nur in Edit-Mode aktiv, im Fokus-Modus strukturell ausgeblendet.
     Alpine.data-Sub — siehe public/js/cards/editor-toolbar-card.js. -->

<div x-data="editorToolbarCard" class="display-contents">
  <!-- Bubble-Toolbar (Inline-Formate) -->
  <template x-teleport="body">
    <div x-show="bubbleShow && $app.editMode && !$app.focusActive" x-cloak
         class="edit-bubble-toolbar"
         role="toolbar"
         :aria-label="$app.t('editor.toolbar.ariaLabel')"
         :style="{ left: bubbleX + 'px', top: bubbleY + 'px' }"
         @mousedown.prevent>
      <button type="button" class="edit-bubble-btn edit-bubble-btn--bold"   @click="toolbarBold()"   :data-tip="$app.t('editor.toolbar.boldTitle')"   :aria-label="$app.t('editor.toolbar.boldTitle')">B</button>
      <button type="button" class="edit-bubble-btn edit-bubble-btn--italic" @click="toolbarItalic()" :data-tip="$app.t('editor.toolbar.italicTitle')" :aria-label="$app.t('editor.toolbar.italicTitle')">I</button>
      <button type="button"
              x-show="bubbleSingleWord"
              class="edit-bubble-btn edit-bubble-btn--syn"
              @click="$app.openSynonymForCurrentSelection()"
              :data-tip="$app.t('editor.toolbar.synonymTitle')"
              :aria-label="$app.t('editor.toolbar.synonymTitle')"
              x-text="$app.t('editor.toolbar.synonymLabel')"></button>
      <button type="button"
              class="edit-bubble-btn edit-bubble-btn--link"
              @click="openLinkInput()"
              :data-tip="$app.t('editor.toolbar.linkTitle')"
              :aria-label="$app.t('editor.toolbar.linkTitle')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg#external-link"/></svg>
      </button>
    </div>
  </template>

  <!-- Link-Input -->
  <template x-teleport="body">
    <div x-show="linkShow && $app.editMode && !$app.focusActive" x-cloak
         class="edit-link-bar"
         :style="{ left: linkX + 'px', top: linkY + 'px' }"
         @click.outside="_closeLink()"
         @mousedown.stop>
      <input type="text" x-ref="linkInput"
             x-model="linkUrl"
             @keydown="_onLinkKeydown($event)"
             :placeholder="$app.t('editor.toolbar.linkPlaceholder')"
             :aria-label="$app.t('editor.toolbar.linkTitle')"
             class="edit-link-input">
      <button type="button" class="edit-link-btn" @click="_commitLink()"
              :data-tip="$app.t('editor.toolbar.linkApply')"
              :aria-label="$app.t('editor.toolbar.linkApply')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg#check"/></svg>
      </button>
    </div>
  </template>

  <!-- Slash-Menü (Block-Transforms) -->
  <template x-teleport="body">
    <div x-show="slashShow && $app.editMode && !$app.focusActive" x-cloak
         class="edit-slash-menu"
         role="listbox"
         :aria-label="$app.t('editor.slash.ariaLabel')"
         :aria-activedescendant="slashShow ? ('edit-slash-opt-' + slashIdx) : null"
         :style="{ left: slashX + 'px', bottom: slashY + 'px' }"
         @click.outside="_closeSlash()">
      <div class="edit-slash-hint" :class="{ 'edit-slash-hint--query': slashQuery }">
        <span x-show="!slashQuery" x-text="$app.t('editor.slash.hint')"></span>
        <span x-show="slashQuery" class="edit-slash-query"><span class="edit-slash-query-slash">/</span><span x-text="slashQuery"></span></span>
      </div>
      <template x-for="(it, i) in slashItems()" :key="it.key">
        <div class="edit-slash-row" role="presentation">
          <div x-show="it.showGroup"
               class="edit-slash-group" x-text="it.groupLabel"></div>
          <button type="button"
                  class="edit-slash-item"
                  role="option"
                  :id="'edit-slash-opt-' + i"
                  :aria-selected="slashIdx === i"
                  :class="it.modClass + (slashIdx === i ? ' edit-slash-item--active' : '')"
                  @mousedown.prevent
                  @click="_applySlashByKey(it.key)"
                  @mouseenter="slashIdx = i">
            <span class="edit-slash-label" x-text="it.label"></span>
            <span x-show="it.preview" class="edit-slash-prev" x-text="it.preview"></span>
          </button>
        </div>
      </template>
      <div x-show="slashItems().length === 0" class="edit-slash-empty"
           x-text="$app.t('editor.slash.noMatch')"></div>
    </div>
  </template>
</div>
