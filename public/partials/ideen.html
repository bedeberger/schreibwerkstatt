<!-- Seiten-Ideen — Notizen für Fortsetzungen, Szenen, Anker.
     Sub-Komponente, lebt parallel zum Editor (kein _closeOtherMainCards).
     Offene Ideen werden im Seiten-Chat als Kontext mitgegeben. -->
<div class="card card--ideen" id="ideen-card" x-data="ideenCard" x-show="$app.showIdeenCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-title"
            x-text="$app.ideenScope === 'chapter' ? $app.t('ideen.titleChapter') : $app.t('ideen.title')"></span>
      <div class="card-subline"
           x-text="$app.ideenScope === 'chapter' ? $app.t('ideen.chatNoteChapter') : $app.t('ideen.chatNote')"></div>
    </div>
  </div>

  <div x-show="errorMessage" class="card-status card-status--error" x-text="errorMessage"></div>

  <div class="ideen-input-row">
    <textarea
      class="ideen-input"
      x-model="newContent"
      :placeholder="$app.ideenScope === 'chapter' ? $app.t('ideen.placeholderChapter') : $app.t('ideen.placeholder')"
      :aria-label="$app.ideenScope === 'chapter' ? $app.t('ideen.placeholderChapter') : $app.t('ideen.placeholder')"
      rows="2"
      :disabled="busy"
      data-spellcheck="spelling"
      @keydown.enter="if(!$event.isComposing && $event.keyCode !== 229 && !$event.shiftKey && !$event.ctrlKey && !$event.metaKey) { $event.preventDefault(); addIdee(); }"
    ></textarea>
    <button type="button"
      class="ideen-add-btn"
      @click="addIdee()"
      :disabled="busy || !(newContent || '').trim()"
      x-text="$app.t('ideen.add')"></button>
  </div>

  <!-- Move-Picker (Single-Instance, ausserhalb x-for damit Combobox sauber initialisiert) -->
  <div x-show="movingId !== null" class="idee-move-panel" x-cloak>
    <span class="ideen-move-label"
          x-text="$app.ideenScope === 'chapter' ? $app.t('ideen.moveToChapter') : $app.t('ideen.moveTo')"></span>
    <div x-data="combobox(() => $app.ideenScope === 'chapter' ? $app.t('ideen.moveSelectPlaceholderChapter') : $app.t('ideen.moveSelectPlaceholder'), null)"
         x-modelable="value" x-model="moveTargetId"
         x-effect="options = $app.ideenMovePickerOptions()"
         class="idee-move-combo"></div>
    <button type="button" class="btn-compact" @click="confirmMoveCurrentIdee()" :disabled="busy || !moveTargetId" x-text="$app.t('ideen.moveConfirm')"></button>
    <button type="button" class="btn-compact" @click="cancelMoveIdee()" :disabled="busy" x-text="$app.t('ideen.cancel')"></button>
  </div>

  <div class="ideen-list">
    <div x-show="loading" class="ideen-loading" x-text="$app.t('common.loading')"></div>

    <div x-show="!loading && ideen.length === 0" class="ideen-empty"
         x-text="$app.ideenScope === 'chapter' ? $app.t('ideen.emptyChapter') : $app.t('ideen.empty')"></div>

    <!-- Offene Ideen -->
    <template x-if="!loading && offeneIdeen().length > 0">
      <div class="ideen-section">
        <div class="ideen-section-title" x-text="$app.t('ideen.sectionOpen')"></div>
        <template x-for="idee in offeneIdeen()" :key="idee.id">
          <div class="idee-item" :class="{'idee-item--moving': movingId === idee.id}" :data-idee-id="idee.id">
            <div class="idee-status-badge" x-text="$app.t('ideen.statusOpen')"></div>
            <div class="idee-menu" x-show="editingId !== idee.id && movingId !== idee.id">
              <button type="button"
                class="idee-menu-btn"
                @click.stop="openMenu($event, idee)"
                :disabled="busy"
                :aria-label="$app.t('ideen.actions')"
                :aria-expanded="menuOpenId === idee.id"
                aria-haspopup="menu">⋯</button>
            </div>
            <template x-if="editingId !== idee.id">
              <div class="idee-content" :class="movingId === idee.id ? 'idee-content--moving' : ''" x-text="idee.content"></div>
            </template>
            <template x-if="editingId === idee.id">
              <div class="idee-edit">
                <textarea class="ideen-input" x-model="editingDraft" rows="3" :disabled="busy"
                  data-spellcheck="spelling"
                  @keydown.enter="if(!$event.isComposing && $event.keyCode !== 229 && !$event.shiftKey && !$event.ctrlKey && !$event.metaKey) { $event.preventDefault(); saveEditIdee(idee); }"
                  @keydown.escape="cancelEditIdee()"></textarea>
                <div class="idee-edit-actions">
                  <button type="button" @click="saveEditIdee(idee)" :disabled="busy" x-text="$app.t('ideen.save')"></button>
                  <button type="button" @click="cancelEditIdee()" :disabled="busy" x-text="$app.t('ideen.cancel')"></button>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

    <!-- Single-Instance Popover für Meatball-Menü.
         Via x-teleport zu <body>, weil .ideen-list im Split-View einen
         Scroll-Container darstellt (max-height + overflow-y) und ein
         lokales position:absolute-Popover dort abgeschnitten würde. -->
    <template x-teleport="body">
      <div class="idee-menu-popover idee-menu-popover--portal"
           x-show="menuOpenId !== null && !!menuOpenIdee()" x-cloak
           :style="`top:${menuPos.top}px;left:${menuPos.left}px`"
           @click.outside="closeMenu()"
           @keydown.escape.window="closeMenu()"
           role="menu">
        <template x-if="menuOpenIdee()">
          <div class="idee-menu-popover-inner">
            <button type="button" role="menuitem"
                    x-show="!menuOpenIdee().erledigt"
                    @click.stop="toggleErledigtIdee(menuOpenIdee()); closeMenu()"
                    :disabled="busy" x-text="$app.t('ideen.markDone')"></button>
            <button type="button" role="menuitem"
                    x-show="menuOpenIdee().erledigt"
                    @click.stop="toggleErledigtIdee(menuOpenIdee()); closeMenu()"
                    :disabled="busy" x-text="$app.t('ideen.markOpen')"></button>
            <button type="button" role="menuitem"
                    x-show="!menuOpenIdee().erledigt"
                    @click.stop="startEditIdee(menuOpenIdee()); closeMenu()"
                    :disabled="busy" x-text="$app.t('ideen.edit')"></button>
            <button type="button" role="menuitem"
                    x-show="!menuOpenIdee().erledigt"
                    @click.stop="startMoveIdee(menuOpenIdee()); closeMenu()"
                    :disabled="busy" x-text="$app.t('ideen.move')"></button>
            <button type="button" role="menuitem" class="idee-menu-item--danger"
                    @click.stop="deleteIdee(menuOpenIdee()); closeMenu()"
                    :disabled="busy" x-text="$app.t('ideen.delete')"></button>
          </div>
        </template>
      </div>
    </template>

    <!-- Erledigte Ideen -->
    <template x-if="!loading && erledigteIdeen().length > 0">
      <div class="ideen-section">
        <div class="ideen-section-title" x-text="$app.t('ideen.sectionDone')"></div>
        <template x-for="idee in erledigteIdeen()" :key="idee.id">
          <div class="idee-item idee-item--erledigt">
            <div class="idee-status-badge idee-status-badge--erledigt" x-text="$app.t('ideen.statusDone')"></div>
            <div class="idee-menu">
              <button type="button"
                class="idee-menu-btn"
                @click.stop="openMenu($event, idee)"
                :disabled="busy"
                :aria-label="$app.t('ideen.actions')"
                :aria-expanded="menuOpenId === idee.id"
                aria-haspopup="menu">⋯</button>
            </div>
            <div class="idee-content" x-text="idee.content"></div>
          </div>
        </template>
      </div>
    </template>
  </div>
</div>
