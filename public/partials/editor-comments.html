<!-- Kommentar-Leiste der Leseansicht (Notebook-Editor, Read-Modus).
     Der Partial-Container in editor-notebook.html hat `display: contents`,
     damit das <aside> direkter Grid-Nachbar von .editor-preview-wrap wird,
     sobald .editor-body-wrap die Klasse `comments-split` trägt (gesteuert über
     das Root-Flag pageCommentRailOpen, das die Karte spiegelt).
     Zeigt nur verankerte Share-Link-Leser-Kommentare der offenen Seite;
     allgemeine Kommentare bleiben der „Geteilte Links"-Karte vorbehalten.
     Der Thread-Body (Root-Kommentar + Antworten + Reply-Foot) lebt geteilt in
     comment-thread-body.html (SSoT mit dem Bucheditor); hier bleibt nur die
     Notebook-Schale + der verankerte Quote-Block. -->
<div x-data="editorCommentsCard" class="display-contents">

  <!-- Verankerte Threads: stapeln normal in der rechten Spalte (das Blatt scrollt
       als eigener Container, daher keine vertikale Verankerung wie im Bucheditor).
       Auswahl scrollt das Blatt zur Stelle. Verhalten: editor/comments-rail.js. -->
  <aside class="comment-rail"
         x-show="commentRailVisible && (commentThreads.length || commentFilterStatus !== 'all' || commentFilterReviewer) && !$app.editMode && !$app.checkDone"
         x-cloak
         :aria-label="$app.t('share.rail.title')">
    <div class="comment-rail__head">
      <span class="comment-rail__title" x-text="$app.t('share.comments.countLabel', { count: commentThreads.length + commentGeneralThreads.length })"></span>
      <button type="button" class="icon-btn icon-btn--ghost"
              @click="collapseRail()"
              :data-tip="$app.t('share.rail.collapse')" :aria-label="$app.t('share.rail.collapse')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg>
      </button>
    </div>

    <!-- Triage-Filter (#5): Status-Segment + optionaler Reviewer-Filter. -->
    <div class="comment-rail__filters" x-show="bookComments.length">
      <div class="seg-toggle comment-rail__filter-status">
        <button type="button" :class="{ 'seg-toggle--active': commentFilterStatus === 'all' }"
                @click="_railSetFilter({ status: 'all' })" x-text="$app.t('share.comments.filter.all')"></button>
        <button type="button" :class="{ 'seg-toggle--active': commentFilterStatus === 'open' }"
                @click="_railSetFilter({ status: 'open' })" x-text="$app.t('share.comments.filter.open')"></button>
        <button type="button" :class="{ 'seg-toggle--active': commentFilterStatus === 'resolved' }"
                @click="_railSetFilter({ status: 'resolved' })" x-text="$app.t('share.comments.filter.resolved')"></button>
      </div>
      <div class="comment-rail__filter-reviewer" x-show="_railReviewerNames().length > 1"
           x-data="combobox($app.t('share.comments.filter.reviewerAll'), $app.t('share.comments.filter.reviewerAll'))"
           x-modelable="value" x-model="commentFilterReviewer"
           x-effect="options = _railReviewerNames().map(n => ({ value: n, label: n }))"
           @combobox-change="_railSetFilter({})"></div>
    </div>

    <div class="comment-rail__filter-empty muted-msg" x-show="!commentThreads.length && !commentGeneralThreads.length"
         x-text="$app.t('share.comments.filterEmpty')"></div>

    <div class="comment-rail__layer">
      <template x-for="thread in commentThreads" :key="thread.root.id">
        <div class="comment-rail__thread"
             :data-root-id="thread.root.id"
             :class="{ 'comment-rail__thread--selected': commentSelectedRootId === thread.root.id,
                       'comment-rail__thread--resolved': thread.root.resolved_at }">

          <!-- Verankerte Stelle (Klick selektiert + hebt im Text hervor). -->
          <div class="comment-rail__anchor internal-link"
               role="button" tabindex="0"
               @click="selectCommentThread(thread.root.id)"
               @keydown.enter.prevent="selectCommentThread(thread.root.id)">
            <span class="comment-rail__quote" x-show="!thread.changed"
                  x-text="thread.root.anchor_quote || ''"></span>
            <!-- Stelle seit dem Kommentar geändert: Quote→aktuell als Inline-Diff. -->
            <template x-if="thread.changed">
              <div class="comment-rail__changed">
                <span class="comment-rail__changed-badge" x-text="$app.t('share.comments.textChanged')"></span>
                <div class="comment-rail-diff" x-show="thread._diffHtml" x-html="thread._diffHtml"></div>
                <span class="comment-rail__quote comment-rail__quote--stale" x-show="!thread._diffHtml"
                      x-text="thread.root.anchor_quote || ''"></span>
              </div>
            </template>
          </div>

          <!-- @include comment-thread-body -->
        </div>
      </template>
    </div><!-- /.comment-rail__layer -->
  </aside>

  <!-- Allgemeine (nicht-verankerte) Kommentare dieser Seite (Page-Share): kein
       Textanker → zentrierte Bande GANZ UNTEN unter dem Seitentext (analog
       Bucheditor). Kein Quote/Highlight; sonst identischer Thread-Body. -->
  <section class="comment-rail comment-rail--general" x-cloak
           x-show="commentRailVisible && commentGeneralThreads.length && !$app.editMode && !$app.checkDone"
           :aria-label="$app.t('share.comments.general')">
    <div class="comment-rail__section-title" x-text="$app.t('share.comments.general')"></div>
    <div class="comment-rail__general-grid">
      <template x-for="thread in commentGeneralThreads" :key="thread.root.id">
        <div class="comment-rail__thread comment-rail__thread--general"
             :class="{ 'comment-rail__thread--selected': commentSelectedRootId === thread.root.id,
                       'comment-rail__thread--resolved': thread.root.resolved_at }">
          <!-- @include comment-thread-body -->
        </div>
      </template>
    </div>
  </section>
</div>
