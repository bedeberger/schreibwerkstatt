<!-- Kontinuitätsprüfung -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/kontinuitaet-card.js.
  `showKontinuitaetCard` + `toggleKontinuitaetCard` bleiben im Root. Das
  kontinuitaet-spezifische „bei erneutem Klick refreshen" läuft über
  window-Event `card:refresh { name: 'kontinuitaet' }`.
-->
<div class="card card--kontinuitaet" x-data="kontinuitaetCard" x-show="$app.showKontinuitaetCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-title" x-text="$app.t('kontinuitaet.title', { name: $app.selectedBookName })"></span>
      <div class="card-subline" x-show="$app.alleAktualisierenLastRun && !kontinuitaetLoading">
        <span class="card-timestamp" x-text="$app.t('common.asOf', { date: $app.alleAktualisierenLastRun })"></span>
      </div>
    </div>
  </div>

  <div x-show="kontinuitaetProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="{ '--progress': kontinuitaetProgress + '%' }"></div>
  </div>
  <div x-show="kontinuitaetStatus" class="card-status" x-html="kontinuitaetStatus"></div>

  <div x-show="!kontinuitaetResult && !kontinuitaetLoading && !kontinuitaetStatus" class="card-status" x-text="$app.t('common.noDataYet')"></div>

  <!-- Skeleton während Loading vor erstem Ergebnis -->
  <div x-show="kontinuitaetLoading && !kontinuitaetResult" class="entity-skeleton entity-list--accented" x-cloak>
    <template x-for="i in 5" :key="i">
      <div class="entity-skeleton-row">
        <span class="entity-skeleton-cell entity-skeleton-cell--anchor"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--title"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--meta"></span>
      </div>
    </template>
  </div>

  <!-- Zusammenfassung (klappbar) — ausserhalb x-if, sonst werden Filter und
       Zusammenfassung beim Result-Wechsel komplett neu gemountet. -->
  <div x-show="kontinuitaetResult?.summary" class="collapsible-wrap" x-cloak>
    <button type="button"
            class="collapsible-toggle"
            @click="kontinuitaetSummaryOpen = !kontinuitaetSummaryOpen"
            :aria-expanded="kontinuitaetSummaryOpen">
      <span class="history-chevron" :class="{ open: kontinuitaetSummaryOpen }">›</span>
      <span x-text="$app.t('kontinuitaet.summary')"></span>
    </button>
    <div x-show="kontinuitaetSummaryOpen" class="collapsible-section kontinuitaet-summary" x-cloak x-text="kontinuitaetResult?.summary || ''"></div>
  </div>

  <!-- Filter-Leiste — MUSS ausserhalb x-if bleiben, sonst trackt Alpine x-effect
       der Comboboxen die Parent-Reaktivität nicht und options bleibt leer. -->
  <div x-show="kontinuitaetResult?.issues?.length > 0" class="filter-bar" x-cloak>
    <div class="tabs">
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': kontinuitaetFilters.schwere === '' }"
              @click="kontinuitaetFilters.schwere = ''">
        <span x-text="$app.t('common.all')"></span>
        <span class="tabs-btn-count" x-text="(kontinuitaetResult?.issues || []).length"></span>
      </button>
      <template x-for="sev in ['kritisch','mittel','niedrig']" :key="sev">
        <button type="button" class="tabs-btn"
                :class="{ 'tabs-btn--active': kontinuitaetFilters.schwere === sev }"
                :disabled="(kontinuitaetResult?.issues || []).filter(i => i.schwere === sev).length === 0"
                @click="kontinuitaetFilters.schwere = kontinuitaetFilters.schwere === sev ? '' : sev">
          <span x-text="$app.t('kontinuitaet.severity.' + sev)"></span>
          <span class="tabs-btn-count" x-text="(kontinuitaetResult?.issues || []).filter(i => i.schwere === sev).length"></span>
        </button>
      </template>
    </div>
    <div x-data="combobox($app.t('filter.figur'), $app.t('filter.allFiguren'))"
         x-modelable="value" x-model="kontinuitaetFilters.figurId"
         x-effect="options = $app.figuren.filter(f => (kontinuitaetResult?.issues||[]).some(i => i.fig_ids?.length ? i.fig_ids.includes(f.id) : (i.figuren||[]).includes(f.name))).map(f => ({value: f.id, label: f.kurzname || f.name}))"
         >
    </div>
    <div x-data="combobox($app.t('filter.chapter'), $app.t('filter.allChapters'))"
         x-modelable="value" x-model="kontinuitaetFilters.kapitel"
         x-effect="options = kontinuitaetKapitelListe().map(k => ({value: k, label: k}))"
         >
    </div>
    <span class="filter-count" x-text="kontinuitaetResult ? kontinuitaetIssuesSorted().length + ' / ' + kontinuitaetResult.issues.length : ''"></span>
  </div>

  <template x-if="kontinuitaetResult">
    <div class="kontinuitaet-result">

      <!-- Keine Probleme -->
      <div x-show="kontinuitaetResult.issues?.length === 0" class="kontinuitaet-ok" x-text="$app.t('kontinuitaet.noIssues')"></div>
      <!-- Alle weggefiltert -->
      <div x-show="kontinuitaetResult.issues?.length > 0 && kontinuitaetIssuesSorted().length === 0" class="kontinuitaet-ok" x-text="$app.t('kontinuitaet.noMatch')"></div>

      <!-- Flache Liste, sortiert nach Schwere -->
      <div x-show="kontinuitaetIssuesSorted().length > 0" class="entity-list entity-list--accented">
        <template x-for="(issue, i) in kontinuitaetIssuesSorted()" :key="kontinuitaetIssueKey(issue, i)">
          <div>
            <div class="entity-row"
                 :class="{ 'entity-row--selected': selectedKontinuitaetIssueKey === kontinuitaetIssueKey(issue, i) }"
                 @click="selectedKontinuitaetIssueKey = selectedKontinuitaetIssueKey === kontinuitaetIssueKey(issue, i) ? null : kontinuitaetIssueKey(issue, i)">
              <span class="severity-tag"
                    :class="'severity-tag--' + (issue.schwere || 'niedrig')"
                    x-text="$app.t('kontinuitaet.severity.' + (issue.schwere || 'niedrig'))"></span>
              <span class="tag entity-typ-tag" x-text="issue.typ"></span>
              <span class="kontinuitaet-row-stellen">
                <template x-if="kontinuitaetResolveStelle(issue.stelle_a, issue, 'a')">
                  <span class="kapitel-badge kapitel-badge--primary internal-link"
                        :data-tip="$app.t('kontinuitaet.gotoTitle', { name: kontinuitaetResolveStelle(issue.stelle_a, issue, 'a').name })"
                        @click.stop="kontinuitaetGotoStelle(issue.stelle_a, issue, 'a')" x-text="issue.stelle_a"></span>
                </template>
                <template x-if="!kontinuitaetResolveStelle(issue.stelle_a, issue, 'a')">
                  <span class="kapitel-badge kapitel-badge--primary" x-text="issue.stelle_a"></span>
                </template>
                <span class="kontinuitaet-arrow">↔</span>
                <template x-if="kontinuitaetResolveStelle(issue.stelle_b, issue, 'b')">
                  <span class="kapitel-badge kapitel-badge--primary internal-link"
                        :data-tip="$app.t('kontinuitaet.gotoTitle', { name: kontinuitaetResolveStelle(issue.stelle_b, issue, 'b').name })"
                        @click.stop="kontinuitaetGotoStelle(issue.stelle_b, issue, 'b')" x-text="issue.stelle_b"></span>
                </template>
                <template x-if="!kontinuitaetResolveStelle(issue.stelle_b, issue, 'b')">
                  <span class="kapitel-badge kapitel-badge--secondary" x-text="issue.stelle_b"></span>
                </template>
              </span>
              <span class="history-chevron" :class="{ open: selectedKontinuitaetIssueKey === kontinuitaetIssueKey(issue, i) }">›</span>
            </div>
            <div x-show="selectedKontinuitaetIssueKey === kontinuitaetIssueKey(issue, i)" class="entity-detail" x-cloak>
              <p x-show="issue.beschreibung" x-text="issue.beschreibung" class="entity-detail-text"></p>
              <div x-show="issue.empfehlung" class="entity-meta-row kontinuitaet-empfehlung">
                <span class="entity-meta-label kontinuitaet-empfehlung-label" x-text="$app.t('kontinuitaet.empfehlung')"></span>
                <span class="entity-meta-value kontinuitaet-empfehlung-value" x-text="issue.empfehlung"></span>
              </div>
            </div>
          </div>
        </template>
      </div>

    </div>
  </template>
</div>
