<template x-if="$store.jobs.jobToast">
  <div class="job-toast"
       :class="'job-toast--' + ($store.jobs.jobToast.severity || 'ok')"
       role="status"
       aria-live="polite"
       x-cloak>
    <span class="job-toast-msg" x-text="$store.jobs.jobToast.message"></span>
    <button type="button"
            class="job-toast-close"
            :aria-label="t('common.close')"
            @click="_dismissJobToast()"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
  </div>
</template>
