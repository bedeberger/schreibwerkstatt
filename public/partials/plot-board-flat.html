<!-- Plot-Werkstatt: flaches Board (Akte = Spalten), gerendert bei NULL Strängen.
     Verbatim aus plot.html ausgelagert (File-Limit). Render-Weiche in plot.html:
     dieses Board ist nur sichtbar, solange keine Stränge angelegt sind — sobald
     der erste Strang existiert, übernimmt plot-board-grid.html. Beat-Markup
     (Ansicht/Bearbeiten) ist mit dem Grid-Board synchron zu halten. -->
<div class="plot-board" x-show="(acts.length || addingAct) && !threads.length" x-cloak>
  <template x-for="act in acts" :key="act.id">
    <div class="plot-column"
         :style="{ '--col-accent': actAccent(act) }">

      <!-- Spalten-Kopf -->
      <div class="plot-column-header">
        <!-- Akt-Farbe: Swatch öffnet ein Palette-Popover -->
        <div class="plot-color-swatch-wrap" x-show="editingActId !== act.id">
          <button type="button" class="plot-color-swatch"
                  @click.stop="toggleActColorPicker(act.id)"
                  :data-tip="$app.t('plot.act.color')" :aria-label="$app.t('plot.act.color')"></button>
          <div class="plot-color-popover" x-show="actColorPickerId === act.id" x-cloak
               @click.outside="actColorPickerId === act.id && (actColorPickerId = null)">
            <button type="button" class="plot-color-opt plot-color-opt--none"
                    :class="{ 'plot-color-opt--on': !act.farbe }"
                    @click="setActColor(act, null)"
                    :data-tip="$app.t('plot.act.colorNone')" :aria-label="$app.t('plot.act.colorNone')"></button>
            <template x-for="key in actPalette()" :key="key">
              <button type="button" class="plot-color-opt"
                      :style="{ '--col-accent': 'var(--palette-' + key + ')' }"
                      :class="{ 'plot-color-opt--on': act.farbe === key }"
                      @click="setActColor(act, key)" :aria-label="key"></button>
            </template>
          </div>
        </div>
        <template x-if="editingActId !== act.id">
          <span class="plot-column-title" @dblclick="startEditAct(act)" x-text="act.name"></span>
        </template>
        <template x-if="editingActId === act.id">
          <input type="text" class="plot-column-title-input" x-model="actDraft"
                 data-spellcheck="spelling"
                 @keydown.enter="saveEditAct(act)" @keydown.escape="cancelEditAct()"
                 @blur="onActBlur(act, $event)">
        </template>
        <span class="plot-column-count" x-text="filteredBeatsForAct(act.id).length"></span>
        <div class="plot-column-actions">
          <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="moveAct(act, -1)" :data-tip="$app.t('plot.act.moveLeft')" :aria-label="$app.t('plot.act.moveLeft')">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#chevron-left"/></svg>
          </button>
          <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="moveAct(act, 1)" :data-tip="$app.t('plot.act.moveRight')" :aria-label="$app.t('plot.act.moveRight')">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#chevron-right"/></svg>
          </button>
          <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="startEditAct(act)" :data-tip="$app.t('plot.act.rename')" :aria-label="$app.t('plot.act.rename')">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#pencil"/></svg>
          </button>
          <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn plot-icon-btn--danger" @click="deleteAct(act)" :data-tip="$app.t('plot.act.delete')" :aria-label="$app.t('plot.act.delete')">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#trash"/></svg>
          </button>
        </div>
      </div>

      <!-- Mini-Fortschritt: Status-Verteilung dieses Akts -->
      <div class="plot-dist-bar plot-dist-bar--mini" x-show="actStats(act.id).total > 0">
        <template x-for="s in distStatusList()" :key="s">
          <div class="plot-dist-seg" :class="'plot-dist-seg--' + s"
               x-show="actStats(act.id).by[s] > 0"
               :style="{ '--seg-grow': actStats(act.id).by[s] }"
               :data-tip="$app.t('plot.status.' + s) + ': ' + actStats(act.id).by[s]"></div>
        </template>
      </div>

      <!-- Beats -->
      <div class="plot-column-body">
        <!-- SortableJS-Container: enthält nur den x-for-Anker + die Beat-Karten
             (Add-/Toggle-/Brainstorm-Elemente liegen bewusst ausserhalb, damit
             Drop-Index + Revert sauber rechnen). thread_id ist im flachen Board NULL. -->
        <div class="plot-beats" data-plot-cell :data-act-id="act.id">
          <template x-for="beat in visibleBeatsForAct(act.id)" :key="beat.id">
            <div class="plot-beat" :data-beat-id="beat.id"
                 :class="{ ['plot-beat--' + beat.status]: true, 'plot-beat--verworfen': !!beat.verworfen, 'plot-beat--editing': editingBeatId === beat.id }">

              <!-- Beat-Karte (Ansicht + Bearbeiten) — geteilt mit dem Grid-Board.
                   SSoT: plot-beat-cell.html (string-seitiger Fragment-Include). -->
              <!-- @include plot-beat-cell -->
            </div>
          </template>
        </div>

        <!-- Verworfene Beats ein-/ausklappen -->
        <button type="button" class="collapsible-toggle plot-verworfen-toggle"
                x-show="verworfenCountForAct(act.id) > 0"
                @click="toggleVerworfen(act.id)" :aria-expanded="!!verworfenOpen[act.id]">
          <span class="history-chevron" :class="{ open: verworfenOpen[act.id] }" aria-hidden="true"></span>
          <span x-text="$app.t('plot.verworfen.toggle', { n: verworfenCountForAct(act.id) })"></span>
        </button>

        <!-- Beat hinzufügen -->
        <template x-if="addingActId === act.id">
          <div class="plot-add-beat" :data-add-beat-act="act.id">
            <textarea class="plot-add-beat-input" x-model="newBeatTitel" rows="1"
                      data-spellcheck="spelling" :placeholder="$app.t('plot.beat.titelPlaceholder')"
                      @keydown.enter.prevent="saveNewBeat(act.id)" @keydown.escape="cancelAddBeat()"
                      @blur="onAddBeatBlur(act.id, $event)"></textarea>
            <div class="plot-add-beat-actions">
              <button type="button" class="btn-compact" @click="saveNewBeat(act.id)" :disabled="busy" x-text="$app.t('plot.beat.add')"></button>
              <button type="button" class="btn-compact btn-compact--ghost" @click="cancelAddBeat()" x-text="$app.t('common.cancel')"></button>
            </div>
          </div>
        </template>
        <button type="button" class="plot-add-beat-btn" x-show="addingActId !== act.id" @click="startAddBeat(act.id)">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#plus"/></svg>
          <span x-text="$app.t('plot.addBeat')"></span>
        </button>

        <!-- KI-Brainstorm pro Akt -->
        <button type="button" class="plot-brainstorm-btn" @click="runBrainstorm(act)"
                :disabled="brainstormLoading"
                x-show="!(brainstormResult && brainstormResult.actId === act.id)"
                x-text="$app.t('plot.brainstorm.run')"></button>

        <div class="plot-brainstorm-loading" x-show="brainstormLoading && brainstormActId === act.id">
          <span class="card-status" x-html="brainstormStatus"></span>
          <button type="button" class="btn-compact btn-compact--ghost" @click="cancelBrainstorm()" x-text="$app.t('plot.brainstorm.cancel')"></button>
        </div>

        <div class="plot-brainstorm-panel" x-show="brainstormResult && brainstormResult.actId === act.id" x-cloak>
          <div class="plot-brainstorm-head">
            <span class="entity-meta-label" x-text="$app.t('plot.brainstorm.title')"></span>
            <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="dismissBrainstorm()" :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
            </button>
          </div>
          <template x-for="(v, idx) in (brainstormResult ? brainstormResult.vorschlaege : [])" :key="idx">
            <div class="plot-vorschlag">
              <div class="plot-vorschlag-body">
                <span class="plot-vorschlag-label" x-text="v.label"></span>
                <span class="plot-vorschlag-begruendung" x-show="v.begruendung" x-text="v.begruendung"></span>
              </div>
              <button type="button" class="btn-compact" @click="applyBrainstorm(idx)" :disabled="busy" x-text="$app.t('plot.brainstorm.apply')"></button>
            </div>
          </template>
          <div x-show="brainstormResult && !brainstormResult.vorschlaege.length" class="card-status" x-text="$app.t('plot.brainstorm.allApplied')"></div>
        </div>
      </div>
    </div>
  </template>

  <!-- Neuer Akt -->
  <div class="plot-column plot-column--add">
    <button type="button" class="plot-add-act-btn" x-show="!addingAct"
            @click="addingAct = true; $nextTick(() => $el.parentElement.querySelector('.plot-new-act-input')?.focus())">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#plus"/></svg>
      <span x-text="$app.t('plot.addAct')"></span>
    </button>
    <div class="plot-add-act-form" x-show="addingAct" x-cloak>
      <input type="text" class="plot-new-act-input" x-model="newActName"
             data-spellcheck="spelling" :placeholder="$app.t('plot.act.namePlaceholder')"
             @keydown.enter="addAct()" @keydown.escape="addingAct = false; newActName = ''">
      <div class="plot-add-act-actions">
        <button type="button" class="btn-compact" @click="addAct()" :disabled="busy" x-text="$app.t('plot.act.add')"></button>
        <button type="button" class="btn-compact btn-compact--ghost" @click="addingAct = false; newActName = ''" x-text="$app.t('common.cancel')"></button>
      </div>
    </div>
  </div>
</div>
