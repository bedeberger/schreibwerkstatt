<!-- Recherche-/Wissensboard — buchweit geteiltes Archiv für Notizen, Links,
     Zitate, Faktensplitter und Bilder. Optional mit Buch-Entitäten verknüpfbar
     (Kapitel/Seite/Figur/Ort/Szene/Beat) + Tags. Rein kuratierend, nie
     generativ im Buchtext. Hauptkarte (exklusiv). -->
<div class="card card--recherche" id="recherche-card" x-data="rechercheCard" x-show="$app.showRechercheCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-title" x-text="$app.t('recherche.title')"></span>
      <div class="card-subline" x-text="$app.t('recherche.subtitle')"></div>
    </div>
    <div class="card-header-aside">
      <div class="card-actions card-actions--grouped">
        <button type="button" class="icon-btn icon-btn--ghost" x-show="$store.config.researchChatEnabled"
                :class="{ 'is-active': researchChatOpen }"
                :aria-pressed="researchChatOpen"
                @click="toggleResearchChat()"
                :aria-label="$app.t('recherche.chat.toggle')"
                :data-tip="$app.t('recherche.chat.toggle')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#message-square"/></svg></button>
        <button type="button" class="icon-btn icon-btn--ghost"
                :aria-pressed="rechercheFullscreen"
                @click="toggleRechercheFullscreen()"
                :aria-label="rechercheFullscreen ? $app.t('recherche.fullscreenExit.tip') : $app.t('recherche.fullscreen.tip')"
                :data-tip="rechercheFullscreen ? $app.t('recherche.fullscreenExit.tip') : $app.t('recherche.fullscreen.tip')"><svg class="icon" aria-hidden="true"><use :href="rechercheFullscreen ? '/icons.svg?v=693#minimize-2' : '/icons.svg?v=693#maximize-2'"/></svg></button>
        <button type="button" class="icon-btn icon-btn--ghost" @click="$app.toggleRechercheCard()" :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
      </div>
    </div>
  </div>

  <div x-show="errorMessage" class="card-status card-status--error" x-text="errorMessage"></div>

  <!-- Recherche-Chat-Panel (Claude-only, mit Web-Suche). Recherchiert + sammelt;
       Fundstücke werden als Vorschläge angeboten und erst per Klick gespeichert. -->
  <div x-show="researchChatOpen" x-cloak class="research-chat">
    <div class="research-chat-head">
      <span class="research-chat-title" x-text="$app.t('recherche.chat.heading')"></span>
      <div class="research-chat-head-actions">
        <button type="button" class="icon-btn icon-btn--ghost" @click="startNewResearchChatSession()" :disabled="researchChatLoading" :data-tip="$app.t('chat.newSessionTitle')" :aria-label="$app.t('chat.newSession')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#plus"/></svg></button>
        <button type="button" class="icon-btn icon-btn--ghost" @click="researchChatOpen = false" :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
      </div>
    </div>

    <div x-show="researchChatProgress > 0" class="progress-bar-wrap">
      <div class="progress-bar" :style="{ '--progress': researchChatProgress + '%' }"></div>
    </div>
    <div x-show="researchChatStatus" class="card-status" x-html="researchChatStatus"></div>

    <div id="research-chat-messages" class="chat-messages research-chat-messages">
      <div x-show="researchChatMessages.length === 0 && !researchChatLoading" class="chat-empty" x-text="$app.t('recherche.chat.empty')"></div>

      <template x-for="(msg, msgIdx) in researchChatMessages" :key="msgIdx">
        <div :class="'chat-msg chat-msg--' + msg.role">
          <div class="chat-msg-bubble">
            <div x-show="msg.role === 'user'" class="chat-msg-text" x-text="msg.content"></div>
            <div x-show="msg.role === 'assistant'" class="chat-msg-text" x-html="_renderResearchAnswer(msg)"></div>

            <!-- Web-Such-/Tool-Hinweis -->
            <template x-if="msg.role === 'assistant' && msg.context_info">
              <div class="chat-context-info">
                <template x-if="msg.context_info.web_searches > 0">
                  <span class="chat-context-tool" x-text="$app.t('recherche.chat.webSearches', { n: msg.context_info.web_searches })"></span>
                </template>
                <template x-for="(entry, ei) in _researchToolSummary(msg.context_info.tool_calls)" :key="ei">
                  <span class="chat-context-tool" x-text="entry.name + (entry.count > 1 ? ' ×' + entry.count : '')"></span>
                </template>
              </div>
            </template>

            <!-- Quellen: in der Antwort zitierte Web-Such-Fundstellen (klickbar) -->
            <template x-if="msg.role === 'assistant' && researchCitedSources(msg).length">
              <div class="research-chat-sources">
                <div class="research-chat-sources-head" x-text="$app.t('recherche.chat.sourcesHead')"></div>
                <template x-for="src in researchCitedSources(msg)" :key="src.n">
                  <a class="research-chat-source" :href="src.url" target="_blank" rel="noopener noreferrer">
                    <span class="research-chat-source-num" x-text="'[' + src.n + ']'"></span>
                    <span class="research-chat-source-title" x-text="src.title"></span>
                  </a>
                </template>
              </div>
            </template>

            <!-- Speicher-Vorschläge: erst beim Klick wird gespeichert (POST /research) -->
            <template x-if="msg.role === 'assistant' && researchProposals(msg).length">
              <div class="research-chat-proposals">
                <div class="research-chat-proposals-head" x-text="$app.t('recherche.chat.proposalsHead')"></div>
                <template x-for="(prop, pi) in researchProposals(msg)" :key="pi">
                  <div class="research-chat-proposal" :class="{ 'research-chat-proposal--saved': isProposalSaved(msgIdx, pi) }">
                    <span class="research-kind-badge palette-badge" :class="'research-kind-badge--' + prop.kind" x-text="kindLabel(prop.kind)"></span>
                    <div class="research-chat-proposal-body">
                      <span class="research-chat-proposal-title" x-show="prop.title" x-text="prop.title"></span>
                      <span class="research-chat-proposal-snippet" x-show="prop.body" x-text="prop.body"></span>
                      <template x-for="(u, ui) in (prop.urls || [])" :key="ui">
                        <a class="research-chat-proposal-url" :href="u.url" target="_blank" rel="noopener noreferrer" x-text="u.label || u.url"></a>
                      </template>
                    </div>
                    <button type="button" class="btn-compact" x-show="!isProposalSaved(msgIdx, pi)"
                            @click="saveResearchProposal(msgIdx, pi, prop)" :disabled="isProposalSaving(msgIdx, pi)"
                            x-text="$app.t('recherche.chat.proposalSave')"></button>
                    <span class="research-chat-proposal-saved" x-show="isProposalSaved(msgIdx, pi)" x-text="$app.t('recherche.chat.proposalSaved')"></span>
                  </div>
                </template>
              </div>
            </template>

            <div x-show="msg.role === 'assistant' && _chatTokenInfo(msg)" class="chat-token-info" x-text="_chatTokenInfo(msg)"></div>
          </div>
        </div>
      </template>

      <div x-show="researchChatLoading" class="chat-skeleton-wrapper">
        <div class="chat-skeleton"></div>
      </div>
    </div>

    <div class="chat-input-row">
      <textarea class="chat-input research-chat-input" x-model="researchChatInput" rows="1"
                :placeholder="$app.t('recherche.chat.placeholder')" :aria-label="$app.t('recherche.chat.placeholder')"
                :disabled="researchChatLoading"
                @keydown.enter="if(!$event.isComposing && $event.keyCode !== 229 && !$event.shiftKey && !$event.ctrlKey && !$event.metaKey) { $event.preventDefault(); sendResearchChatMessage(); }"></textarea>
      <button type="button" class="chat-send-btn" @click="sendResearchChatMessage()" :disabled="researchChatLoading || !researchChatInput.trim()" :aria-label="$app.t('chat.send')">
        <span x-show="researchChatLoading" class="spinner"></span>
        <svg x-show="!researchChatLoading" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#arrow-up"/></svg>
      </button>
    </div>
    <div class="chat-input-hint" x-text="$app.t('recherche.chat.hint')"></div>

    <!-- Session-Historie -->
    <div x-show="researchChatSessions.length > 0" class="card-history-section">
      <div class="chat-history-title" x-text="$app.t('chat.history')"></div>
      <template x-for="s in researchChatSessions" :key="s.id">
        <div
          class="chat-session-item"
          :class="s.id === researchChatSessionId ? 'chat-session-item--active' : ''"
          @click="loadResearchChatSession(s.id)"
        >
          <div class="chat-session-preview" x-text="(s.title || s.preview || $app.t('recherche.chat.untitled')).slice(0, 80)"></div>
          <div class="chat-session-meta" x-text="$app.formatDate(s.last_message_at)"></div>
          <button type="button" class="chat-session-delete btn-card-close" @click.stop="deleteResearchChatSession(s.id)" :data-tip="$app.t('common.delete')" :aria-label="$app.t('common.delete')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#trash"/></svg></button>
        </div>
      </template>
    </div>
  </div>

  <!-- Toolbar: Anlegen + Filter -->
  <div class="recherche-toolbar">
    <button type="button" class="btn-compact recherche-new-btn" @click="creating ? cancelCreate() : startCreate()" :disabled="busy">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#plus"/></svg>
      <span x-text="$app.t('recherche.new')"></span>
    </button>
    <div class="recherche-filters">
      <div x-data="combobox($app.t('recherche.filter.allKinds'), $app.t('recherche.filter.allKinds'))"
           x-modelable="value" x-model="filterKind"
           x-effect="options = kindOptions()"
           @combobox-change="applyFilters()"></div>
      <div x-data="combobox($app.t('recherche.filter.allTags'), $app.t('recherche.filter.allTags'))"
           x-modelable="value" x-model="filterTag"
           x-effect="options = tagFilterOptions()"
           @combobox-change="applyFilters()"></div>
      <!-- Filter nach verknüpfter Entität: Kategorie + konkreter Eintrag -->
      <div x-data="combobox($app.t('recherche.filter.allLinked'), $app.t('recherche.filter.allLinked'))"
           x-modelable="value" x-model="filterLinkedKind"
           x-effect="options = linkKinds()"
           @combobox-change="onLinkedFilterKindChange()"></div>
      <div x-show="filterLinkedKind" x-cloak
           x-data="combobox($app.t('recherche.filter.allLinkedTargets'), $app.t('recherche.filter.allLinkedTargets'))"
           x-modelable="value" x-model="filterLinkedTargetId"
           x-effect="options = linkedFilterTargetOptions()"
           @combobox-change="applyLinkedFilter()"></div>
      <span class="filter-search-wrap">
        <input type="text" class="filter-search-input recherche-search"
               x-model.debounce.400ms="filterText"
               @input.debounce.400ms="applyFilters()"
               :placeholder="$app.t('recherche.filter.search')"
               :aria-label="$app.t('recherche.filter.search')">
        <button type="button" class="search-clear--icon" x-show="filterText" @click="filterText=''; applyFilters()" :aria-label="$app.t('search.clear')" :data-tip="$app.t('search.clear')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
      </span>
      <div x-data="combobox($app.t('recherche.sort.label'))"
           x-modelable="value" x-model="sortBy"
           x-effect="options = sortOptions()"
           @combobox-change="applySort()"></div>
      <label class="recherche-archived-toggle">
        <input type="checkbox" x-model="showArchived" @change="applyFilters()">
        <span x-text="$app.t('recherche.filter.showArchived')"></span>
      </label>
    </div>
  </div>

  <!-- Anlegen-Formular -->
  <div x-show="creating" x-cloak class="recherche-form">
    <div class="recherche-form-row">
      <div x-data="combobox($app.t('recherche.kindLabel'))"
           x-modelable="value" x-model="draft.kind"
           x-effect="options = kindOptions()" class="recherche-kind-combo"></div>
      <input type="text" class="recherche-input recherche-title-input"
             x-model="draft.title" :placeholder="$app.t('recherche.field.title')"
             :aria-label="$app.t('recherche.field.title')" data-spellcheck="spelling">
    </div>
    <textarea class="recherche-input" x-model="draft.body" rows="4"
              :placeholder="$app.t('recherche.field.body')" :aria-label="$app.t('recherche.field.body')"
              data-spellcheck="spelling"></textarea>
    <div class="recherche-urls">
      <template x-for="(u, ui) in draft.urls" :key="ui">
        <div class="recherche-url-row">
          <input type="text" class="recherche-input recherche-url-input" x-model="u.url"
                 :placeholder="$app.t('recherche.field.url')" :aria-label="$app.t('recherche.field.url')">
          <input type="text" class="recherche-input recherche-url-label-input" x-model="u.label"
                 :placeholder="$app.t('recherche.field.urlLabel')" :aria-label="$app.t('recherche.field.urlLabel')"
                 data-spellcheck="spelling">
          <button type="button" class="icon-btn" @click="removeUrlRow(draft, ui)"
                  :data-tip="$app.t('recherche.field.urlRemove')" :aria-label="$app.t('recherche.field.urlRemove')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
        </div>
      </template>
      <button type="button" class="btn-compact recherche-url-add" @click="addUrlRow(draft)">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#plus"/></svg>
        <span x-text="$app.t('recherche.field.urlAdd')"></span>
      </button>
    </div>
    <input type="text" class="recherche-input" x-model="draft.source"
           :placeholder="$app.t('recherche.field.source')" :aria-label="$app.t('recherche.field.source')"
           data-spellcheck="spelling">
    <input type="text" class="recherche-input" x-model="draft.tags"
           :placeholder="$app.t('recherche.field.tags')" :aria-label="$app.t('recherche.field.tags')">
    <div class="recherche-attach">
      <label class="btn-compact recherche-attach-btn">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#file-plus"/></svg>
        <span x-text="$app.t('recherche.field.attach')"></span>
        <input type="file" accept="image/*,application/pdf" x-ref="createFile" @change="onCreateFilePick($event)">
      </label>
      <span class="recherche-attach-name" x-show="draft.fileName" x-text="draft.fileName"></span>
      <button type="button" class="icon-btn" x-show="draft.fileName" @click="clearCreateFile()"
              :data-tip="$app.t('recherche.field.attachClear')" :aria-label="$app.t('recherche.field.attachClear')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
    </div>
    <div class="recherche-form-actions">
      <button type="button" class="btn-compact recherche-primary" @click="createItem()" :disabled="busy" x-text="$app.t('recherche.save')"></button>
      <button type="button" class="btn-compact" @click="cancelCreate()" :disabled="busy" x-text="$app.t('recherche.cancel')"></button>
    </div>
  </div>

  <!-- Skeleton während Loading vor erstem Datensatz -->
  <div x-show="loading" class="recherche-skeleton entity-list--accented" x-cloak>
    <template x-for="i in 4" :key="i">
      <div class="recherche-skeleton-card">
        <div class="recherche-skeleton-head">
          <span class="entity-skeleton-cell recherche-skeleton-badge"></span>
          <span class="entity-skeleton-cell recherche-skeleton-title"></span>
        </div>
        <span class="entity-skeleton-cell recherche-skeleton-line"></span>
        <span class="entity-skeleton-cell recherche-skeleton-line recherche-skeleton-line--short"></span>
      </div>
    </template>
  </div>

  <!-- Empty-State mit CTA: kein Eintrag → direkt anlegen. -->
  <div x-show="!loading && items.length === 0 && !creating" class="card-empty" x-cloak>
    <p class="card-empty-text" x-text="$app.t('recherche.empty')"></p>
    <p class="card-empty-hint" x-text="$app.t('recherche.emptyHint')"></p>
    <button type="button" class="primary card-empty-cta" @click="startCreate()" :disabled="busy">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#plus"/></svg>
      <span x-text="$app.t('recherche.new')"></span>
    </button>
  </div>

  <!-- Schnipsel-Liste -->
  <div class="recherche-list" x-show="!loading && items.length > 0">
    <template x-for="item in items" :key="item.id">
      <div class="research-item" :class="{ 'research-item--pinned': item.pinned, 'research-item--archived': item.archived }">

        <!-- Anzeige-Modus -->
        <template x-if="editingId !== item.id">
          <div class="research-item-body research-item-body--clickable" @click="onItemBodyClick(item, $event)">
            <div class="research-item-head">
              <span class="research-kind-badge palette-badge" :class="'research-kind-badge--' + item.kind" x-text="kindLabel(item.kind)"></span>
              <span class="research-item-title" x-show="item.title" x-text="item.title"></span>
              <div class="research-item-actions">
                <button type="button" class="icon-btn" @click="startEdit(item)" :disabled="busy" :data-tip="$app.t('recherche.edit')" :aria-label="$app.t('recherche.edit')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#pencil"/></svg></button>
                <button type="button" class="icon-btn" @click.stop="menuOpenId = (menuOpenId === item.id ? null : item.id)" :disabled="busy" :aria-label="$app.t('recherche.actions')" aria-haspopup="menu"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#more-horizontal"/></svg></button>
                <div class="context-menu context-menu--dropdown" x-show="menuOpenId === item.id" x-cloak @click.outside="menuOpenId = null" @keydown.escape.window="menuOpenId = null" role="menu">
                  <button type="button" class="context-menu-item" role="menuitem" @click="menuOpenId = null; openLinkPicker(item)" x-text="$app.t('recherche.link.add')"></button>
                  <button type="button" class="context-menu-item" role="menuitem" @click="suggestLinks(item)" :disabled="busy || suggestItemId === item.id" x-text="$app.t('recherche.suggest.btn')"></button>
                  <button type="button" class="context-menu-item" role="menuitem" @click="togglePin(item)" x-text="item.pinned ? $app.t('recherche.unpin') : $app.t('recherche.pin')"></button>
                  <button type="button" class="context-menu-item" role="menuitem" @click="toggleArchive(item)" x-text="item.archived ? $app.t('recherche.unarchive') : $app.t('recherche.archive')"></button>
                  <label class="context-menu-item research-menu-upload" role="menuitem">
                    <span x-text="$app.t('recherche.image.upload')"></span>
                    <input type="file" accept="image/*" @change="onImagePick(item, $event); menuOpenId = null">
                  </label>
                  <label class="context-menu-item research-menu-upload" role="menuitem">
                    <span x-text="$app.t('recherche.doc.upload')"></span>
                    <input type="file" accept="application/pdf" @change="onDocPick(item, $event); menuOpenId = null">
                  </label>
                  <button type="button" class="context-menu-item" role="menuitem" x-show="item.has_doc" @click="removeDoc(item)" x-text="$app.t('recherche.doc.remove')"></button>
                  <button type="button" class="context-menu-item context-menu-item--danger" role="menuitem" @click="deleteItem(item)" x-text="$app.t('recherche.delete')"></button>
                </div>
              </div>
            </div>

            <img x-show="item.has_image" class="research-item-image" :src="imageUrl(item)" :alt="item.title || ''" loading="lazy">

            <a x-show="item.has_doc" class="research-item-doc" :href="docUrl(item)" target="_blank" rel="noopener noreferrer">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#file-plus"/></svg>
              <span class="research-item-doc-name" x-text="item.doc_name || $app.t('recherche.doc.fallbackName')"></span>
              <span class="research-item-doc-meta" x-show="item.doc_pages" x-text="$app.t('recherche.doc.pages', { n: item.doc_pages })"></span>
            </a>

            <div class="research-item-text" x-show="item.body" :class="{ 'research-item-text--quote': item.kind === 'quote' }" x-text="item.body"></div>

            <div class="research-item-urls" x-show="item.urls && item.urls.length">
              <template x-for="u in item.urls" :key="u.url_id">
                <a class="research-item-url" :href="u.url" target="_blank" rel="noopener noreferrer">
                  <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#external-link"/></svg>
                  <span x-text="u.label || u.url"></span>
                </a>
              </template>
            </div>

            <div x-show="item.source" class="research-item-source" x-text="item.source"></div>

            <!-- Verknüpfungen -->
            <div class="research-links" x-show="item.links && item.links.length">
              <template x-for="link in item.links" :key="link.link_id">
                <span class="research-link-chip" :class="'research-link-chip--' + link.target_kind">
                  <span class="research-link-kind" x-text="linkKindLabel(link.target_kind)"></span>
                  <span x-text="link.label"></span>
                  <button type="button" class="research-chip-x" @click="removeLink(item, link)" :aria-label="$app.t('recherche.link.remove')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
                </span>
              </template>
            </div>

            <!-- Link-Picker (inline am Item, nur das aktive sichtbar) -->
            <template x-if="linkPickerItemId === item.id">
              <div class="recherche-linkpicker">
                <span class="recherche-linkpicker-label" x-text="$app.t('recherche.link.pickerLabel')"></span>
                <div x-data="combobox($app.t('recherche.link.pickKind'))"
                     x-modelable="value" x-model="linkPickerKind"
                     x-effect="options = linkKinds()"
                     @combobox-change="linkPickerTargetId = ''"></div>
                <div x-data="combobox($app.t('recherche.link.pickTarget'))"
                     x-modelable="value" x-model="linkPickerTargetId"
                     x-effect="options = linkTargetOptions()" class="recherche-linkpicker-target"></div>
                <button type="button" class="btn-compact recherche-primary" @click="confirmLinkPicker()" :disabled="!linkPickerTargetId" x-text="$app.t('recherche.link.confirm')"></button>
                <button type="button" class="btn-compact" @click="cancelLinkPicker()" x-text="$app.t('recherche.cancel')"></button>
              </div>
            </template>

            <!-- Tags -->
            <div class="research-tags" x-show="item.tags && item.tags.length">
              <template x-for="tag in item.tags" :key="tag">
                <span class="research-tag internal-link" @click="filterTag = tag; applyFilters()" x-text="tag"></span>
              </template>
            </div>

            <!-- KI-Verknüpfungsvorschläge -->
            <div class="research-suggestions" x-show="itemSuggestions(item)" x-cloak>
              <div class="research-suggestions-head" x-text="$app.t('recherche.suggest.heading')"></div>
              <template x-if="itemSuggestions(item) && itemSuggestions(item).length === 0">
                <div class="research-suggestions-empty" x-text="$app.t('recherche.suggest.none')"></div>
              </template>
              <template x-for="(sg, i) in (itemSuggestions(item) || [])" :key="sg.target_kind + ':' + sg.target_id">
                <div class="research-suggestion">
                  <span class="research-link-kind" x-text="linkKindLabel(sg.target_kind)"></span>
                  <span class="research-suggestion-label" x-text="sg.label"></span>
                  <span class="research-suggestion-reason" x-show="sg.grund" x-text="sg.grund"></span>
                  <button type="button" class="btn-compact" @click="acceptSuggestion(item, sg)" x-text="$app.t('recherche.suggest.accept')"></button>
                </div>
              </template>
              <button type="button" class="research-suggestions-dismiss" @click="dismissSuggestions(item)" x-text="$app.t('recherche.suggest.dismiss')"></button>
            </div>
          </div>
        </template>

        <!-- Bearbeiten-Modus -->
        <template x-if="editingId === item.id">
          <div class="recherche-form" @keydown.escape="cancelEdit()">
            <div class="recherche-form-row">
              <div x-data="combobox($app.t('recherche.kindLabel'))"
                   x-modelable="value" x-model="editDraft.kind"
                   x-effect="options = kindOptions()" class="recherche-kind-combo"></div>
              <input type="text" class="recherche-input recherche-title-input"
                     x-model="editDraft.title" :placeholder="$app.t('recherche.field.title')"
                     :aria-label="$app.t('recherche.field.title')" data-spellcheck="spelling">
            </div>
            <textarea class="recherche-input" x-model="editDraft.body" rows="4"
                      :placeholder="$app.t('recherche.field.body')" :aria-label="$app.t('recherche.field.body')"
                      data-spellcheck="spelling"></textarea>
            <div class="recherche-urls">
              <template x-for="(u, ui) in editDraft.urls" :key="ui">
                <div class="recherche-url-row">
                  <input type="text" class="recherche-input recherche-url-input" x-model="u.url"
                         :placeholder="$app.t('recherche.field.url')" :aria-label="$app.t('recherche.field.url')">
                  <input type="text" class="recherche-input recherche-url-label-input" x-model="u.label"
                         :placeholder="$app.t('recherche.field.urlLabel')" :aria-label="$app.t('recherche.field.urlLabel')"
                         data-spellcheck="spelling">
                  <button type="button" class="icon-btn" @click="removeUrlRow(editDraft, ui)"
                          :data-tip="$app.t('recherche.field.urlRemove')" :aria-label="$app.t('recherche.field.urlRemove')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
                </div>
              </template>
              <button type="button" class="btn-compact recherche-url-add" @click="addUrlRow(editDraft)">
                <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#plus"/></svg>
                <span x-text="$app.t('recherche.field.urlAdd')"></span>
              </button>
            </div>
            <input type="text" class="recherche-input" x-model="editDraft.source"
                   :placeholder="$app.t('recherche.field.source')" :aria-label="$app.t('recherche.field.source')"
                   data-spellcheck="spelling">
            <input type="text" class="recherche-input" x-model="editDraft.tags"
                   :placeholder="$app.t('recherche.field.tags')" :aria-label="$app.t('recherche.field.tags')">
            <div class="recherche-form-actions">
              <button type="button" class="btn-compact recherche-primary" @click="saveEdit(item)" :disabled="busy" x-text="$app.t('recherche.save')"></button>
              <button type="button" class="btn-compact" @click="cancelEdit()" :disabled="busy" x-text="$app.t('recherche.cancel')"></button>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>

</div>
