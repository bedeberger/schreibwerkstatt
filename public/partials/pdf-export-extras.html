      <!-- Extras-Tab: nur Render-Platzierung. Inhaltliche Titelei (ISBN, Subtitle,
           Jahr, Widmung, Impressum, Copyright, Frontmatter, Bio) + Cover/Autorfoto
           leben buch-weit unter BookSettings → Publikation (book_publication). -->
      <div class="export-tab-panel" x-bind="panel('extras')">
        <p class="card-form-field-note" x-text="$app.t('pdfExport.extras.hint')"></p>
        <div class="card-form-grid">
          <div class="card-form-row">
            <label class="card-form-label" x-text="$app.t('pdfExport.extras.imprintPosition')"></label>
            <div class="card-form-field">
              <div x-data="combobox($app.t('pdfExport.extras.imprintPosition'))"
                   x-modelable="value" x-model="activeProfile.config.extras.imprintPosition"
                   x-effect="options = [{ value: 'front', label: $app.t('pdfExport.extras.imprintFront') }, { value: 'back', label: $app.t('pdfExport.extras.imprintBack') }]"
></div>
            </div>
          </div>
          <div class="card-form-row card-form-row--top">
            <label class="card-form-label">&nbsp;</label>
            <div class="card-form-field">
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.extras.barcode">
                <span x-text="$app.t('pdfExport.extras.barcode')"></span>
              </label>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.extras.barcodeHint')"></p>
            </div>
          </div>
          <div class="card-form-row card-form-row--top">
            <label class="card-form-label">&nbsp;</label>
            <div class="card-form-field">
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.extras.imprintOnVerso">
                <span x-text="$app.t('pdfExport.extras.imprintOnVerso')"></span>
              </label>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.extras.imprintOnVersoHint')"></p>
            </div>
          </div>
          <div class="card-form-row card-form-row--top">
            <label class="card-form-label">&nbsp;</label>
            <div class="card-form-field">
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.extras.dedicationOnRecto">
                <span x-text="$app.t('pdfExport.extras.dedicationOnRecto')"></span>
              </label>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.extras.dedicationOnRectoHint')"></p>
            </div>
          </div>
        </div>
      </div>
