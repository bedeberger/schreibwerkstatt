<!-- Buch-Einstellungen -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/book-settings-card.js.
  `showBookSettingsCard` bleibt im Root, fachlicher State in dieser Komponente.
-->
<div class="card card--settings" x-data="bookSettingsCard" x-show="$app.showBookSettingsCard" x-cloak>
  <div class="card-header">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('book.settings.title')"></span>
    </div>
    <div class="card-actions">
      <span class="card-form-saved" x-show="headerSaved()" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('common.settingsSaved')"></span>
      <span class="card-form-error" x-show="headerError()" x-text="headerError()"></span>
      <button type="button" @click="saveActiveTab()" :disabled="headerDisabled()">
        <span x-show="headerSaving()" class="spinner"></span>
        <span x-text="headerSaving() ? $app.t('common.saving') : $app.t('common.save')"></span>
      </button>
    </div>
  </div>

  <div x-show="bookSettingsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

  <div x-show="!bookSettingsLoading">

    <div class="tabs tabs--scrollable">
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': bookSettingsTab === 'book' }"
              @click="bookSettingsTab = 'book'"
              x-text="$app.t('book.settings.tab.book')"></button>
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': bookSettingsTab === 'context' }"
              @click="bookSettingsTab = 'context'"
              x-text="$app.t('book.settings.tab.context')"></button>
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': bookSettingsTab === 'share' }"
              @click="bookSettingsTab = 'share'"
              x-text="$app.t('book.settings.tab.share')"></button>
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': bookSettingsTab === 'publication' }"
              @click="bookSettingsTab = 'publication'"
              x-text="$app.t('book.settings.tab.publication')"></button>
      <button type="button" class="tabs-btn"
              x-show="bookSettingsBuchtyp === 'blog'" x-cloak
              :class="{ 'tabs-btn--active': bookSettingsTab === 'sync' }"
              @click="bookSettingsTab = 'sync'"
              x-text="$app.t('book.settings.tab.sync')"></button>
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': bookSettingsTab === 'stats' }"
              @click="bookSettingsTab = 'stats'"
              x-text="$app.t('book.settings.tab.stats')"></button>
      <button type="button" class="tabs-btn"
              :class="{ 'tabs-btn--active': bookSettingsTab === 'danger' }"
              @click="bookSettingsTab = 'danger'"
              x-text="$app.t('book.settings.tab.danger')"></button>
    </div>

    <div class="card-form-grid" x-show="bookSettingsTab === 'book'" x-cloak>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.basics')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" for="bs-name" x-text="$app.t('book.settings.name')"></label>
        <input type="text"
               id="bs-name"
               class="card-form-input"
               x-model="bookSettingsName"
               :placeholder="$app.t('book.create.namePlaceholder')"
               maxlength="255"
               data-spellcheck="spelling">
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.language')"></label>
        <div class="book-settings-options">
          <label class="book-settings-option">
            <input type="radio" name="bs-lang" value="de" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
            <span x-text="$app.t('lang.de')"></span>
          </label>
          <label class="book-settings-option">
            <input type="radio" name="bs-lang" value="en" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
            <span x-text="$app.t('lang.en')"></span>
          </label>
        </div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.region')"></label>
        <div class="book-settings-options">
          <template x-if="bookSettingsLanguage === 'de'">
            <div class="book-settings-options">
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="CH" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.de.CH')"></span>
              </label>
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="DE" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.de.DE')"></span>
              </label>
            </div>
          </template>
          <template x-if="bookSettingsLanguage === 'en'">
            <div class="book-settings-options">
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="US" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.en.US')"></span>
              </label>
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="GB" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.en.GB')"></span>
              </label>
            </div>
          </template>
        </div>
      </div>
    </section>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.narrative')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.buchtyp')"></label>
        <div x-data="combobox($app.t('book.settings.buchtyp'), $app.t('book.settings.buchtyp.none'))"
             x-modelable="value" x-model="bookSettingsBuchtyp"
             x-effect="options = bookSettingsBuchtypOptions()"
  ></div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.pov')"></label>
        <div x-data="combobox($app.t('book.settings.pov'), $app.t('book.settings.pov.none'))"
             x-modelable="value" x-model="bookSettingsErzaehlperspektive"
             x-effect="options = bookSettingsPovOptions()"
  ></div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.tempus')"></label>
        <div x-data="combobox($app.t('book.settings.tempus'), $app.t('book.settings.tempus.none'))"
             x-modelable="value" x-model="bookSettingsErzaehlzeit"
             x-effect="options = bookSettingsTempusOptions()"
  ></div>
      </div>

      <p class="card-form-hint"
         x-show="bookSettingsBuchtyp === 'kurzgeschichten' && (bookSettingsErzaehlperspektive || bookSettingsErzaehlzeit)"
         x-text="$app.t('book.settings.pov.kurzgeschichtenHint')"></p>
    </section>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.taxonomy')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.category')"></label>
        <div x-data="combobox($app.t('book.category'), $app.t('book.category.none'))"
             x-modelable="value" x-model="bookCategoryId"
             x-effect="options = bookCategoryOptions()"
             @combobox-change="saveBookCategory($event.detail)"></div>
      </div>

    </section>

    </div><!-- /tab: book -->

    <div class="card-form-grid" x-show="bookSettingsTab === 'context'" x-cloak>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.context')"></h3>

      <div class="card-form-row card-form-row--top">
        <label class="card-form-label" for="bs-buchkontext" x-text="$app.t('book.settings.context')"></label>
        <div class="book-settings-kontext-wrap">
          <textarea
            id="bs-buchkontext"
            class="card-form-textarea"
            x-model="bookSettingsBuchKontext"
            :placeholder="$app.t('book.settings.contextPlaceholder')"
            rows="4"
            maxlength="1000"
            data-spellcheck="spelling"
          ></textarea>
          <p class="card-form-hint" x-text="(bookSettingsBuchKontext || '').length + ' / 1000'"></p>
        </div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.status')"></label>
        <div class="form-stack">
          <label class="form-check">
            <input type="checkbox" id="bs-finished" x-model="bookSettingsIsFinished">
            <span>
              <span class="form-check-title" x-text="$app.t('book.settings.finished')"></span>
              <span class="form-check-desc" x-text="$app.t('book.settings.finished.desc')"></span>
            </span>
          </label>
        </div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.dailyGoalChars')"></label>
        <div class="card-form-field">
          <input type="text" class="form-num"
                 x-data="numInput({ step: 100, min: 100, max: 50000 })"
                 x-modelable="value" x-model="bookSettingsDailyGoalChars">
          <p class="card-form-field-note" x-text="$app.t('book.settings.dailyGoalCharsHint')"></p>
        </div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.orte')"></label>
        <div class="form-stack">
          <label class="form-check">
            <input type="checkbox" id="bs-orte-real" x-model="bookSettingsOrteReal">
            <span>
              <span class="form-check-title" x-text="$app.t('book.settings.orteReal')"></span>
              <span class="form-check-desc" x-text="$app.t('book.settings.orteReal.desc')"></span>
            </span>
          </label>
        </div>
      </div>

      <div class="card-form-row" x-show="bookSettingsOrteReal" x-cloak>
        <label class="card-form-label" x-text="$app.t('book.settings.schauplatzLand')"></label>
        <div class="card-form-field">
          <div x-data="combobox($app.t('book.settings.schauplatzLand.placeholder'), $app.t('book.settings.schauplatzLand.none'))"
               x-modelable="value" x-model="bookSettingsSchauplatzLand"
               x-effect="options = bookSettingsLandOptions()"></div>
          <p class="card-form-field-note" x-text="$app.t('book.settings.schauplatzLand.hint')"></p>
        </div>
      </div>
    </section>

    </div><!-- /tab: context -->

    <div class="card-form-grid" x-show="bookSettingsTab === 'danger'" x-cloak>

    <div class="book-settings-danger-zone">
      <div class="book-settings-danger-title">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=689#alert-triangle"/></svg>
        <span x-text="$app.t('book.settings.dangerZone')"></span>
      </div>

      <div class="book-settings-danger-section">
        <div class="book-settings-danger-row">
          <div class="book-settings-danger-text" x-text="$app.t('book.settings.dangerText')"></div>
          <div class="book-settings-danger-actions">
            <button type="button"
              class="book-settings-btn-danger"
              @click="resetBookHistory()"
              :disabled="bookHistoryResetLoading || !$app.selectedBookId">
              <span x-show="bookHistoryResetLoading" class="spinner"></span>
              <span x-text="bookHistoryResetLoading ? $app.t('common.deleting') : $app.t('book.settings.dangerButton')"></span>
            </button>
          </div>
        </div>
        <p class="card-form-saved" x-show="bookHistoryResetMessage" x-cloak x-transition.opacity.duration.250ms x-text="bookHistoryResetMessage"></p>
        <p class="card-form-error" x-show="bookHistoryResetError" x-text="bookHistoryResetError"></p>
      </div>

      <div class="book-settings-danger-section">
        <div class="book-settings-danger-row">
          <div class="book-settings-danger-text" x-text="$app.t('book.settings.deleteBookText')"></div>
          <div class="book-settings-danger-actions">
            <button type="button"
              class="book-settings-btn-danger"
              @click="deleteBook()"
              :disabled="bookDeleteLoading || !$app.selectedBookId">
              <span x-show="bookDeleteLoading" class="spinner"></span>
              <span x-text="bookDeleteLoading ? $app.t('common.deleting') : $app.t('book.settings.deleteBookButton')"></span>
            </button>
          </div>
        </div>
        <p class="card-form-error" x-show="bookDeleteError" x-text="bookDeleteError"></p>
      </div>
    </div>

    </div><!-- /tab: danger -->

    <!-- Publikation: buch-weite Metadaten (Cover, Titelei, Bio) — geteilt von
         PDF- und EPUB-Export. Plus EPUB-Export-Trigger. -->
    <div class="card-form-grid" x-show="bookSettingsTab === 'publication'" x-cloak>

      <section class="book-settings-section">
        <h3 class="book-settings-section-title" x-text="$app.t('publication.section.images')"></h3>

        <div class="card-form-row">
          <label class="card-form-label" x-text="$app.t('publication.cover')"></label>
          <div class="pub-image-block">
            <div class="pub-image-preview">
              <template x-if="bookPublication.has_cover">
                <img :src="publicationCoverUrl()" alt="">
              </template>
              <template x-if="!bookPublication.has_cover">
                <span x-text="$app.t('publication.noImage')"></span>
              </template>
            </div>
            <div class="pub-image-actions">
              <label class="pub-upload-btn">
                <input type="file" accept="image/jpeg,image/png,image/webp" hidden @change="uploadPublicationCover($event)">
                <span x-text="pubCoverUploading ? $app.t('publication.uploading') : (bookPublication.has_cover ? $app.t('publication.replace') : $app.t('publication.upload'))"></span>
              </label>
              <button type="button" class="btn-compact" x-show="bookPublication.has_cover" @click="removePublicationCover()" x-text="$app.t('publication.remove')"></button>
            </div>
          </div>
          <p class="card-form-error" x-show="pubCoverError" x-text="pubCoverError"></p>
        </div>

        <div class="card-form-row">
          <label class="card-form-label" x-text="$app.t('publication.authorImage')"></label>
          <div class="pub-image-block">
            <div class="pub-image-preview">
              <template x-if="bookPublication.has_author_image">
                <img :src="publicationAuthorImageUrl()" alt="">
              </template>
              <template x-if="!bookPublication.has_author_image">
                <span x-text="$app.t('publication.noImage')"></span>
              </template>
            </div>
            <div class="pub-image-actions">
              <label class="pub-upload-btn">
                <input type="file" accept="image/jpeg,image/png,image/webp" hidden @change="uploadPublicationAuthorImage($event)">
                <span x-text="pubAuthorUploading ? $app.t('publication.uploading') : (bookPublication.has_author_image ? $app.t('publication.replace') : $app.t('publication.upload'))"></span>
              </label>
              <button type="button" class="btn-compact" x-show="bookPublication.has_author_image" @click="removePublicationAuthorImage()" x-text="$app.t('publication.remove')"></button>
            </div>
          </div>
          <p class="card-form-error" x-show="pubAuthorError" x-text="pubAuthorError"></p>
        </div>
      </section>

      <section class="book-settings-section">
        <h3 class="book-settings-section-title" x-text="$app.t('publication.section.metadata')"></h3>

        <div class="card-form-row">
          <label class="card-form-label" for="pub-author-name" x-text="$app.t('publication.authorName')"></label>
          <input type="text" id="pub-author-name" class="card-form-input" x-model="bookPublication.author_name" maxlength="200" :placeholder="$app.t('publication.authorNamePlaceholder')" data-spellcheck="spelling">
          <p class="card-form-hint" x-text="$app.t('publication.authorNameHint')"></p>
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-subtitle" x-text="$app.t('publication.subtitle')"></label>
          <input type="text" id="pub-subtitle" class="card-form-input" x-model="bookPublication.subtitle" maxlength="300" data-spellcheck="spelling">
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-isbn" x-text="$app.t('publication.isbn')"></label>
          <input type="text" id="pub-isbn" class="card-form-input" x-model="bookPublication.isbn" maxlength="20">
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-year" x-text="$app.t('publication.year')"></label>
          <input type="text" id="pub-year" class="card-form-input" x-model="bookPublication.year" maxlength="10">
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-dedication" x-text="$app.t('publication.dedication')"></label>
          <textarea id="pub-dedication" class="card-form-textarea" rows="2" x-model="bookPublication.dedication" maxlength="2000" data-spellcheck="spelling"></textarea>
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-frontmatter" x-text="$app.t('publication.frontmatter')"></label>
          <textarea id="pub-frontmatter" class="card-form-textarea" rows="3" x-model="bookPublication.frontmatter" maxlength="8000" data-spellcheck="spelling"></textarea>
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-imprint" x-text="$app.t('publication.imprint')"></label>
          <textarea id="pub-imprint" class="card-form-textarea" rows="3" x-model="bookPublication.imprint" maxlength="8000" data-spellcheck="spelling"></textarea>
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-copyright" x-text="$app.t('publication.copyright')"></label>
          <textarea id="pub-copyright" class="card-form-textarea" rows="2" x-model="bookPublication.copyright" maxlength="500" data-spellcheck="spelling"></textarea>
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-bio" x-text="$app.t('publication.authorBio')"></label>
          <textarea id="pub-bio" class="card-form-textarea" rows="4" x-model="bookPublication.author_bio" maxlength="4000" data-spellcheck="spelling"></textarea>
        </div>
      </section>

      <section class="book-settings-section">
        <h3 class="book-settings-section-title" x-text="$app.t('publication.section.trade')"></h3>
        <p class="card-form-hint" x-text="$app.t('publication.tradeHint')"></p>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-description" x-text="$app.t('publication.description')"></label>
          <textarea id="pub-description" class="card-form-textarea" rows="4" x-model="bookPublication.description" maxlength="4000" data-spellcheck="spelling"></textarea>
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-publisher" x-text="$app.t('publication.publisher')"></label>
          <input type="text" id="pub-publisher" class="card-form-input" x-model="bookPublication.publisher" maxlength="200">
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-series" x-text="$app.t('publication.series')"></label>
          <input type="text" id="pub-series" class="card-form-input" x-model="bookPublication.series" maxlength="200">
        </div>
        <div class="card-form-row">
          <label class="card-form-label" x-text="$app.t('publication.seriesIndex')"></label>
          <input type="text" x-data="numInput({ min: 0, step: 0.5 })"
                 x-modelable="value" x-model="bookPublication.series_index" class="card-form-input">
        </div>
        <div class="card-form-row">
          <label class="card-form-label" for="pub-keywords" x-text="$app.t('publication.keywords')"></label>
          <input type="text" id="pub-keywords" class="card-form-input" x-model="bookPublication.keywords" maxlength="500">
          <span class="card-form-hint" x-text="$app.t('publication.keywordsHint')"></span>
        </div>
      </section>

      <section class="book-settings-section">
        <h3 class="book-settings-section-title" x-text="$app.t('publication.section.export')"></h3>
        <p class="card-form-hint" x-text="$app.t('publication.exportToolsHint')"></p>
        <div class="card-actions">
          <button type="button" class="primary" :disabled="!$app.selectedBookId"
                  @click="$app.togglePdfExportCard()" x-text="$app.t('book.export.pdfCustom')"></button>
          <button type="button" class="primary" :disabled="!$app.selectedBookId"
                  @click="$app.toggleEpubExportCard()" x-text="$app.t('book.export.epubCustom')"></button>
        </div>
      </section>

    </div><!-- /tab: publication -->

    <div class="card-form-grid" x-show="bookSettingsTab === 'share'" x-cloak>

    <!-- Sharing + Buch-Chat-Opt-In für Lektor. Sichtbar für alle
         Buch-Berechtigten (read-only für nicht-Owner). -->
    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.share.title')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.share.lektorBookChatLabel')"></label>
        <div class="form-stack">
          <label class="form-check">
            <input type="checkbox" x-model="bookSettingsAllowLektorBookChat" :disabled="!bookAccessIsOwner()">
            <span>
              <span class="form-check-title" x-text="$app.t('book.share.lektorBookChatTitle')"></span>
              <span class="form-check-desc" x-text="$app.t('book.share.lektorBookChatDesc')"></span>
            </span>
          </label>
        </div>
      </div>

      <div x-show="bookAccessLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>
      <p class="card-form-error" x-show="bookAccessError" x-text="bookAccessError"></p>

      <div class="card-form-row card-form-row--top" x-show="!bookAccessLoading && bookAccessList.length">
        <label class="card-form-label" x-text="$app.t('book.share.membersLabel')"></label>
        <div class="book-share-list">
          <template x-for="entry in bookAccessList" :key="entry.user_email">
            <div class="book-share-row" :class="{ 'book-share-row--self': entry.user_email === $app.currentUser?.email }">
              <span class="book-share-avatar" :style="`--avatar-hue: ${$app.userAvatarHue(entry.user_email)}`" x-text="shareInitials(entry)" aria-hidden="true"></span>
              <div class="book-share-row-main">
                <span class="book-share-displayname">
                  <span x-text="entry.display_name || entry.user_email"></span>
                  <span class="book-share-you-tag" x-show="entry.user_email === $app.currentUser?.email" x-text="$app.t('book.share.youTag')"></span>
                </span>
                <span class="book-share-email muted" x-show="entry.display_name" x-text="entry.user_email"></span>
              </div>
              <div class="book-share-row-actions">
                <template x-if="entry.role === 'owner' || !bookAccessIsOwner()">
                  <span class="book-share-role-badge" :class="'book-share-role-badge--' + entry.role" x-text="$app.t('book.share.role.' + entry.role)"></span>
                </template>
                <template x-if="bookAccessIsOwner() && entry.role !== 'owner'">
                  <div class="book-share-row-controls">
                    <div class="book-share-role-combo"
                         x-data="combobox($app.t('book.share.role.editor'))"
                         x-effect="value = entry.role; options = bookAccessRoleOptions()"
                         @combobox-change="if ($event.detail && $event.detail !== entry.role) changeBookAccessRole(entry.user_email, $event.detail)"></div>
                    <button type="button" class="btn-compact book-share-btn-transfer"
                            @click="transferOwnership(entry.user_email)"
                            :data-tip="$app.t('book.share.transferTooltip')"

            <span class="blog-status-label" x-text="$app.t('blog.status.imported')"></span>

                <span class="muted" x-text="$app.t('blog.status.notImported')"></span>

               :placeholder="'https://blog.example.com'"

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('blog.connect.user')"></label>
        <input type="text" class="card-form-input"

        <label class="card-form-label" x-text="$app.t('blog.connect.password')"></label>

               autocomplete="current-password"
               :placeholder="blogConnection ? $app.t('blog.connect.passwordReplace') : ''"

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('blog.connect.defaultStatus')"></label>
        <div x-data="combobox($app.t('blog.connect.defaultStatus'))"
             x-modelable="value" x-model="blogForm.defaultStatus"
             x-effect="options = blogStatusOptions()"></div>
      </div>

      <div class="card-form-row card-form-row--top">
        <span class="card-form-label"></span>
        <div class="blog-actions">
          <button type="button"
                  @click="testBlogConnection()"
                  :disabled="blogBusy || !blogFormReady()">
            <span x-show="blogBusy && blogAction === 'test'" class="spinner"></span>
            <span x-text="$app.t('blog.connect.test')"></span>
          </button>
          <button type="button"
                  @click="saveBlogConnection()"
                  :disabled="blogBusy || !blogFormReady()">
            <span x-show="blogBusy && blogAction === 'save'" class="spinner"></span>
            <span x-text="blogConnection ? $app.t('blog.connect.update') : $app.t('blog.connect.save')"></span>
          </button>
          <button type="button"
                  x-show="blogConnection && !blogConnection.initialImportDoneAt"
                  @click="startBlogImport()"
                  :disabled="blogBusy || blogImportJobId">
            <span x-show="blogImportJobId" class="spinner"></span>
            <span x-text="$app.t('blog.action.import')"></span>
          </button>
          <button type="button"
                  x-show="blogConnection?.initialImportDoneAt"
                  @click="startBlogPull()"
                  :disabled="blogBusy || blogPullJobId">
            <span x-show="blogPullJobId" class="spinner"></span>
            <span x-text="$app.t('blog.action.pull')"></span>
          </button>
          <button type="button"
                  x-show="blogConnection?.initialImportDoneAt"
                  @click="startBlogReconcile()"
                  :disabled="blogBusy || blogReconcileJobId"
                  :data-tip="$app.t('blog.action.reconcileHint')">
            <span x-show="blogReconcileJobId" class="spinner"></span>
            <span x-text="$app.t('blog.action.reconcile')"></span>
          </button>
          <button type="button" class="book-settings-btn-danger"
                  x-show="blogConnection"
                  @click="disconnectBlog()"
                  :disabled="blogBusy">
            <span x-text="$app.t('blog.connect.disconnect')"></span>
          </button>
        </div>
      </div>

      <p class="card-form-saved" x-show="blogMessage" x-cloak x-transition.opacity.duration.250ms x-text="blogMessage"></p>
      <p class="card-form-error" x-show="blogError" x-text="blogError"></p>

      </div>
    </section>

        <span x-text="$app.t('hubspot.connect.title')"></span>
      </button>

      <div x-show="hubspotSectionOpen" x-cloak>

        <label class="card-form-label" x-text="$app.t('hubspot.status.title')"></label>
        <div class="hubspot-status-panel">
          <div class="hubspot-status-row">
            <span class="hubspot-status-label" x-text="$app.t('hubspot.status.tokenSet')"></span>
            <span class="hubspot-status-value">••••••••</span>
          </div>
          <div class="hubspot-status-row">
            <span class="hubspot-status-label" x-text="$app.t('hubspot.status.blog')"></span>
            <span class="hubspot-status-value" x-text="(hubspotBlogs.find(b => String(b.id) === String(hubspotConnection?.blogId))?.name) || hubspotConnection?.blogId"></span>
          </div>
          <div class="hubspot-status-row">
            <span class="hubspot-status-label" x-text="$app.t('hubspot.status.author')"></span>
            <span class="hubspot-status-value" x-text="(hubspotAuthors.find(a => String(a.id) === String(hubspotConnection?.authorId))?.name) || hubspotConnection?.authorId"></span>
          </div>
          <div class="hubspot-status-row">
            <span class="hubspot-status-label" x-text="$app.t('hubspot.status.imported')"></span>

              <template x-if="hubspotConnection?.initialImportDoneAt">

        <div x-data="combobox($app.t('hubspot.connect.blog'))"

      <div class="card-form-row">

    <div class="card-form-grid" x-show="bookSettingsTab === 'stats'" x-cloak>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('jobStats.title')"></h3>
      <div x-show="bookJobStatsLoading && !bookJobStats" class="job-stats-loading" x-text="$app.t('jobStats.loading')"></div>
      <div x-show="bookJobStats && bookJobStats.length === 0" class="job-stats-empty" x-text="$app.t('jobStats.empty')"></div>
      <div x-show="bookJobStats && bookJobStats.length > 0" class="job-stats-scroll">
      <table class="job-stats-table">
        <thead>
          <tr>
            <th x-text="$app.t('jobStats.col.type')"></th>
            <th :data-tip="$app.t('jobStats.col.avgDurationTitle')" x-text="$app.t('jobStats.col.avgDuration')"></th>
            <th :data-tip="$app.t('jobStats.col.avgTokensTitle')" x-text="$app.t('jobStats.col.avgTokens')"></th>
            <th x-text="$app.t('jobStats.col.lastRun')"></th>
            <th :data-tip="$app.t('jobStats.col.runsTitle')" x-text="$app.t('jobStats.col.runs')"></th>
          </tr>
        </thead>
        <template x-for="row in bookJobStats" :key="row.type">
          <tbody>
              <tr class="job-stats-row job-stats-row--clickable"
                  :class="{ 'job-stats-row--open': expandedJobType === row.type }"
                  role="button" tabindex="0"
                  @click="toggleJobRuns(row.type)"
                  @keydown.enter.prevent="toggleJobRuns(row.type)"
                  @keydown.space.prevent="toggleJobRuns(row.type)"
                  :data-tip="$app.t('jobStats.expandHint')">
                <td>
                  <span class="history-chevron" :class="{ open: expandedJobType === row.type }">›</span>
                  <span x-text="$app.t(row.typeLabel)"></span>
                </td>
                <td x-text="row.avgDurationFmt"></td>
                <td x-text="row.avgTokensFmt"></td>
                <td x-text="$app.formatLastRun(row.lastRun)"></td>
                <td>
                  <span x-text="row.count"></span>
                  <span x-show="row.errorCount > 0" class="job-stats-errors">
                    / <span x-text="row.errorCount"></span> <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=689#x"/></svg>
                  </span>
                </td>
              </tr>
              <tr x-show="expandedJobType === row.type" class="job-stats-runs-row">
                <td colspan="5">
                  <div x-show="bookJobRunsLoading && !bookJobRuns[row.type]" class="job-runs-loading" x-text="$app.t('jobStats.loading')"></div>
                  <div x-show="bookJobRuns[row.type] && bookJobRuns[row.type].length === 0" class="job-runs-empty" x-text="$app.t('jobStats.runs.empty')"></div>
                  <div class="table-scroll" x-show="bookJobRuns[row.type] && bookJobRuns[row.type].length > 0">
                  <table class="job-runs-table">
                    <thead>
                      <tr>
                        <th x-text="$app.t('jobStats.runs.col.when')"></th>
                        <th x-text="$app.t('jobStats.runs.col.status')"></th>
                        <th x-text="$app.t('jobStats.runs.col.duration')"></th>
                        <th x-text="$app.t('jobStats.runs.col.tokens')"></th>
                        <th x-text="$app.t('jobStats.runs.col.detail')"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="run in (bookJobRuns[row.type] || [])" :key="run.jobId">
                        <tr>
                          <td x-text="$app.formatLastRun(run.endedAt || run.startedAt || run.queuedAt)"></td>
                          <td>
                            <span class="job-run-status" :class="'job-run-status--' + run.status"
                                  x-text="$app.t('jobStats.runs.status.' + run.status)"></span>
                          </td>
                          <td x-text="run.durationFmt"></td>
                          <td x-text="run.tokensFmt"></td>
                          <td class="job-run-detail">
                            <span x-show="run.error" class="job-run-error" :data-tip="$app.t(run.error, run.errorParams)" x-text="$app.t(run.error, run.errorParams)"></span>
                            <span x-show="!run.error" class="job-run-muted">—</span>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                  </div>
                </td>
              </tr>
          </tbody>
        </template>
      </table>
      </div>
    </section>

    </div><!-- /tab: stats -->
  </div>
</div>
