<!-- Buch-Einstellungen -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/book-settings-card.js.
  `showBookSettingsCard` bleibt im Root, fachlicher State in dieser Komponente.
-->
<div class="card card--settings" x-data="bookSettingsCard" x-show="$app.showBookSettingsCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('book.settings.title', { name: $app.selectedBookName })"></span>
    <div class="card-actions">
      <button type="button" @click="saveBookSettings()" :disabled="bookSettingsSaving || bookSettingsLoading">
        <span x-show="bookSettingsSaving" class="spinner"></span>
        <span x-text="bookSettingsSaving ? $app.t('common.saving') : $app.t('common.save')"></span>
      </button>
    </div>
  </div>

  <div x-show="bookSettingsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

  <div x-show="!bookSettingsLoading" class="card-form-grid">

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.basics')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.language')"></label>
        <div class="book-settings-options">
          <label class="book-settings-option">
            <input type="radio" name="bs-lang" value="de" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
            <span x-text="$app.t('lang.de')"></span>
          </label>
          <label class="book-settings-option">
            <input type="radio" name="bs-lang" value="en" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
            <span x-text="$app.t('lang.en')"></span>
          </label>
        </div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.region')"></label>
        <div class="book-settings-options">
          <template x-if="bookSettingsLanguage === 'de'">
            <div class="book-settings-options">
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="CH" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.de.CH')"></span>
              </label>
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="DE" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.de.DE')"></span>
              </label>
            </div>
          </template>
          <template x-if="bookSettingsLanguage === 'en'">
            <div class="book-settings-options">
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="US" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.en.US')"></span>
              </label>
              <label class="book-settings-option">
                <input type="radio" name="bs-region" value="GB" x-model="bookSettingsRegion">
                <span x-text="$app.t('region.en.GB')"></span>
              </label>
            </div>
          </template>
        </div>
      </div>
    </section>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.narrative')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.buchtyp')"></label>
        <div x-data="combobox($app.t('book.settings.buchtyp'), $app.t('book.settings.buchtyp.none'))"
             x-modelable="value" x-model="bookSettingsBuchtyp"
             x-effect="options = bookSettingsBuchtypOptions()"
  ></div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.pov')"></label>
        <div x-data="combobox($app.t('book.settings.pov'), $app.t('book.settings.pov.none'))"
             x-modelable="value" x-model="bookSettingsErzaehlperspektive"
             x-effect="options = bookSettingsPovOptions()"
  ></div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.tempus')"></label>
        <div x-data="combobox($app.t('book.settings.tempus'), $app.t('book.settings.tempus.none'))"
             x-modelable="value" x-model="bookSettingsErzaehlzeit"
             x-effect="options = bookSettingsTempusOptions()"
  ></div>
      </div>

      <p class="card-form-hint"
         x-show="bookSettingsBuchtyp === 'kurzgeschichten' && (bookSettingsErzaehlperspektive || bookSettingsErzaehlzeit)"
         x-text="$app.t('book.settings.pov.kurzgeschichtenHint')"></p>
    </section>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.taxonomy')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.category')"></label>
        <div x-data="combobox($app.t('book.category'), $app.t('categories.empty'))"
             x-modelable="value" x-model="bookCategoryId"
             x-effect="options = bookCategoryOptions()"
             @combobox-change="saveBookCategory()"></div>
      </div>

      <div class="card-form-row card-form-row--top">
        <label class="card-form-label" x-text="$app.t('book.tags')"></label>
        <div class="book-tags-editor">
          <div class="book-tags-pool" x-show="tagPool.length > 0">
            <template x-for="tag in tagPool" :key="tag.id">
              <button type="button"
                      class="book-tag-chip"
                      :class="{ 'is-active': bookTagIds.includes(tag.id) }"
                      @click="toggleBookTag(tag.id)"
                      x-text="tag.name"></button>
            </template>
          </div>
          <p class="muted-msg muted-msg--sm" x-show="tagPool.length === 0" x-text="$app.t('tags.empty')"></p>
          <div class="book-tags-new">
            <input type="text"
                   class="card-form-input"
                   x-model="newTagName"
                   :placeholder="$app.t('tag.new')"
                   @keydown.enter.prevent="createInlineTag()"
                   :disabled="newTagBusy"
                   maxlength="80">
            <button type="button" @click="createInlineTag()" :disabled="newTagBusy || !newTagName.trim()" x-text="$app.t('common.new')"></button>
          </div>
        </div>
      </div>
    </section>

    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.settings.section.context')"></h3>

      <div class="card-form-row card-form-row--top">
        <label class="card-form-label" for="bs-buchkontext" x-text="$app.t('book.settings.context')"></label>
        <div class="book-settings-kontext-wrap">
          <textarea
            id="bs-buchkontext"
            class="card-form-textarea"
            x-model="bookSettingsBuchKontext"
            :placeholder="$app.t('book.settings.contextPlaceholder')"
            rows="4"
            maxlength="1000"
          ></textarea>
          <p class="card-form-hint" x-text="(bookSettingsBuchKontext || '').length + ' / 1000'"></p>
        </div>
      </div>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.settings.status')"></label>
        <div class="form-stack">
          <label class="form-check">
            <input type="checkbox" id="bs-finished" x-model="bookSettingsIsFinished">
            <span>
              <span class="form-check-title" x-text="$app.t('book.settings.finished')"></span>
              <span class="form-check-desc" x-text="$app.t('book.settings.finished.desc')"></span>
            </span>
          </label>
        </div>
      </div>
    </section>

    <p class="card-form-saved" x-show="bookSettingsSaved" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('common.settingsSaved')"></p>
    <p class="card-form-error" x-show="bookSettingsError" x-text="bookSettingsError"></p>

    <!-- Sharing + Buch-Chat-Opt-In für Lektor. Sichtbar für alle
         Buch-Berechtigten (read-only für nicht-Owner). -->
    <section class="book-settings-section">
      <h3 class="book-settings-section-title" x-text="$app.t('book.share.title')"></h3>

      <div class="card-form-row">
        <label class="card-form-label" x-text="$app.t('book.share.lektorBookChatLabel')"></label>
        <div class="form-stack">
          <label class="form-check">
            <input type="checkbox" x-model="bookSettingsAllowLektorBookChat" :disabled="!bookAccessIsOwner()">
            <span>
              <span class="form-check-title" x-text="$app.t('book.share.lektorBookChatTitle')"></span>
              <span class="form-check-desc" x-text="$app.t('book.share.lektorBookChatDesc')"></span>
            </span>
          </label>
        </div>
      </div>

      <div x-show="bookAccessLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>
      <p class="card-form-error" x-show="bookAccessError" x-text="bookAccessError"></p>

      <div x-show="!bookAccessLoading && bookAccessList.length" class="book-share-list">
        <template x-for="entry in bookAccessList" :key="entry.user_email">
          <div class="book-share-row">
            <span class="book-share-avatar" :style="shareAvatarStyle(entry)" x-text="shareInitials(entry)" aria-hidden="true"></span>
            <div class="book-share-row-main">
              <span class="book-share-displayname" x-text="entry.display_name || entry.user_email"></span>
              <span class="book-share-email muted" x-show="entry.display_name" x-text="entry.user_email"></span>
            </div>
            <div class="book-share-row-actions">
              <template x-if="entry.role === 'owner' || !bookAccessIsOwner()">
                <span class="badge" x-text="$app.t('book.share.role.' + entry.role)"></span>
              </template>
              <template x-if="bookAccessIsOwner() && entry.role !== 'owner'">
                <div class="book-share-row-controls">
                  <div class="book-share-role-combo"
                       x-data="combobox($app.t('book.share.role.editor'))"
                       x-effect="value = entry.role; options = bookAccessRoleOptions()"
                       @combobox-change="if ($event.detail && $event.detail !== entry.role) changeBookAccessRole(entry.user_email, $event.detail)"></div>
                  <button type="button" class="btn-compact book-share-btn-transfer"
                          @click="transferOwnership(entry.user_email)"
                          :data-tip="$app.t('book.share.transferTooltip')"
                          x-text="$app.t('book.share.transferBtn')"></button>
                  <button type="button" class="btn-compact book-share-btn-revoke"
                          @click="revokeBookAccess(entry.user_email)"
                          x-text="$app.t('book.share.revokeBtn')"></button>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <div x-show="bookAccessIsOwner()" class="book-share-invite">
        <label class="card-form-label" x-text="$app.t('book.share.inviteLabel')"></label>
        <div class="book-share-invite-row">
          <div class="book-share-invite-typeahead">
            <input type="email" class="card-form-input"
                   x-model="shareEmail"
                   :placeholder="$app.t('book.share.invitePlaceholder')"
                   :disabled="shareBusy"
                   autocomplete="off"
                   @focus="shareSuggestOpen = true"
                   @input="shareSuggestOpen = true"
                   @keydown.escape="shareSuggestOpen = false"
                   @blur="setTimeout(() => shareSuggestOpen = false, 150)">
            <ul x-show="shareSuggestOpen && shareSuggestions().length" x-cloak class="book-share-suggest">
              <template x-for="s in shareSuggestions()" :key="s.key">
                <li class="book-share-suggest-item"
                    :class="{'book-share-suggest-item--invite': s.kind === 'invite'}"
                    @mousedown.prevent="pickShareSuggestion(s)">
                  <span class="book-share-suggest-main" x-text="s.label"></span>
                  <span class="book-share-suggest-sub muted" x-show="s.sub" x-text="s.sub"></span>
                </li>
              </template>
            </ul>
          </div>
          <div class="book-share-role-combo"
               x-data="combobox($app.t('book.share.role.editor'))"
               x-modelable="value" x-model="shareRole"
               x-effect="options = bookAccessRoleOptions()"></div>
          <button type="button" class="btn-compact"
                  @click="submitShareInvite()"
                  :disabled="shareBusy || !shareEmail">
            <span x-show="shareBusy" class="spinner"></span>
            <span x-text="shareSubmitLabel()"></span>
          </button>
        </div>
      </div>
    </section>

    <div class="book-settings-danger-zone">
      <div class="book-settings-danger-title" x-text="$app.t('book.settings.dangerZone')"></div>

      <div class="book-settings-danger-section">
        <div class="book-settings-danger-row">
          <div class="book-settings-danger-text" x-text="$app.t('book.settings.dangerText')"></div>
          <div class="book-settings-danger-actions">
            <button type="button"
              class="book-settings-btn-danger"
              @click="resetBookHistory()"
              :disabled="bookHistoryResetLoading || !$app.selectedBookId">
              <span x-show="bookHistoryResetLoading" class="spinner"></span>
              <span x-text="bookHistoryResetLoading ? $app.t('common.deleting') : $app.t('book.settings.dangerButton')"></span>
            </button>
          </div>
        </div>
        <p class="card-form-saved" x-show="bookHistoryResetMessage" x-cloak x-transition.opacity.duration.250ms x-text="bookHistoryResetMessage"></p>
        <p class="card-form-error" x-show="bookHistoryResetError" x-text="bookHistoryResetError"></p>
      </div>

      <div class="book-settings-danger-section">
        <div class="book-settings-danger-row">
          <div class="book-settings-danger-text" x-text="$app.t('book.settings.deleteBookText')"></div>
          <div class="book-settings-danger-actions">
            <button type="button"
              class="book-settings-btn-danger"
              @click="deleteBook()"
              :disabled="bookDeleteLoading || !$app.selectedBookId">
              <span x-show="bookDeleteLoading" class="spinner"></span>
              <span x-text="bookDeleteLoading ? $app.t('common.deleting') : $app.t('book.settings.deleteBookButton')"></span>
            </button>
          </div>
        </div>
        <p class="card-form-error" x-show="bookDeleteError" x-text="bookDeleteError"></p>
      </div>
    </div>

    <section class="book-settings-stats">
      <h3 class="book-settings-stats-title" x-text="$app.t('jobStats.title')"></h3>
      <div x-show="bookJobStatsLoading && !bookJobStats" class="job-stats-loading" x-text="$app.t('jobStats.loading')"></div>
      <div x-show="bookJobStats && bookJobStats.length === 0" class="job-stats-empty" x-text="$app.t('jobStats.empty')"></div>
      <div x-show="bookJobStats && bookJobStats.length > 0" class="job-stats-scroll">
      <table class="job-stats-table">
        <thead>
          <tr>
            <th x-text="$app.t('jobStats.col.type')"></th>
            <th :data-tip="$app.t('jobStats.col.avgDurationTitle')" x-text="$app.t('jobStats.col.avgDuration')"></th>
            <th :data-tip="$app.t('jobStats.col.avgTokensTitle')" x-text="$app.t('jobStats.col.avgTokens')"></th>
            <th x-text="$app.t('jobStats.col.lastRun')"></th>
            <th :data-tip="$app.t('jobStats.col.runsTitle')" x-text="$app.t('jobStats.col.runs')"></th>
          </tr>
        </thead>
        <template x-for="row in bookJobStats" :key="row.type">
          <tbody>
              <tr class="job-stats-row job-stats-row--clickable"
                  :class="{ 'job-stats-row--open': expandedJobType === row.type }"
                  role="button" tabindex="0"
                  @click="toggleJobRuns(row.type)"
                  @keydown.enter.prevent="toggleJobRuns(row.type)"
                  @keydown.space.prevent="toggleJobRuns(row.type)"
                  :data-tip="$app.t('jobStats.expandHint')">
                <td>
                  <span class="history-chevron" :class="{ open: expandedJobType === row.type }">›</span>
                  <span x-text="$app.t(row.typeLabel)"></span>
                </td>
                <td x-text="row.avgDurationFmt"></td>
                <td x-text="row.avgTokensFmt"></td>
                <td x-text="$app.formatLastRun(row.lastRun)"></td>
                <td>
                  <span x-text="row.count"></span>
                  <span x-show="row.errorCount > 0" class="job-stats-errors" x-text="' / ' + row.errorCount + ' ✕'"></span>
                </td>
              </tr>
              <tr x-show="expandedJobType === row.type" class="job-stats-runs-row">
                <td colspan="5">
                  <div x-show="bookJobRunsLoading && !bookJobRuns[row.type]" class="job-runs-loading" x-text="$app.t('jobStats.loading')"></div>
                  <div x-show="bookJobRuns[row.type] && bookJobRuns[row.type].length === 0" class="job-runs-empty" x-text="$app.t('jobStats.runs.empty')"></div>
                  <table x-show="bookJobRuns[row.type] && bookJobRuns[row.type].length > 0" class="job-runs-table">
                    <thead>
                      <tr>
                        <th x-text="$app.t('jobStats.runs.col.when')"></th>
                        <th x-text="$app.t('jobStats.runs.col.status')"></th>
                        <th x-text="$app.t('jobStats.runs.col.duration')"></th>
                        <th x-text="$app.t('jobStats.runs.col.tokens')"></th>
                        <th x-text="$app.t('jobStats.runs.col.detail')"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="run in (bookJobRuns[row.type] || [])" :key="run.jobId">
                        <tr>
                          <td x-text="$app.formatLastRun(run.endedAt || run.startedAt || run.queuedAt)"></td>
                          <td>
                            <span class="job-run-status" :class="'job-run-status--' + run.status"
                                  x-text="$app.t('jobStats.runs.status.' + run.status)"></span>
                          </td>
                          <td x-text="run.durationFmt"></td>
                          <td x-text="run.tokensFmt"></td>
                          <td class="job-run-detail">
                            <span x-show="run.error" class="job-run-error" :data-tip="$app.t(run.error, run.errorParams)" x-text="$app.t(run.error, run.errorParams)"></span>
                            <span x-show="!run.error" class="job-run-muted">—</span>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </td>
              </tr>
          </tbody>
        </template>
      </table>
      </div>
    </section>
  </div>
</div>
