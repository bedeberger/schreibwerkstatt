<!-- Buch-Einstellungen -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/book-settings-card.js.
  `showBookSettingsCard` bleibt im Root, fachlicher State in dieser Komponente.
-->
<div class="card card--settings" x-data="bookSettingsCard" x-show="$app.showBookSettingsCard" x-cloak>
  <div class="card-header">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('book.settings.title')"></span>
    </div>
    <div class="card-actions">
      <span class="card-form-saved" x-show="headerSaved()" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('common.settingsSaved')"></span>
      <span class="card-form-error" x-show="headerError()" x-text="headerError()"></span>
      <button type="button" data-label-ok @click="saveActiveTab()" :disabled="headerDisabled()">
        <span x-show="headerSaving()" class="spinner"></span>
        <span x-text="headerSaving() ? $app.t('common.saving') : $app.t('common.save')"></span>
      </button>
    </div>
  </div>

  <div x-show="bookSettingsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

  <div x-show="!bookSettingsLoading"
       x-data="tabs(['book','context','share','publication','sync','stats','danger'])"
       x-modelable="value" x-model="bookSettingsTab">

    <!-- Tabs (DESIGN.md .tabs / Alpine.data('tabs')) -->
    <div class="tabs tabs--scrollable" x-bind="tablist">
      <button class="tabs-btn" x-bind="tabBtn('book')"
              x-text="$app.t('book.settings.tab.book')"></button>
      <button class="tabs-btn" x-bind="tabBtn('context')"
              x-text="$app.t('book.settings.tab.context')"></button>
      <button class="tabs-btn" x-bind="tabBtn('share')"
              x-text="$app.t('book.settings.tab.share')"></button>
      <button class="tabs-btn" x-bind="tabBtn('publication')"
              x-text="$app.t('book.settings.tab.publication')"></button>
      <button class="tabs-btn" x-bind="tabBtn('sync')"
              x-show="bookSettingsBuchtyp === 'blog'" x-cloak
              x-text="$app.t('book.settings.tab.sync')"></button>
      <button class="tabs-btn" x-bind="tabBtn('stats')"
              x-text="$app.t('book.settings.tab.stats')"></button>
      <button class="tabs-btn" x-bind="tabBtn('danger')"
              x-text="$app.t('book.settings.tab.danger')"></button>
    </div>

    <!-- @include book-settings-book -->

    <!-- @include book-settings-context -->

    <!-- @include book-settings-danger -->

    <!-- @include book-settings-publication -->

    <!-- @include book-settings-share -->

    <!-- @include book-settings-sync -->

    <!-- @include book-settings-stats -->
  </div>
</div>
