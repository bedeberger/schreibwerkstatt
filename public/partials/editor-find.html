<!-- Find & Replace im Edit-Mode (Cmd/Ctrl+F).
     Teleport nach <body>, damit position:fixed nicht vom card-Transform
     eingefangen wird. Strukturell nur im Edit-Mode sichtbar.
     Alpine.data-Sub-Komponente — siehe public/js/cards/editor-find-card.js. -->
<div x-data="editorFindCard" class="display-contents">
  <template x-teleport="body">
    <div x-show="findOpen && $app.editMode" x-cloak
         class="edit-find"
         role="dialog"
         aria-modal="true"
         :aria-label="$app.t('find.title')"
         :style="{ left: findX + 'px', top: findY + 'px' }"
         @keydown.escape.stop="closeFind()"
         @keydown="$app.trapFocus($event, $el)"
         @mousedown.stop>
      <div class="edit-find-row">
        <input type="text"
               class="edit-find-input"
               x-model="findTerm"
               @input="onFindInput()"
               @keydown="onFindKeydown($event)"
               :placeholder="$app.t('find.placeholder')"
               :aria-label="$app.t('find.placeholder')">
        <span class="edit-find-count"
              x-text="findTerm
                ? (findMatches.length > 0
                    ? $app.t('find.counter', { i: findIndex + 1, n: findMatches.length })
                    : $app.t('find.noMatches'))
                : ''"></span>
        <button type="button" class="edit-find-btn" @click="findPrev()"
                :disabled="findMatches.length === 0"
                :data-tip="$app.t('find.prev')" :aria-label="$app.t('find.prev')">&#x2191;</button>
        <button type="button" class="edit-find-btn" @click="findNext()"
                :disabled="findMatches.length === 0"
                :data-tip="$app.t('find.next')" :aria-label="$app.t('find.next')">&#x2193;</button>
        <button type="button" class="edit-find-btn edit-find-btn--toggle"
                :class="{ 'edit-find-btn--active': findCaseSensitive }"
                @click="findCaseSensitive = !findCaseSensitive; recomputeFindMatches()"
                :data-tip="$app.t('find.caseSensitive')" :aria-label="$app.t('find.caseSensitive')"
                :aria-pressed="findCaseSensitive">Aa</button>
        <button type="button" class="edit-find-btn edit-find-btn--toggle"
                :class="{ 'edit-find-btn--active': findWholeWord }"
                @click="findWholeWord = !findWholeWord; recomputeFindMatches()"
                :data-tip="$app.t('find.wholeWord')" :aria-label="$app.t('find.wholeWord')"
                :aria-pressed="findWholeWord">W</button>
        <button type="button" class="edit-find-close" @click="closeFind()"
                :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
      </div>
      <div class="edit-find-row">
        <input type="text"
               class="edit-find-input edit-find-input--replace"
               x-model="findReplace"
               @keydown.escape.stop="closeFind()"
               :placeholder="$app.t('find.replacePlaceholder')"
               :aria-label="$app.t('find.replacePlaceholder')">
        <button type="button" class="edit-find-btn edit-find-btn--text"
                @click="replaceCurrent()"
                :disabled="findMatches.length === 0"
                x-text="$app.t('find.replace')"></button>
        <button type="button" class="edit-find-btn edit-find-btn--text"
                @click="replaceAll()"
                :disabled="findMatches.length === 0"
                x-text="$app.t('find.replaceAll')"></button>
      </div>
    </div>
  </template>
</div>
