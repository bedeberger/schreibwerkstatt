<!-- Pagetree-Rechtsklick-Menü. Position:fixed (viewport-koordinaten). MUSS
     ausserhalb des `.card`-Wrappers stehen: .card hat cardFadeIn-Animation mit
     transform: translateY(0) als Endzustand — ein transform-Ancestor erzeugt
     einen Containing-Block fuer position:fixed (Spec), wodurch das Menue an
     der Karte statt am Viewport ausgerichtet wuerde. Der Placeholder-Wrapper
     (`#partial-sidebar-pagetree-menu`) ist ein transform-freies div, daher
     bleibt der Containing-Block der Viewport. State + Handler in
     tree-context-menu.js + app-state.js#navigationState. -->
<div class="context-menu pagetree-context-menu"
     role="menu"
     x-show="pageTreeMenuOpen"
     x-cloak
     :style="{ left: pageTreeMenuPos.left + 'px', top: pageTreeMenuPos.top + 'px' }"
     @click.stop
     @contextmenu.prevent>
  <template x-if="pageTreeMenuTarget">
    <div>
      <div class="context-menu-header" x-text="pageTreeMenuTarget.name"></div>
      <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
              @click="pagetreeCtxOpen()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#book-open"/></svg>
        <span x-text="t('pagetreeCtx.open')"></span>
      </button>
      <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
              x-show="pageTreeMenuTarget.kind === 'page'"
              @click="pagetreeCtxEdit()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#pencil"/></svg>
        <span x-text="t('pagetreeCtx.edit')"></span>
      </button>
      <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
              x-show="pageTreeMenuTarget.kind === 'page'"
              @click="pagetreeCtxLektorieren()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#spell-check"/></svg>
        <span x-text="t('pagetreeCtx.lektorieren')"></span>
      </button>
      <div class="context-menu-sep" role="separator"></div>
      <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
              @click="pagetreeCtxShare()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#share-2"/></svg>
        <span x-text="t('pagetreeCtx.share')"></span>
      </button>
      <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
              @click="pagetreeCtxExport()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#download"/></svg>
        <span x-text="t('pagetreeCtx.export')"></span>
      </button>
      <div class="context-menu-sep" role="separator"></div>
      <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
              @click="pagetreeCtxNewChapter()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#folder-plus"/></svg>
        <span x-text="t('pagetreeCtx.newChapter')"></span>
      </button>
      <template x-if="pageTreeMenuTarget.kind === 'chapter'">
        <div>
          <div class="context-menu-sep" role="separator"></div>
          <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
                  @click="pagetreeCtxNewPage()">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#file-plus"/></svg>
            <span x-text="t('pagetreeCtx.newPage')"></span>
          </button>
          <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
                  @click="pagetreeCtxToggleExclude()">
            <svg class="icon" aria-hidden="true"><use :href="'/icons.svg?v=693#' + (pageTreeMenuTarget.excluded ? 'rotate-cw' : 'archive')"/></svg>
            <span x-text="pageTreeMenuTarget.excluded ? t('pagetreeCtx.includeChapter') : t('pagetreeCtx.excludeChapter')"></span>
          </button>
        </div>
      </template>
    </div>
  </template>
</div>
