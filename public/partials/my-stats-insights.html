<!-- Insight-Tiles der „Meine Statistik" (nested via <div id="partial-my-stats-insights">
     in public/partials/my-stats.html, im x-data="myStatsCard"-Scope). Wrapper ist
     display:contents (css/components/my-stats.css), damit die .overview-tile direkte
     Grid-Children der .overview-grid bleiben. Daten: my-stats-card.js / -compute.js. -->

<!-- Tagesziel (Minuten/Tag): Live-Fortschritt heute + Ziel-Streak.
     Gesetzt wird das Ziel im Profil (userSettingsCard); hier nur die Anzeige.
     Immer sichtbar (auch ohne gesetztes Ziel → Hinweis aufs Profil). -->
<template x-if="myStatsData && myStatsData.books > 0">
  <div class="overview-tile overview-tile--medium">
    <div class="overview-tile-label" x-text="$app.t('mystats.goal.title')"></div>

    <template x-if="myStatsHasGoal">
      <div class="mystats-goal-progress">
        <div class="mystats-goal-head">
          <span class="mystats-goal-today">
            <span class="mystats-goal-done" x-text="myStatsMinFmt(myStatsGoal().todayMinutes)"></span>
            <span class="mystats-goal-target" x-text="$app.t('mystats.goal.ofTarget', { n: myStatsGoal().goalMinutes })"></span>
          </span>
          <span class="mystats-goal-reached" x-show="myStatsGoal().reachedToday" x-cloak>
            <svg class="icon" aria-hidden="true"><use href="/icons.svg#check"></use></svg>
            <span x-text="$app.t('mystats.goal.reached')"></span>
          </span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" :style="{ '--progress': myStatsGoal().progressPct + '%' }"></div>
        </div>
        <div class="overview-consistency-grid mystats-goal-stats">
          <div class="overview-consistency-item">
            <span class="overview-consistency-value" x-text="$app.t('mystats.days', { n: myStatsGoal().currentStreak })"></span>
            <span class="overview-consistency-label" x-text="$app.t('mystats.goal.streak')"></span>
          </div>
          <div class="overview-consistency-item">
            <span class="overview-consistency-value" x-text="$app.t('mystats.days', { n: myStatsGoal().longestStreak })"></span>
            <span class="overview-consistency-label" x-text="$app.t('mystats.goal.streakLongest')"></span>
          </div>
          <div class="overview-consistency-item">
            <span class="overview-consistency-value" x-text="_myStatsFmt(myStatsGoal().daysHit)"></span>
            <span class="overview-consistency-label" x-text="$app.t('mystats.goal.daysHit')"></span>
          </div>
        </div>
      </div>
    </template>

    <p class="mystats-goal-prompt" x-show="!myStatsHasGoal" x-text="$app.t('mystats.goal.prompt')"></p>
  </div>
</template>

<!-- Tageszeit-Muster: 24 Balken (wann am Tag du schreibst), lebenslang -->
<template x-if="myStatsHasHours">
  <div class="overview-tile overview-tile--medium">
    <div class="overview-tile-label">
      <span x-text="$app.t('mystats.hourPattern')"></span>
      <span class="mystats-alltime-tag" x-show="myStatsWindowActive" x-text="$app.t('mystats.allTimeTag')"></span>
    </div>
    <div class="overview-weekday-bars mystats-hour-bars">
      <template x-for="h in myStatsHours().hours" :key="h.hour">
        <div class="overview-weekday-col"
             :data-tip="myStatsHourTip(h.hour, h.minutes)">
          <div class="overview-weekday-track">
            <div class="overview-weekday-fill" :style="{ '--progress': h.pct + '%' }"></div>
          </div>
          <span class="overview-weekday-label" x-text="myStatsHourLabel(h.hour)"></span>
        </div>
      </template>
    </div>
    <p class="mystats-hour-peak" x-show="myStatsHours().peakHour !== null"
       x-text="$app.t('mystats.hourPeak', { from: String(myStatsHours().peakHour).padStart(2,'0'), to: String((myStatsHours().peakHour + 1) % 24).padStart(2,'0') })"></p>
  </div>
</template>

<!-- Lesbarkeit: chars-gewichteter Mittelwert + Trend ggü. ~30 Tagen -->
<template x-if="myStatsHasReadability">
  <div class="overview-tile overview-tile--medium">
    <div class="overview-tile-label">
      <span x-text="$app.t('mystats.readability')"></span>
      <span class="mystats-alltime-tag" x-show="myStatsWindowActive" x-text="$app.t('mystats.allTimeTag')"></span>
    </div>
    <div class="overview-consistency-grid">
      <div class="overview-consistency-item" x-show="myStatsReadability().flesch !== null">
        <span class="overview-consistency-value">
          <span x-text="myStatsDec(myStatsReadability().flesch)"></span>
          <svg class="icon mystats-trend" aria-hidden="true"><use :href="'/icons.svg#' + myStatsTrendIcon(myStatsReadability().fleschTrend)"></use></svg>
        </span>
        <span class="overview-consistency-label"
              x-text="$app.t('mystats.flesch') + ' · ' + myStatsFleschLabel(myStatsReadability().flesch)"></span>
      </div>
      <div class="overview-consistency-item" x-show="myStatsReadability().lix !== null">
        <span class="overview-consistency-value">
          <span x-text="myStatsDec(myStatsReadability().lix)"></span>
          <svg class="icon mystats-trend" aria-hidden="true"><use :href="'/icons.svg#' + myStatsTrendIcon(myStatsReadability().lixTrend)"></use></svg>
        </span>
        <span class="overview-consistency-label" x-text="$app.t('mystats.lix')"></span>
      </div>
      <div class="overview-consistency-item" x-show="myStatsReadability().sentenceLen !== null">
        <span class="overview-consistency-value">
          <span x-text="myStatsDec(myStatsReadability().sentenceLen)"></span>
          <svg class="icon mystats-trend" aria-hidden="true"><use :href="'/icons.svg#' + myStatsTrendIcon(myStatsReadability().sentenceLenTrend)"></use></svg>
        </span>
        <span class="overview-consistency-label" x-text="$app.t('mystats.sentenceLen')"></span>
      </div>
    </div>
  </div>
</template>

<!-- Lektorat-Qualität: Fundstellen-Dichte + Trend ggü. ~30 Tagen -->
<template x-if="myStatsHasQuality">
  <div class="overview-tile overview-tile--medium">
    <div class="overview-tile-label">
      <span x-text="$app.t('mystats.quality')"></span>
      <span class="mystats-alltime-tag" x-show="myStatsWindowActive" x-text="$app.t('mystats.allTimeTag')"></span>
    </div>
    <div class="overview-consistency-grid">
      <div class="overview-consistency-item">
        <span class="overview-consistency-value">
          <span x-text="myStatsDec(myStatsQuality().avgPerPage)"></span>
          <svg class="icon mystats-trend" aria-hidden="true"><use :href="'/icons.svg#' + myStatsTrendIcon(myStatsQuality().trend)"></use></svg>
        </span>
        <span class="overview-consistency-label" x-text="$app.t('mystats.qualityPerPage')"></span>
      </div>
      <div class="overview-consistency-item" x-show="myStatsQuality().perNormpage !== null">
        <span class="overview-consistency-value" x-text="myStatsDec(myStatsQuality().perNormpage)"></span>
        <span class="overview-consistency-label" x-text="$app.t('mystats.qualityPerNormpage')"></span>
      </div>
      <div class="overview-consistency-item">
        <span class="overview-consistency-value" x-text="_myStatsFmt(myStatsQuality().totalFindings)"></span>
        <span class="overview-consistency-label" x-text="$app.t('mystats.qualityTotal')"></span>
      </div>
      <div class="overview-consistency-item">
        <span class="overview-consistency-value" x-text="_myStatsFmt(myStatsQuality().pagesChecked)"></span>
        <span class="overview-consistency-label" x-text="$app.t('mystats.qualityChecked')"></span>
      </div>
    </div>
  </div>
</template>

<!-- Aufwand: Schreiben vs. Überarbeiten -->
<template x-if="myStatsEffort().hasData">
  <div class="overview-tile overview-tile--medium">
    <div class="overview-tile-label" x-text="$app.t('mystats.effort')"></div>
    <div class="mystats-effort-bar" role="img"
         :aria-label="$app.t('mystats.effortWriting') + ' ' + myStatsEffort().writingPct + '%'">
      <div class="mystats-effort-seg mystats-effort-seg--write" :style="{ width: myStatsEffort().writingPct + '%' }"></div>
      <div class="mystats-effort-seg mystats-effort-seg--edit" :style="{ width: myStatsEffort().lektoratPct + '%' }"></div>
    </div>
    <div class="mystats-effort-legend">
      <span class="mystats-effort-key">
        <span class="mystats-effort-dot mystats-effort-dot--write"></span>
        <span x-text="$app.t('mystats.effortWriting') + ' · ' + myStatsEffort().writingPct + '%'"></span>
      </span>
      <span class="mystats-effort-key">
        <span class="mystats-effort-dot mystats-effort-dot--edit"></span>
        <span x-text="$app.t('mystats.effortEditing') + ' · ' + myStatsEffort().lektoratPct + '%'"></span>
      </span>
    </div>
  </div>
</template>

<!-- Umfang nach Kategorie: Zeichen-Bestand je Buch-Kategorie (lebenslang) -->
<template x-if="myStatsHasCategories">
  <div class="overview-tile overview-tile--medium">
    <div class="overview-tile-label">
      <span x-text="$app.t('mystats.category.title')"></span>
      <span class="mystats-alltime-tag" x-show="myStatsWindowActive" x-text="$app.t('mystats.allTimeTag')"></span>
    </div>
    <ul class="overview-chapter-list">
      <template x-for="c in myStatsByCategory()" :key="c.categoryId == null ? '__none__' : c.categoryId">
        <li class="overview-chapter-row">
          <span class="overview-chapter-name mystats-cat-name">
            <span class="mystats-cat-dot" :style="{ background: c.color }" aria-hidden="true"></span>
            <span :data-tip="c.name" x-text="c.name"></span>
          </span>
          <div class="overview-chapter-bar-track">
            <div class="overview-chapter-bar-fill" :style="{ width: c.pct + '%', background: c.color }"></div>
          </div>
          <span class="overview-chapter-meta">
            <span class="overview-chapter-chars" x-text="$app.t('mystats.bookGoals.normpages', { n: _myStatsFmt(c.normpages) })"></span>
            <span class="overview-chapter-chars mystats-goals-muted" x-text="$app.t('mystats.category.books', { n: _myStatsFmt(c.bookCount) })"></span>
          </span>
        </li>
      </template>
    </ul>
  </div>
</template>

<!-- Wo deine Zeit hinfloss: Schreibzeit pro Buch -->
<template x-if="myStatsHasPerBook">
  <div class="overview-tile overview-tile--medium">
    <div class="overview-tile-label" x-text="$app.t('mystats.perBookTime')"></div>
    <ul class="overview-chapter-list">
      <template x-for="b in myStatsPerBookTime()" :key="b.book_id">
        <li class="overview-chapter-row">
          <span class="overview-chapter-name" :data-tip="b.name" x-text="b.name"></span>
          <div class="overview-chapter-bar-track">
            <div class="overview-chapter-bar-fill" :style="{ width: b.pct + '%' }"></div>
          </div>
          <span class="overview-chapter-meta">
            <span class="overview-chapter-chars" x-text="myStatsMinFmt(b.minutes)"></span>
          </span>
        </li>
      </template>
    </ul>
  </div>
</template>
