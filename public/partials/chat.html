<!-- Seiten-Chat -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/chat-card.js.
  showChatCard bleibt am Root; fachlicher State in der Sub.
-->
<div class="card" id="chat-card" x-data="chatCard" x-show="$app.showChatCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('chat.title', { name: $app.currentPage?.name || '–' })"></span>
    <div class="card-actions">
      <button type="button" @click="startNewChatSession()" :disabled="chatLoading" :data-tip="$app.t('chat.newSessionTitle')" x-text="$app.t('chat.newSession')"></button>
    </div>
  </div>

  <div class="progress-bar-wrap" x-show="chatProgress > 0">
    <div class="progress-bar" :style="{ '--progress': chatProgress + '%' }"></div>
  </div>
  <div x-show="chatStatus" class="card-status" x-html="chatStatus"></div>

  <div id="chat-messages" class="chat-messages">
    <div x-show="chatMessages.length === 0" class="chat-empty" x-text="$app.t('chat.emptyPage', { name: $app.currentPage?.name || '' })"></div>

    <template x-for="(msg, msgIdx) in chatMessages" :key="msgIdx">
      <div :class="'chat-msg chat-msg--' + msg.role">
        <div class="chat-msg-bubble">
          <div x-show="msg.role === 'user'" class="chat-msg-text" x-text="msg.content"></div>
          <div x-show="msg.role === 'assistant'" class="chat-msg-text" x-html="_renderChatMarkdown(msg.content)"></div>
          <div x-show="msg.role === 'assistant' && _chatTokenInfo(msg)" class="chat-token-info" x-text="_chatTokenInfo(msg)"></div>
        </div>

        <!-- Änderungsvorschläge (nur Seiten-Chat) -->
        <template x-if="msg.role === 'assistant' && msg.vorschlaege && msg.vorschlaege.length > 0">
          <div class="chat-vorschlaege">
            <template x-for="(v, vIdx) in msg.vorschlaege" :key="vIdx">
              <div class="chat-vorschlag" :class="v._applied ? 'chat-vorschlag--applied' : ''">
                <div class="chat-vorschlag-header">
                  <span class="chat-vorschlag-label" x-text="$app.t('chat.suggestion')"></span>
                  <button type="button"
                    class="chat-vorschlag-btn"
                    @click="applyChatVorschlag(v, msgIdx, vIdx)"
                    :disabled="!!v._applied || !!v._applying || chatLoading"
                  >
                    <span x-show="v._applying" class="spinner"></span>
                    <span x-text="v._applied ? $app.t('chat.applied') : v._applying ? $app.t('common.saving') : $app.t('chat.apply')"></span>
                  </button>
                </div>
                <div class="chat-vorschlag-diff">
                  <span class="finding-original" x-text="v.original"></span>
                  <span class="finding-korrektur" x-text="v.ersatz"></span>
                </div>
                <div x-show="v.begruendung" class="chat-vorschlag-begruendung" x-text="v.begruendung"></div>
                <div x-show="v._error" class="chat-vorschlag-error" x-text="v._error"></div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

    <div x-show="chatLoading" class="chat-skeleton-wrapper">
      <div class="chat-skeleton-line chat-skeleton-line--wide"></div>
      <div class="chat-skeleton-line chat-skeleton-line--narrow"></div>
    </div>
  </div>

  <div class="chat-input-row">
    <textarea
      class="chat-input"
      x-model="chatInput"
      :placeholder="$app.t('chat.placeholder')"
      :aria-label="$app.t('chat.placeholder')"
      rows="2"
      :disabled="chatLoading"
      @keydown.enter="if(!$event.isComposing && $event.keyCode !== 229 && !$event.shiftKey && !$event.ctrlKey && !$event.metaKey) { $event.preventDefault(); sendChatMessage(); }"
    ></textarea>
    <button type="button" class="chat-send-btn" @click="sendChatMessage()" :disabled="chatLoading || !chatInput.trim()" :aria-label="$app.t('chat.send')">
      <span x-show="chatLoading" class="spinner"></span>
      <span x-show="!chatLoading">↑</span>
    </button>
  </div>
  <div class="chat-input-hint" x-text="$app.t('chat.inputHint')"></div>

  <div x-show="chatSessions.length > 0" class="card-history-section">
    <div class="chat-history-title" x-text="$app.t('chat.history')"></div>
    <template x-for="s in chatSessions" :key="s.id">
      <div
        class="chat-session-item"
        :class="s.id === chatSessionId ? 'chat-session-item--active' : ''"
        @click="loadChatSession(s.id)"
      >
        <div class="chat-session-preview" x-text="(s.preview || $app.t('chat.previewEmpty')).slice(0, 80)"></div>
        <div class="chat-session-meta" x-text="$app.formatDate(s.last_message_at)"></div>
        <button type="button" class="chat-session-delete btn-card-close" @click.stop="deleteChatSession(s.id)" :data-tip="$app.t('common.delete')" :aria-label="$app.t('common.delete')">×</button>
      </div>
    </template>
  </div>
</div>

<!-- Buch-Chat -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/book-chat-card.js.
-->
<div class="card" id="book-chat-card" x-data="bookChatCard" x-show="$app.showBookChatCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('chat.titleBook', { name: $app.selectedBookName })"></span>
    <div class="card-actions">
      <button type="button" @click="startNewBookChatSession()" :disabled="bookChatLoading" :data-tip="$app.t('chat.newSessionTitle')" x-text="$app.t('chat.newSession')"></button>
    </div>
  </div>

  <div class="progress-bar-wrap" x-show="bookChatProgress > 0">
    <div class="progress-bar" :style="{ '--progress': bookChatProgress + '%' }"></div>
  </div>
  <div x-show="bookChatStatus" class="card-status" x-html="bookChatStatus"></div>

  <div id="book-chat-messages" class="chat-messages">
    <div x-show="bookChatMessages.length === 0" class="chat-empty" x-text="$app.t('chat.emptyBook', { name: $app.selectedBookName || '' })"></div>

    <template x-for="(msg, msgIdx) in bookChatMessages" :key="msgIdx">
      <div :class="'chat-msg chat-msg--' + msg.role">
        <div class="chat-msg-bubble">
          <div x-show="msg.role === 'user'" class="chat-msg-text" x-text="msg.content"></div>
          <div x-show="msg.role === 'assistant'" class="chat-msg-text" x-html="_renderChatMarkdown(msg.content)"></div>
          <!-- Kontext-Info (nur Buch-Chat) -->
          <template x-if="msg.role === 'assistant' && msg.context_info">
            <div x-data="{ expanded: false }"
                 class="chat-context-info">
              <span class="chat-context-label" x-text="$app.t('chat.contextLabel')"></span>

              <!-- Agent-Modus: aufgerufene Werkzeuge -->
              <template x-if="msg.context_info.mode === 'agent'">
                <span>
                  <template x-for="(entry, ei) in _agentToolSummary(msg.context_info.tool_calls)" :key="ei">
                    <span class="chat-context-badge"
                          :class="{ 'chat-context-badge--error': entry.errors > 0 }"
                          x-text="entry.name + (entry.count > 1 ? ' ×' + entry.count : '')"></span>
                  </template>
                </span>
              </template>

              <!-- Klassischer Modus: vorausgewählte Seiten -->
              <template x-if="msg.context_info.mode !== 'agent' && Array.isArray(msg.context_info.pages)">
                <span>
                  <template x-for="(p, pi) in (expanded ? msg.context_info.pages : (msg.context_info.pages || []).slice(0, 3))" :key="pi">
                    <span>
                      <template x-if="pi > 0"><span class="chat-context-sep">, </span></template>
                      <a x-show="p.id"
                         :href="'#book/' + $app.selectedBookId + '/page/' + p.id"
                         @click.prevent="$app.gotoPageById(p.id)"
                         class="chat-context-link" x-text="p.name"></a>
                      <span x-show="!p.id" x-text="p.name"></span>
                    </span>
                  </template>
                  <button type="button" x-show="(msg.context_info.pages || []).length > 3"
                          class="chat-context-toggle"
                          @click.stop="expanded = !expanded"
                          x-text="expanded ? '▲' : '+' + ((msg.context_info.pages || []).length - 3)"></button>
                  <template x-if="msg.context_info.totalPages > (msg.context_info.pages || []).length">
                    <span class="chat-context-total" x-text="$app.t('chat.ofTotalPages', { n: msg.context_info.totalPages })"></span>
                  </template>
                  <template x-if="(msg.context_info.pages || []).length > 0">
                    <span class="chat-context-badge" x-text="$app.t('chat.ctxSeitentext')"></span>
                  </template>
                  <template x-if="msg.context_info.figuren">
                    <span class="chat-context-badge" x-text="$app.t('chat.ctxFiguren')"></span>
                  </template>
                  <template x-if="msg.context_info.review">
                    <span class="chat-context-badge" x-text="$app.t('chat.ctxReview')"></span>
                  </template>
                </span>
              </template>
            </div>
          </template>
          <div x-show="msg.role === 'assistant' && _chatTokenInfo(msg)" class="chat-token-info" x-text="_chatTokenInfo(msg)"></div>
        </div>
      </div>
    </template>

    <div x-show="bookChatLoading" class="chat-skeleton-wrapper">
      <div class="chat-skeleton-line chat-skeleton-line--wide"></div>
      <div class="chat-skeleton-line chat-skeleton-line--narrow"></div>
    </div>
  </div>

  <div class="chat-input-row">
    <textarea
      class="chat-input"
      x-model="bookChatInput"
      :placeholder="$app.t('chat.placeholderBook')"
      :aria-label="$app.t('chat.placeholderBook')"
      rows="2"
      :disabled="bookChatLoading"
      @keydown.enter="if(!$event.isComposing && $event.keyCode !== 229 && !$event.shiftKey && !$event.ctrlKey && !$event.metaKey) { $event.preventDefault(); sendBookChatMessage(); }"
    ></textarea>
    <button type="button" class="chat-send-btn" @click="sendBookChatMessage()" :disabled="bookChatLoading || !bookChatInput.trim()" :aria-label="$app.t('chat.send')">
      <span x-show="bookChatLoading" class="spinner"></span>
      <span x-show="!bookChatLoading">↑</span>
    </button>
  </div>
  <div class="chat-input-hint" x-text="$app.t('chat.inputHint')"></div>

  <div x-show="bookChatSessions.length > 0" class="card-history-section">
    <div class="chat-history-title" x-text="$app.t('chat.history')"></div>
    <template x-for="s in bookChatSessions" :key="s.id">
      <div
        class="chat-session-item"
        :class="s.id === bookChatSessionId ? 'chat-session-item--active' : ''"
        @click="loadBookChatSession(s.id)"
      >
        <div class="chat-session-preview" x-text="(s.preview || $app.t('chat.previewEmpty')).slice(0, 80)"></div>
        <div class="chat-session-meta" x-text="$app.formatDate(s.last_message_at)"></div>
        <button type="button" class="chat-session-delete btn-card-close" @click.stop="deleteBookChatSession(s.id)" :data-tip="$app.t('common.delete')" :aria-label="$app.t('common.delete')">×</button>
      </div>
    </template>
  </div>
</div>
