    <!-- Jobs-Tab -->
    <section x-show="adminSettingsTab === 'jobs'" class="admin-settings-section">
      <div x-data="settingField({ k: 'jobs.max_concurrent', type: 'num', num: { step: 1, min: 1, max: 8 } })"></div>
      <div x-data="settingField({ k: 'jobs.book_chat.mode', type: 'select', opts: [{ value: 'auto', label: 'auto' }, { value: 'agent', label: 'agent' }, { value: 'classic', label: 'classic' }] })"></div>
      <div x-data="settingField({ k: 'jobs.book_chat.max_tool_iter', type: 'num', num: { step: 1, min: 1, max: 50 } })"></div>
      <div x-data="settingField({ k: 'jobs.book_chat.token_budget', type: 'num', num: { step: 1, min: 0, max: 2000000 } })"></div>
    </section>
