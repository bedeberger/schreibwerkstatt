<!-- Erste Schritte: Onboarding-Fortschritts-Checkliste. Alpine.data-Sub-Komponente,
     siehe public/js/cards/onboarding-card.js. Buch-unabhaengig. Fortschritt wird
     serverseitig aus echtem State abgeleitet (GET /me/onboarding). -->
<div class="card card--onboarding" x-data="onboardingCard" x-show="$app.showOnboardingCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('onboarding.title')"></span>
    <button type="button" class="ghost onboarding-dismiss" @click="dismiss()"
            x-text="$app.t('onboarding.dismiss')"></button>
  </div>

  <p class="onboarding-intro" x-text="$app.t('onboarding.intro')"></p>

  <div class="onboarding-progress">
    <div class="progress-bar-wrap">
      <div class="progress-bar" :class="{ 'progress-bar--reached': allDone() }"
           :style="{ '--progress': progressPct() + '%' }"></div>
    </div>
    <span class="onboarding-progress-count" x-text="doneCount() + '/' + totalCount()"></span>
  </div>

  <p class="onboarding-alldone" x-show="allDone()" x-cloak x-text="$app.t('onboarding.allDone')"></p>

  <ul class="onboarding-steps">
    <template x-for="(key, i) in stepKeys" :key="key">
      <li class="onboarding-step" :class="{ 'is-done': steps[key] }">
        <span class="onboarding-step-num" aria-hidden="true" x-text="steps[key] ? '' : (i + 1)"></span>
        <div class="onboarding-step-body">
          <span class="onboarding-step-title" x-text="stepTitle(key)"></span>
          <span class="onboarding-step-desc" x-text="stepDesc(key)"></span>
        </div>
        <span class="onboarding-step-state" x-show="steps[key]" x-text="$app.t('onboarding.stepDone')"></span>
        <button type="button" class="secondary onboarding-step-cta" x-show="!steps[key]"
                @click="doStep(key)" x-text="stepCta(key)"></button>
      </li>
    </template>
  </ul>

  <div class="onboarding-demo">
    <div class="onboarding-demo-text">
      <span class="onboarding-demo-title" x-text="$app.t('onboarding.demo.title')"></span>
      <span class="onboarding-demo-desc" x-text="$app.t('onboarding.demo.desc')"></span>
    </div>
    <button type="button" class="primary" @click="importDemo()" :disabled="demoBusy"
            x-text="demoBusy ? $app.t('onboarding.demo.busy') : $app.t('onboarding.demo.cta')"></button>
  </div>

  <p class="onboarding-error" x-show="error" x-cloak x-text="error"></p>

  <p class="onboarding-palette-hint" x-text="$app.t('onboarding.paletteHint')"></p>
</div>
