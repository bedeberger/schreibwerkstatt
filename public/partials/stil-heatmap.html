<!-- Stil-Heatmap: Kapitel × Metrik. Klick auf eine Zelle öffnet Treffer-Beispiele. -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/stil-card.js. Der
  `showStilCard`-Flag bleibt im Root (Hash-Router, Exklusivität), fachlicher
  State (stilData, stilLoading, …) lebt in dieser Komponente.
-->
<div class="card card--stil" x-data="stilCard" x-show="$app.showStilCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('stil.title')"></span>
      <div class="card-subline" x-show="stilData?.last_updated && !stilSyncing && !stilLoading">
        <span class="card-timestamp" x-text="stilLastUpdatedLabel()"></span>
      </div>
    </div>
    <div class="card-header-aside">
      <div class="card-actions">
        <button type="button" class="icon-btn icon-btn--ghost" @click="runStilSync()" :disabled="stilSyncing || stilLoading"
                :data-tip="$app.t('stil.recompute')" :aria-label="$app.t('stil.recompute')">
          <span x-show="stilSyncing" class="spinner"></span>
          <svg x-show="!stilSyncing" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div x-show="stilStatus" class="card-status" x-html="stilStatus"></div>

  <div x-show="!stilLoading && !stilSyncing && (!stilData?.pages || stilData.pages.length === 0)"
       class="muted-msg muted-msg--spaced" x-text="$app.t('stil.emptyState')"></div>

  <template x-if="stilData?.pages?.length > 0">
    <div class="heatmap-wrap">
      <div class="heatmap-legend" x-text="$app.t('stil.legend')"></div>

      <div class="heatmap-scroll">
        <table class="heatmap-table">
          <thead>
            <tr>
              <th class="heatmap-rowhead" x-text="$app.t('stil.chapter')"></th>
              <th class="heatmap-numcol" x-text="$app.t('stil.words')"></th>
              <template x-for="m in stilMetricDefs" :key="m.key">
                <th :data-tip="$app.t('stil.tip.' + m.key)">
                  <span x-text="$app.t(m.label)"></span>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="c in stilChaptersAggregated()" :key="c.key">
              <tr>
                <th class="heatmap-rowhead" scope="row">
                  <span class="heatmap-rowhead-main"
                        :class="{ 'internal-link': c.key !== '__uncat__' }"
                        @click="c.key !== '__uncat__' && stilJumpToChapter(c.key)"
                        x-text="c.name"></span>
                  <span class="heatmap-rowhead-sub" x-text="$app.t('stil.pagesCount', { n: c.pageCount })"></span>
                </th>
                <td class="heatmap-numcol" x-text="(c.words || 0).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH')"></td>
                <template x-for="m in stilMetricDefs" :key="m.key">
                  <td class="heatmap-cell"
                      :class="[
                        ('heatmap-cell--' + stilCellKind(c[m.key], m.key, stilChaptersAggregated())),
                        {
                          'heatmap-cell--clickable': stilIsClickableMetric(m.key) && (c[m.key] || 0) > 0,
                          'heatmap-cell--active': activeStilDetailKey === (c.key + ':' + m.key),
                        }
                      ]"
                      :style="stilCellVars(c[m.key], m.key, stilChaptersAggregated())"
                      @click="stilIsClickableMetric(m.key) && (c[m.key] || 0) > 0 && toggleStilDetail(c.key, m.key)"
                      x-text="stilFormat(c[m.key], m.key)">
                  </td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Detail-Panel: Treffer-Beispiele für die angeklickte Zelle -->
      <template x-if="stilActiveDetail()">
        <div class="heatmap-detail">
          <div class="heatmap-detail-header">
            <span class="heatmap-detail-title"
                  x-text="$app.t('stil.detail.title', {
                    metric: stilActiveDetail().metricLabel,
                    chapter: stilActiveDetail().chapterName,
                  })"></span>
            <button type="button" class="heatmap-detail-close"
                    @click="activeStilDetailKey = null"
                    x-text="$app.t('common.close')"></button>
          </div>
          <div class="heatmap-detail-list">
            <template x-if="stilActiveDetail().entries.length === 0">
              <div class="muted-msg" x-text="$app.t('stil.detail.empty')"></div>
            </template>
            <template x-for="page in stilActiveDetail().entries" :key="page.page_id">
              <div class="heatmap-detail-page">
                <div class="heatmap-detail-page-header">
                  <span class="tag internal-link"
                        @click="stilJumpToPage(page.page_id)"
                        x-text="page.page_name"></span>
                  <span class="heatmap-detail-page-count" x-text="$app.t('fehlerHeatmap.detail.countLabel', { n: page.count })"></span>
                </div>
                <template x-if="page.samples">
                  <div class="heatmap-detail-token-groups">
                    <template x-for="(g, i) in stilGroupSamplesByToken(page.samples)" :key="i">
                      <div class="heatmap-detail-token-group">
                        <span class="tag stil-repetition-word heatmap-detail-token" x-text="g.token"></span>
                        <div class="heatmap-detail-token-sentences">
                          <template x-for="(sentence, j) in g.sentences" :key="j">
                            <span class="heatmap-detail-original" x-text="sentence"></span>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="page.words">
                  <div class="stil-repetitions-words">
                    <template x-for="w in page.words" :key="w.token">
                      <span class="tag stil-repetition-word" x-text="w.token + ' · ' + w.count"></span>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
