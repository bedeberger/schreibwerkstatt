<!-- Komplettanalyse: Primärbutton mit eingebettetem Fortschrittsring + Status-/Aktionsmenü (⋯) -->
<div class="komplett-status-wrap" @click.outside="showKomplettStatus = false" @mouseenter="if ($store.jobs.alleAktualisierenLoading) showKomplettStatus = true">
  <button type="button"
          class="update-all-btn"
          :class="{ 'update-all-btn--running': $store.jobs.alleAktualisierenLoading }"
          @click="alleAktualisieren()"
          :disabled="$store.jobs.alleAktualisierenLoading || !$store.nav.selectedBookId"
          :data-tip="t('header.updateAllTitle')">
    <span class="update-all-btn-ring"
          x-show="$store.jobs.alleAktualisierenLoading"
          :style="{ '--progress': ($store.jobs.alleAktualisierenProgress || 0) + '%' }"
          aria-hidden="true"></span>
    <span class="update-all-btn-icon" x-show="!$store.jobs.alleAktualisierenLoading" aria-hidden="true">
      <svg class="icon"><use href="/icons.svg?v=691#rotate-cw"/></svg>
    </span>
    <span class="update-all-btn-label" x-text="t('header.updateAll')"></span>
  </button>
  <button type="button"
          class="icon-btn icon-btn--ghost"
          :class="{ 'is-active': showKomplettStatus }"
          @click="showKomplettStatus = !showKomplettStatus"
          :disabled="!$store.nav.selectedBookId"
          :data-tip="t('header.statusMenu')"
          :aria-label="t('header.statusMenu')"
          aria-haspopup="menu"
          :aria-expanded="showKomplettStatus">
    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#more-horizontal"/></svg>
  </button>
  <span class="komplett-last-run"
        x-show="!$store.jobs.alleAktualisierenLoading && $store.jobs.alleAktualisierenLastRun"
        x-cloak
        x-text="t('common.asOf', { date: $store.jobs.alleAktualisierenLastRun })"></span>
  <div class="komplett-status-panel" x-show="showKomplettStatus" x-cloak role="menu">
    <div class="komplett-status-title" x-text="t('komplett.title')"></div>
    <div class="komplett-status-laststamp" x-show="$store.jobs.alleAktualisierenLastRun" x-cloak
         x-text="t('common.asOf', { date: $store.jobs.alleAktualisierenLastRun })"></div>
    <template x-if="$store.jobs.alleAktualisierenLoading || $store.jobs.alleAktualisierenLastRun">
      <div class="komplett-status-progress">
        <div class="progress-bar-wrap komplett-progress-bar-wrap">
          <div class="progress-bar" :style="{ '--progress': $store.jobs.alleAktualisierenProgress + '%' }"></div>
        </div>
        <div class="komplett-progress-label">
          <span x-text="$store.jobs.alleAktualisierenStatus || t('komplett.done')"></span>
          <span x-show="$store.jobs.alleAktualisierenTokIn > 0 || $store.jobs.alleAktualisierenTokOut > 0" class="komplett-tokens">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#arrow-up"/></svg><span x-text="_fmtTok($store.jobs.alleAktualisierenTokIn)"></span>
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#arrow-down"/></svg><span x-text="_fmtTok($store.jobs.alleAktualisierenTokOut)"></span>
            <span x-show="$store.jobs.alleAktualisierenTps" x-text="' · ' + Math.round($store.jobs.alleAktualisierenTps) + ' tok/s'"></span>
          </span>
        </div>
        <ul class="komplett-phase-list" x-show="_komplettPhasen().length">
          <template x-for="phase in _komplettPhasen()" :key="phase.key || phase.label">
            <li class="komplett-phase-item" :class="{ 'is-done': phase.done, 'is-active': phase.active }">
              <span class="komplett-phase-icon">
                <svg class="icon" aria-hidden="true"><use :href="phase.done ? '/icons.svg?v=691#check' : (phase.active ? '/icons.svg?v=691#play' : '/icons.svg?v=691#circle')"/></svg>
              </span>
              <span x-text="phase.label"></span>
            </li>
          </template>
        </ul>
      </div>
    </template>
    <ul class="komplett-warnings" x-show="!$store.jobs.alleAktualisierenLoading && $store.jobs.alleAktualisierenWarnings.length" x-cloak>
      <template x-for="w in $store.jobs.alleAktualisierenWarnings" :key="w.key">
        <li class="komplett-warning-item" x-text="t(w.key, w.params)"></li>
      </template>
    </ul>
    <div class="komplett-coverage" x-cloak
         x-show="!$store.jobs.alleAktualisierenLoading && $store.jobs.alleAktualisierenCoverage && $store.jobs.alleAktualisierenCoverage.score !== null"
         :class="{ 'komplett-coverage--low': ($store.jobs.alleAktualisierenCoverage?.score ?? 1) < 0.8 }"
         :data-tip="t('komplett.coverageTip', { erkannt: $store.jobs.alleAktualisierenCoverage?.erkannt || 0, fehlend: $store.jobs.alleAktualisierenCoverage?.fehlend || 0, chapters: $store.jobs.alleAktualisierenCoverage?.sampledChapters || 0 })">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#check"/></svg>
      <span x-text="t('komplett.coverageLabel', { score: Math.round(($store.jobs.alleAktualisierenCoverage?.score || 0) * 100) })"></span>
    </div>
    <div class="komplett-status-actions">
      <button type="button"
              class="komplett-status-action-btn"
              role="menuitem"
              @click="showKomplettStatus = false; clearChapterCache()"
              :disabled="$store.jobs.alleAktualisierenLoading || !$store.nav.selectedBookId"
              :data-tip="t('header.clearCacheTitle')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#trash"/></svg>
        <span x-text="t('header.clearCache')"></span>
      </button>
    </div>
  </div>
</div>
