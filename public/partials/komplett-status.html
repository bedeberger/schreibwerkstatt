<!-- Komplettanalyse: Primärbutton mit eingebettetem Fortschrittsring + Cache-Clear + Status-Panel -->
<div class="komplett-status-wrap" @click.outside="showKomplettStatus = false" @mouseenter="if (alleAktualisierenLoading) showKomplettStatus = true" :data-lastrun="(!alleAktualisierenLoading && alleAktualisierenLastRun) ? t('common.asOf', { date: alleAktualisierenLastRun }) : null">
  <button type="button"
          class="update-all-btn"
          :class="{ 'update-all-btn--running': alleAktualisierenLoading }"
          @click="alleAktualisieren()"
          :disabled="alleAktualisierenLoading || !selectedBookId"
          :data-tip="t('header.updateAllTitle')">
    <span class="update-all-btn-ring"
          x-show="alleAktualisierenLoading"
          :style="{ '--progress': (alleAktualisierenProgress || 0) + '%' }"
          aria-hidden="true"></span>
    <span class="update-all-btn-icon" x-show="!alleAktualisierenLoading" aria-hidden="true">↻</span>
    <span class="update-all-btn-label" x-text="t('header.updateAll')"></span>
  </button>
  <button type="button"
          class="header-icon-btn header-icon-btn--cache"
          @click="clearChapterCache()"
          :disabled="alleAktualisierenLoading || !selectedBookId"
          :data-tip="t('header.clearCacheTitle')"
          :aria-label="t('header.clearCache')">
    <span aria-hidden="true">⌫</span>
  </button>
  <div class="komplett-status-panel" x-show="showKomplettStatus" x-cloak>
    <div class="komplett-status-title" x-text="t('komplett.title')"></div>
    <div class="progress-bar-wrap komplett-progress-bar-wrap">
      <div class="progress-bar" :style="{ '--progress': alleAktualisierenProgress + '%' }"></div>
    </div>
    <div class="komplett-progress-label">
      <span x-text="alleAktualisierenStatus || t('komplett.done')"></span>
      <span x-show="alleAktualisierenTokIn > 0 || alleAktualisierenTokOut > 0" class="komplett-tokens">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=635#arrow-up"/></svg><span x-text="_fmtTok(alleAktualisierenTokIn)"></span>
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=635#arrow-down"/></svg><span x-text="_fmtTok(alleAktualisierenTokOut)"></span>
        <span x-show="alleAktualisierenTps" x-text="' · ' + Math.round(alleAktualisierenTps) + ' tok/s'"></span>
      </span>
    </div>
    <ul class="komplett-phase-list">
      <template x-for="phase in _komplettPhasen()" :key="phase.key || phase.label">
        <li class="komplett-phase-item" :class="{ 'is-done': phase.done, 'is-active': phase.active }">
          <span class="komplett-phase-icon">
            <svg class="icon" aria-hidden="true"><use :href="phase.done ? '/icons.svg?v=635#check' : (phase.active ? '/icons.svg?v=635#play' : '/icons.svg?v=635#circle')"/></svg>
          </span>
          <span x-text="phase.label"></span>
        </li>
      </template>
    </ul>
  </div>
</div>
