<!-- Plot-Werkstatt (Beat-Board) -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/plot-card.js.
  Akte = Spalten (plot_acts), Beats = Karten (plot_beats), Stränge = Swimlane-Zeilen
  (plot_threads). Render-Weiche: ohne Strang flaches Board (plot-board-flat.html),
  mit ≥1 Strang das Akte×Stränge-Grid (plot-board-grid.html). Zwei KI-Jobs:
  Brainstorm (Beats vorschlagen) + Consistency (geplant vs. Buchrealität prüfen).
  Rahmen + verschachtelte Partials (File-Limit) via _loadPartials-Cascade.
-->
<div class="card card--plot" x-data="plotCard" x-show="$app.showPlotCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('plot.title')"></span>
      <div class="card-subline" x-show="acts.length > 0">
        <span class="card-timestamp"
              x-text="$app.t('plot.stats', { total: boardStats().total })"></span>
      </div>
    </div>
    <div class="card-header-aside">
      <button type="button" class="icon-btn icon-btn--ghost"
              @click="runConsistency()"
              :disabled="consistencyLoading || !beats.length"
              :data-tip="$app.t('plot.consistency.run')" :aria-label="$app.t('plot.consistency.run')">
        <span x-show="consistencyLoading" class="spinner"></span>
        <svg x-show="!consistencyLoading" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg>
      </button>
      <button type="button" class="icon-btn"
              :aria-pressed="plotFullscreen"
              @click="togglePlotFullscreen()"
              :aria-label="plotFullscreen ? $app.t('plot.fullscreenExit.tip') : $app.t('plot.fullscreen.tip')"
              :data-tip="plotFullscreen ? $app.t('plot.fullscreenExit.tip') : $app.t('plot.fullscreen.tip')"><svg class="icon" aria-hidden="true"><use :href="plotFullscreen ? '/icons.svg?v=691#minimize-2' : '/icons.svg?v=691#maximize-2'"/></svg></button>
    </div>
  </div>

  <!-- Status-Verteilung (board-weit): segmentierter Balken + Legende -->
  <div class="plot-progress" x-show="Object.values(boardStats().by).filter(n => n > 0).length > 1" x-cloak>
    <div class="plot-dist-bar">
      <template x-for="s in statusList()" :key="s">
        <div class="plot-dist-seg" :class="'plot-dist-seg--' + s"
             x-show="boardStats().by[s] > 0"
             :style="{ '--seg-grow': boardStats().by[s] }"
             :data-tip="$app.t('plot.status.' + s) + ': ' + boardStats().by[s]"></div>
      </template>
    </div>
    <div class="plot-progress-legend">
      <template x-for="s in statusList()" :key="s">
        <span class="plot-legend-item" x-show="boardStats().by[s] > 0">
          <span class="plot-legend-swatch" :class="'plot-dist-seg--' + s"></span>
          <span x-text="$app.t('plot.status.' + s) + ' · ' + boardStats().by[s]"></span>
        </span>
      </template>
    </div>
  </div>

  <!-- Fehler -->
  <div x-show="errorMessage" class="card-status card-status--error" x-text="errorMessage"></div>

  <!-- Skeleton -->
  <div x-show="loading && !acts.length" class="card-status" x-text="$app.t('plot.loading')"></div>

  <!-- Leer-Hinweis -->
  <div x-show="!acts.length && !loading" class="card-empty">
    <p x-text="$app.t('plot.empty.hint')"></p>
    <button type="button" class="btn-primary" @click="addingAct = true; $nextTick(() => $el.parentElement.querySelector('.plot-new-act-input')?.focus())"
            x-show="!addingAct" x-text="$app.t('plot.empty.addAct')"></button>
  </div>

  <!-- Filter-Leiste (Volltext / Kapitel / Figur) — filtert die Beats pro Akt-Spalte/Zelle.
       Such-Feld ist Filter (kein Spellcheck — User sucht ggf. nach Tippfehlern). -->
  <div class="filter-bar" x-show="beats.length > 0" x-cloak>
    <span class="filter-search-wrap">
      <input type="text" class="filter-search-input" x-model.debounce.200ms="plotFilters.text"
             :placeholder="$app.t('plot.filter.searchPlaceholder')"
             :aria-label="$app.t('plot.filter.searchPlaceholder')">
      <button type="button" class="search-clear--icon" x-show="plotFilters.text" @click="plotFilters.text=''" :aria-label="$app.t('search.clear')" :data-tip="$app.t('search.clear')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg></button>
    </span>
    <div x-data="catalogFilter('figur')"
         x-modelable="value" x-model="plotFilters.figurId"
         x-effect="options = $app.figuren.filter(f => beats.some(b => (b.fig_ids||[]).includes(f.id))).map(f => ({value: f.id, label: f.kurzname || f.name}))">
    </div>
    <div x-data="catalogFilter('werkstattFigur')"
         x-show="beats.some(b => (b.draft_fig_ids||[]).length)"
         x-modelable="value" x-model="plotFilters.draftFigurId"
         x-effect="options = draftFiguren.filter(d => beats.some(b => (b.draft_fig_ids||[]).includes(d.id))).map(d => ({value: d.id, label: d.name}))">
    </div>
    <div x-data="catalogFilter('chapter')"
         x-modelable="value" x-model="plotFilters.kapitel"
         x-effect="options = plotKapitelListe().map(k => ({value: k, label: k}))">
    </div>
    <span class="filter-count" x-text="filteredBeatCount() + ' / ' + beats.length"></span>
  </div>

  <!-- Kapitel-Coverage (lokal, kein KI-Job): offene Kapitel + kapellose Beats.
       Klappbar, sichtbar erst sobald geplant wird und es etwas zu melden gibt. -->
  <div class="plot-coverage" x-show="beats.length > 0 && plotCoverageRelevant()" x-cloak x-data="collapsible(false)">
    <button type="button" class="collapsible-toggle" x-bind="trigger">
      <span class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
      <span x-text="$app.t('plot.coverage.title')"></span>
    </button>
    <div class="plot-coverage-body" x-bind="panel" x-cloak>
      <div class="plot-coverage-group" x-show="plotCoverage().uncovered.length">
        <span class="entity-meta-label" x-text="$app.t('plot.coverage.uncovered', { n: plotCoverage().uncovered.length })"></span>
        <div class="plot-coverage-chips">
          <template x-for="name in plotCoverage().uncovered" :key="name">
            <span class="kapitel-badge internal-link" @click="$app.openKapitelByName(name)" x-text="name"></span>
          </template>
        </div>
      </div>
      <div class="plot-coverage-group" x-show="plotCoverage().beatsNoChapter">
        <span class="entity-meta-label" x-text="$app.t('plot.coverage.noChapter', { n: plotCoverage().beatsNoChapter })"></span>
      </div>
    </div>
  </div>

  <!-- Spannungsbogen: Intensität der Beats (1–5) als Kurve. Ohne Stränge eine
       globale Kurve in Board-Lesereihenfolge; mit Strängen je Strang eine eigene
       farbige Kurve. Sichtbar ab 2 nicht-verworfenen Beats mit Intensität. -->
  <div class="plot-tension" x-show="tensionCurve().count >= 2" x-cloak x-data="collapsible(true)">
    <button type="button" class="collapsible-toggle plot-tension-toggle" x-bind="trigger">
      <span class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
      <span x-text="$app.t('plot.tension.title')"></span>
    </button>
    <div class="plot-tension-body" x-bind="panel" x-cloak>
      <div class="plot-tension-chart">
        <span class="plot-tension-axis plot-tension-axis--high" x-text="$app.t('plot.tension.high')"></span>
        <span class="plot-tension-axis plot-tension-axis--low" x-text="$app.t('plot.tension.low')"></span>
        <!-- ohne Stränge: eine Kurve (CSS-Stroke). x-for/x-if NIE direkt ins <svg>
             (SVG-namespaced <template> hat keine .content → Alpine-importNode bricht);
             darum pro Zweig ein eigenständiges, überlagertes <svg>. -->
        <template x-if="!tensionCurve().series.length">
          <svg class="plot-tension-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <polyline :points="tensionCurve().polyline" vector-effect="non-scaling-stroke" />
          </svg>
        </template>
        <!-- mit Strängen: pro Strang ein eigenes (überlagertes) <svg> mit farbiger Kurve -->
        <template x-for="s in tensionCurve().series" :key="s.key">
          <svg class="plot-tension-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <polyline :points="s.polyline" vector-effect="non-scaling-stroke" :style="{ stroke: threadAccent(s.thread) }" />
          </svg>
        </template>
        <!-- Punkte ohne Stränge -->
        <template x-for="p in (tensionCurve().series.length ? [] : tensionCurve().points)" :key="p.beat.id">
          <button type="button" class="plot-tension-dot"
                  :style="{ left: p.xPct + '%', bottom: p.bottomPct + '%', '--col-accent': p.color }"
                  @click="startEditBeat(p.beat)"
                  :data-tip="(p.act ? p.act.name + ' · ' : '') + p.beat.titel + ' (' + p.beat.intensitaet + '/5)'"
                  :aria-label="p.beat.titel"></button>
        </template>
        <!-- Punkte je Strang -->
        <template x-for="s in tensionCurve().series" :key="s.key">
          <template x-for="p in s.points" :key="p.beat.id">
            <button type="button" class="plot-tension-dot"
                    :style="{ left: p.xPct + '%', bottom: p.bottomPct + '%', '--col-accent': threadAccent(s.thread) }"
                    @click="startEditBeat(p.beat)"
                    :data-tip="s.label + ' · ' + p.beat.titel + ' (' + p.beat.intensitaet + '/5)'"
                    :aria-label="p.beat.titel"></button>
          </template>
        </template>
      </div>
    </div>
  </div>

  <!-- Strang-Leiste (Opt-in-Einstieg zu den Swimlanes) -->
  <div id="partial-plot-thread-bar"></div>

  <!-- Board: flach (ohne Stränge) ODER Akte×Stränge-Grid (mit Strängen) -->
  <div id="partial-plot-board-flat"></div>
  <div id="partial-plot-board-grid"></div>

  <!-- Consistency unterhalb des Boards: Fortschritt + KI-Ergebnis, gefolgt von der
       Prüfungs-Historie ganz unten. Run-Button sitzt im Card-Header. -->
  <div x-show="consistencyLoading" class="plot-job-bar">
    <div class="progress-bar-wrap" x-show="consistencyProgress > 0">
      <div class="progress-bar" :style="{ '--progress': consistencyProgress + '%' }"></div>
    </div>
    <div class="plot-job-bar-row">
      <span class="card-status" x-show="consistencyStatus" x-html="consistencyStatus"></span>
      <button type="button" class="btn-compact btn-compact--ghost" @click="cancelConsistency()" x-text="$app.t('plot.consistency.cancel')"></button>
    </div>
  </div>

  <div x-show="consistencyResult" class="plot-consistency-panel" x-cloak>
    <div class="plot-consistency-head">
      <span class="bewertung-section-title" x-text="$app.t('plot.consistency.title')"></span>
      <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="dismissConsistency()" :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
      </button>
    </div>
    <p class="plot-consistency-fazit" x-show="consistencyResult && consistencyResult.fazit" x-text="consistencyResult && consistencyResult.fazit"></p>
    <div x-show="consistencyResult && !consistencyResult.konflikte.length" class="card-status" x-text="$app.t('plot.consistency.noFindings')"></div>
    <div class="plot-konflikt-list">
      <template x-for="(k, idx) in (consistencyResult ? consistencyResult.konflikte : [])" :key="idx">
        <div class="plot-konflikt" :class="{ 'plot-konflikt--open': selectedKonfliktIdx === idx }"
             @click="selectedKonfliktIdx = selectedKonfliktIdx === idx ? null : idx">
          <div class="plot-konflikt-head">
            <span class="severity-tag" :class="'severity-tag--' + k.schwere" x-text="$app.t('plot.severity.' + k.schwere)"></span>
            <span class="plot-konflikt-beat" :class="{ 'internal-link': k.beat && k.beat !== '—' }"
                  :data-tip="(k.beat && k.beat !== '—') ? $app.t('plot.consistency.gotoBeat') : null"
                  @click="if (k.beat && k.beat !== '—') { gotoKonfliktBeat(k); $event.stopPropagation(); }"
                  x-text="k.beat"></span>
            <span class="plot-konflikt-problem" x-text="k.problem"></span>
            <span class="history-chevron" :class="{ open: selectedKonfliktIdx === idx }" aria-hidden="true"></span>
          </div>
          <div x-show="selectedKonfliktIdx === idx && k.vorschlag" class="plot-konflikt-vorschlag" x-cloak>
            <span class="entity-meta-label" x-text="$app.t('plot.consistency.suggestion')"></span>
            <span x-text="k.vorschlag"></span>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Konsistenz-Prüfungs-Historie: persistierte Läufe pro Buch. Klick lädt das
       Result oberhalb ins Consistency-Panel (selectedRunId). Wie Werkstatt-Run-Verlauf. -->
  <div class="history-bar" x-show="consistencyRuns.length > 0" x-cloak>
    <div class="history-heading" x-text="$app.t('plot.consistency.runs', { count: consistencyRuns.length })"></div>
    <template x-for="r in consistencyRuns" :key="r.id">
      <div class="history-item" :class="{ 'history-item--open': selectedRunId === r.id }"
           @click="openConsistencyRun(r.id)">
        <span class="history-date" x-text="formatRunDate(r.created_at)"></span>
        <span class="tag" x-text="$app.t('plot.consistency.konfliktCount', { n: r.konflikt_count })"></span>
        <span x-show="r.model" class="tag" x-text="r.model"></span>
        <span class="history-chevron" :class="{ open: selectedRunId === r.id }" aria-hidden="true"></span>
        <button type="button" class="history-item-delete"
                @click.stop="deleteConsistencyRun(r.id)"
                :data-tip="$app.t('common.deleteEntry')"
                :aria-label="$app.t('common.deleteEntry')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#trash"/></svg></button>
      </div>
    </template>
  </div>

  <!-- Brainstorm-Lauf-Historie: persistierte Läufe pro Buch (zusätzlich pro Akt/
       Strang). Klick lädt die Vorschläge zurück ins Inline-Panel des Akts/der Zelle
       (selectedBrainstormRunId). Läufe mit gelöschtem Akt sind nicht reaktivierbar. -->
  <div class="history-bar" x-show="brainstormRuns.length > 0" x-cloak>
    <div class="history-heading" x-text="$app.t('plot.brainstorm.runs', { count: brainstormRuns.length })"></div>
    <template x-for="r in brainstormRuns" :key="r.id">
      <div class="history-item" :class="{ 'history-item--open': selectedBrainstormRunId === r.id, 'history-item--disabled': r.act_id === null }"
           @click="r.act_id !== null && openBrainstormRun(r)">
        <span class="history-date" x-text="formatRunDate(r.created_at)"></span>
        <span class="tag" x-text="r.act_name || $app.t('plot.brainstorm.actDeleted')"></span>
        <span x-show="r.thread_name" class="tag tag--werkstatt" x-text="r.thread_name"></span>
        <span class="tag" x-text="$app.t('plot.brainstorm.vorschlagCount', { n: r.vorschlag_count })"></span>
        <span x-show="r.model" class="tag" x-text="r.model"></span>
        <span class="history-chevron" :class="{ open: selectedBrainstormRunId === r.id }" aria-hidden="true" x-show="r.act_id !== null"></span>
        <button type="button" class="history-item-delete"
                @click.stop="deleteBrainstormRun(r.id)"
                :data-tip="$app.t('common.deleteEntry')"
                :aria-label="$app.t('common.deleteEntry')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#trash"/></svg></button>
      </div>
    </template>
  </div>
</div>
