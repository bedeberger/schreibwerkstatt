<!-- Plot-Werkstatt: Swimlane-Grid (Akte = Spalten × Stränge = Zeilen), gerendert
     sobald mindestens ein Strang existiert (Render-Weiche in plot.html). Eine
     Zelle = (Akt, Strang); Beats werden per DnD zwischen Zellen verschoben.

     Hybrid-Akte: ein Strang kann eine EIGENE Aktstruktur haben. Darum rendert das
     Board nicht eine starre Akt×Strang-Matrix, sondern eine flache Liste von Zeilen-
     Deskriptoren (gridRows()): die GETEILTE Region (ein Header + alle Lanes ohne
     eigene Akte, inkl. „ohne Strang") und darunter pro Strang mit eigener Struktur
     ein eigener Header + seine Lane (eigene Spaltenzahl). Eine x-for-Schleife, je
     Deskriptor ein Header- ODER Lane-Block (display:contents-Wrapper) — so bleibt
     das Beat-Zell-Markup an EINER Stelle.
     Beat-Markup (Ansicht/Bearbeiten) ist mit plot-board-flat.html synchron zu halten. -->
<div class="plot-swimlane" x-show="threads.length" x-cloak>
  <div class="plot-swim">

    <template x-for="row in gridRows()" :key="row.key">
      <div class="plot-swim-rowgroup">

        <!-- ── Kopfzeile (geteilt ODER strang-eigen) ─────────────────────────── -->
        <template x-if="row.kind === 'header'">
          <div class="plot-swim-row plot-swim-row--header" :class="{ 'plot-swim-row--ownhead': row.thread }">
            <div class="plot-swim-corner" :class="{ 'plot-swim-corner--thread': row.thread }"
                 x-text="row.thread ? row.thread.name : $app.t('plot.thread.axisLabel')"></div>
            <template x-for="act in row.acts" :key="act.id">
              <div class="plot-swim-acthead" :style="{ '--col-accent': actAccent(act) }">
                <div class="plot-color-swatch-wrap" x-show="editingActId !== act.id">
                  <button type="button" class="plot-color-swatch"
                          @click.stop="toggleActColorPicker(act.id)"
                          :data-tip="$app.t('plot.act.color')" :aria-label="$app.t('plot.act.color')"></button>
                  <div class="plot-color-popover" x-show="actColorPickerId === act.id" x-cloak
                       @click.outside="actColorPickerId === act.id && (actColorPickerId = null)">
                    <button type="button" class="plot-color-opt plot-color-opt--none"
                            :class="{ 'plot-color-opt--on': !act.farbe }"
                            @click="setActColor(act, null)"
                            :data-tip="$app.t('plot.act.colorNone')" :aria-label="$app.t('plot.act.colorNone')"></button>
                    <template x-for="key in actPalette()" :key="key">
                      <button type="button" class="plot-color-opt"
                              :style="{ '--col-accent': 'var(--palette-' + key + ')' }"
                              :class="{ 'plot-color-opt--on': act.farbe === key }"
                              @click="setActColor(act, key)" :aria-label="key"></button>
                    </template>
                  </div>
                </div>
                <template x-if="editingActId !== act.id">
                  <span class="plot-column-title" @dblclick="startEditAct(act)" x-text="act.name"></span>
                </template>
                <template x-if="editingActId === act.id">
                  <input type="text" class="plot-column-title-input" x-model="actDraft"
                         data-spellcheck="spelling"
                         @keydown.enter="saveEditAct(act)" @keydown.escape="cancelEditAct()"
                         @blur="onActBlur(act, $event)">
                </template>
                <div class="plot-column-actions">
                  <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="moveAct(act, -1)" :data-tip="$app.t('plot.act.moveLeft')" :aria-label="$app.t('plot.act.moveLeft')">
                    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#chevron-left"/></svg>
                  </button>
                  <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="moveAct(act, 1)" :data-tip="$app.t('plot.act.moveRight')" :aria-label="$app.t('plot.act.moveRight')">
                    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#chevron-right"/></svg>
                  </button>
                  <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="startEditAct(act)" :data-tip="$app.t('plot.act.rename')" :aria-label="$app.t('plot.act.rename')">
                    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#pencil"/></svg>
                  </button>
                  <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn plot-icon-btn--danger" @click="deleteAct(act)" :data-tip="$app.t('plot.act.delete')" :aria-label="$app.t('plot.act.delete')">
                    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#trash"/></svg>
                  </button>
                </div>
              </div>
            </template>

            <!-- Akt hinzufügen (scoped: geteilt bzw. dieser Strang) -->
            <div class="plot-swim-acthead plot-swim-acthead--add"
                 :data-add-act-scope="row.thread ? String(row.thread.id) : 'shared'">
              <template x-if="addingActScope !== (row.thread ? row.thread.id : null)">
                <button type="button" class="plot-add-act-btn plot-add-act-btn--head"
                        @click="startAddAct(row.thread ? row.thread.id : null)"
                        :data-tip="$app.t('plot.addAct')" :aria-label="$app.t('plot.addAct')">
                  <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#plus"/></svg>
                </button>
              </template>
              <template x-if="addingActScope === (row.thread ? row.thread.id : null)">
                <div class="plot-add-act-form">
                  <input type="text" class="plot-new-act-input" x-model="newActName"
                         data-spellcheck="spelling" :placeholder="$app.t('plot.act.namePlaceholder')"
                         @keydown.enter="addActScoped()" @keydown.escape="cancelAddAct()">
                  <div class="plot-add-act-actions">
                    <button type="button" class="btn-compact" @click="addActScoped()" :disabled="busy" x-text="$app.t('plot.act.add')"></button>
                    <button type="button" class="btn-compact btn-compact--ghost" @click="cancelAddAct()" x-text="$app.t('common.cancel')"></button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- ── Strang-Zeile (Lane-Label + Zellen) ────────────────────────────── -->
        <template x-if="row.kind === 'lane'">
          <div class="plot-swim-row" :class="{ 'plot-swim-row--default': row.lane.isDefault }">

            <!-- Lane-Label (sticky links) -->
            <div class="plot-swim-lane"
                 :style="{ '--col-accent': row.lane.thread ? threadAccent(row.lane.thread) : 'var(--card-accent)' }">

              <!-- „ohne Strang"-Lane -->
              <template x-if="row.lane.isDefault">
                <span class="plot-swim-lane-name plot-swim-lane-name--muted" x-text="$app.t('plot.thread.noThread')"></span>
              </template>

              <!-- Strang-Lane: Ansicht -->
              <template x-if="row.lane.thread && editingThreadId !== row.lane.id">
                <div class="plot-swim-lane-view">
                  <div class="plot-color-swatch-wrap">
                    <button type="button" class="plot-color-swatch"
                            @click.stop="toggleThreadColorPicker(row.lane.id)"
                            :data-tip="$app.t('plot.thread.color')" :aria-label="$app.t('plot.thread.color')"></button>
                    <div class="plot-color-popover" x-show="threadColorPickerId === row.lane.id" x-cloak
                         @click.outside="threadColorPickerId === row.lane.id && (threadColorPickerId = null)">
                      <button type="button" class="plot-color-opt plot-color-opt--none"
                              :class="{ 'plot-color-opt--on': !row.lane.thread.farbe }"
                              @click="setThreadColor(row.lane.thread, null)"
                              :data-tip="$app.t('plot.act.colorNone')" :aria-label="$app.t('plot.act.colorNone')"></button>
                      <template x-for="key in actPalette()" :key="key">
                        <button type="button" class="plot-color-opt"
                                :style="{ '--col-accent': 'var(--palette-' + key + ')' }"
                                :class="{ 'plot-color-opt--on': row.lane.thread.farbe === key }"
                                @click="setThreadColor(row.lane.thread, key)" :aria-label="key"></button>
                      </template>
                    </div>
                  </div>
                  <div class="plot-swim-lane-text">
                    <span class="plot-swim-lane-name" @dblclick="startEditThread(row.lane.thread)" x-text="row.lane.thread.name"></span>
                    <span class="plot-swim-lane-figure internal-link" x-show="threadFigureLabel(row.lane.thread)"
                          @click.stop="row.lane.thread.fig_id ? $app.openFigurById(row.lane.thread.fig_id) : (row.lane.thread.draft_figure_id && $app.openWerkstattDraftById(row.lane.thread.draft_figure_id))"
                          x-text="threadFigureLabel(row.lane.thread)"></span>
                    <span class="plot-swim-lane-chapter internal-link" x-show="row.lane.thread.chapter_name"
                          @click.stop="$app.openKapitelByName(row.lane.thread.chapter_name)"
                          x-text="row.lane.thread.chapter_name"></span>
                    <span class="plot-swim-lane-ownacts" x-show="threadHasOwnActs(row.lane.id)" x-text="$app.t('plot.thread.ownActs')"></span>
                  </div>
                  <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn"
                          :class="{ 'is-active': threadActionsOpenId === row.lane.id }"
                          @click.stop="openThreadMenu($event, row.lane.id)"
                          aria-haspopup="menu" :aria-expanded="threadActionsOpenId === row.lane.id"
                          :data-tip="$app.t('plot.thread.actions')" :aria-label="$app.t('plot.thread.actions')">
                    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#more-horizontal"/></svg>
                  </button>
                </div>
              </template>

              <!-- Strang-Lane: Bearbeiten (Name + Figuren-/Kapitel-Bindung) -->
              <template x-if="row.lane.thread && editingThreadId === row.lane.id">
                <div class="plot-swim-lane-edit">
                  <input type="text" class="plot-thread-name-input" x-model="threadDraft.name"
                         data-spellcheck="spelling" :placeholder="$app.t('plot.thread.namePlaceholder')"
                         @keydown.enter.prevent="saveEditThread(row.lane.thread)" @keydown.escape="cancelEditThread()">
                  <label class="plot-edit-label" x-show="$store.catalog.figuren.length" x-text="$app.t('plot.thread.bindFigure')"></label>
                  <div x-show="$store.catalog.figuren.length"
                       x-data="entityPicker({ entity: 'figur', placeholder: $app.t('plot.thread.bindFigurePlaceholder'), emptyLabel: $app.t('plot.thread.noFigure') })"
                       x-modelable="value" x-model="threadDraft.figure_id"
                       @combobox-change="threadDraft.figure_id && (threadDraft.draft_figure_id = '')"></div>
                  <label class="plot-edit-label" x-show="draftFiguren.length" x-text="$app.t('plot.thread.bindDraftFigure')"></label>
                  <div x-show="draftFiguren.length"
                       x-data="entityPicker({ entity: 'werkstatt', placeholder: $app.t('plot.thread.bindFigurePlaceholder'), emptyLabel: $app.t('plot.thread.noFigure'), items: () => draftFiguren })"
                       x-modelable="value" x-model="threadDraft.draft_figure_id"
                       @combobox-change="threadDraft.draft_figure_id && (threadDraft.figure_id = '')"></div>
                  <label class="plot-edit-label" x-text="$app.t('plot.thread.bindChapter')"></label>
                  <div x-data="entityPicker({ entity: 'chapter', placeholder: $app.t('plot.beat.chapterPlaceholder'), emptyLabel: $app.t('plot.beat.noChapter') })"
                       x-modelable="value" x-model="threadDraft.chapter_id"></div>
                  <div class="plot-beat-edit-actions">
                    <button type="button" class="icon-btn icon-btn--ghost icon-btn--success plot-icon-btn" @click="saveEditThread(row.lane.thread)" :disabled="busy" :data-tip="$app.t('common.save')" :aria-label="$app.t('common.save')">
                      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#check"/></svg>
                    </button>
                    <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="cancelEditThread()" :data-tip="$app.t('common.cancel')" :aria-label="$app.t('common.cancel')">
                      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
                    </button>
                  </div>
                </div>
              </template>
            </div>

            <!-- Zellen (Akt × Strang) -->
            <template x-for="act in row.acts" :key="act.id">
              <div class="plot-swim-cell">

                <!-- SortableJS-Container der Zelle: nur x-for-Anker + Beat-Karten.
                     thread_id leer = „ohne Strang"-Lane (dnd.js parst → NULL). -->
                <div class="plot-beats" data-plot-cell :data-act-id="act.id"
                     :data-thread-id="row.lane.id === null ? '' : row.lane.id">
                  <template x-for="beat in filteredBeatsForCell(act.id, row.lane.id)" :key="beat.id">
                    <div class="plot-beat" :data-beat-id="beat.id"
                         :class="{ ['plot-beat--' + beat.status]: true, 'plot-beat--verworfen': !!beat.verworfen, 'plot-beat--editing': editingBeatId === beat.id }">

                      <!-- Beat-Karte (Ansicht + Bearbeiten) — geteilt mit dem flachen Board.
                           SSoT: plot-beat-cell.html (string-seitiger Fragment-Include). -->
                      <!-- @include plot-beat-cell -->
                    </div>
                  </template>
                </div>

                <!-- Beat in dieser Zelle hinzufügen -->
                <template x-if="addingCell === (act.id + ':' + (row.lane.id === null ? 'null' : row.lane.id))">
                  <div class="plot-add-beat" :data-add-beat-cell="act.id + ':' + (row.lane.id === null ? 'null' : row.lane.id)">
                    <textarea class="plot-add-beat-input" x-model="newBeatTitel" rows="1"
                              data-spellcheck="spelling" :placeholder="$app.t('plot.beat.titelPlaceholder')"
                              @keydown.enter.prevent="saveNewBeatCell(act.id, row.lane.id)" @keydown.escape="cancelAddBeatCell()"
                              @blur="onAddBeatCellBlur(act.id, row.lane.id, $event)"></textarea>
                    <div class="plot-add-beat-actions">
                      <button type="button" class="btn-compact" @click="saveNewBeatCell(act.id, row.lane.id)" :disabled="busy" x-text="$app.t('plot.beat.add')"></button>
                      <button type="button" class="btn-compact btn-compact--ghost" @click="cancelAddBeatCell()" x-text="$app.t('common.cancel')"></button>
                    </div>
                  </div>
                </template>
                <div class="plot-swim-cell-foot" x-show="addingCell !== (act.id + ':' + (row.lane.id === null ? 'null' : row.lane.id))">
                  <button type="button" class="plot-add-beat-btn plot-add-beat-btn--cell" @click="startAddBeatCell(act.id, row.lane.id)"
                          :data-tip="$app.t('plot.addBeat')" :aria-label="$app.t('plot.addBeat')">
                    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#plus"/></svg>
                  </button>
                  <!-- Strang-Brainstorm pro Zelle (nur echte Stränge — Figuren-/Strang-Kontext) -->
                  <button type="button" class="plot-add-beat-btn plot-add-beat-btn--cell" x-show="row.lane.thread"
                          @click="runBrainstorm(act, row.lane.thread)" :disabled="brainstormLoading"
                          :data-tip="$app.t('plot.brainstorm.run')" :aria-label="$app.t('plot.brainstorm.run')">
                    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#zap"/></svg>
                  </button>
                </div>

                <!-- Brainstorm-Status + Ergebnis dieser Zelle -->
                <div class="plot-brainstorm-loading" x-show="brainstormLoading && brainstormActId === act.id && brainstormThreadId === row.lane.id">
                  <span class="card-status" x-html="brainstormStatus"></span>
                  <button type="button" class="btn-compact btn-compact--ghost" @click="cancelBrainstorm()" x-text="$app.t('plot.brainstorm.cancel')"></button>
                </div>
                <div class="plot-brainstorm-panel" x-show="brainstormResult && brainstormResult.actId === act.id && (brainstormResult.threadId ?? null) === row.lane.id" x-cloak>
                  <div class="plot-brainstorm-head">
                    <span class="entity-meta-label" x-text="$app.t('plot.brainstorm.title')"></span>
                    <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="dismissBrainstorm()" :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">
                      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
                    </button>
                  </div>
                  <template x-for="(v, idx) in (brainstormResult ? brainstormResult.vorschlaege : [])" :key="idx">
                    <div class="plot-vorschlag">
                      <div class="plot-vorschlag-body">
                        <span class="plot-vorschlag-label" x-text="v.label"></span>
                        <span class="plot-vorschlag-begruendung" x-show="v.begruendung" x-text="v.begruendung"></span>
                      </div>
                      <button type="button" class="btn-compact" @click="applyBrainstorm(idx)" :disabled="busy" x-text="$app.t('plot.brainstorm.apply')"></button>
                    </div>
                  </template>
                  <div x-show="brainstormResult && !brainstormResult.vorschlaege.length" class="card-status" x-text="$app.t('plot.brainstorm.allApplied')"></div>
                </div>
              </div>
            </template>

            <!-- Vollbild-Ausgleich: unsichtbarer Zwilling der „Akt hinzufügen"-
                 Spalte der Kopfzeile, damit Lane-Zeilen dieselbe Spaltenzahl wie
                 die Kopfzeile verteilen (Spalten bleiben ausgerichtet). -->
            <div class="plot-swim-spacer" aria-hidden="true"></div>
          </div>
        </template>

      </div>
    </template>
  </div>

  <!-- Strang-Aktions-Dropdown: ein einzelnes, nach <body> teleportiertes
       .context-menu (JS-positioniert in openThreadMenu). Die Lane sitzt in einem
       overflow-x/will-change-Scrollcontainer, in dem ein am Trigger verankertes
       Popover geclippt bzw. eingesperrt würde. Die offene Lane via threadMenuLane(). -->
  <template x-teleport="body">
    <div class="context-menu" x-ref="threadMenu" x-show="threadActionsOpenId !== null && !!threadMenuLane()" x-cloak
         :style="`top:${threadMenuPos.top}px;left:${threadMenuPos.left}px`"
         @click.outside="closeThreadMenu()" @keydown.escape.window="closeThreadMenu()" role="menu">
      <template x-if="threadMenuLane()">
        <div>
          <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
                  @click.stop="moveThread(threadMenuLane().thread, -1); closeThreadMenu()">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#chevron-up"/></svg>
            <span x-text="$app.t('plot.thread.moveUp')"></span>
          </button>
          <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
                  @click.stop="moveThread(threadMenuLane().thread, 1); closeThreadMenu()">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#chevron-down"/></svg>
            <span x-text="$app.t('plot.thread.moveDown')"></span>
          </button>
          <div class="context-menu-sep" role="separator"></div>
          <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
                  :class="{ 'context-menu-item--on': threadHasOwnActs(threadMenuLane().id) }"
                  @click.stop="threadHasOwnActs(threadMenuLane().id) ? unforkThreadActs(threadMenuLane().thread) : forkThreadActs(threadMenuLane().thread); closeThreadMenu()">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#git-fork"/></svg>
            <span x-text="threadHasOwnActs(threadMenuLane().id) ? $app.t('plot.thread.sharedActs') : $app.t('plot.thread.ownActs')"></span>
          </button>
          <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon"
                  @click.stop="startEditThread(threadMenuLane().thread); closeThreadMenu()">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#pencil"/></svg>
            <span x-text="$app.t('plot.thread.rename')"></span>
          </button>
          <div class="context-menu-sep" role="separator"></div>
          <button type="button" role="menuitem" class="context-menu-item context-menu-item--icon context-menu-item--danger"
                  @click.stop="deleteThread(threadMenuLane().thread); closeThreadMenu()">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#trash"/></svg>
            <span x-text="$app.t('plot.thread.delete')"></span>
          </button>
        </div>
      </template>
    </div>
  </template>
</div>
