      <!-- Cover-Tab -->
      <div class="export-tab-panel" x-bind="panel('cover')">
        <label class="pdfx-check pdfx-check--leading">
          <input type="checkbox" x-model="activeProfile.config.cover.enabled">
          <span x-text="$app.t('pdfExport.cover.enabled')"></span>
        </label>
        <template x-if="activeProfile.config.cover.enabled">
          <div>
            <p class="card-form-field-note" x-text="$app.t('pdfExport.cover.imageFromPublication')"></p>

            <div class="collapsible-wrap" x-data="collapsible()">
              <button type="button" class="collapsible-toggle" x-bind="trigger">
                <span class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
                <span x-text="$app.t('pdfExport.cover.optionsLegend')"></span>
              </button>
              <div x-bind="panel" x-cloak class="collapsible-section">
                <div class="card-form-grid">
                  <div class="card-form-row">
                    <label class="card-form-label" x-text="$app.t('pdfExport.cover.fit')"></label>
                    <div class="card-form-field">
                      <div x-data="combobox($app.t('pdfExport.cover.fit'))"
                           x-modelable="value" x-model="activeProfile.config.cover.fit"
                           x-effect="options = [{ value: 'cover', label: $app.t('pdfExport.cover.fitCover') }, { value: 'contain', label: $app.t('pdfExport.cover.fitContain') }]"
></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- Separates Umschlag-PDF (Druck): Rückseite + Buchrücken + Vorderseite -->
        <div class="collapsible-wrap pdfx-cover-spine" x-data="collapsible()">
          <button type="button" class="collapsible-toggle" x-bind="trigger">
            <span class="history-chevron" x-bind="chevron" aria-hidden="true"></span>
            <span x-text="$app.t('pdfExport.cover.spineLegend')"></span>
          </button>
          <div x-bind="panel" x-cloak class="collapsible-section">
            <p class="card-form-field-note" x-text="$app.t('pdfExport.cover.spineHint')"></p>
            <div class="card-form-grid">
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.cover.pageCount')"></label>
                <div class="card-form-field">
                  <input type="text" x-data="numInput({ step: 1, min: 0, max: 5000, integer: true })" x-modelable="value" x-model="activeProfile.config.coverSpec.pageCount" class="pdfx-num-input">
                  <p class="card-form-field-note" x-text="$app.t('pdfExport.cover.pageCountAutoHint')"></p>
                </div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.cover.paperType')"></label>
                <div class="card-form-field">
                  <div x-data="combobox($app.t('pdfExport.cover.paperTypePlaceholder'))"
                       x-modelable="value" x-model="paperPresetSel"
                       x-effect="options = paperPresetOptions()"
                       @combobox-change="applyPaperPreset($event.detail)"
></div>
                </div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.cover.paperBulk')"></label>
                <div class="card-form-field">
                  <input type="text" x-data="numInput({ step: 0.5, min: 0, max: 300 })" x-modelable="value" x-model="activeProfile.config.coverSpec.paperBulkMmPer1000" class="pdfx-num-input">
                  <p class="card-form-field-note" x-text="$app.t('pdfExport.cover.paperBulkHint')"></p>
                </div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.cover.spineWidth')"></label>
                <div class="card-form-field">
                  <span class="pdfx-spine-width" x-text="coverSpineMm().toFixed(1) + ' mm'"></span>
                </div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.cover.spineText')"></label>
                <div class="card-form-field">
                  <input x-model="activeProfile.config.coverSpec.spineText" class="pdfx-text-input" data-spellcheck="spelling" :placeholder="$app.t('pdfExport.cover.spineTextPlaceholder')">
                </div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.cover.bgColor')"></label>
                <div class="card-form-field pdfx-color-field">
                  <input type="color" class="pdfx-color-picker" x-model="activeProfile.config.coverSpec.backgroundColor">
                  <span class="pdfx-color-text" x-text="activeProfile.config.coverSpec.backgroundColor"></span>
                </div>
              </div>
              <div class="card-form-row card-form-row--top">
                <label class="card-form-label" x-text="$app.t('pdfExport.cover.blurb')"></label>
                <div class="card-form-field">
                  <textarea x-model="activeProfile.config.coverSpec.blurb" class="card-form-textarea" rows="5" data-spellcheck="spelling"></textarea>
                </div>
              </div>
            </div>

            <h4 class="pdfx-font-group-title" x-text="$app.t('pdfExport.cover.backImage')"></h4>
            <div class="pdfx-cover-preview">
              <template x-if="activeProfile.has_back_cover">
                <img :src="backCoverUrl()" alt="">
              </template>
              <template x-if="!activeProfile.has_back_cover">
                <span x-text="$app.t('pdfExport.cover.backNoFile')"></span>
              </template>
            </div>
            <div class="pdfx-cover-actions">
              <div class="pdfx-file-btn"
                   x-data="fileDrop({ accept: 'image/jpeg,image/png,image/webp', drag: false })"
                   @file-drop="uploadBackCover($event.detail.file)">
                <span x-text="backCoverUploading ? $app.t('pdfExport.cover.backUploading') : (activeProfile.has_back_cover ? $app.t('pdfExport.cover.backReplace') : $app.t('pdfExport.cover.backUpload'))"></span>
              </div>
              <button type="button"
                      x-show="activeProfile.has_back_cover"
                      @click="removeBackCover()"
                      x-text="$app.t('pdfExport.cover.backRemove')"></button>
            </div>
            <p class="card-form-error" x-show="backCoverError" x-text="backCoverError"></p>

            <div class="pdfx-cover-spine-actions">
              <button type="button"
                      class="primary"
                      x-show="!exporting"
                      :disabled="!coverSpecReady() || !$store.nav.selectedBookId"
                      :data-tip="!coverSpecReady() ? $app.t('pdfExport.cover.spineNeedsValues') : ''"
                      @click="exportPdf('cover')">
                <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#download"/></svg>
                <span x-text="$app.t('pdfExport.cover.renderCover')"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
