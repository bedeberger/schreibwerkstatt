<!-- Tagebuch-Rückblick (nur Buchtyp 'tagebuch') -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/tagebuch-rueckblick-card.js.
  `showTagebuchRueckblickCard` bleibt am Root (Hash-Router + Exklusivität);
  fachlicher State (Zeitraum/Result/Loading/Progress/Status, PollTimer) lebt in
  der Sub. KI-Felder via x-text (auto-escaped) — kein x-html-Sink.
-->
<div class="card card--tagebuchRueckblick" x-data="tagebuchRueckblickCard" x-show="$app.showTagebuchRueckblickCard" x-cloak>
  <div class="card-header">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title">
        <span x-text="$app.t('rueckblick.title')"></span><span class="rb-title-period" x-show="viewingZeitraumLabel()" x-cloak x-text="viewingZeitraumLabel()"></span>
      </span>
    </div>
    <div class="card-actions rb-actions">
      <div class="rb-zeitraum">
        <div x-data="combobox({ placeholder: $app.t('rueckblick.zeitraum'), compact: false })"
             x-modelable="value" x-model="rueckblickZeitraum"
             x-effect="options = availableZeitraeume()"></div>
      </div>
      <button type="button" class="icon-btn icon-btn--ghost" @click="runTagebuchRueckblick()"
              :disabled="rueckblickLoading || !rueckblickZeitraum || rueckblickUpToDate()"
              :data-tip="hasRueckblickResult() ? $app.t('rueckblick.rerun') : $app.t('rueckblick.start')"
              :aria-label="hasRueckblickResult() ? $app.t('rueckblick.rerun') : $app.t('rueckblick.start')">
        <span x-show="rueckblickLoading" class="spinner"></span>
        <svg x-show="!rueckblickLoading" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#scroll"/></svg>
      </button>
      <button type="button" class="icon-btn icon-btn--ghost" x-show="hasRueckblickResult() || rueckblickEmpty" x-cloak
              @click="closeRueckblick()"
              :data-tip="$app.t('rueckblick.close')" :aria-label="$app.t('rueckblick.close')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg>
      </button>
    </div>
  </div>

  <div class="progress-bar-wrap" x-show="rueckblickProgress > 0">
    <div class="progress-bar" :style="{ '--progress': rueckblickProgress + '%' }"></div>
  </div>
  <div class="card-status" x-html="rueckblickStatus"></div>

  <!-- Neugenerierung gesperrt: Einträge des Zeitraums unverändert seit Generierung -->
  <div class="rb-uptodate" x-show="rueckblickUpToDate() && !rueckblickLoading" x-cloak>
    <span x-text="$app.t('rueckblick.upToDate')"></span>
  </div>

  <!-- Leerzustand: keine datierten Einträge im Zeitraum -->
  <div class="rb-empty" x-show="rueckblickEmpty" x-cloak>
    <span x-text="$app.t('rueckblick.empty')"></span>
  </div>

  <!-- Ergebnis: editorial — Reflexion zuerst, Stichwort-Facetten, Tage als Akzent-Liste -->
  <div class="rb-result" x-show="hasRueckblickResult()" x-cloak>
    <!-- Zusammenfassung als ruhiger Lesetext -->
    <div class="rb-essay">
      <template x-for="(para, i) in rueckblickParagraphs()" :key="i">
        <p x-text="para"></p>
      </template>
    </div>

    <!-- Facetten: worüber / wer / wo — sortierte Chips (häufigste zuerst), Zähler
         nur bei Wiederholung. Klick → Belegtage in der Inline-Leiste unten. -->
    <div class="rb-facets"
         x-show="rueckblickResult?.themen?.length || rueckblickResult?.personen?.length || rueckblickResult?.orte?.length">
      <div class="rb-facet" x-show="rueckblickResult?.themen?.length">
        <span class="rb-facet-label" x-text="$app.t('rueckblick.facet.worueber')"></span>
        <span class="rb-facet-chips">
          <template x-for="(t, i) in rbThemen()" :key="i">
            <button type="button" class="rb-chip" :class="{ 'rb-chip--active': rbBeleg.key === 'themen:'+t.label }"
                    @click="toggleBeleg('themen:'+t.label, t.label, t.belege)"
                    :data-tip="$app.t('rueckblick.showReferences')">
              <span x-text="t.label"></span>
              <span class="rb-chip-count" x-show="t.haeufigkeit > 1" x-text="t.haeufigkeit"></span>
            </button>
          </template>
        </span>
      </div>
      <div class="rb-facet" x-show="rueckblickResult?.personen?.length">
        <span class="rb-facet-label" x-text="$app.t('rueckblick.facet.wer')"></span>
        <span class="rb-facet-chips">
          <template x-for="(p, i) in rbPersonen()" :key="i">
            <button type="button" class="rb-chip" :class="{ 'rb-chip--active': rbBeleg.key === 'personen:'+p.name }"
                    @click="toggleBeleg('personen:'+p.name, p.name, p.belege)"
                    :data-tip="$app.t('rueckblick.showReferences')">
              <span x-text="p.name"></span>
              <span class="rb-chip-count" x-show="p.haeufigkeit > 1" x-text="p.haeufigkeit"></span>
            </button>
          </template>
        </span>
      </div>
      <div class="rb-facet" x-show="rueckblickResult?.orte?.length">
        <span class="rb-facet-label" x-text="$app.t('rueckblick.facet.wo')"></span>
        <span class="rb-facet-chips">
          <template x-for="(o, i) in rbOrte()" :key="i">
            <button type="button" class="rb-chip" :class="{ 'rb-chip--active': rbBeleg.key === 'orte:'+o.name }"
                    @click="toggleBeleg('orte:'+o.name, o.name, o.belege)"
                    :data-tip="$app.t('rueckblick.showReferences')">
              <span x-text="o.name"></span>
              <span class="rb-chip-count" x-show="o.haeufigkeit > 1" x-text="o.haeufigkeit"></span>
            </button>
          </template>
        </span>
      </div>

      <!-- Belegtage des aktiven Stichworts (inline, keine Fehlplatzierung) -->
      <div class="rb-belege-strip" x-show="rbBeleg.key" x-cloak>
        <span class="rb-belege-strip-label" x-text="rbBeleg.label"></span>
        <span class="rb-belege-strip-days">
          <template x-for="(d, i) in rbBeleg.belege" :key="i">
            <button type="button" class="rb-belege-day" @click="gotoBelegTag(d)" x-text="belegLabel(d)"></button>
          </template>
          <span class="rb-belege-strip-empty" x-show="!rbBeleg.belege.length" x-text="$app.t('rueckblick.belegeEmpty')"></span>
        </span>
      </div>
    </div>

    <!-- Bemerkenswerte Tage als Akzent-Liste -->
    <div class="rb-days" x-show="rueckblickResult?.bemerkenswerteTage?.length">
      <div class="history-heading" x-text="$app.t('rueckblick.tage')"></div>
      <ul class="rb-tage">
        <template x-for="(tag, i) in (rueckblickResult?.bemerkenswerteTage || [])" :key="i">
          <li class="rb-tag-item">
            <button type="button" class="rb-tag-datum" @click="gotoRueckblickTag(tag.datum)"
                    x-text="belegLabel(tag.datum)"></button>
            <span class="rb-tag-text" x-text="tag.begruendung"></span>
          </li>
        </template>
      </ul>
    </div>
  </div>

  <!-- History: früher generierte Rückblicke (re-öffenbar) — Kalender (default)
       oder Liste. Kalender zeigt das Jahr×Monat-Raster der gespeicherten
       Rückblicke; Liste bleibt als durchsuchbarer Zusatz. -->
  <div x-show="rueckblickHistory.length > 0"
       class="card-history-section"
       :class="{ 'card-history-section--borderless': !hasRueckblickResult() && !rueckblickEmpty }">
    <div class="rb-history-head">
      <div class="history-heading" x-text="$app.t('rueckblick.history')"></div>
      <div class="tabs rb-history-tabs">
        <button type="button" class="tabs-btn" :class="{ 'tabs-btn--active': rbHistoryView === 'cal' }"
                @click="rbHistoryView = 'cal'" x-text="$app.t('rueckblick.viewCalendar')"></button>
        <button type="button" class="tabs-btn" :class="{ 'tabs-btn--active': rbHistoryView === 'list' }"
                @click="rbHistoryView = 'list'" x-text="$app.t('rueckblick.viewList')"></button>
      </div>
    </div>

    <!-- Kalender-Ansicht -->
    <div class="rb-cal" x-show="rbHistoryView === 'cal'" x-cloak>
      <div class="rb-cal-scroll">
        <div class="rb-cal-grid">
          <div class="rb-cal-row rb-cal-row--head">
            <span class="rb-cal-corner"></span>
            <template x-for="(mLabel, mi) in rbMonthLabels()" :key="mi">
              <span class="rb-cal-month-label" x-text="mLabel"></span>
            </template>
          </div>
          <template x-for="row in rueckblickCalendar().years" :key="row.year">
            <div class="rb-cal-row">
              <button type="button" class="rb-cal-year"
                      :class="{ 'rb-cal-year--has': row.hasRueckblick, 'rb-cal-year--active': row.selected }"
                      :disabled="!row.hasRueckblick && !row.hasEntries"
                      @click="openCalendarYear(row)" :data-tip="rbCalYearTip(row)"
                      x-text="row.year"></button>
              <template x-for="cell in row.months" :key="cell.key">
                <button type="button" class="rb-cal-cell"
                        :class="{ 'rb-cal-cell--has': cell.hasRueckblick, 'rb-cal-cell--entries': cell.hasEntries && !cell.hasRueckblick, 'rb-cal-cell--active': cell.selected }"
                        :disabled="!cell.hasRueckblick && !cell.hasEntries"
                        @click="openCalendarCell(cell)" :data-tip="rbCalCellTip(cell)"></button>
              </template>
            </div>
          </template>
        </div>
      </div>
      <div class="rb-cal-legend">
        <span class="rb-cal-legend-swatch rb-cal-cell--has"></span>
        <span x-text="$app.t('rueckblick.cal.legendHas')"></span>
        <span class="rb-cal-legend-swatch rb-cal-cell--entries"></span>
        <span x-text="$app.t('rueckblick.cal.legendEntries')"></span>
      </div>
    </div>

    <!-- Listen-Ansicht -->
    <div x-show="rbHistoryView === 'list'" x-cloak>
      <span class="filter-search-wrap rb-history-search-wrap" x-show="rueckblickHistory.length > 2">
        <input type="text" class="filter-search-input rb-history-search" x-model="rbHistorySearch"
               :placeholder="$app.t('rueckblick.historySearch')" :aria-label="$app.t('rueckblick.historySearch')">
        <button type="button" class="search-clear--icon" x-show="rbHistorySearch" @click="rbHistorySearch=''"
                :aria-label="$app.t('search.clear')" :data-tip="$app.t('search.clear')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg>
        </button>
      </span>
      <template x-for="entry in filteredRueckblickHistory()" :key="entry.id">
        <div>
          <div class="history-item" :class="{ 'history-item--active': selectedRueckblickId === entry.id }"
               @click="openRueckblickHistory(entry)">
            <span class="rb-history-zeitraum" x-text="zeitraumLabel(entry.zeitraum)"></span>
            <span class="history-date" x-text="rueckblickEntryDate(entry.created_at)"></span>
            <span class="tag" x-show="entry.model" x-text="entry.model"></span>
            <button type="button" class="history-item-delete" @click.stop="deleteRueckblickHistory(entry.id)"
                    :data-tip="$app.t('common.deleteEntry')" :aria-label="$app.t('common.deleteEntry')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg#trash"/></svg>
            </button>
          </div>
        </div>
      </template>
      <div class="rb-empty" x-show="rbHistorySearch && !filteredRueckblickHistory().length" x-cloak
           x-text="$app.t('rueckblick.historyNoMatch')"></div>
    </div>
  </div>

  <!-- Hinweis, solange noch kein Rückblick gespeichert wurde -->
  <div class="card-history-section rb-history-empty"
       :class="{ 'card-history-section--borderless': !hasRueckblickResult() && !rueckblickEmpty }"
       x-show="rbHistoryLoaded && !rueckblickHistory.length && !rueckblickLoading" x-cloak>
    <div class="history-heading" x-text="$app.t('rueckblick.history')"></div>
    <p class="rb-history-empty-text" x-text="$app.t('rueckblick.historyEmpty')"></p>
  </div>
</div>
