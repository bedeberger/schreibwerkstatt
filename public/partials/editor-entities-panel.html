<!-- Entity-Linking-Panel "Auf dieser Seite" (Notebook-Editor).
     Collapsible ueber dem Editor-Body, gleicher Stil wie .figure-context-panel
     (Chevron-Header + Chip-Body). Drei Reihen: Figuren / Szenen / Ereignisse.
     Leere Reihe wird ausgeblendet. Popover teleported in body fuer Klick auf
     Highlight-Wort. x-data: editorEntitiesCard (cards/editor-entities-card.js). -->
<div x-data="editorEntitiesCard" class="display-contents">

  <div class="on-this-page-panel"
       x-show="$app.entitiesEnabledForCurrentBook && $app.editMode && !$app.focusActive && !extractionEmpty()"
       x-cloak>
    <div class="on-this-page-header internal-link"
         @click="$app.entityPanelOpen = !$app.entityPanelOpen"
         :aria-expanded="$app.entityPanelOpen ? 'true' : 'false'">
      <span class="on-this-page-title" x-text="$app.t('entities.panel.title')"></span>
      <span class="history-chevron" :class="{ open: $app.entityPanelOpen }">›</span>
    </div>

    <div x-show="$app.entityPanelOpen" x-cloak class="on-this-page-body">

      <!-- Figuren-Row -->
      <template x-if="panelFigures().length > 0">
        <div class="on-this-page-row">
          <span class="on-this-page-row-label" x-text="$app.t('entities.panel.figures')"></span>
          <div class="on-this-page-chips">
            <template x-for="f in panelFigures()" :key="'pf-' + f.id">
              <span class="on-this-page-chip on-this-page-chip--figure internal-link"
                    @click="openFigure(f.id)"
                    x-text="f.kurzname || f.name"></span>
            </template>
          </div>
        </div>
      </template>

      <!-- Szenen-Row -->
      <template x-if="panelScenes().onPage.length + panelScenes().inChapter.length > 0">
        <div class="on-this-page-row">
          <span class="on-this-page-row-label" x-text="$app.t('entities.panel.scenes')"></span>
          <div class="on-this-page-chips">
            <template x-for="s in panelScenes().onPage" :key="'sp-' + s.id">
              <span class="on-this-page-chip internal-link" @click="openScene(s.id)">
                <span class="on-this-page-chip-title" x-text="s.titel || $app.t('entities.scene')"></span>
                <span x-show="s.wertung" class="tag"
                      :class="'badge--wertung-' + s.wertung"
                      x-text="s.wertung"></span>
              </span>
            </template>
            <template x-for="s in panelScenes().inChapter" :key="'sc-' + s.id">
              <span class="on-this-page-chip on-this-page-chip--chapter internal-link"
                    @click="openScene(s.id)"
                    :data-tip="$app.t('entities.panel.inChapter')">
                <span class="on-this-page-chip-title" x-text="s.titel || $app.t('entities.scene')"></span>
                <span x-show="s.wertung" class="tag"
                      :class="'badge--wertung-' + s.wertung"
                      x-text="s.wertung"></span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Ereignisse-Row -->
      <template x-if="panelEvents().onPage.length + panelEvents().inChapter.length > 0">
        <div class="on-this-page-row">
          <span class="on-this-page-row-label" x-text="$app.t('entities.panel.events')"></span>
          <div class="on-this-page-chips">
            <template x-for="(e, ei) in panelEvents().onPage" :key="'ep-' + ei + '-' + e.figure_id">
              <span class="on-this-page-chip internal-link" @click="openEvent(e.figure_id)">
                <span class="on-this-page-chip-title" x-text="e.ereignis"></span>
                <span x-show="e.datum" class="on-this-page-chip-meta" x-text="e.datum_label || e.datum"></span>
                <span x-show="e.figure_kurzname || e.figure_name"
                      class="on-this-page-chip-meta on-this-page-chip-meta--figure"
                      x-text="e.figure_kurzname || e.figure_name"></span>
              </span>
            </template>
            <template x-for="(e, ei) in panelEvents().inChapter" :key="'ec-' + ei + '-' + e.figure_id">
              <span class="on-this-page-chip on-this-page-chip--chapter internal-link"
                    @click="openEvent(e.figure_id)"
                    :data-tip="$app.t('entities.panel.inChapter')">
                <span class="on-this-page-chip-title" x-text="e.ereignis"></span>
                <span x-show="e.datum" class="on-this-page-chip-meta" x-text="e.datum_label || e.datum"></span>
                <span x-show="e.figure_kurzname || e.figure_name"
                      class="on-this-page-chip-meta on-this-page-chip-meta--figure"
                      x-text="e.figure_kurzname || e.figure_name"></span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Alles leer (Extraktion vorhanden, aber nichts auf dieser Seite). -->
      <p x-show="panelFigures().length === 0
                 && panelScenes().onPage.length + panelScenes().inChapter.length === 0
                 && panelEvents().onPage.length + panelEvents().inChapter.length === 0"
         class="on-this-page-empty muted-msg"
         x-text="$app.t('entities.panel.empty')"></p>

    </div>
  </div>

  <!-- Popover (teleport): Klick auf Highlight-Wort im Editor.
       Pendant zum figur-lookup-Popover; eigene Klasse fuer Styling.  -->
  <template x-teleport="body">
    <div x-show="entityPopover" x-cloak class="entity-popover"
         :style="{ left: (entityPopover?.x || 0) + 'px', top: (entityPopover?.y || 0) + 'px' }"
         @click.outside="closePopover()"
         @keydown.escape.window="closePopover()">
      <template x-if="entityPopover">
        <div>
          <div class="entity-popover-header">
            <span class="entity-popover-kind"
                  :class="'entity-popover-kind--' + entityPopover.kind"
                  x-text="entityPopover.kind === 'figure' ? $app.t('entities.figure') : $app.t('entities.location')"></span>
            <span class="entity-popover-name" x-text="entityPopover.name"></span>
            <button type="button" class="entity-popover-close" @click="closePopover()"
                    :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">×</button>
          </div>
          <div class="entity-popover-body">
            <p x-show="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"
               class="entity-popover-desc"
               x-text="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"></p>
            <p x-show="entityPopover.kind === 'figure' && entityPopover.data?.rolle"
               class="entity-popover-meta"
               x-text="entityPopover.data?.rolle"></p>
            <p x-show="entityPopover.kind === 'location' && entityPopover.data?.typ"
               class="entity-popover-meta"
               x-text="entityPopover.data?.typ"></p>
          </div>
          <div class="entity-popover-footer">
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'figure'"
                    @click="openFigure(entityPopover.id)"
                    x-text="$app.t('entities.gotoCard')"></button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'location'"
                    @click="openLocation(entityPopover.id)"
                    x-text="$app.t('entities.gotoCard')"></button>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
