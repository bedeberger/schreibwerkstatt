<!-- Entity-Linking-Panel "Auf dieser Seite" (Notebook-Editor).
     Wiederverwendung des `.figure-context-panel`-Patterns: Header + Chevron +
     Chip-Body. Drei Sektionen — Figuren (Kapitel-Scope), Szenen (Seite +
     Kapitel-ohne-Seitenbezug), Ereignisse (analog). Sektion ohne Inhalte
     wird ausgeblendet.

     Chip-Klick oeffnet das gemeinsame `.entity-popover` (Teleport in body) —
     identisches Markup/CSS/State wie das Editor-Highlight-Popover. Footer-
     Button im Popover navigiert dann zur jeweiligen Karte.
     x-data: editorEntitiesCard (cards/editor-entities-card.js). -->
<div x-data="editorEntitiesCard" class="display-contents">

  <!-- Sichtbarkeit haengt am Buch-Level (extractionEmpty), nicht an den
       Sektionen der aktuellen Seite: das Panel bleibt beim Seitenwechsel
       stehen statt zu verschwinden/reinzuploppen (Layout-Sprung ueber dem
       Editor-Body). Seiten ohne Eintraege zeigen den Empty-Hinweis im Body. -->
  <div class="figure-context-panel" x-show="!extractionEmpty()" x-cloak>
    <div class="figure-context-header internal-link"
         @click="$app.entityPanelOpen = !$app.entityPanelOpen"
         :aria-expanded="$app.entityPanelOpen ? 'true' : 'false'">
      <span class="figure-context-title">
        <span x-text="$app.t('entities.panel.title')"></span>
        <!-- Zaehler-Badges: machen den zugeklappten Zustand informativ —
             ohne Aufklappen sichtbar, ob/wie viel die Seite an Kontext hat. -->
        <span class="figure-context-counts">
          <span x-show="$app.chapterFigures.length > 0" class="tag"
                x-text="$app.t('entities.panel.figures') + ': ' + $app.chapterFigures.length"></span>
          <span x-show="panelScenes().onPage.length + panelScenes().inChapter.length > 0" class="tag"
                x-text="$app.t('entities.panel.scenes') + ': ' + (panelScenes().onPage.length + panelScenes().inChapter.length)"></span>
          <span x-show="panelEvents().onPage.length + panelEvents().inChapter.length > 0" class="tag"
                x-text="$app.t('entities.panel.events') + ': ' + (panelEvents().onPage.length + panelEvents().inChapter.length)"></span>
        </span>
      </span>
      <span class="history-chevron" :class="{ open: $app.entityPanelOpen }" aria-hidden="true">›</span>
    </div>

    <!-- Collapse via Grid-Row 0fr→1fr (CSS-Transition) statt x-show-Snap. -->
    <div class="figure-context-collapse" :class="{ open: $app.entityPanelOpen }">
    <div class="figure-context-body figure-context-body--rows">

      <!-- Figuren (Kapitel-Scope, wie urspruengliches figure-context-panel) -->
      <template x-if="$app.chapterFigures.length > 0">
        <div class="figure-context-section">
          <span class="figure-context-section-label" x-text="$app.t('entities.panel.figures')"></span>
          <div class="figure-context-chips">
            <template x-for="(fig, fi) in $app.chapterFigures" :key="'cf-' + (fig.id ?? fi)">
              <span class="figure-context-chip internal-link"
                    @click="openPopoverForChip('figure', fig, fig.name, $event)">
                <span x-text="fig.kurzname || fig.name"></span>
                <span x-show="fig.typ" class="tag" x-text="$app.t('figuren.type.' + fig.typ)"></span>
                <span x-show="fig.geburtstag" class="tag" x-text="'* ' + fig.geburtstag"></span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Szenen (Seite + Kapitel-ohne-Seitenbezug, gedimmt) -->
      <template x-if="panelScenes().onPage.length + panelScenes().inChapter.length > 0">
        <div class="figure-context-section">
          <span class="figure-context-section-label" x-text="$app.t('entities.panel.scenes')"></span>
          <div class="figure-context-chips">
            <template x-for="s in panelScenes().onPage" :key="'sp-' + s.id">
              <span class="figure-context-chip internal-link"
                    @click="openPopoverForChip('scene', s, s.titel || $app.t('entities.scene'), $event)">
                <span x-text="s.titel || $app.t('entities.scene')"></span>
                <span x-show="s.wertung" class="tag"
                      :class="'badge--wertung-' + s.wertung"
                      x-text="s.wertung"></span>
              </span>
            </template>
            <template x-for="s in panelScenes().inChapter" :key="'sc-' + s.id">
              <span class="figure-context-chip figure-context-chip--chapter internal-link"
                    @click="openPopoverForChip('scene', s, s.titel || $app.t('entities.scene'), $event)"
                    :data-tip="$app.t('entities.panel.inChapter')">
                <span x-text="s.titel || $app.t('entities.scene')"></span>
                <span x-show="s.wertung" class="tag"
                      :class="'badge--wertung-' + s.wertung"
                      x-text="s.wertung"></span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Ereignisse (Seite + Kapitel-ohne-Seitenbezug) -->
      <template x-if="panelEvents().onPage.length + panelEvents().inChapter.length > 0">
        <div class="figure-context-section">
          <span class="figure-context-section-label" x-text="$app.t('entities.panel.events')"></span>
          <div class="figure-context-chips">
            <template x-for="(e, ei) in panelEvents().onPage" :key="'ep-' + ei + '-' + e.figure_id">
              <span class="figure-context-chip internal-link"
                    @click="openPopoverForChip('event', e, e.ereignis, $event)">
                <span x-text="e.ereignis"></span>
                <span x-show="e.datum" class="tag" x-text="e.datum_label || e.datum"></span>
              </span>
            </template>
            <template x-for="(e, ei) in panelEvents().inChapter" :key="'ec-' + ei + '-' + e.figure_id">
              <span class="figure-context-chip figure-context-chip--chapter internal-link"
                    @click="openPopoverForChip('event', e, e.ereignis, $event)"
                    :data-tip="$app.t('entities.panel.inChapter')">
                <span x-text="e.ereignis"></span>
                <span x-show="e.datum" class="tag" x-text="e.datum_label || e.datum"></span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Seite ohne Kontext-Eintraege: Panel bleibt stehen (stabile Praesenz),
           Body sagt explizit, dass es hier nichts gibt. -->
      <template x-if="$app.chapterFigures.length === 0 && panelEmpty()">
        <span class="figure-context-empty" x-text="$app.t('entities.panel.empty')"></span>
      </template>

    </div>
    </div>
  </div>

  <!-- Popover (teleport): wird von Highlight-Klicks im Editor UND von Chip-
       Klicks in der Kontext-Leiste befuellt. Vier `kind`-Varianten: figure,
       location, scene, event — Accent-Bar und Avatar-Toenung pro kind in
       entities.css. -->
  <template x-teleport="body">
    <div x-show="entityPopover" x-cloak class="entity-popover"
         :class="entityPopover ? 'entity-popover--' + entityPopover.kind : ''"
         :style="{ left: (entityPopover?.x || 0) + 'px', top: (entityPopover?.y || 0) + 'px' }"
         @click.outside="closePopover()"
         @keydown.escape.window="closePopover()">
      <template x-if="entityPopover">
        <div class="entity-popover-card">
          <div class="entity-popover-head">
            <span class="entity-popover-avatar" aria-hidden="true"
                  x-text="(entityPopover.name || entityPopover.data?.kurzname || entityPopover.data?.name || entityPopover.data?.titel || entityPopover.data?.ereignis || '?').trim().charAt(0).toUpperCase()"></span>
            <div class="entity-popover-headtext">
              <span class="entity-popover-name"
                    x-text="entityPopover.kind === 'figure' ? (entityPopover.data?.name || entityPopover.name)
                          : entityPopover.kind === 'location' ? (entityPopover.data?.name || entityPopover.name)
                          : entityPopover.kind === 'scene' ? (entityPopover.data?.titel || entityPopover.name || $app.t('entities.scene'))
                          : (entityPopover.data?.ereignis || entityPopover.name)"></span>
              <span class="entity-popover-badges">
                <span class="entity-popover-kind"
                      x-text="entityPopover.kind === 'figure' ? $app.t('entities.figure')
                            : entityPopover.kind === 'location' ? $app.t('entities.location')
                            : entityPopover.kind === 'scene' ? $app.t('entities.scene')
                            : $app.t('entities.event')"></span>
                <template x-if="(entityPopover.kind === 'figure' || entityPopover.kind === 'location') && entityPopover.data?.typ">
                  <span class="entity-popover-tag" x-text="entityPopover.data.typ"></span>
                </template>
                <template x-if="entityPopover.kind === 'scene' && entityPopover.data?.wertung">
                  <span class="entity-popover-tag"
                        :class="'badge--wertung-' + entityPopover.data.wertung"
                        x-text="entityPopover.data.wertung"></span>
                </template>
                <template x-if="entityPopover.kind === 'event' && (entityPopover.data?.datum_label || entityPopover.data?.datum)">
                  <span class="entity-popover-tag"
                        x-text="entityPopover.data.datum_label || entityPopover.data.datum"></span>
                </template>
              </span>
            </div>
            <button type="button" class="entity-popover-close" @click="closePopover()"
                    :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">×</button>
          </div>

          <div class="entity-popover-body">
            <p x-show="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"
               class="entity-popover-desc"
               x-text="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"></p>

            <template x-if="entityPopover.kind === 'figure'">
              <dl class="entity-popover-meta-grid">
                <template x-if="entityPopover.data?.rolle">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figuren.field.rolle')"></dt>
                    <dd x-text="entityPopover.data.rolle"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.beruf">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figuren.field.beruf')"></dt>
                    <dd x-text="entityPopover.data.beruf"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.geburtstag">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figurLookup.geburt')"></dt>
                    <dd x-text="entityPopover.data.geburtstag"></dd>
                  </div>
                </template>
              </dl>
            </template>

            <template x-if="entityPopover.kind === 'event'">
              <dl class="entity-popover-meta-grid">
                <template x-if="entityPopover.data?.datum_label || entityPopover.data?.datum">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figurLookup.geburt')"></dt>
                    <dd x-text="entityPopover.data.datum_label || entityPopover.data.datum"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.figure_kurzname || entityPopover.data?.figure_name">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('entities.figure')"></dt>
                    <dd x-text="entityPopover.data.figure_kurzname || entityPopover.data.figure_name"></dd>
                  </div>
                </template>
              </dl>
            </template>
          </div>

          <div class="entity-popover-footer">
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'figure'"
                    @click="openFigure(entityPopover.id)">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'location'"
                    @click="openLocation(entityPopover.id)">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'scene'"
                    @click="openScene(entityPopover.id); closePopover()">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'event'"
                    @click="openEvent(entityPopover.data?.figure_id); closePopover()">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
