<!-- Entity-Linking-Panel "Auf dieser Seite" (Notebook-Editor).
     Wiederverwendung des `.figure-context-panel`-Patterns: Header + Chevron +
     Chip-Body mit Hover-Tooltips. Drei Sektionen — Figuren (Kapitel-Scope),
     Szenen (Seite + Kapitel-ohne-Seitenbezug), Ereignisse (analog). Sektion
     ohne Inhalte wird ausgeblendet. Popover-Teleport siehe unten.
     x-data: editorEntitiesCard (cards/editor-entities-card.js). -->
<div x-data="editorEntitiesCard" class="display-contents">

  <div class="figure-context-panel"
       x-show="$app.chapterFigures.length > 0
               || panelScenes().onPage.length + panelScenes().inChapter.length > 0
               || panelEvents().onPage.length + panelEvents().inChapter.length > 0"
       x-cloak>
    <div class="figure-context-header internal-link"
         @click="$app.entityPanelOpen = !$app.entityPanelOpen"
         :aria-expanded="$app.entityPanelOpen ? 'true' : 'false'">
      <span class="figure-context-title">
        <span class="figure-context-icon" aria-hidden="true">›</span>
        <span x-text="$app.t('entities.panel.title')"></span>
      </span>
      <span class="history-chevron" :class="{ open: $app.entityPanelOpen }" aria-hidden="true">›</span>
    </div>

    <div x-show="$app.entityPanelOpen" x-cloak class="figure-context-body figure-context-body--rows">

      <!-- Figuren (Kapitel-Scope, wie urspruengliches figure-context-panel) -->
      <template x-if="$app.chapterFigures.length > 0">
        <div class="figure-context-section">
          <span class="figure-context-section-label" x-text="$app.t('entities.panel.figures')"></span>
          <div class="figure-context-chips">
            <template x-for="(fig, fi) in $app.chapterFigures" :key="'cf-' + (fig.id ?? fi)">
              <span class="figure-context-chip internal-link"
                    x-data="{ show: false }"
                    @mouseenter="show = true" @mouseleave="show = false"
                    @click="openFigure(fig.id)">
                <span x-text="fig.kurzname || fig.name"></span>
                <span x-show="fig.typ" class="tag" x-text="$app.t('figuren.type.' + fig.typ)"></span>
                <span x-show="fig.geburtstag" class="tag" x-text="'* ' + fig.geburtstag"></span>
                <div x-show="show" x-cloak class="figure-context-tooltip">
                  <div class="figure-context-tooltip-name" x-text="fig.name"></div>
                  <div x-show="fig.geburtstag" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('figurLookup.geburt')"></span>
                    <span x-text="fig.geburtstag"></span>
                  </div>
                  <div x-show="fig.beruf" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('figuren.field.beruf')"></span>
                    <span x-text="fig.beruf"></span>
                  </div>
                  <div x-show="fig.geschlecht" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('editor.field.geschlecht')"></span>
                    <span x-text="fig.geschlecht"></span>
                  </div>
                  <div x-show="fig.beschreibung" class="figure-context-tooltip-desc" x-text="fig.beschreibung"></div>
                </div>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Szenen (Seite + Kapitel-ohne-Seitenbezug, gedimmt) -->
      <template x-if="panelScenes().onPage.length + panelScenes().inChapter.length > 0">
        <div class="figure-context-section">
          <span class="figure-context-section-label" x-text="$app.t('entities.panel.scenes')"></span>
          <div class="figure-context-chips">
            <template x-for="s in panelScenes().onPage" :key="'sp-' + s.id">
              <span class="figure-context-chip internal-link"
                    x-data="{ show: false }"
                    @mouseenter="show = true" @mouseleave="show = false"
                    @click="openScene(s.id)">
                <span x-text="s.titel || $app.t('entities.scene')"></span>
                <span x-show="s.wertung" class="tag"
                      :class="'badge--wertung-' + s.wertung"
                      x-text="s.wertung"></span>
                <div x-show="show" x-cloak class="figure-context-tooltip">
                  <div class="figure-context-tooltip-name" x-text="s.titel || $app.t('entities.scene')"></div>
                  <div x-show="s.wertung" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('entities.panel.scenes')"></span>
                    <span x-text="s.wertung"></span>
                  </div>
                  <div x-show="s.beschreibung" class="figure-context-tooltip-desc" x-text="s.beschreibung"></div>
                </div>
              </span>
            </template>
            <template x-for="s in panelScenes().inChapter" :key="'sc-' + s.id">
              <span class="figure-context-chip figure-context-chip--chapter internal-link"
                    x-data="{ show: false }"
                    @mouseenter="show = true" @mouseleave="show = false"
                    @click="openScene(s.id)"
                    :data-tip="$app.t('entities.panel.inChapter')">
                <span x-text="s.titel || $app.t('entities.scene')"></span>
                <span x-show="s.wertung" class="tag"
                      :class="'badge--wertung-' + s.wertung"
                      x-text="s.wertung"></span>
                <div x-show="show" x-cloak class="figure-context-tooltip">
                  <div class="figure-context-tooltip-name" x-text="s.titel || $app.t('entities.scene')"></div>
                  <div class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('entities.panel.inChapter')"></span>
                  </div>
                  <div x-show="s.beschreibung" class="figure-context-tooltip-desc" x-text="s.beschreibung"></div>
                </div>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Ereignisse (Seite + Kapitel-ohne-Seitenbezug) -->
      <template x-if="panelEvents().onPage.length + panelEvents().inChapter.length > 0">
        <div class="figure-context-section">
          <span class="figure-context-section-label" x-text="$app.t('entities.panel.events')"></span>
          <div class="figure-context-chips">
            <template x-for="(e, ei) in panelEvents().onPage" :key="'ep-' + ei + '-' + e.figure_id">
              <span class="figure-context-chip internal-link"
                    x-data="{ show: false }"
                    @mouseenter="show = true" @mouseleave="show = false"
                    @click="openEvent(e.figure_id)">
                <span x-text="e.ereignis"></span>
                <span x-show="e.datum" class="tag" x-text="e.datum_label || e.datum"></span>
                <div x-show="show" x-cloak class="figure-context-tooltip">
                  <div class="figure-context-tooltip-name" x-text="e.ereignis"></div>
                  <div x-show="e.datum" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('figurLookup.geburt')"></span>
                    <span x-text="e.datum_label || e.datum"></span>
                  </div>
                  <div x-show="e.figure_kurzname || e.figure_name" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('entities.figure')"></span>
                    <span x-text="e.figure_kurzname || e.figure_name"></span>
                  </div>
                </div>
              </span>
            </template>
            <template x-for="(e, ei) in panelEvents().inChapter" :key="'ec-' + ei + '-' + e.figure_id">
              <span class="figure-context-chip figure-context-chip--chapter internal-link"
                    x-data="{ show: false }"
                    @mouseenter="show = true" @mouseleave="show = false"
                    @click="openEvent(e.figure_id)"
                    :data-tip="$app.t('entities.panel.inChapter')">
                <span x-text="e.ereignis"></span>
                <span x-show="e.datum" class="tag" x-text="e.datum_label || e.datum"></span>
                <div x-show="show" x-cloak class="figure-context-tooltip">
                  <div class="figure-context-tooltip-name" x-text="e.ereignis"></div>
                  <div class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('entities.panel.inChapter')"></span>
                  </div>
                  <div x-show="e.datum" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('figurLookup.geburt')"></span>
                    <span x-text="e.datum_label || e.datum"></span>
                  </div>
                  <div x-show="e.figure_kurzname || e.figure_name" class="figure-context-tooltip-row">
                    <span class="figure-context-label" x-text="$app.t('entities.figure')"></span>
                    <span x-text="e.figure_kurzname || e.figure_name"></span>
                  </div>
                </div>
              </span>
            </template>
          </div>
        </div>
      </template>

    </div>
  </div>

  <!-- Popover (teleport): Klick auf Highlight im Editor.
       Initial-Bubble + Kind/Typ-Badge-Reihe + Meta-Grid + 1-Klick-Zur-Karte. -->
  <template x-teleport="body">
    <div x-show="entityPopover" x-cloak class="entity-popover"
         :class="entityPopover ? 'entity-popover--' + entityPopover.kind : ''"
         :style="{ left: (entityPopover?.x || 0) + 'px', top: (entityPopover?.y || 0) + 'px' }"
         @click.outside="closePopover()"
         @keydown.escape.window="closePopover()">
      <template x-if="entityPopover">
        <div class="entity-popover-card">
          <div class="entity-popover-head">
            <span class="entity-popover-avatar" aria-hidden="true"
                  x-text="(entityPopover.data?.kurzname || entityPopover.data?.name || entityPopover.name || '?').trim().charAt(0).toUpperCase()"></span>
            <div class="entity-popover-headtext">
              <span class="entity-popover-name" x-text="entityPopover.data?.name || entityPopover.name"></span>
              <span class="entity-popover-badges">
                <span class="entity-popover-kind"
                      x-text="entityPopover.kind === 'figure' ? $app.t('entities.figure') : $app.t('entities.location')"></span>
                <template x-if="entityPopover.kind === 'figure' && entityPopover.data?.typ">
                  <span class="entity-popover-tag" x-text="entityPopover.data.typ"></span>
                </template>
                <template x-if="entityPopover.kind === 'location' && entityPopover.data?.typ">
                  <span class="entity-popover-tag" x-text="entityPopover.data.typ"></span>
                </template>
              </span>
            </div>
            <button type="button" class="entity-popover-close" @click="closePopover()"
                    :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')">×</button>
          </div>

          <div class="entity-popover-body">
            <p x-show="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"
               class="entity-popover-desc"
               x-text="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"></p>

            <template x-if="entityPopover.kind === 'figure'">
              <dl class="entity-popover-meta-grid">
                <template x-if="entityPopover.data?.rolle">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figuren.field.rolle')"></dt>
                    <dd x-text="entityPopover.data.rolle"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.beruf">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figuren.field.beruf')"></dt>
                    <dd x-text="entityPopover.data.beruf"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.geburtstag">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figurLookup.geburt')"></dt>
                    <dd x-text="entityPopover.data.geburtstag"></dd>
                  </div>
                </template>
              </dl>
            </template>
          </div>

          <div class="entity-popover-footer">
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'figure'"
                    @click="openFigure(entityPopover.id)">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=636#arrow-right"/></svg>
            </button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'location'"
                    @click="openLocation(entityPopover.id)">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=636#arrow-right"/></svg>
            </button>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
