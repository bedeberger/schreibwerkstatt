<!-- Entity-Popover-Host (Notebook-Editor). editorEntitiesCard rechnet die
     Inline-Highlights (Figuren/Orte) im contenteditable; ein Klick auf ein
     Highlight oeffnet das teleportierte `.entity-popover`. Die Kontext-Listen
     (Figuren/Szenen/Ereignisse) leben im Referenz-Slot (reference-card.js).
     x-data: editorEntitiesCard (cards/editor-entities-card.js). -->
<div x-data="editorEntitiesCard" class="display-contents">

  <!-- Das frühere „Auf dieser Seite"-Collapsible (Figuren/Szenen/Ereignisse)
       lebt jetzt als Tabs im Referenz-Slot neben dem Editor (reference-card.js /
       reference.html). Hier bleibt nur der Popover, den die Inline-Highlights
       im contenteditable per Klick öffnen. -->

  <!-- Popover (teleport): wird von Highlight-Klicks im Editor befuellt. Vier
       `kind`-Varianten: figure,
       location, scene, event — Accent-Bar und Avatar-Toenung pro kind in
       entities.css. -->
  <template x-teleport="body">
    <div x-show="entityPopover" x-cloak class="entity-popover"
         :class="entityPopover ? 'entity-popover--' + entityPopover.kind : ''"
         :style="{ left: (entityPopover?.x || 0) + 'px', top: (entityPopover?.y || 0) + 'px' }"
         @click.outside="closePopover()"
         @keydown.escape.window="closePopover()">
      <template x-if="entityPopover">
        <div class="entity-popover-card">
          <div class="entity-popover-head">
            <span class="entity-popover-avatar" aria-hidden="true"
                  x-text="(entityPopover.name || entityPopover.data?.kurzname || entityPopover.data?.name || entityPopover.data?.titel || entityPopover.data?.ereignis || '?').trim().charAt(0).toUpperCase()"></span>
            <div class="entity-popover-headtext">
              <span class="entity-popover-name"
                    x-text="entityPopover.kind === 'figure' ? (entityPopover.data?.name || entityPopover.name)
                          : entityPopover.kind === 'location' ? (entityPopover.data?.name || entityPopover.name)
                          : entityPopover.kind === 'scene' ? (entityPopover.data?.titel || entityPopover.name || $app.t('entities.scene'))
                          : (entityPopover.data?.ereignis || entityPopover.name)"></span>
              <span class="entity-popover-badges">
                <span class="entity-popover-kind"
                      x-text="entityPopover.kind === 'figure' ? $app.t('entities.figure')
                            : entityPopover.kind === 'location' ? $app.t('entities.location')
                            : entityPopover.kind === 'scene' ? $app.t('entities.scene')
                            : $app.t('entities.event')"></span>
                <template x-if="(entityPopover.kind === 'figure' || entityPopover.kind === 'location') && entityPopover.data?.typ">
                  <span class="entity-popover-tag" x-text="entityPopover.data.typ"></span>
                </template>
                <template x-if="entityPopover.kind === 'scene' && entityPopover.data?.wertung">
                  <span class="entity-popover-tag"
                        :class="'badge--wertung-' + entityPopover.data.wertung"
                        x-text="entityPopover.data.wertung"></span>
                </template>
                <template x-if="entityPopover.kind === 'event' && (entityPopover.data?.datum_label || entityPopover.data?.datum)">
                  <span class="entity-popover-tag"
                        x-text="entityPopover.data.datum_label || entityPopover.data.datum"></span>
                </template>
              </span>
            </div>
            <button type="button" class="entity-popover-close" @click="closePopover()"
                    :data-tip="$app.t('common.close')" :aria-label="$app.t('common.close')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
          </div>

          <div class="entity-popover-body">
            <p x-show="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"
               class="entity-popover-desc"
               x-text="entityPopover.data?.kurzbeschreibung || entityPopover.data?.beschreibung"></p>

            <template x-if="entityPopover.kind === 'figure'">
              <dl class="entity-popover-meta-grid">
                <template x-if="entityPopover.data?.rolle">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figuren.field.rolle')"></dt>
                    <dd x-text="entityPopover.data.rolle"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.beruf">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figuren.field.beruf')"></dt>
                    <dd x-text="entityPopover.data.beruf"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.geburtstag">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figurLookup.geburt')"></dt>
                    <dd x-text="entityPopover.data.geburtstag"></dd>
                  </div>
                </template>
              </dl>
            </template>

            <template x-if="entityPopover.kind === 'event'">
              <dl class="entity-popover-meta-grid">
                <template x-if="entityPopover.data?.datum_label || entityPopover.data?.datum">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('figurLookup.geburt')"></dt>
                    <dd x-text="entityPopover.data.datum_label || entityPopover.data.datum"></dd>
                  </div>
                </template>
                <template x-if="entityPopover.data?.figure_kurzname || entityPopover.data?.figure_name">
                  <div class="entity-popover-meta-row">
                    <dt x-text="$app.t('entities.figure')"></dt>
                    <dd x-text="entityPopover.data.figure_kurzname || entityPopover.data.figure_name"></dd>
                  </div>
                </template>
              </dl>
            </template>
          </div>

          <div class="entity-popover-footer">
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'figure'"
                    @click="openFigure(entityPopover.id)">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'location'"
                    @click="openLocation(entityPopover.id)">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'scene'"
                    @click="openScene(entityPopover.id); closePopover()">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
            <button type="button" class="entity-popover-link"
                    x-show="entityPopover.kind === 'event'"
                    @click="openEvent(entityPopover.data?.figure_id); closePopover()">
              <span x-text="$app.t('entities.gotoCard')"></span>
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-right"/></svg>
            </button>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
