<!-- Figuren-Werkstatt: Vorwärts-Entwicklung von Figuren als Mindmap.
     jsMind-Editor + KI-Brainstorm + Konsistenz-Check. -->
<div class="card card--werkstatt" x-data="figurWerkstattCard" x-show="$app.showFigurWerkstattCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-title" x-text="$app.t('werkstatt.title', { name: $app.selectedBookName })"></span>
      <div class="card-subline">
        <span x-text="$app.t('werkstatt.subline')"></span>
      </div>
    </div>
  </div>

  <div x-show="errorMessage" class="card-status card-status--error" x-text="errorMessage"></div>

  <!-- Skeleton während Loading vor erstem Datensatz -->
  <div x-show="loading && drafts.length === 0" class="entity-skeleton" x-cloak>
    <template x-for="i in 4" :key="i">
      <div class="entity-skeleton-row">
        <span class="entity-skeleton-cell entity-skeleton-cell--anchor"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--title"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--meta"></span>
      </div>
    </template>
  </div>

  <!-- Empty-State mit CTA — kein Draft vorhanden -->
  <div x-show="!loading && drafts.length === 0 && !creating && !importing" class="card-empty">
    <p class="card-empty-text" x-text="$app.t('werkstatt.empty.title')"></p>
    <p class="card-empty-hint" x-text="$app.t('werkstatt.empty.hint')"></p>
    <div class="row">
      <button type="button" class="primary" :disabled="busy" @click="startCreate()" x-text="$app.t('werkstatt.empty.cta')"></button>
      <button type="button" :disabled="busy" @click="startImport()" x-text="$app.t('werkstatt.action.import')"></button>
    </div>
  </div>

  <!-- Create-Inline (auch bei leerem Empty-State sichtbar nach Klick auf CTA) -->
  <div x-show="creating && drafts.length === 0" class="card-empty" x-cloak>
    <p class="card-empty-text" x-text="$app.t('werkstatt.action.new')"></p>
    <input type="text"
           class="werkstatt-new-name"
           :placeholder="$app.t('werkstatt.field.name')"
           x-model="newName"
           @keydown.enter.prevent="createDraft()"
           @keydown.escape.prevent="cancelCreate()"
           :aria-label="$app.t('werkstatt.field.name')">
    <div class="row">
      <button type="button" class="primary" :disabled="busy || !newName.trim()" @click="createDraft()" x-text="$app.t('werkstatt.action.save')"></button>
      <button type="button" :disabled="busy" @click="cancelCreate()" x-text="$app.t('common.cancel')"></button>
    </div>
  </div>

  <!-- 2-Spalten-Layout: Drafts-Liste links, Detail rechts -->
  <div x-show="drafts.length > 0" class="werkstatt-grid">
    <div class="werkstatt-sidebar">
      <div class="list-header">
        <button type="button" class="primary" :disabled="busy || creating || importing" @click="startCreate()" x-text="$app.t('werkstatt.action.new')"></button>
        <button type="button" :disabled="busy || creating || importing" @click="startImport()" x-text="$app.t('werkstatt.action.import')"></button>
      </div>

      <div class="werkstatt-list" role="list">
        <template x-for="d in drafts" :key="d.id">
          <button type="button"
                  class="werkstatt-list-item"
                  :class="{ 'werkstatt-list-item--selected': d.id === selectedDraftId }"
                  @click="selectDraft(d.id)"
                  role="listitem">
            <span class="werkstatt-list-name" x-text="d.name"></span>
            <span class="werkstatt-list-archetype" x-show="d.archetype" x-text="d.archetype ? ($app.t('werkstatt.archetype.' + d.archetype) || d.archetype) : ''"></span>
          </button>
        </template>
      </div>

      <div x-show="creating" class="werkstatt-create-inline" x-cloak>
        <input type="text"
               class="werkstatt-new-name"
               :placeholder="$app.t('werkstatt.field.name')"
               x-model="newName"
               @keydown.enter.prevent="createDraft()"
               @keydown.escape.prevent="cancelCreate()"
               :aria-label="$app.t('werkstatt.field.name')">
        <div class="werkstatt-create-row">
          <button type="button" class="primary" :disabled="busy || !newName.trim()" @click="createDraft()" x-text="$app.t('werkstatt.action.save')"></button>
          <button type="button" :disabled="busy" @click="cancelCreate()" x-text="$app.t('common.cancel')"></button>
        </div>
      </div>

      <!-- Import-Inline: Combobox listet Buch-Figuren ohne aktiven Draft des Users.
           Auswahl + Übernehmen erzeugt Draft mit Mindmap aus figures-Feldern und
           source_figure_id-Referenz. -->
      <div x-show="importing" class="werkstatt-create-inline" x-cloak>
        <div x-show="importablesLoading" class="card-status" x-text="$app.t('werkstatt.import.loading')"></div>
        <div x-show="!importablesLoading && importables.length === 0" class="card-status" x-text="$app.t('werkstatt.import.empty')"></div>
        <div x-show="!importablesLoading && importables.length > 0" class="form-stack">
          <div x-data="combobox($app.t('werkstatt.import.placeholder'))"
               x-modelable="value"
               x-model="selectedImportFigureId"
               x-effect="options = importables.map(f => ({
                 value: String(f.id),
                 label: f.name + (f.typ ? ' [' + f.typ + ']' : '')
               }))"></div>
        </div>
        <div class="werkstatt-create-row">
          <button type="button" class="primary" :disabled="busy || !selectedImportFigureId" @click="runImport()" x-text="$app.t('werkstatt.import.confirm')"></button>
          <button type="button" :disabled="busy" @click="cancelImport()" x-text="$app.t('common.cancel')"></button>
        </div>
      </div>
    </div>

    <div class="werkstatt-detail" x-show="selectedDraft()" x-cloak>
      <div class="werkstatt-detail-header">
        <div class="werkstatt-detail-titlebar">
          <h2 class="werkstatt-detail-name" x-text="editName || $app.t('werkstatt.field.name')"></h2>
          <span x-show="importedFromName()"
                class="badge badge-source"
                :data-tip="$app.t('werkstatt.importedFrom.tip')"
                x-text="$app.t('werkstatt.importedFrom', { name: importedFromName() })"></span>
        </div>
        <div class="header-actions">
          <button type="button" class="primary" :disabled="busy || !editName.trim()" @click="saveDraft()" x-text="$app.t('werkstatt.action.save')"></button>
          <button type="button"
                  :disabled="busy || brainstormLoading || !selectedKnotenId"
                  @click="runBrainstorm()"
                  :data-tip="selectedKnotenId ? $app.t('werkstatt.action.brainstorm') : $app.t('werkstatt.action.brainstormSelectFirst')"
                  x-text="$app.t('werkstatt.action.brainstorm')"></button>
          <button type="button"
                  :disabled="busy || consistencyLoading"
                  @click="runConsistency()"
                  x-text="$app.t('werkstatt.action.consistency')"></button>
          <button type="button" :disabled="busy" @click="requestDelete()" x-text="$app.t('werkstatt.action.delete')"></button>
        </div>
      </div>

      <!-- Form: Name + Archetyp + Notizen -->
      <div class="card-form-grid">
        <div class="card-form-row">
          <label class="card-form-label" :for="'werkstatt-name-' + selectedDraftId" x-text="$app.t('werkstatt.field.name')"></label>
          <div class="form-stack">
            <input type="text"
                   :id="'werkstatt-name-' + selectedDraftId"
                   x-model="editName"
                   :aria-invalid="!editName.trim()"
                   :placeholder="$app.t('werkstatt.field.name')">
          </div>
        </div>

        <div class="card-form-row">
          <label class="card-form-label" x-text="$app.t('werkstatt.field.archetype')"></label>
          <div class="form-stack">
            <div x-data="combobox($app.t('werkstatt.archetype.placeholder'), $app.t('werkstatt.archetype.frei'))"
                 x-modelable="value"
                 x-model="editArchetype"
                 x-effect="options = [
                   { value: 'protagonist', label: $app.t('werkstatt.archetype.protagonist') },
                   { value: 'antagonist', label: $app.t('werkstatt.archetype.antagonist') },
                   { value: 'nebenfigur', label: $app.t('werkstatt.archetype.nebenfigur') },
                   { value: 'mentor',     label: $app.t('werkstatt.archetype.mentor') },
                   { value: 'nemesis',    label: $app.t('werkstatt.archetype.nemesis') },
                 ]"></div>
          </div>
        </div>

        <div class="card-form-row card-form-row--top">
          <label class="card-form-label" :for="'werkstatt-notes-' + selectedDraftId" x-text="$app.t('werkstatt.field.notes')"></label>
          <div class="form-stack">
            <textarea :id="'werkstatt-notes-' + selectedDraftId"
                      class="card-form-textarea"
                      x-model="editNotes"
                      rows="4"
                      :placeholder="$app.t('werkstatt.field.notes')"></textarea>
          </div>
        </div>
      </div>

      <!-- Mindmap-Canvas (jsMind, lazy-loaded). Editierbar: F2/Doppelklick zum Umbenennen,
           Tab fügt Sub-Knoten, Enter fügt Geschwister, Delete entfernt, Pfeiltasten navigieren,
           Rechtsklick öffnet Kontext-Menü. -->
      <section class="werkstatt-mindmap-section">
        <div class="werkstatt-mindmap-section-head">
          <h3 class="section-heading" x-text="$app.t('werkstatt.mindmap.title')"></h3>
          <span class="save-indicator"
                x-show="selectedDraft()?.updated_at"
                x-text="selectedDraft()?.updated_at ? $app.t('werkstatt.savedAt', { when: $app._formatSaveTs(new Date(selectedDraft().updated_at).getTime()) }) : ''"></span>
        </div>
        <div class="werkstatt-mindmap-canvas">
          <!-- :key="selectedDraftId" zwingt komplettes Remount des Mindmap-Divs bei
               Figur-Wechsel. jsMind hängt sich an frische DOM, kein State-Lecken
               zwischen Drafts. _mountMindmap kriegt $el direkt — keine $el-Magic-Race. -->
          <template x-for="dId in selectedDraftId ? [selectedDraftId] : []" :key="dId">
            <div class="werkstatt-mindmap" x-init="_mountMindmap($el)"></div>
          </template>
          <div class="werkstatt-mindmap-controls werkstatt-mindmap-controls--overlay">
            <button type="button"
                    class="graph-tool-btn"
                    :data-tip="$app.t('graph.zoomIn')"
                    :aria-label="$app.t('graph.zoomIn')"
                    @click="_jm && _jm.view && _jm.view.zoom_in()">+</button>
            <button type="button"
                    class="graph-tool-btn"
                    :data-tip="$app.t('graph.zoomOut')"
                    :aria-label="$app.t('graph.zoomOut')"
                    @click="_jm && _jm.view && _jm.view.zoom_out()">−</button>
            <button type="button"
                    class="graph-tool-btn graph-tool-btn--reset"
                    :data-tip="$app.t('graph.reset')"
                    :aria-label="$app.t('graph.reset')"
                    @click="_jm && _jm.view && _jm.view.set_zoom(1)">&#x26F6;</button>
            <button type="button"
                    class="graph-tool-btn"
                    :aria-pressed="mindmapFullscreen"
                    :aria-label="mindmapFullscreen ? $app.t('werkstatt.mindmap.fullscreenExit.tip') : $app.t('werkstatt.mindmap.fullscreen.tip')"
                    @click="toggleMindmapFullscreen()"
                    :data-tip="mindmapFullscreen ? $app.t('werkstatt.mindmap.fullscreenExit.tip') : $app.t('werkstatt.mindmap.fullscreen.tip')"
                    x-text="mindmapFullscreen ? '✕' : '⤢'"></button>
          </div>
        </div>

        <!-- Rechtsklick-Menü, position:fixed via inline-style -->
        <div class="werkstatt-context-menu"
             role="menu"
             x-show="contextMenuOpen"
             x-cloak
             :style="{ left: contextMenuPos.left + 'px', top: contextMenuPos.top + 'px' }"
             @click.stop>
          <button type="button" role="menuitem" class="werkstatt-context-item" @click="ctxBrainstorm()" x-text="$app.t('werkstatt.action.brainstorm')"></button>
          <button type="button" role="menuitem" class="werkstatt-context-item" @click="ctxRename()" x-text="$app.t('werkstatt.context.rename')"></button>
          <button type="button" role="menuitem" class="werkstatt-context-item" @click="ctxAddChild()" x-text="$app.t('werkstatt.context.addChild')"></button>
          <button type="button" role="menuitem" class="werkstatt-context-item" @click="ctxAddSibling()" x-text="$app.t('werkstatt.context.addSibling')"></button>
          <div class="werkstatt-context-sep" role="separator"></div>
          <button type="button" role="menuitem" class="werkstatt-context-item werkstatt-context-item--danger" @click="ctxDelete()" :disabled="contextMenuNodeId === 'root'" x-text="$app.t('werkstatt.context.delete')"></button>
        </div>
      </section>

      <!-- Brainstorm-Status während KI-Job -->
      <section x-show="brainstormLoading" x-cloak class="werkstatt-job-status">
        <div x-show="brainstormProgress > 0" class="progress-bar-wrap">
          <div class="progress-bar" :style="{ '--progress': brainstormProgress + '%' }"></div>
        </div>
        <div class="werkstatt-job-status-row">
          <div class="card-status" x-html="brainstormStatus"></div>
          <button type="button" @click="cancelBrainstorm()" x-text="$app.t('common.cancel')"></button>
        </div>
      </section>

      <!-- Consistency-Status während KI-Job -->
      <section x-show="consistencyLoading" x-cloak class="werkstatt-job-status">
        <div x-show="consistencyProgress > 0" class="progress-bar-wrap">
          <div class="progress-bar" :style="{ '--progress': consistencyProgress + '%' }"></div>
        </div>
        <div class="werkstatt-job-status-row">
          <div class="card-status" x-html="consistencyStatus"></div>
          <button type="button" @click="cancelConsistency()" x-text="$app.t('common.cancel')"></button>
        </div>
      </section>

      <!-- KI-Lauf-Historie pro Draft. Klick expandiert Result inline unter dem
           Eintrag (history-item--open + history-detail), wie Buch-Review-Verlauf. -->
      <div class="history-bar" x-show="runsLoadedDraftId === selectedDraftId && runs.brainstorm.length > 0" x-cloak>
        <div class="history-heading" x-text="$app.t('werkstatt.runs.brainstorm', { count: runs.brainstorm.length })"></div>
        <template x-for="r in runs.brainstorm" :key="r.id">
          <div>
            <div class="history-item" :class="{ 'history-item--open': selectedRunId === r.id }"
                 @click="openRun(r.id, 'brainstorm')">
              <span class="history-date" x-text="formatRunDate(r.created_at)"></span>
              <span x-show="r.knoten_pfad" class="tag" x-text="r.knoten_pfad"></span>
              <span x-show="r.model" class="tag" x-text="r.model"></span>
              <span class="history-chevron" :class="{ open: selectedRunId === r.id }">›</span>
              <button type="button" class="history-item-delete"
                      @click.stop="deleteRun(r.id, 'brainstorm')"
                      :data-tip="$app.t('common.deleteEntry')"
                      :aria-label="$app.t('common.deleteEntry')">×</button>
            </div>
            <div x-show="selectedRunId === r.id && brainstormResult" class="history-detail" x-cloak>
              <div class="chat-vorschlaege">
                <template x-for="(v, idx) in brainstormResult ? brainstormResult.vorschlaege : []" :key="idx">
                  <div class="chat-vorschlag">
                    <div class="chat-vorschlag-header">
                      <span class="chat-vorschlag-label" x-text="$app.t('chat.suggestion')"></span>
                      <button type="button"
                              class="chat-vorschlag-btn"
                              @click.stop="applyBrainstormVorschlag(idx)"
                              :disabled="busy"
                              x-text="$app.t('werkstatt.brainstorm.apply')"></button>
                    </div>
                    <div class="chat-vorschlag-title" x-text="v.label"></div>
                    <div x-show="v.begruendung" class="chat-vorschlag-begruendung" x-text="v.begruendung"></div>
                  </div>
                </template>
                <div x-show="brainstormResult && brainstormResult.vorschlaege.length === 0" class="card-status" x-text="$app.t('werkstatt.brainstorm.allApplied')"></div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div class="history-bar" x-show="runsLoadedDraftId === selectedDraftId && runs.consistency.length > 0" x-cloak>
        <div class="history-heading" x-text="$app.t('werkstatt.runs.consistency', { count: runs.consistency.length })"></div>
        <template x-for="r in runs.consistency" :key="r.id">
          <div>
            <div class="history-item" :class="{ 'history-item--open': selectedRunId === r.id }"
                 @click="openRun(r.id, 'consistency')">
              <span class="history-date" x-text="formatRunDate(r.created_at)"></span>
              <span x-show="r.model" class="tag" x-text="r.model"></span>
              <span class="history-chevron" :class="{ open: selectedRunId === r.id }">›</span>
              <button type="button" class="history-item-delete"
                      @click.stop="deleteRun(r.id, 'consistency')"
                      :data-tip="$app.t('common.deleteEntry')"
                      :aria-label="$app.t('common.deleteEntry')">×</button>
            </div>
            <div x-show="selectedRunId === r.id && consistencyResult" class="history-detail" x-cloak>
              <p class="werkstatt-consistency-fazit" x-show="consistencyResult && consistencyResult.fazit" x-text="consistencyResult ? consistencyResult.fazit : ''"></p>
              <div x-show="consistencyResult && consistencyResult.konflikte.length === 0" class="card-status" x-text="$app.t('werkstatt.consistency.noIssues')"></div>
              <div class="entity-list entity-list--accented" x-show="consistencyResult && consistencyResult.konflikte.length > 0">
                <template x-for="(k, idx) in consistencyResult ? consistencyResult.konflikte : []" :key="idx">
                  <div>
                    <div class="entity-row" :class="{ 'entity-row--selected': selectedKonfliktIdx === idx }"
                         @click.stop="selectedKonfliktIdx = selectedKonfliktIdx === idx ? null : idx">
                      <span class="severity-tag" :class="'severity-tag--' + k.schwere" x-text="$app.t('werkstatt.severity.' + k.schwere)"></span>
                      <span class="entity-row-title" x-text="k.feld"></span>
                      <span class="entity-row-meta" x-text="k.problem"></span>
                      <span class="history-chevron" :class="{ open: selectedKonfliktIdx === idx }">›</span>
                    </div>
                    <div x-show="selectedKonfliktIdx === idx" class="entity-detail" x-cloak>
                      <p class="entity-detail-text" x-text="k.problem"></p>
                      <div x-show="k.vorschlag" class="entity-meta-row">
                        <span class="entity-meta-label" x-text="$app.t('werkstatt.consistency.vorschlag')"></span>
                        <span class="entity-meta-value" x-text="k.vorschlag"></span>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
