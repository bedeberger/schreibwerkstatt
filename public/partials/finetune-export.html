<!-- Fine-Tuning-Datenexport -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/finetune-export-card.js.
  `showFinetuneExportCard` bleibt im Root (Hash-Router + Exklusivitaet),
  fachlicher State in dieser Komponente.

  Markup-Konvention: Form-Geometrie (card-form-grid / -row / -label) und
  Form-Patterns (form-stack / form-check / form-inline / form-num) sind
  geteilt mit book-settings.html / user-settings.html. Siehe DESIGN.md.
-->
<div class="card card--finetune" x-data="finetuneExportCard" x-show="$app.showFinetuneExportCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('finetune.title', { name: $app.selectedBookName })"></span>
    <div class="card-actions">
      <button type="button"
              @click="runFinetuneExport()"
              :disabled="finetuneLoading || !finetuneAnyTypeSelected() || !$app.selectedBookId">
        <span x-show="finetuneLoading" class="spinner"></span>
        <span x-text="finetuneLoading ? $app.t('finetune.generating') : $app.t('finetune.generate')"></span>
      </button>
    </div>
  </div>

  <p class="form-lead" x-text="$app.t('finetune.lead')"></p>

  <div class="card-form-grid">

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('finetune.types')"></label>
      <div class="form-stack">
        <label class="form-check">
          <input type="checkbox" id="ft-type-style" name="ft-type-style" x-model="finetuneTypeStyle">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.type.style')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.type.style.desc')"></span>
          </span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="ft-type-scene" name="ft-type-scene" x-model="finetuneTypeScene">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.type.scene')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.type.scene.desc')"></span>
          </span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="ft-type-dialog" name="ft-type-dialog" x-model="finetuneTypeDialog">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.type.dialog')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.type.dialog.desc')"></span>
          </span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="ft-type-authorchat" name="ft-type-authorchat" x-model="finetuneTypeAuthorChat">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.type.authorChat')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.type.authorChat.desc')"></span>
          </span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="ft-type-correction" name="ft-type-correction" x-model="finetuneTypeCorrection">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.type.correction')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.type.correction.desc')"></span>
          </span>
        </label>
      </div>
    </div>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('finetune.length')"></label>
      <div class="form-inline">
        <label class="form-inline-field">
          <span x-text="$app.t('finetune.length.min')"></span>
          <input type="text" id="ft-min-chars" name="ft-min-chars" x-data="numInput({ step: 20, min: 80, max: 5000 })" x-modelable="value" x-model="finetuneMinChars" class="form-num">
        </label>
        <label class="form-inline-field">
          <span x-text="$app.t('finetune.length.max')"></span>
          <input type="text" id="ft-max-chars" name="ft-max-chars" x-data="numInput({ step: 100, min: 200, max: 16000 })" x-modelable="value" x-model="finetuneMaxChars" class="form-num">
        </label>
      </div>
    </div>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('finetune.valSplit')"></label>
      <div class="form-inline">
        <label class="form-inline-field">
          <span x-text="$app.t('finetune.valSplit.ratio')"></span>
          <input type="text" id="ft-val-split" name="ft-val-split" x-data="numInput({ step: 0.05, min: 0, max: 0.5 })" x-modelable="value" x-model="finetuneValSplit" class="form-num">
        </label>
        <label class="form-inline-field">
          <span x-text="$app.t('finetune.valSplit.seed')"></span>
          <input type="text" id="ft-val-seed" name="ft-val-seed" x-data="numInput({ step: 1, min: 0, max: 999999 })" x-modelable="value" x-model="finetuneValSeed" class="form-num">
        </label>
      </div>
    </div>

    <p class="card-form-section-divider" x-text="$app.t('finetune.ai.lead')"></p>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('finetune.ai')"></label>
      <div class="form-stack">
        <label class="form-check">
          <input type="checkbox" id="ft-ai-reverse" name="ft-ai-reverse" x-model="finetuneAiReversePrompts">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.ai.reversePrompts')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.ai.reversePrompts.desc')"></span>
          </span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="ft-ai-factqa" name="ft-ai-factqa" x-model="finetuneAiFactQA">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.ai.factQA')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.ai.factQA.desc')"></span>
          </span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="ft-ai-reasoning" name="ft-ai-reasoning" x-model="finetuneAiReasoningBackfill">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.ai.reasoningBackfill')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.ai.reasoningBackfill.desc')"></span>
          </span>
        </label>
        <div class="form-inline">
          <label class="form-inline-field">
            <span x-text="$app.t('finetune.ai.reversePromptsPerPage')"></span>
            <input type="text" id="ft-ai-rev-per-page" name="ft-ai-rev-per-page" x-data="numInput({ step: 1, min: 1, max: 8 })" x-modelable="value" x-model="finetuneAiReversePromptsPerPage" class="form-num">
          </label>
          <label class="form-inline-field">
            <span x-text="$app.t('finetune.ai.factQAPerEntity')"></span>
            <input type="text" id="ft-ai-qa-per-entity" name="ft-ai-qa-per-entity" x-data="numInput({ step: 1, min: 2, max: 8 })" x-modelable="value" x-model="finetuneAiFactQAPerEntity" class="form-num">
          </label>
        </div>
      </div>
    </div>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('finetune.unsloth')"></label>
      <div class="form-stack">
        <div class="form-inline">
          <label class="form-inline-field">
            <span x-text="$app.t('finetune.unsloth.maxSeqTokens')"></span>
            <input type="text" id="ft-max-seq-tokens" name="ft-max-seq-tokens" x-data="numInput({ step: 512, min: 0, max: 16384 })" x-modelable="value" x-model="finetuneMaxSeqTokens" class="form-num">
          </label>
        </div>
        <label class="form-check">
          <input type="checkbox" id="ft-emit-text" name="ft-emit-text" x-model="finetuneEmitText">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.unsloth.emitText')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.unsloth.emitText.desc')"></span>
          </span>
        </label>
        <label class="form-check">
          <input type="checkbox" id="ft-truncate-long" name="ft-truncate-long" x-model="finetuneTruncateLong">
          <span>
            <span class="form-check-title" x-text="$app.t('finetune.unsloth.truncateLong')"></span>
            <span class="form-check-desc" x-text="$app.t('finetune.unsloth.truncateLong.desc')"></span>
          </span>
        </label>
      </div>
    </div>
  </div>

  <div x-show="finetuneLoading" class="progress-bar-wrap">
    <div class="progress-bar" :style="{ '--progress': finetuneProgress + '%' }"></div>
  </div>

  <div x-show="finetuneStatus" class="card-status" x-html="finetuneStatus"></div>

  <template x-if="finetuneStats && !finetuneLoading">
    <div class="form-section">
      <div class="form-stats">
        <span class="tok-badge tok-neutral" x-text="$app.t('finetune.stats.total', { n: finetuneStats.total })"></span>
        <span class="tok-badge tok-neutral" x-text="$app.t('finetune.stats.train', { n: finetuneStats.train })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.val > 0" x-text="$app.t('finetune.stats.val', { n: finetuneStats.val })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.styleCount > 0" x-text="$app.t('finetune.stats.style', { n: finetuneStats.styleCount })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.sceneCount > 0" x-text="$app.t('finetune.stats.scene', { n: finetuneStats.sceneCount })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.dialogCount > 0" x-text="$app.t('finetune.stats.dialog', { n: finetuneStats.dialogCount })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.authorChatCount > 0" x-text="$app.t('finetune.stats.authorChat', { n: finetuneStats.authorChatCount })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.correctionCount > 0" x-text="$app.t('finetune.stats.correction', { n: finetuneStats.correctionCount })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.aiAugmentCount > 0" x-text="$app.t('finetune.stats.aiAugment', { n: finetuneStats.aiAugmentCount })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.tokensP95 > 0" x-text="$app.t('finetune.stats.tokensP95', { n: finetuneStats.tokensP95 })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.tokensMax > 0" x-text="$app.t('finetune.stats.tokensMax', { n: finetuneStats.tokensMax })"></span>
        <span class="tok-badge tok-neutral" x-show="finetuneStats.recommendedSeqLen > 0" x-text="$app.t('finetune.stats.recommendedSeqLen', { n: finetuneStats.recommendedSeqLen })"></span>
        <span class="tok-badge tok-med" x-show="finetuneStats.dropped > 0" x-text="$app.t('finetune.stats.dropped', { n: finetuneStats.dropped })"></span>
        <span class="tok-badge tok-med" x-show="finetuneStats.capped > 0" x-text="$app.t('finetune.stats.capped', { n: finetuneStats.capped })"></span>
      </div>

      <div class="row">
        <button type="button"
                @click="finetuneDownload('train')"
                :disabled="!finetuneJobId || (finetuneStats.train ?? 0) === 0">
          <span x-text="$app.t('finetune.download.train')"></span>
          <span class="form-size-hint" x-text="'(' + finetuneFormatBytes(finetuneStats.trainBytes) + ')'" x-show="finetuneStats.trainBytes > 0"></span>
        </button>
        <button type="button"
                @click="finetuneDownload('val')"
                :disabled="!finetuneJobId || (finetuneStats.val ?? 0) === 0">
          <span x-text="$app.t('finetune.download.val')"></span>
          <span class="form-size-hint" x-text="'(' + finetuneFormatBytes(finetuneStats.valBytes) + ')'" x-show="finetuneStats.valBytes > 0"></span>
        </button>
      </div>

      <p class="card-form-hint" x-text="$app.t('finetune.hint.expiry')"></p>
    </div>
  </template>

  <div x-show="!finetuneLoading && !finetuneStats && !finetuneStatus" class="muted-msg muted-msg--spaced" x-text="$app.t('finetune.emptyState')"></div>
</div>
