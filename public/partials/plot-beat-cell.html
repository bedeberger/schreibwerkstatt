<!-- Plot-Werkstatt: geteiltes Beat-Karten-Markup (Ansicht + Bearbeiten).
     SSoT fuer die Beat-Innenansicht — per string-seitigem Fragment-Include
     (Marker @include plot-beat-cell, siehe app-ui.js#_resolveIncludes) in
     plot-board-flat.html UND plot-board-grid.html eingebettet. Erwartet im Scope
     die x-for-Variable beat plus den plotCard-State (beatDraft, editingBeatId,
     draftFiguren, $app …). Der umschliessende .plot-beat-Wrapper inkl. DnD-
     Handler bleibt pro Board-Datei (flach vs. Zelle unterscheiden sich dort).
     WICHTIG: in diesem Kommentar nie die Marker-Delimiter ausschreiben — der
     Resolver wuerde sie erneut expandieren und der innere Delimiter beendet
     diesen Kommentar vorzeitig (Doku-Text leckt sichtbar in jede Beat-Karte). -->
<!-- Ansicht -->
<template x-if="editingBeatId !== beat.id">
  <div class="plot-beat-view">
    <div class="plot-beat-head">
      <!-- Drag-Griff: einzige Greiffläche für SortableJS (handle '.plot-beat-grip').
           So bleibt die übrige Karte voll klickbar (Titel→Edit, Tags→Figur
           springen) ohne Drag/Klick-Konflikt. Nur Ansichtsmodus. Status wird
           nicht mehr in der Kopfzeile gezeigt (nur Border-Farbe + Status-Filter),
           gesetzt wird er über die Status-Tabs im Bearbeiten-Modus. -->
      <span class="plot-beat-grip" :data-tip="$app.t('plot.beat.dragHandle')" :aria-label="$app.t('plot.beat.dragHandle')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#grip-vertical"/></svg>
      </span>
      <span class="plot-beat-title" @click="startEditBeat(beat)" x-text="beat.titel"></span>
      <!-- Konsistenz-Warn-Badge: zeigt, dass der aktive Prüflauf diesen Beat beanstandet -->
      <button type="button" class="plot-beat-warn" :class="'plot-beat-warn--' + beatTopSeverity(beat)"
              x-show="consistencyResult && beatKonflikte(beat).length"
              @click.stop="focusKonfliktForBeat(beat)"
              :data-tip="beatKonflikteTip(beat)" :aria-label="$app.t('plot.beat.konfliktBadge')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#alert-triangle"/></svg>
      </button>
      <span class="plot-beat-intensity" x-show="beat.intensitaet"
            :data-tip="$app.t('plot.beat.intensitaet') + ': ' + beat.intensitaet + '/5'"
            :aria-label="$app.t('plot.beat.intensitaet') + ': ' + beat.intensitaet + '/5'">
        <template x-for="lvl in intensitaetScale()" :key="lvl">
          <span class="plot-beat-intensity-pip" :class="{ 'plot-beat-intensity-pip--on': lvl <= (beat.intensitaet || 0) }"></span>
        </template>
      </span>
      <!-- Verankerungs-Badge (Soll status vs. Ist-Fundstellen aus der semantischen
           Suche). Nur „im Buch"-Beats werden verankert: 'confirmed' zeigt die
           Fundstellen-Zahl und öffnet bei Klick das Fundstellen-Popover (Liste →
           Sprung zur Textstelle); 'drift' (im_buch ohne Fund) warnt (nicht
           navigierbar). 'none' (geplant/verworfen) rendert nichts. -->
      <button type="button" class="plot-beat-anchor" :class="'plot-beat-anchor--' + beatAnchorState(beat)"
              x-show="beatAnchorState(beat) !== 'none'"
              @click.stop="beat.occ_count && openBeatOccPopover($event, beat)"
              aria-haspopup="menu" :aria-expanded="beatOccPopoverBeatId === beat.id"
              :data-tip="beatAnchorTip(beat)" :aria-label="beatAnchorTip(beat)">
        <span x-show="beat.occ_count" x-text="beat.occ_count"></span>
        <span x-show="!beat.occ_count" aria-hidden="true">!</span>
      </button>
    </div>
    <p class="plot-beat-desc" x-show="beat.beschreibung" x-text="beat.beschreibung"></p>
    <div class="plot-beat-meta" x-show="beat.chapter_name || (beat.fig_ids && beat.fig_ids.length) || (beat.draft_fig_ids && beat.draft_fig_ids.length) || (beat.motifs && beat.motifs.length)">
      <span class="kapitel-badge kapitel-badge--primary internal-link" x-show="beat.chapter_name"
            @click.stop="beat.chapter_name && $app.openKapitelByName(beat.chapter_name)"
            x-text="beat.chapter_name"></span>
      <template x-for="figId in (beat.fig_ids || [])" :key="figId">
        <span class="tag internal-link" @click.stop="$app.openFigurById(figId)"
              x-text="$app.figurenById.get(figId)?.kurzname || $app.figurenById.get(figId)?.name || figId"></span>
      </template>
      <template x-for="dfId in (beat.draft_fig_ids || [])" :key="'d' + dfId">
        <span class="tag tag--werkstatt internal-link" @click.stop="$app.openWerkstattDraftById(dfId)"
              :data-tip="$app.t('plot.beat.werkstattFiguren')"
              x-text="draftFigurenById.get(dfId)?.name || dfId"></span>
      </template>
      <!-- Motiv-Badges (read-only): Soll-Verknüpfung aus der Motiv-Werkstatt (motif_beats).
           Kuratiert wird sie dort; Klick springt in die Motiv-Werkstatt zum Motiv. -->
      <template x-for="mo in (beat.motifs || [])" :key="'m' + mo.id">
        <span class="tag tag--motif internal-link" :style="{ '--motif-accent': motifAccent(mo) }"
              @click.stop="$app.openMotifById(mo.id)"
              :data-tip="$app.t('plot.beat.motif')"
              x-text="mo.name"></span>
      </template>
    </div>
    <!-- Beat-zu-Beat-Beziehungen (ausgehend): Kausal-/Setup-Payoff-Kanten, read-only.
         Klick springt zum Ziel-Beat (scrollToBeat). Kuratiert wird im Bearbeiten-Modus. -->
    <div class="plot-beat-rels" x-show="beatRelationsOut(beat).length">
      <template x-for="rel in beatRelationsOut(beat)" :key="rel.id">
        <span class="plot-beat-rel internal-link" @click.stop="scrollToBeat(rel.to_beat_id)"
              :data-tip="relTypeLabel(rel.typ) + ': ' + rel.to_titel">
          <span class="plot-beat-rel-typ" x-text="relTypeLabel(rel.typ)"></span>
          <span class="plot-beat-rel-target" x-text="rel.to_titel"></span>
        </span>
      </template>
    </div>
  </div>
</template>

<!-- Bearbeiten -->
<template x-if="editingBeatId === beat.id">
  <!-- Klick ausserhalb speichert den Beat und schliesst ihn. Guard editingBeatId
       === beat.id: beim Wechsel auf einen anderen Beat hat dessen startEditBeat
       den Wert schon umgesetzt, sodass dieser alte Handler nicht gegen-speichert.
       (Escape verwirft weiterhin via cancelEditBeat.) -->
  <div class="plot-beat-edit"
       @keydown="onBeatEditKeydown($event, beat)"
       @click.outside="editingBeatId === beat.id && commitEditBeat(beat)">
    <input type="text" class="plot-beat-edit-titel" x-model="beatDraft.titel"
           data-spellcheck="spelling" :placeholder="$app.t('plot.beat.titelPlaceholder')"
           @keydown.enter.prevent="commitEditBeat(beat)">
    <textarea class="plot-beat-edit-desc" x-model="beatDraft.beschreibung" rows="3"
              data-spellcheck="spelling" :placeholder="$app.t('plot.beat.descPlaceholder')"></textarea>
    <div class="tabs plot-status-tabs" role="group" :aria-label="$app.t('plot.beat.statusLabel')">
      <template x-for="s in statusList()" :key="s">
        <button type="button" class="tabs-btn"
                :class="{ ['plot-status-seg--' + s]: true, 'tabs-btn--active': beatDraft.status === s }"
                @click="beatDraft.status = s"
                x-text="$app.t('plot.status.' + s)"></button>
      </template>
    </div>
    <label class="plot-edit-label" x-text="$app.t('plot.beat.intensitaet')"></label>
    <div class="plot-intensity" role="group" :aria-label="$app.t('plot.beat.intensitaet')">
      <template x-for="n in intensitaetScale()" :key="n">
        <button type="button" class="plot-intensity-step"
                :class="{ 'plot-intensity-step--on': beatDraft.intensitaet && n <= beatDraft.intensitaet }"
                @click="setBeatDraftIntensitaet(n)"
                :data-tip="$app.t('plot.beat.intensitaetTip')"
                :aria-pressed="beatDraft.intensitaet === n ? 'true' : 'false'"
                x-text="n"></button>
      </template>
    </div>
    <label class="plot-edit-label" x-text="$app.t('plot.beat.chapter')"></label>
    <div x-data="entityPicker({ entity: 'chapter', placeholder: $app.t('plot.beat.chapterPlaceholder'), emptyLabel: $app.t('plot.beat.noChapter') })"
         x-modelable="value" x-model="beatDraft.chapter_id"></div>
    <!-- Figuren: eine Combobox, zwei Quellen als opt-Gruppen (Katalog =
         Komplettanalyse, Werkstatt = Plotwerkstatt-Drafts) — spart Platz wie in
         der Motiv-Werkstatt. Wert trägt Präfix fig:/draft:, addBeatFigureLink
         legt in der richtigen Draft-Liste an. -->
    <label class="plot-edit-label" x-show="$store.catalog.figuren.length || draftFiguren.length"
           x-text="$app.t('plot.beat.figuren')"></label>
    <div x-show="$store.catalog.figuren.length || draftFiguren.length"
         x-data="combobox({ placeholder: $app.t('plot.beat.figurenPick'), transient: true })"
         x-effect="options = [
           ...($store.catalog.figuren||[]).map(f=>({value:'fig:'+f.id, label:(f.kurzname||f.name), group:$app.t('plot.beat.figureGroup.katalog')})),
           ...(draftFiguren||[]).map(d=>({value:'draft:'+d.id, label:d.name, group:$app.t('plot.beat.figureGroup.werkstatt')}))
         ]"
         @combobox-change="addBeatFigureLink($event.detail)"></div>
    <div class="plot-fig-chips" x-show="beatFigureChips().length || beatWerkstattChips().length">
      <template x-for="chip in beatFigureChips()" :key="chip.id">
        <span class="tag plot-fig-chip">
          <span x-text="chip.label"></span>
          <button type="button" class="plot-fig-chip-remove" :aria-label="$app.t('common.remove')"
                  @click="toggleBeatDraftFigure(chip.id)">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
          </button>
        </span>
      </template>
      <template x-for="chip in beatWerkstattChips()" :key="'d' + chip.id">
        <span class="tag tag--werkstatt plot-fig-chip">
          <span x-text="chip.label"></span>
          <button type="button" class="plot-fig-chip-remove" :aria-label="$app.t('common.remove')"
                  @click="toggleBeatDraftWerkstattFigure(chip.id)">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
          </button>
        </span>
      </template>
    </div>
    <!-- Motive (Motiv-Werkstatt): schreibt in dieselbe motif_beats-Brücke. Nur sichtbar,
         wenn der Motiv-Katalog des Buchs Einträge hat. -->
    <label class="plot-edit-label" x-show="motifsCatalog.length" x-text="$app.t('plot.beat.motifs')"></label>
    <div x-show="motifsCatalog.length"
         x-data="entityPicker({ entity: 'custom', multiple: true, placeholder: $app.t('plot.beat.motifPick'), items: () => beatMotifOptions() })"
         x-modelable="value" x-model="beatDraft.motif_ids"></div>
    <div class="plot-fig-chips" x-show="beatMotifChips().length">
      <template x-for="chip in beatMotifChips()" :key="'m' + chip.id">
        <span class="tag tag--motif plot-fig-chip">
          <span x-text="chip.label"></span>
          <button type="button" class="plot-fig-chip-remove" :aria-label="$app.t('common.remove')"
                  @click="toggleBeatDraftMotif(chip.id)">
            <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
          </button>
        </span>
      </template>
    </div>
    <!-- Beat-zu-Beat-Beziehungen (Kausalität + Setup/Payoff): Typ + Ziel-Beat wählen,
         sofort persistiert (eigene Achse neben dem Draft-Save). Nur sinnvoll ab 2 Beats. -->
    <label class="plot-edit-label" x-show="beats.length > 1" x-text="$app.t('plot.relation.label')"></label>
    <div class="plot-rel-editor" x-show="beats.length > 1">
      <div class="plot-rel-add">
        <div class="plot-rel-typ"
             x-data="combobox({ placeholder: $app.t('plot.relation.typPick') })"
             x-modelable="value" x-model="relDraftTyp"
             x-effect="options = relationTypes().map(tp => ({ value: tp, label: relTypeLabel(tp) }))"></div>
        <div class="plot-rel-target"
             x-data="combobox({ placeholder: $app.t('plot.relation.targetPick') })"
             x-modelable="value" x-model="relDraftTarget"
             x-effect="options = relTargetOptions(beat)"></div>
        <button type="button" class="btn-compact" :disabled="busy || !relDraftTyp || !relDraftTarget"
                @click="addBeatRelation(beat)" x-text="$app.t('plot.relation.add')"></button>
      </div>
      <div class="plot-fig-chips" x-show="beatRelationsOut(beat).length">
        <template x-for="rel in beatRelationsOut(beat)" :key="rel.id">
          <span class="tag plot-fig-chip plot-rel-chip">
            <span x-text="relTypeLabel(rel.typ) + ' → ' + rel.to_titel"></span>
            <button type="button" class="plot-fig-chip-remove" :aria-label="$app.t('common.remove')"
                    @click="deleteBeatRelationById(rel.id)">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
            </button>
          </span>
        </template>
      </div>
    </div>
    <div class="plot-beat-edit-actions">
      <button type="button" class="icon-btn icon-btn--ghost icon-btn--success plot-icon-btn" @click="saveEditBeat(beat)" :disabled="busy" :data-tip="$app.t('common.save')" :aria-label="$app.t('common.save')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#check"/></svg>
      </button>
      <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn" @click="cancelEditBeat()" :data-tip="$app.t('common.cancel')" :aria-label="$app.t('common.cancel')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#x"/></svg>
      </button>
      <span class="action-sep" aria-hidden="true"></span>
      <!-- Verwerfen ist eine eigene Achse (Flag), kein Status — sofort persistiert. -->
      <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn plot-beat-discard"
              :class="{ 'is-active': beat.verworfen }"
              @click="toggleBeatVerworfen(beat)"
              :data-tip="beat.verworfen ? $app.t('plot.beat.restore') : $app.t('plot.beat.discard')"
              :aria-label="beat.verworfen ? $app.t('plot.beat.restore') : $app.t('plot.beat.discard')">
        <svg class="icon" aria-hidden="true"><use :href="'/icons.svg?v=691#' + (beat.verworfen ? 'rotate-ccw' : 'minus')"/></svg>
      </button>
      <button type="button" class="icon-btn icon-btn--ghost plot-icon-btn plot-icon-btn--danger plot-beat-delete" @click="deleteBeat(beat)" :data-tip="$app.t('plot.beat.delete')" :aria-label="$app.t('plot.beat.delete')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#trash"/></svg>
      </button>
    </div>
  </div>
</template>
