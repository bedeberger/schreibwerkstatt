<!-- Seiteneditor & Lektorat -->
<!-- Notebook-Sub-Komponenten-Anker: hostet Snapshot-Restore + Trampoline-Events
     (Pendant zu editor-focus.html#editorFocusCard). Eigener x-data wäre an der
     #editor-card-Karte unsauber, weil die Karte selbst alle Root-Felder
     (editMode, currentPage, ...) via Body-Scope braucht. Lebt unsichtbar als
     display-contents-Anker am Anfang des Notebook-Partials. -->
<div x-data="editorNotebookCard" class="display-contents"></div>

<div class="card" id="editor-card"
     x-show="showEditorCard" x-cloak
     :class="{ 'editor-card--fullscreen': pageEditorFullscreen && editMode }"
     @keydown.escape.window="!focusActive && pageEditorFullscreen && togglePageEditorFullscreen()">
  <!-- Sticky-Region im Vollbild: Header + Save-Progress + Lektorat-Status +
       Save-Bestätigung bleiben oben sichtbar, auch wenn die Karte gescrollt
       wird. Wrapper umschliesst alles, was beim Speichern Feedback liefert. -->
  <div class="editor-card__topbar">
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <template x-if="currentPage && canEdit()">
        <textarea class="card-title card-title--input" rows="1"
                  :value="currentPage.name"
                  x-init="const fit = () => $nextTick(() => {
                            if (!$el.offsetParent && $el.style.position !== 'fixed') return;
                            $el.style.height = 'auto';
                            const h = $el.scrollHeight;
                            if (h > 0) $el.style.height = h + 'px';
                          });
                          fit();
                          $watch('currentPage?.id', fit);
                          $watch('currentPage?.name', fit);
                          $watch('showEditorCard', v => v && fit());
                          $watch('pageEditorFullscreen', fit);"
                  @input="$el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
                  @blur="renameCurrentPage($event)"
                  @keydown.enter.prevent="$event.target.blur()"
                  :disabled="editMode || focusActive"
                  autocomplete="off" data-bwignore data-1p-ignore data-lpignore="true" data-form-type="other"
                  data-spellcheck="spelling"
                  :aria-label="t('editor.renamePage')"></textarea>
      </template>
      <template x-if="!currentPage || !canEdit()">
        <span class="card-title" x-text="t('editor.title', { name: currentPage?.name || '–' })"></span>
      </template>
      <div class="card-subline">
        <span class="save-indicator"
              x-show="editMode || lastSavedKind() !== 'none'"
              :class="'save-indicator--' + lastSavedKind()"
              :data-tip="saveIndicatorTip()">
          <span class="save-indicator__dot" aria-hidden="true"></span>
          <span class="save-indicator__text" x-text="saveIndicatorText()"></span>
        </span>
        <span x-show="focusActive" class="focus-live-counter">
          <span x-text="t('editor.focus.counterTotal', { words: focusCountWords, chars: focusCountChars })"></span>
          <span class="focus-live-counter--today"
                x-text="t('editor.focus.counterToday', { wordsDelta: focusCountWordsDelta, charsDelta: focusCountCharsDelta })"></span>
        </span>
        <template x-for="prov in $syncProviders" :key="prov.key">
          <span class="editor-sync-status sync-provider" :class="'sync-provider--' + prov.key"
                x-show="currentPage && prov.card.statusFor(currentPage)">
            <template x-if="prov.card.statusFor(currentPage)">
              <span class="badge" :class="'badge--sync-' + prov.card.statusFor(currentPage)"
                    :data-tip="prov.card.statusLabel(prov.card.statusFor(currentPage))"
                    x-text="prov.card.statusLabel(prov.card.statusFor(currentPage))"></span>
            </template>
            <template x-if="prov.card.canPush(currentPage) || prov.card.pushBusy[currentPage?.id]">
              <button type="button" class="btn-compact editor-sync-push"
                      @click="prov.card.push(currentPage.id)"
                      :disabled="!!prov.card.pushBusy[currentPage.id]"
                      :data-tip="t(prov.key + '.action.push')"
                      :aria-label="t(prov.key + '.action.push')">
                <template x-if="!prov.card.pushBusy[currentPage?.id]">
                  <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#arrow-up"/></svg>
                </template>
                <template x-if="prov.card.pushBusy[currentPage?.id]">
                  <span class="display-contents">
                    <span class="spinner" aria-hidden="true"></span>
                    <span class="editor-sync-push-pct" x-text="(prov.card.pushProgress[currentPage.id] || 0) + '%'"></span>
                  </span>
                </template>
              </button>
            </template>
            <template x-if="prov.card.hasConflict && prov.card.statusFor(currentPage) === 'conflict'">
              <button type="button" class="btn-compact editor-sync-conflict"
                      @click="prov.card.openConflict(currentPage.id)"
                      :data-tip="t(prov.key + '.action.resolveConflict')"
                      x-text="t(prov.key + '.action.resolveConflict')"></button>
            </template>
            <template x-if="prov.card.viewUrl(currentPage)">
              <button type="button" class="btn-compact editor-sync-view"
                      @click="window.open(prov.card.viewUrl(currentPage), '_blank', 'noopener')"
                      :data-tip="t(prov.key + '.action.view')"
                      :aria-label="t(prov.key + '.action.view')">
                <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#external-link"/></svg>
              </button>
            </template>
          </span>
        </template>
        <span x-show="currentPage && tokEsts[currentPage.id]" class="tok-stats">
          <template x-if="tokEsts[currentPage?.id]?.words > 0">
            <span class="display-contents">
              <span class="tok-badge tok-neutral"
                x-text="tokEsts[currentPage.id]?.chars >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].chars/1000) + 'k Z' : tokEsts[currentPage.id]?.chars + ' Z'"></span>
              <span class="tok-badge tok-neutral"
                :data-tip="t('bookstats.metric.normseiten')"
                x-text="(Math.round((tokEsts[currentPage.id]?.chars || 0) / 1500 * 10) / 10).toLocaleString(uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + t('bookstats.unit.ns')"></span>
              <span class="tok-badge tok-neutral"
                x-text="tokEsts[currentPage.id]?.words >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].words/1000) + 'k W' : tokEsts[currentPage.id]?.words + ' W'"></span>
              <span class="tok-badge"
                :class="tokEsts[currentPage.id]?.tok > 16000 ? 'tok-high' : tokEsts[currentPage.id]?.tok > 4000 ? 'tok-med' : 'tok-ok'"
                x-text="tokEsts[currentPage.id]?.tok >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].tok/1000) + 'k T' : '~' + tokEsts[currentPage.id]?.tok + ' T'"
                ></span>
            </span>
          </template>
          <template x-if="tokEsts[currentPage?.id] && tokEsts[currentPage.id].words === 0">
            <span class="tok-badge tok-empty" x-text="t('sidebar.empty')"></span>
          </template>
        </span>
      </div>
    </div>
    <div class="card-header-aside">
      <div class="card-actions card-actions--grouped">
      <template x-if="!editMode">
        <span class="display-contents">
          <span class="action-group" x-show="isTagebuch()">
            <button type="button" class="icon-btn icon-btn--ghost"
                    @click="diaryGo(-1)"
                    :disabled="!diaryPrevPage()"
                    :data-tip="t('diary.prevEntry')"
                    :aria-label="t('diary.prevEntry')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#chevron-left"/></svg>
            </button>
            <button type="button" class="icon-btn icon-btn--ghost"
                    @click="diaryGo(1)"
                    :disabled="!diaryNextPage()"
                    :data-tip="t('diary.nextEntry')"
                    :aria-label="t('diary.nextEntry')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#chevron-right"/></svg>
            </button>
          </span>
          <span class="action-sep" aria-hidden="true" x-show="isTagebuch()"></span>
          <span class="action-group" x-show="canReview()">
            <button type="button" class="icon-btn icon-btn--ghost" @click="runCheck()" :disabled="checkLoading || currentPageEmpty" :data-tip="currentPageEmpty ? t('editor.btn.pageEmpty') : t('editor.btn.checkTitle')" :aria-label="t('editor.btn.check')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#spell-check"/></svg>
            </button>
            <button type="button" class="icon-btn icon-btn--ghost" @click="closeFindings()" x-show="checkDone" :data-tip="t('editor.btn.exitCheckTitle')" :aria-label="t('editor.btn.exitCheck')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg>
            </button>
            <button type="button" class="icon-btn icon-btn--ghost icon-btn--success" @click="saveCorrections()" :disabled="saveApplying != null" x-show="canEdit() && ((correctedHtml && selectedFindings.some(v => v)) || saveApplying != null)" :data-tip="saveApplying != null ? t('editor.btn.saveCorrectionsProgress') : t('editor.btn.saveCorrections')" :aria-label="t('editor.btn.saveCorrections')">
              <span x-show="saveApplying != null" class="spinner"></span>
              <svg x-show="saveApplying == null" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#check"/></svg>
            </button>
          </span>
          <span class="action-sep" aria-hidden="true" x-show="canReview() && canEdit() && !checkDone"></span>
          <span class="action-group" x-show="canEdit() && !checkDone">
            <button type="button" class="icon-btn icon-btn--ghost" @click="startEdit()" :disabled="checkLoading || saveApplying != null || originalHtml === null" :data-tip="t('editor.btn.editTitle')" :aria-label="t('editor.btn.edit')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#pencil"/></svg>
            </button>
            <button type="button" class="icon-btn icon-btn--ghost" @click="enterFocusFromPageview()" :disabled="checkLoading || saveApplying != null || originalHtml === null" :data-tip="t('editor.btn.focusTitle')" :aria-label="t('editor.btn.focus')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#maximize"/></svg>
            </button>
          </span>
          <span class="action-sep" aria-hidden="true"></span>
          <span class="action-group">
            <span class="icon-btn-badge-wrap" x-show="canReview()">
              <button type="button" class="icon-btn icon-btn--ghost" @click="toggleChatCard()" :class="{ 'is-active': showChatCard }" :disabled="currentPageEmpty" :data-tip="t('editor.btn.chatTitle')" :aria-label="t('editor.btn.chat')">
                <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#message-square"/></svg>
              </button>
              <span class="icon-btn-badge" x-show="currentPageChatSessionCount > 0" x-text="currentPageChatSessionCount" :data-tip="t('editor.btn.chatCountTitle', { n: currentPageChatSessionCount })"></span>
            </span>
            <span class="icon-btn-badge-wrap" x-show="pageCommentCount > 0">
              <button type="button" class="icon-btn icon-btn--ghost" @click="window.dispatchEvent(new CustomEvent('comments-rail:toggle'))" :class="{ 'is-active': pageCommentRailOpen }" :data-tip="t('share.rail.toggle')" :aria-label="t('share.rail.toggle')" :aria-pressed="pageCommentRailOpen">
                <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#users"/></svg>
              </button>
              <span class="icon-btn-badge" x-text="pageCommentCount" :data-tip="t('share.openCommentsTitle', { n: pageCommentCount })"></span>
            </span>
            <span class="action-overflow" @click.outside="pageActionsMenuOpen = false" @keydown.escape.window="pageActionsMenuOpen = false">
              <span class="icon-btn-badge-wrap">
                <button type="button" class="icon-btn icon-btn--ghost"
                        :class="{ 'is-active': pageActionsMenuOpen }"
                        @click="pageActionsMenuOpen = !pageActionsMenuOpen"
                        aria-haspopup="menu" :aria-expanded="pageActionsMenuOpen"
                        :data-tip="t('editor.btn.moreActions')" :aria-label="t('editor.btn.moreActions')">
                  <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#more-horizontal"/></svg>
                </button>
                <span class="icon-btn-badge" x-show="currentPageIdeenOpenCount > 0" x-text="currentPageIdeenOpenCount" :data-tip="t('ideen.openCountTitle', { n: currentPageIdeenOpenCount })"></span>
              </span>
              <div class="context-menu context-menu--dropdown" x-show="pageActionsMenuOpen" x-cloak role="menu">
                <button type="button" class="context-menu-item context-menu-item--icon" :class="{ 'context-menu-item--on': showIdeenCard }" role="menuitem" @click="toggleIdeenCard(); pageActionsMenuOpen = false">
                  <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#lightbulb"/></svg>
                  <span x-text="t('ideen.title')"></span>
                  <span class="btn-count" x-show="currentPageIdeenOpenCount > 0" x-text="currentPageIdeenOpenCount"></span>
                </button>
                <button type="button" class="context-menu-item context-menu-item--icon" role="menuitem" x-show="currentPageRechercheCount > 0" @click="openRechercheForPage(currentPage?.id); pageActionsMenuOpen = false">
                  <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#book-open"/></svg>
                  <span x-text="t('recherche.title')"></span>
                  <span class="btn-count" x-text="currentPageRechercheCount"></span>
                </button>
                <button type="button" class="context-menu-item context-menu-item--icon" role="menuitem" x-show="canEdit() && currentPage" :disabled="currentPageEmpty" @click="openShareLinksForPage(currentPage.id); pageActionsMenuOpen = false">
                  <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#share-2"/></svg>
                  <span x-text="t('share.btn.sharePage')"></span>
                  <span class="btn-count" x-show="currentPageShareCommentCount > 0" x-text="currentPageShareCommentCount" :data-tip="t('share.openCommentsTitle', { n: currentPageShareCommentCount })"></span>
                </button>
              </div>
            </span>
          </span>
        </span>
      </template>
      <template x-if="editMode">
        <span class="display-contents">
          <span class="action-group">
            <button type="button" class="icon-btn icon-btn--ghost icon-btn--success" @click="saveEdit()" :disabled="editSaving" :data-tip="t('editor.btn.saveEditTitle')" :aria-label="t('common.save')">
              <span x-show="editSaving" class="spinner"></span>
              <svg x-show="!editSaving" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#check"/></svg>
            </button>
            <button type="button" class="icon-btn icon-btn--ghost" @click="cancelEdit()" :disabled="editSaving" :data-tip="t('common.cancel')" :aria-label="t('common.cancel')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg>
            </button>
          </span>
          <span class="action-sep" aria-hidden="true"></span>
          <span class="action-group">
            <button type="button" class="icon-btn icon-btn--ghost" @click="focusActive ? exitFocusMode() : enterFocusMode()" :class="{ 'is-active': focusActive }" :aria-pressed="focusActive" :data-tip="focusActive ? t('editor.btn.leaveFocusTitle') : t('editor.btn.enterFocusTitle')" :aria-label="focusActive ? t('editor.btn.leaveFocus') : t('editor.btn.focusShort')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#maximize"/></svg>
            </button>
          </span>
        </span>
      </template>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap" x-show="checkProgress > 0 || saveApplying != null">
    <div class="progress-bar" :style="{ '--progress': (checkProgress || saveApplying || 0) + '%' }"></div>
  </div>
  <div class="card-status" x-show="checkStatus" x-html="checkStatus"></div>
  <div id="status" x-html="statusHtml"></div>
  <!-- Page-Editor-Toolbar (Zoom/FitWidth/Fullscreen/HR). Lebt im Topbar, damit
       sie über die bestehende Sticky-Region permanent sichtbar bleibt — auch
       beim Scrollen tief in die Seite (Vollbild). -->
  <div class="page-editor-toolbar" x-show="editMode && !focusActive" x-cloak>
    <button type="button" class="icon-btn"
            :disabled="!notebookCanUndo()"
            :data-tip="t('editor.toolbar.undoTitle')" :aria-label="t('editor.toolbar.undoTitle')"
            @click="notebookUndo()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#undo"/></svg>
    </button>
    <button type="button" class="icon-btn"
            :disabled="!notebookCanRedo()"
            :data-tip="t('editor.toolbar.redoTitle')" :aria-label="t('editor.toolbar.redoTitle')"
            @click="notebookRedo()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#redo"/></svg>
    </button>
    <span class="action-sep" aria-hidden="true"></span>
    <button type="button" class="icon-btn"
            :data-tip="t('editor.toolbar.hrTitle')" :aria-label="t('editor.toolbar.hrTitle')"
            @click="insertHorizontalRule()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#separator-horizontal"/></svg>
    </button>
    <button type="button" class="icon-btn"
            :class="{ 'is-success': quotesNormalizedFlash }"
            :data-tip="quotesNormalizedFlash
              ? (quotesNormalizedFlash.count > 0
                  ? t('editor.toolbar.quotesDone', { count: quotesNormalizedFlash.count })
                  : t('editor.toolbar.quotesNone'))
              : t('editor.toolbar.quotesTitle')"
            :aria-label="t('editor.toolbar.quotesTitle')"
            @click="normalizeQuotes()">
      <svg class="icon" aria-hidden="true" x-show="!quotesNormalizedFlash"><use href="/icons.svg?v=690#quote"/></svg>
      <svg class="icon" aria-hidden="true" x-show="quotesNormalizedFlash" x-cloak><use href="/icons.svg?v=690#check"/></svg>
    </button>
    <span class="action-sep" aria-hidden="true"></span>
    <button type="button" class="icon-btn"
            :data-tip="t('graph.zoomOut')" :aria-label="t('graph.zoomOut')"
            @click="pageEditorZoomOut()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#minus"/></svg>
    </button>
    <button type="button" class="icon-btn"
            :data-tip="t('graph.zoomIn')" :aria-label="t('graph.zoomIn')"
            @click="pageEditorZoomIn()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#plus"/></svg>
    </button>
    <button type="button" class="icon-btn"
            :data-tip="t('graph.reset')" :aria-label="t('graph.reset')"
            @click="pageEditorZoomReset()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#scan"/></svg>
    </button>
    <button type="button" class="icon-btn"
            :aria-pressed="pageEditorFitWidth"
            :data-tip="pageEditorFitWidth ? t('editor.fitWidthOff') : t('editor.fitWidth')"
            :aria-label="pageEditorFitWidth ? t('editor.fitWidthOff') : t('editor.fitWidth')"
            @click="togglePageEditorFitWidth()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#move-horizontal"/></svg>
    </button>
    <button type="button" class="icon-btn"
            :aria-pressed="pageEditorFullscreen"
            :data-tip="pageEditorFullscreen ? t('graph.fullscreenClose') : t('graph.fullscreen')"
            :aria-label="pageEditorFullscreen ? t('graph.fullscreenClose') : t('graph.fullscreen')"
            @click="togglePageEditorFullscreen()">
      <svg class="icon" aria-hidden="true"><use :href="pageEditorFullscreen ? '/icons.svg?v=690#minimize-2' : '/icons.svg?v=690#maximize-2'"/></svg>
    </button>
    <!-- Steuerzeichen-Anzeige (Absatzmarken ¶ + Soft-Break ↵). Reine
         CSS-Pseudo-Element-Dekoration auf dem contenteditable — kein Markup im
         gespeicherten HTML. State pageEditorShowMarks (in editorPrefs). -->
    <button type="button" class="icon-btn"
            :aria-pressed="pageEditorShowMarks"
            :data-tip="pageEditorShowMarks ? t('editor.toolbar.marksOff') : t('editor.toolbar.marksOn')"
            :aria-label="pageEditorShowMarks ? t('editor.toolbar.marksOff') : t('editor.toolbar.marksOn')"
            @click="togglePageEditorShowMarks()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=692#pilcrow"/></svg>
    </button>
    <span class="action-sep" aria-hidden="true"></span>
    <!-- Entity-Linking-Toggle (Figuren/Orte-Highlights + Szenen/Ereignisse-Panel).
         Aendert nur die Buch-Setting; der Auf/Zu-Zustand der Klappschiene
         (entityPanelOpen) bleibt User-Wahl und wird nicht uebersteuert.
         Pure Buch-Setting (book_settings.entities_enabled) — Schreib-Pfad ist
         PUT /booksettings/:id/entities-enabled, Event book:settings:updated. -->
    <button type="button" class="icon-btn"
            :aria-pressed="entitiesEnabledForCurrentBook"
            :data-tip="entitiesEnabledForCurrentBook ? t('entities.toggle.off') : t('entities.toggle.on')"
            :aria-label="entitiesEnabledForCurrentBook ? t('entities.toggle.off') : t('entities.toggle.on')"
            @click="toggleEntitiesEnabledForCurrentBook()">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#radio"/></svg>
    </button>
    <!-- STT-Diktat-Mic schwebt im Editorfeld unten rechts (siehe
         editor-body-edit.html), nicht hier in der Toolbar. -->
  </div>
  </div><!-- /editor-card__topbar -->

  <!-- Live-Presence anderer User wird über den globalen Collab-Toast gemeldet
       (collab-toast.html, Variante currentPage), nicht über einen Editor-Banner. -->

  <!-- Self-Multi-Device: derselbe User hat dieselbe Seite auf einem anderen
       Gerät offen. Eigene aktuelle Session ist serverseitig schon ausgefiltert. -->
  <template x-if="currentPage && presenceFor(currentPage.id).filter(p => p.is_self).length > 0">
    <div class="editor-presence-banner editor-presence-banner--self" x-cloak>
      <span class="editor-presence-banner__text"
            x-text="presenceFor(currentPage.id).filter(p => p.is_self).length === 1
              ? t('presence.self.bannerOne', { device: presenceFor(currentPage.id).filter(p => p.is_self)[0].device_label || t('presence.device.unknown') })
              : t('presence.self.bannerMany', { count: presenceFor(currentPage.id).filter(p => p.is_self).length })"></span>
    </div>
  </template>

  <!-- Soft-Edit-Lock-Hinweis: anderer User hatte Editor zuletzt offen
       (last_heartbeat <30min). Reine Info; kein Save-Block (OCC schuetzt). -->
  <div class="editor-presence-banner editor-presence-banner--lock"
       x-show="foreignEditLock"
       x-cloak>
    <span class="editor-presence-banner__text"
          x-text="t('collab.lock.banner', {
            user: foreignEditLock?.user_display_name || t('edit.conflict.unknownUser'),
            until: foreignEditLock?.expires_at ? formatDate(foreignEditLock.expires_at) : ''
          })"></span>
  </div>

  <!-- Local-Draft-Recovery: localStorage hat ungespeicherten Entwurf für
       offene Seite (z. B. nach Server-Crash mid-write + Tab-Reopen). User
       wählt Resume (öffnet Edit) oder Discard. -->
  <div class="editor-draft-banner" role="status" x-show="pendingDraft && !editMode" x-cloak>
    <span class="editor-draft-banner__icon" aria-hidden="true">●</span>
    <span class="editor-draft-banner__text"
          x-text="t('edit.draftRecovery.banner', { when: pendingDraft?.savedAt ? formatDate(pendingDraft.savedAt) : '' })"></span>
    <button type="button" class="editor-draft-banner__action"
            @click="resumeDraft()"
            x-text="t('edit.draftRecovery.resume')"></button>
    <button type="button" class="editor-draft-banner__discard"
            @click="discardDraft()"
            x-text="t('edit.draftRecovery.discard')"></button>
  </div>

  <!-- Cross-User-Konflikt aus _checkPageConflict / Server-OCC. Bleibt im
       Fokusmodus sichtbar (eigene Klasse, nicht via #status versteckt). -->
  <div class="editor-conflict-banner" role="alert" x-show="editConflict" x-cloak>
    <svg class="icon editor-conflict-banner__icon" aria-hidden="true"><use href="/icons.svg?v=690#alert-triangle"/></svg>
    <span class="editor-conflict-banner__text"
          x-text="t('edit.conflict.banner', {
            user: editConflict?.remoteUserName || t('edit.conflict.unknownUser'),
            time: editConflict?.remoteUpdatedAt ? formatDate(editConflict.remoteUpdatedAt) : ''
          })"></span>
    <button type="button" class="editor-conflict-banner__action"
            @click="saveEdit()" :disabled="editSaving"
            x-text="t('edit.conflict.resolveBtn')"></button>
  </div>

  <!-- „Auf dieser Seite"-Panel (Entity-Linking + Kapitel-Figuren konsolidiert).
       Eine Collapsible mit drei Sektionen: Figuren (Kapitel-Scope), Szenen,
       Ereignisse. Stil + Hover-Tooltips wie .figure-context-panel. Lebt im
       Partial editor-entities-panel.html. -->
  <div id="partial-editor-entities-panel" class="display-contents"></div>

  <!-- Preview + optional Befunde: Layout wird zum Split, sobald geprüft wurde.
       editMode zeigt contenteditable statt Preview (Findings bleiben rechts sichtbar). -->
  <div class="editor-body-wrap" :class="{ 'lektorat-split': checkDone, 'comments-split': pageCommentRailOpen && !checkDone }">
    <div class="editor-preview-wrap" :class="checkDone ? 'lektorat-split-preview' : ''">
      <div id="partial-editor-body-edit"></div>
      <div id="partial-editor-body-view"></div>
    </div>
    <div id="partial-editor-findings" class="display-contents"></div>
    <!-- Kommentar-Leiste (Leseansicht): verankerte Share-Link-Leser-Kommentare
         rechts neben dem Text. Nur wenn die Seite Threads hat und nicht im
         Edit-/Lektorat-Split-Modus. -->
    <div id="partial-editor-comments" class="display-contents"></div>
  </div>

  <!-- Push-getriebener „Zuletzt bearbeitet auf <Gerät>"-Hint: das letzte Save
       dieser Seite kam von einem anderen EIGENEN Gerät (z. B. nativer Mac-Focus-
       Client). Passiv, kein Live-Signal — aktualisiert sich erst beim nächsten
       Speichern/Reload, nicht beim Tippen. Eigenes aktuelles Gerät + fremde User
       sind bereits in _resolvePageLastEditor ausgefiltert. Sitzt UNTER dem
       Editor-Frame (nicht oben unter der sticky Topbar — dort flackerte er beim
       Überfahren durch Sticky-Overlap-Repaints). -->
  <template x-if="pageLastEditor">
    <div class="editor-presence-banner editor-presence-banner--device" x-cloak>
      <span class="editor-presence-banner__text"
            x-text="t('presence.lastEdited', {
              device: pageLastEditor.device_name,
              rel: formatRelativeShort(pageLastEditor.updated_at)
            })"></span>
      <button type="button" class="editor-presence-banner__dismiss"
              @click="pageLastEditor = null"
              :aria-label="t('common.close')" :data-tip="t('common.close')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg>
      </button>
    </div>
  </template>

  <!-- Verlauf dieser Seite (Partial → pageHistoryCard) -->
  <div id="partial-page-history" class="display-contents"></div>

  <!-- App-eigene Revisionen (Partial → pageRevisionsCard) -->
  <div id="partial-page-revisions" class="display-contents"></div>
</div>
