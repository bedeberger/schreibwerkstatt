<!-- Custom-PDF-Export — Profile + Editor + Trigger -->
<!--
  Alpine.data-Sub-Komponente — public/js/cards/pdf-export-card.js.
  Tabs: Layout / Schrift / Kapitel / Cover / TOC / Extras / PDF/A.
  Pattern-Konformität (DESIGN.md):
    - Combobox statt <select>
    - .tabs / .tabs-btn (+ .tabs--scrollable) für Tab-Reihe
    - Standard-Buttons (kein eigenes pdfx-btn)
    - .card-form-row (Label links / Control rechts)
    - .collapsible-toggle + .history-chevron für lange Sektionen
    - .card-header > .card-actions für Speichern + Exportieren
    - .card-status / .card-form-saved / .card-form-error
-->
<div class="card card--pdfexport pdf-export-card" x-data="pdfExportCard" x-show="$app.showPdfExportCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('pdfExport.title')"></span>
    <div class="card-actions" x-show="_formMounted">
      <button type="button"
              :disabled="saving"
              @click="saveActiveProfile()">
        <span x-show="saving" class="spinner"></span>
        <span x-text="saving ? $app.t('common.saving') : $app.t('common.save')"></span>
      </button>
      <span class="card-form-saved" x-show="savedAt" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('pdfExport.saved')"></span>
      <div class="pdfx-scope-picker" x-show="!exporting">
        <div x-data="combobox({ placeholder: $app.t('export.scope.label'), compact: false })"
             x-modelable="value" x-model="exportScope"
             x-effect="options = exportScopeOptions()"></div>
        <div x-show="exportScope === 'chapter'"
             x-data="combobox({ placeholder: $app.t('export.scope.pickChapter'), compact: false })"
             x-modelable="value" x-model="exportChapterId"
             x-effect="options = exportChapterOptions()"></div>
        <button type="button"
                class="kapitel-include-subs-btn"
                x-show="exportScope === 'chapter' && selectedChapterHasSubs()"
                @click="exportIncludeSubchapters = !exportIncludeSubchapters"
                :class="{ primary: exportIncludeSubchapters }"
                :aria-pressed="exportIncludeSubchapters"
                :data-tip="$app.t('pdfExport.includeSubchaptersTip')">
          <svg class="icon" aria-hidden="true">
            <use :href="exportIncludeSubchapters ? '/icons.svg?v=687#check' : '/icons.svg?v=687#chevron-down'"/>
          </svg>
          <span x-text="$app.t('pdfExport.includeSubchapters')"></span>
        </button>
        <div x-show="exportScope === 'page'"
             x-data="combobox({ placeholder: $app.t('export.scope.pickPage'), compact: false })"
             x-modelable="value" x-model="exportPageId"
             x-effect="options = exportPageOptions()"></div>
      </div>
      <button type="button"
              class="primary"
              x-show="!exporting"
              :disabled="!$app.selectedBookId"
              :data-tip="!$app.selectedBookId ? $app.t('pdfExport.export.noBookHint') : ''"
              @click="exportPdf()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=636#download"/></svg>
        <span x-text="$app.t('pdfExport.export')"></span>
      </button>
      <button type="button"
              x-show="exporting"
              @click="cancelExport()">
        <span class="spinner"></span>
        <span x-text="$app.t('pdfExport.cancel')"></span>
      </button>
    </div>
  </div>

  <!-- Profile-Liste -->
  <div class="pdfx-profile-bar">
    <template x-for="p in profiles" :key="p.id">
      <button type="button"
              class="pdfx-profile-pill"
              :class="{ 'is-active': activeProfileId === p.id, 'is-default': p.is_default }"
              @click="selectProfile(p.id)">
        <span x-text="p.name"></span>
        <span class="pdfx-default-marker" x-show="p.is_default" x-text="$app.t('pdfExport.defaultMark')"></span>
      </button>
    </template>
    <button type="button"
            class="pdfx-profile-pill pdfx-profile-pill--new"
            :class="{ 'is-active': _showCreate }"
            @click="_showCreate = !_showCreate"
            x-text="$app.t('pdfExport.newProfile')"></button>
  </div>

  <!-- Neues Profil anlegen (eingeklappt) -->
  <div class="pdfx-create-panel" x-show="_showCreate" x-cloak>
    <input type="text"
           class="pdfx-name-input"
           x-model="newProfileName"
           :placeholder="$app.t('pdfExport.newPlaceholder')"
           @keydown.enter="createProfile()">
    <label class="pdfx-create-clone">
      <span class="pdfx-create-clone-label" x-text="$app.t('pdfExport.cloneLabel')"></span>
      <div x-data="combobox($app.t('pdfExport.cloneNone'))"
           x-modelable="value" x-model="cloneFromId"
           x-effect="options = [{ value: '', label: $app.t('pdfExport.cloneNone') }, ...profiles.map(p => ({ value: p.id, label: p.name }))]"
></div>
    </label>
    <div class="pdfx-create-actions">
      <button type="button"
              class="primary"
              :disabled="creating || !newProfileName.trim()"
              @click="createProfile()"
              x-text="$app.t('pdfExport.create')"></button>
      <button type="button"
              @click="_showCreate = false; newProfileName = ''; cloneFromId = null"
              x-text="$app.t('pdfExport.cancel')"></button>
    </div>
  </div>

  <div x-show="!_formMounted" class="card-status" x-text="$app.t('pdfExport.empty')"></div>

  <template x-if="_formMounted">
    <div>
      <!-- Profil-Header: Name + Default-Toggle + Delete -->
      <div class="list-header list-header--between list-header--wrap">
        <input type="text" class="pdfx-name-input" x-model="activeProfile.name">
        <div class="card-actions">
          <button type="button"
                  :disabled="activeProfile.is_default"
                  @click="setDefault(activeProfile.id)"
                  x-text="activeProfile.is_default ? $app.t('pdfExport.isDefault') : $app.t('pdfExport.setDefault')"></button>
          <button type="button"
                  class="danger"
                  @click="deleteProfile(activeProfile.id)"
                  x-text="$app.t('common.delete')"></button>
        </div>
      </div>

      <!-- Tabs (DESIGN.md .tabs) -->
      <div class="tabs tabs--scrollable pdfx-tabs">
        <template x-for="tab in ['layout','font','chapter','cover','toc','extras','author','pdfa']" :key="tab">
          <button type="button"
                  class="tabs-btn"
                  :class="{ 'tabs-btn--active': isTab(tab) }"
                  @click="setTab(tab)"
                  x-text="$app.t('pdfExport.tab.' + tab)"></button>
        </template>
      </div>

      <!-- Layout-Tab -->
      <div class="pdfx-tab-panel" x-show="isTab('layout')">
        <div class="card-form-grid">
          <div class="card-form-row">
            <label class="card-form-label" x-text="$app.t('pdfExport.layout.pageSize')"></label>
            <div class="card-form-field">
              <div x-data="combobox($app.t('pdfExport.layout.pageSize'))"
                   x-modelable="value" x-model="activeProfile.config.layout.pageSize"
                   x-effect="options = [{ value: 'A4', label: 'A4' }, { value: 'A5', label: 'A5' }, { value: 'A6', label: 'A6' }, { value: 'Letter', label: 'Letter' }, { value: 'custom', label: $app.t('pdfExport.layout.custom') }]"
></div>
            </div>
          </div>

          <template x-if="activeProfile.config.layout.pageSize === 'custom'">
            <div class="card-form-row">
              <label class="card-form-label" x-text="$app.t('pdfExport.layout.widthMm') + ' / ' + $app.t('pdfExport.layout.heightMm')"></label>
              <div class="card-form-field pdfx-inline-pair">
                <input type="text" x-data="numInput({ step: 1, min: 50, max: 500 })" x-modelable="value" x-model="activeProfile.config.layout.customWidthMm" class="pdfx-num-input">
                <input type="text" x-data="numInput({ step: 1, min: 50, max: 700 })" x-modelable="value" x-model="activeProfile.config.layout.customHeightMm" class="pdfx-num-input">
              </div>
            </div>
          </template>

          <div class="card-form-row">
            <label class="card-form-label" x-text="$app.t('pdfExport.layout.columns')"></label>
            <div class="card-form-field">
              <div x-data="combobox($app.t('pdfExport.layout.columns'))"
                   x-modelable="value" x-model="activeProfile.config.layout.columns"
                   x-effect="options = [{ value: 1, label: '1' }, { value: 2, label: '2' }]"
></div>
            </div>
          </div>

          <div class="collapsible-wrap">
            <button type="button"
                    class="collapsible-toggle"
                    @click="secOpen.margins = !secOpen.margins"
                    :aria-expanded="secOpen.margins">
              <span class="history-chevron" :class="{ open: secOpen.margins }">›</span>
              <span x-text="$app.t('pdfExport.layout.margins')"></span>
            </button>
            <div x-show="secOpen.margins" x-cloak class="collapsible-section">
              <div class="pdfx-num-grid pdfx-num-grid--4">
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.top')"></span><input type="text" x-data="numInput({ step: 1, min: 5, max: 80 })" x-modelable="value" x-model="activeProfile.config.layout.marginsMm.top" class="pdfx-num-input"></label>
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.right')"></span><input type="text" x-data="numInput({ step: 1, min: 5, max: 80 })" x-modelable="value" x-model="activeProfile.config.layout.marginsMm.right" class="pdfx-num-input"></label>
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.bottom')"></span><input type="text" x-data="numInput({ step: 1, min: 5, max: 80 })" x-modelable="value" x-model="activeProfile.config.layout.marginsMm.bottom" class="pdfx-num-input"></label>
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.left')"></span><input type="text" x-data="numInput({ step: 1, min: 5, max: 80 })" x-modelable="value" x-model="activeProfile.config.layout.marginsMm.left" class="pdfx-num-input"></label>
              </div>
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.layout.mirrorMargins">
                <span x-text="$app.t('pdfExport.layout.mirrorMargins')"></span>
              </label>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.layout.mirrorMarginsHint')"></p>
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.layout.hyphenate">
                <span x-text="$app.t('pdfExport.layout.hyphenate')"></span>
              </label>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.layout.hyphenateHint')"></p>
              <label class="pdfx-check">
                <input type="checkbox" x-model="activeProfile.config.layout.widowOrphanControl">
                <span x-text="$app.t('pdfExport.layout.widowOrphan')"></span>
              </label>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.layout.widowOrphanHint')"></p>
            </div>
          </div>

          <div class="collapsible-wrap">
            <button type="button"
                    class="collapsible-toggle"
                    @click="secOpen.bodyInset = !secOpen.bodyInset"
                    :aria-expanded="secOpen.bodyInset">
              <span class="history-chevron" :class="{ open: secOpen.bodyInset }">›</span>
              <span x-text="$app.t('pdfExport.layout.bodyInset')"></span>
            </button>
            <div x-show="secOpen.bodyInset" x-cloak class="collapsible-section">
              <p class="card-form-field-note" x-text="$app.t('pdfExport.layout.bodyInsetHint')"></p>
              <div class="pdfx-num-grid pdfx-num-grid--4">
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.top')"></span><input type="text" x-data="numInput({ step: 1, min: 0, max: 60 })" x-modelable="value" x-model="activeProfile.config.layout.bodyInsetMm.top" class="pdfx-num-input"></label>
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.right')"></span><input type="text" x-data="numInput({ step: 1, min: 0, max: 60 })" x-modelable="value" x-model="activeProfile.config.layout.bodyInsetMm.right" class="pdfx-num-input"></label>
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.bottom')"></span><input type="text" x-data="numInput({ step: 1, min: 0, max: 60 })" x-modelable="value" x-model="activeProfile.config.layout.bodyInsetMm.bottom" class="pdfx-num-input"></label>
                <label class="pdfx-num-field"><span x-text="$app.t('pdfExport.layout.edge.left')"></span><input type="text" x-data="numInput({ step: 1, min: 0, max: 60 })" x-modelable="value" x-model="activeProfile.config.layout.bodyInsetMm.left" class="pdfx-num-input"></label>
              </div>
            </div>
          </div>

          <div class="collapsible-wrap">
            <button type="button"
                    class="collapsible-toggle"
                    @click="secOpen.headerFooter = !secOpen.headerFooter"
                    :aria-expanded="secOpen.headerFooter">
              <span class="history-chevron" :class="{ open: secOpen.headerFooter }">›</span>
              <span x-text="$app.t('pdfExport.layout.headerFooter')"></span>
            </button>
            <div x-show="secOpen.headerFooter" x-cloak class="collapsible-section">
              <p class="card-form-field-note" x-text="$app.t('pdfExport.layout.tokensHint')"></p>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.layout.headerLeft')"></label>
                <div class="card-form-field"><input x-model="activeProfile.config.layout.headerLeft" class="pdfx-text-input"></div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.layout.headerCenter')"></label>
                <div class="card-form-field"><input x-model="activeProfile.config.layout.headerCenter" class="pdfx-text-input"></div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.layout.headerRight')"></label>
                <div class="card-form-field"><input x-model="activeProfile.config.layout.headerRight" class="pdfx-text-input"></div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.layout.footerLeft')"></label>
                <div class="card-form-field"><input x-model="activeProfile.config.layout.footerLeft" class="pdfx-text-input"></div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.layout.footerCenter')"></label>
                <div class="card-form-field"><input x-model="activeProfile.config.layout.footerCenter" class="pdfx-text-input"></div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.layout.footerRight')"></label>
                <div class="card-form-field"><input x-model="activeProfile.config.layout.footerRight" class="pdfx-text-input"></div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label" x-text="$app.t('pdfExport.layout.pageNumberStart')"></label>
                <div class="card-form-field">
                  <input type="text" x-data="numInput({ step: 1, min: 1, max: 9999 })" x-modelable="value" x-model="activeProfile.config.layout.pageNumberStart" class="pdfx-num-input">
                </div>
              </div>
              <div class="card-form-row">
                <label class="card-form-label">&nbsp;</label>
                <div class="card-form-field">
                  <label class="pdfx-check">
                    <input type="checkbox" x-model="activeProfile.config.layout.headerRule">
                    <span x-text="$app.t('pdfExport.layout.headerRule')"></span>
                  </label>
                  <label class="pdfx-check">
                    <input type="checkbox" x-model="activeProfile.config.layout.footerRule">
                    <span x-text="$app.t('pdfExport.layout.footerRule')"></span>
                  </label>
                  <label class="pdfx-check">
                    <input type="checkbox" x-model="activeProfile.config.layout.showHeaderOnChapterStart">
                    <span x-text="$app.t('pdfExport.layout.showHeaderOnChapterStart')"></span>
                  </label>
                  <label class="pdfx-check">
                    <input type="checkbox" x-model="activeProfile.config.layout.showFooterOnChapterStart">
                    <span x-text="$app.t('pdfExport.layout.showFooterOnChapterStart')"></span>
                  </label>
                </div>
              </div>
              <div x-show="activeProfile.config.layout.mirrorMargins" x-cloak>
                <p class="card-form-field-note" x-text="$app.t('pdfExport.layout.versoSlotsHint')"></p>
                <div class="card-form-row">
                  <label class="card-form-label" x-text="$app.t('pdfExport.layout.headerVersoLeft')"></label>
                  <div class="card-form-field"><input x-model="activeProfile.config.layout.headerVersoLeft" class="pdfx-text-input"></div>
                </div>
                <div class="card-form-row">
                  <label class="card-form-label" x-text="$app.t('pdfExport.layout.headerVersoCenter')"></label>
                  <div class="card-form-field"><input x-model="activeProfile.config.layout.headerVersoCenter" class="pdfx-text-input"></div>
                </div>
                <div class="card-form-row">
                  <label class="card-form-label" x-text="$app.t('pdfExport.layout.headerVersoRight')"></label>
                  <div class="card-form-field"><input x-model="activeProfile.config.layout.headerVersoRight" class="pdfx-text-input"></div>
                </div>
                <div class="card-form-row">
                  <label class="card-form-label" x-text="$app.t('pdfExport.layout.footerVersoLeft')"></label>
                  <div class="card-form-field"><input x-model="activeProfile.config.layout.footerVersoLeft" class="pdfx-text-input"></div>
                </div>
                <div class="card-form-row">
                  <label class="card-form-label" x-text="$app.t('pdfExport.layout.footerVersoCenter')"></label>
                  <div class="card-form-field"><input x-model="activeProfile.config.layout.footerVersoCenter" class="pdfx-text-input"></div>
                </div>
                <div class="card-form-row">
                  <label class="card-form-label" x-text="$app.t('pdfExport.layout.footerVersoRight')"></label>
                  <div class="card-form-field"><input x-model="activeProfile.config.layout.footerVersoRight" class="pdfx-text-input"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Schrift-Tab -->
      <div class="pdfx-tab-panel" x-show="isTab('font')">
        <template x-for="group in [
            { key: 'body',       roles: ['body','heading'] },
            { key: 'titlePages', roles: ['title','subtitle','byline','dedication','frontMatter','year'] },
            { key: 'backmatter', roles: ['authorBio'] },
            { key: 'imprint',    roles: ['imprint'] }
          ]" :key="group.key">
          <div class="pdfx-font-group">
            <h4 class="pdfx-font-group-title" x-text="$app.t('pdfExport.font.group.' + group.key)"></h4>

            <template x-for="role in group.roles" :key="role">
              <div class="pdfx-font-role collapsible-wrap">
                <button type="button"
                        class="collapsible-toggle pdfx-font-role-toggle"
                        @click="fontRoleOpen[role] = !fontRoleOpen[role]"
                        :aria-expanded="fontRoleOpen[role]">
                  <span class="history-chevron" :class="{ open: fontRoleOpen[role] }" aria-hidden="true">›</span>
                  <span x-text="$app.t('pdfExport.font.' + role)"></span>
                  <span class="pdfx-font-role-summary"
                        x-text="activeProfile.config.font[role].family + ' : ' + activeProfile.config.font[role].weight"></span>
                </button>

                <div x-show="fontRoleOpen[role]" x-cloak class="collapsible-section">
                  <div class="card-form-row">
                    <label class="card-form-label" x-text="$app.t('pdfExport.font.family')"></label>
                    <div class="card-form-field">
                      <div x-data="combobox($app.t('pdfExport.font.family'))"
                           x-modelable="value" x-model="activeProfile.config.font[role].family"
                           x-effect="options = fontList.map(f => ({ value: f.family, label: f.family }))"
                           @combobox-change="onFontPick(role, $event.detail)"
></div>
                    </div>
                  </div>

                  <div class="card-form-row">
                    <label class="card-form-label" x-text="$app.t('pdfExport.font.weight')"></label>
                    <div class="card-form-field">
                      <div x-data="combobox($app.t('pdfExport.font.weight'))"
                           x-modelable="value" x-model="activeProfile.config.font[role].weight"
                           x-effect="options = ((fontList.find(f => f.family === activeProfile?.config?.font?.[role]?.family)?.weights) || [400]).map(w => ({ value: w, label: String(w) }))"
></div>
                    </div>
                  </div>

                  <template x-if="role !== 'heading'">
                    <div class="card-form-row">
                      <label class="card-form-label" x-text="$app.t('pdfExport.font.sizePt')"></label>
                      <div class="card-form-field">
                        <input type="text" x-data="numInput({ step: 1, min: 6, max: 72 })" x-modelable="value" x-model="activeProfile.config.font[role].sizePt" class="pdfx-num-input">
                      </div>
                    </div>
                  </template>

                  <template x-if="role === 'heading'">
                    <div class="pdfx-num-grid pdfx-num-grid--3">
                      <label class="pdfx-num-field"><span>h1 (pt)</span><input type="text" x-data="numInput({ step: 1, min: 10, max: 60 })" x-modelable="value" x-model="activeProfile.config.font.heading.sizes.h1" class="pdfx-num-input"></label>
                      <label class="pdfx-num-field"><span>h2 (pt)</span><input type="text" x-data="numInput({ step: 1, min: 9,  max: 48 })" x-modelable="value" x-model="activeProfile.config.font.heading.sizes.h2" class="pdfx-num-input"></label>
                      <label class="pdfx-num-field"><span>h3 (pt)</span><input type="text" x-data="numInput({ step: 1, min: 8,  max: 36 })" x-modelable="value" x-model="activeProfile.config.font.heading.sizes.h3" class="pdfx-num-input"></label>
                    </div>
                  </template>

                  <template x-if="role === 'body'">
                    <div>
                      <div class="card-form-row">
                        <label class="card-form-label" x-text="$app.t('pdfExport.font.lineHeight')"></label>
                        <div class="card-form-field">
                          <input type="text" x-data="numInput({ step: 0.05, min: 0.8, max: 3 })" x-modelable="value" x-model="activeProfile.config.font.body.lineHeight" class="pdfx-num-input">
                        </div>
                      </div>
                      <div class="card-form-row">
                        <label class="card-form-label" x-text="$app.t('pdfExport.font.paragraphGap')"></label>
                        <div class="card-form-field">
                          <input type="text" x-data="numInput({ step: 0.05, min: 0, max: 3 })" x-modelable="value" x-model="activeProfile.config.font.body.paragraphGap" class="pdfx-num-input">
                        </div>
                      </div>
                      <div class="card-form-row">
                        <label class="card-form-label" x-text="$app.t('pdfExport.font.firstLineIndentMm')"></label>
                        <div class="card-form-field">
                          <input type="text" x-data="numInput({ step: 0.5, min: 0, max: 30 })" x-modelable="value" x-model="activeProfile.config.font.body.firstLineIndentMm" class="pdfx-num-input">
                        </div>
                      </div>
                      <div class="card-form-row">
                        <label class="card-form-label" x-text="$app.t('pdfExport.font.numerals')"></label>
                        <div class="card-form-field">
                          <div x-data="combobox($app.t('pdfExport.font.numerals'))"
                               x-modelable="value" x-model="activeProfile.config.font.body.numerals"
                               x-effect="options = [{ value: 'auto', label: $app.t('pdfExport.font.numerals.auto') }, { value: 'lining', label: $app.t('pdfExport.font.numerals.lining') }, { value: 'oldstyle', label: $app.t('pdfExport.font.numerals.oldstyle') }]"
></div>
                        </div>
                      </div>
                    </div>
                  </template>

                  <div class="card-form-row">
                    <label class="card-form-label">

            <div class="card-form-field">
              <textarea x-model="activeProfile.config.extras.frontMatter" class="card-form-textarea" rows="4" data-spellcheck="spelling"></textarea>
              <p class="card-form-field-note" x-text="$app.t('pdfExport.extras.frontMatterHint')"></p>
            </div>
          </div>
          <div class="card-form-row card-form-row--top">
            <label class="card-form-label" x-text="$app.t('pdfExport.extras.imprint')"></label>
            <div class="card-form-field">
              <textarea x-model="activeProfile.config.extras.imprint" class="card-form-textarea" rows="6" data-spellcheck="spelling"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Autor-Tab ("Über den Autor"-Seite) -->
      <div class="pdfx-tab-panel" x-show="isTab('author')">
        <p class="card-form-field-note" x-text="$app.t('pdfExport.author.hint')"></p>
        <div class="pdfx-cover-preview pdfx-author-preview">
          <template x-if="activeProfile.has_author_image">
            <img :src="authorImageUrl()" alt="">
          </template>
          <template x-if="!activeProfile.has_author_image">
            <span x-text="$app.t('pdfExport.author.noPhoto')"></span>
          </template>
        </div>
        <div class="pdfx-cover-actions">
          <label class="pdfx-file-btn">
            <input type="file" accept="image/jpeg,image/png,image/webp" hidden @change="uploadAuthorImage($event)">
            <span x-text="authorImageUploading ? $app.t('pdfExport.author.uploading') : (activeProfile.has_author_image ? $app.t('pdfExport.author.replacePhoto') : $app.t('pdfExport.author.uploadPhoto'))"></span>
          </label>
          <button type="button"
                  x-show="activeProfile.has_author_image"
                  @click="removeAuthorImage()"
                  x-text="$app.t('pdfExport.author.removePhoto')"></button>
        </div>
        <p class="card-form-error" x-show="authorImageError" x-text="authorImageError"></p>

        <div class="card-form-grid">
          <div class="card-form-row card-form-row--top">
            <label class="card-form-label" x-text="$app.t('pdfExport.author.bio')"></label>
            <div class="card-form-field">
              <textarea x-model="activeProfile.config.extras.authorBio" class="card-form-textarea" rows="8" data-spellcheck="spelling"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- PDF/A-Tab -->
      <div class="pdfx-tab-panel" x-show="isTab('pdfa')">
        <label class="pdfx-check pdfx-check--leading">
          <input type="checkbox" x-model="activeProfile.config.pdfa.enabled">
          <span x-text="$app.t('pdfExport.pdfa.enabled')"></span>
        </label>
        <p class="card-form-field-note" x-text="$app.t('pdfExport.pdfa.hint')"></p>
      </div>

      <!-- Progress / Errors -->
      <div class="pdfx-progress" x-show="exporting || (exportProgress > 0 && !exportError)">
        <div class="progress-bar-wrap">
          <div class="progress-bar" :style="{ '--progress': exportProgress + '%' }"></div>
        </div>
        <p class="card-form-field-note" x-text="exportStatus"></p>
      </div>
      <p class="card-form-error" x-show="exportError" x-text="exportError"></p>
    </div>
  </template>
</div>
