<!-- Custom-PDF-Export — Profile + Editor + Trigger -->
<!--
  Alpine.data-Sub-Komponente — public/js/cards/pdf-export-card.js.
  Aufbau identisch zu Word/EPUB (export-shared.css): Header mit Scope-Picker +
  Export, Hint, einzeilige Profil-Leiste (Combobox + Icon-Aktionen), Anlege-
  Zeile, Tabs, Speichern-Footer unten. Tabs: Layout / Schrift / Kapitel /
  Cover / TOC / Extras / Druck / Norm.
  Pattern-Konformität (DESIGN.md): Combobox statt <select>, .tabs / .tabs-btn,
  Standard-Buttons, .card-form-row, .collapsible-toggle + .history-chevron,
  .card-form-saved / .card-form-error.
-->
<div class="card card--pdfexport pdf-export-card" x-data="pdfExportCard" x-show="$app.showPdfExportCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('pdfExport.title')"></span>
    <div class="card-actions">
      <div class="export-scope-picker" x-show="!exporting">
        <div x-data="combobox({ placeholder: $app.t('export.scope.label'), compact: false })"
             x-modelable="value" x-model="exportScope"
             x-effect="options = exportScopeOptions()"></div>
        <div x-show="exportScope === 'book' && exportSnapshots.length"
             x-data="combobox({ placeholder: $app.t('export.snapshot.label'), compact: false })"
             x-modelable="value" x-model="exportSnapshotId"
             x-effect="options = exportSnapshotOptions()"></div>
        <div x-show="exportScope === 'chapter'"
             x-data="combobox({ placeholder: $app.t('export.scope.pickChapter'), compact: false })"
             x-modelable="value" x-model="exportChapterId"
             x-effect="options = exportChapterOptions()"></div>
        <button type="button"
                class="kapitel-include-subs-btn"
                x-show="exportScope === 'chapter' && selectedChapterHasSubs()"
                @click="exportIncludeSubchapters = !exportIncludeSubchapters"
                :class="{ primary: exportIncludeSubchapters }"
                :aria-pressed="exportIncludeSubchapters"
                :data-tip="$app.t('pdfExport.includeSubchaptersTip')">
          <svg class="icon" aria-hidden="true">
            <use :href="exportIncludeSubchapters ? '/icons.svg?v=690#check' : '/icons.svg?v=690#chevron-down'"/>
          </svg>
          <span x-text="$app.t('pdfExport.includeSubchapters')"></span>
        </button>
        <div x-show="exportScope === 'page'"
             x-data="combobox({ placeholder: $app.t('export.scope.pickPage'), compact: false })"
             x-modelable="value" x-model="exportPageId"
             x-effect="options = exportPageOptions()"></div>
      </div>
      <button type="button"
              class="primary"
              x-show="!exporting"
              :disabled="!$store.nav.selectedBookId || !activeProfile"
              :data-tip="!$store.nav.selectedBookId ? $app.t('pdfExport.export.noBookHint') : ''"
              @click="exportPdf()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#download"/></svg>
        <span x-text="$app.t('pdfExport.export')"></span>
      </button>
      <button type="button" data-label-ok
              x-show="exporting"
              @click="cancelExport()">
        <span class="spinner"></span>
        <span x-text="$app.t('pdfExport.cancel')"></span>
      </button>
    </div>
  </div>

  <p class="card-form-hint" x-text="$app.t('pdfExport.hint')"></p>

  <!-- Profil-Leiste (einzeilig): Auswahl-Combobox + Aktionen (neu/standard/löschen) -->
  <div class="export-profile-bar">
    <label class="card-form-label" x-text="$app.t('pdfExport.profile')"></label>
    <div class="export-profile-pick"
         x-data="combobox({ placeholder: $app.t('pdfExport.profile'), compact: false })"
         x-modelable="value" x-model="activeProfileId"
         x-effect="options = profiles.map(p => ({ value: p.id, label: p.name + (p.is_default ? ' ★' : '') }))"
         @combobox-change="selectProfile($event.detail)"></div>
    <button type="button" class="export-profile-btn" :data-tip="$app.t('pdfExport.newProfile')"
            @click="_showCreate = !_showCreate">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#plus"/></svg>
    </button>
    <button type="button" class="export-profile-btn" x-show="activeProfile && !activeProfile.is_default"
            :data-tip="$app.t('pdfExport.makeDefault')" @click="setDefault(activeProfileId)">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#check"/></svg>
    </button>
    <button type="button" class="export-profile-btn" x-show="profiles.length > 1"
            :data-tip="$app.t('pdfExport.deleteProfile')" @click="deleteProfile(activeProfileId)">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#trash"/></svg>
    </button>
  </div>

  <!-- Neues Profil anlegen (eingeklappt) -->
  <div class="export-create-row" x-show="_showCreate" x-cloak>
    <input type="text" class="card-form-input" x-model="newProfileName"
           :placeholder="$app.t('pdfExport.newPlaceholder')" maxlength="80"
           @keydown.enter="createProfile()" data-spellcheck="spelling">
    <label class="export-create-clone">
      <span class="export-create-clone-label" x-text="$app.t('pdfExport.cloneLabel')"></span>
      <div x-data="combobox($app.t('pdfExport.cloneNone'))"
           x-modelable="value" x-model="cloneFromId"
           x-effect="options = [{ value: '', label: $app.t('pdfExport.cloneNone') }, ...profiles.map(p => ({ value: p.id, label: p.name }))]"
></div>
    </label>
    <button type="button" class="primary" data-label-ok
            :disabled="creating || !newProfileName.trim()"
            @click="createProfile()"
            x-text="$app.t('pdfExport.create')"></button>
  </div>

  <template x-if="_formMounted && activeProfile">
    <div x-data="tabs(['layout','font','chapter','cover','toc','extras','print','pdfa'])"
         x-modelable="value" x-model="activeTab">
      <!-- Tabs (DESIGN.md .tabs / Alpine.data('tabs')) -->
      <div class="tabs tabs--scrollable export-tabs" x-bind="tablist">
        <template x-for="tab in tabs" :key="tab">
          <button class="tabs-btn"
                  x-bind="tabBtn(tab)"
                  x-text="$app.t('pdfExport.tab.' + tab)"></button>
        </template>
      </div>

      <!-- @include pdf-export-layout -->
      <!-- @include pdf-export-font -->
      <!-- @include pdf-export-chapter -->
      <!-- @include pdf-export-cover -->
      <!-- @include pdf-export-toc -->
      <!-- @include pdf-export-extras -->
      <!-- @include pdf-export-print -->
      <!-- @include pdf-export-pdfa -->

      <!-- Persistenter Footer: Speichern gilt für alle Tabs (Profil-Config) -->
      <div class="card-actions">
        <span class="card-form-saved" x-show="savedAt" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('pdfExport.saved')"></span>
        <button type="button" data-label-ok :disabled="saving" @click="saveActiveProfile()">
          <span x-show="saving" class="spinner"></span>
          <span x-text="saving ? $app.t('common.saving') : $app.t('common.save')"></span>
        </button>
      </div>

      <!-- Progress / Errors -->
      <div class="export-progress" x-show="exporting || (exportProgress > 0 && !exportError)">
        <div class="progress-bar-wrap">
          <div class="progress-bar" :style="{ '--progress': exportProgress + '%' }"></div>
        </div>
        <p class="card-form-field-note" x-text="exportStatus"></p>
      </div>
      <p class="card-form-error" x-show="exportError" x-text="exportError"></p>
      <p class="card-form-field-note pdfx-lowres-warn" x-show="exportLowRes > 0"
         x-text="$app.t('pdfExport.print.lowResWarning', { count: exportLowRes })"></p>
    </div>
  </template>
</div>
