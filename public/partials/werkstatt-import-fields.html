<!-- Geteilter Import-Picker (Ladezustand / Leer-Hinweis / Figuren-Combobox +
     Übernehmen/Abbrechen). Via @include im Empty-State und Sidebar eingebunden.
     Combobox listet Buch-Figuren ohne aktiven Draft; Auswahl + Übernehmen
     erzeugt Draft mit Mindmap aus figures-Feldern und source_figure_id-Referenz. -->
<div x-show="importablesLoading" class="card-status" x-text="$app.t('werkstatt.import.loading')"></div>
<div x-show="!importablesLoading && importables.length === 0" class="card-status" x-text="$app.t('werkstatt.import.empty')"></div>
<div x-show="!importablesLoading && importables.length > 0" class="form-stack">
  <div x-data="entityPicker({ entity: 'custom', placeholder: $app.t('werkstatt.import.placeholder'), items: () => importables.map(f => ({ value: String(f.id), label: f.name + (f.typ ? ' [' + f.typ + ']' : ''), sublabel: importFigureContext(f) })) })"
       x-modelable="value" x-model="selectedImportFigureId"></div>
</div>
<div class="werkstatt-create-row">
  <button type="button" class="primary" :disabled="busy || !selectedImportFigureId" @click="runImport()" x-text="$app.t('werkstatt.import.confirm')"></button>
  <button type="button" :disabled="busy" @click="cancelImport()" x-text="$app.t('common.cancel')"></button>
</div>
