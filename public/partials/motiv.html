<!-- Motiv-Werkstatt (Themen & Motive als Konstellation) -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/motiv-card.js.
  Themen = Cluster, Motive = Naben (Grösse = Ist-Dichte aus motif_occurrences),
  Motiv↔Motiv-Beziehungen = Kanten, Soll-Layer (Figuren/Beats/Kapitel) zuschaltbar.
  KI-Motiverkennung (Job motif-scan) füllt den Ist-Index; nie generativ im Text.
-->
<div class="card card--motiv" x-data="motivCard" x-show="$app.showMotivCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('motiv.title')"></span>
      <div class="card-subline" x-show="motifs.length > 0">
        <span class="card-timestamp"
              x-text="$app.t('motiv.stats', { motifs: motivStats().motifs, themes: motivStats().themes, withOcc: motivStats().withOcc, ghosts: motivStats().ghosts })"></span>
      </div>
    </div>
    <div class="card-header-aside">
      <div class="card-actions card-actions--grouped">
        <button type="button" class="icon-btn icon-btn--ghost"
                @click="runBrainstorm()" :disabled="brainstorming"
                :data-tip="$app.t('motiv.brainstorm.run')" :aria-label="$app.t('motiv.brainstorm.run')">
          <span x-show="brainstorming" class="spinner"></span>
          <svg x-show="!brainstorming" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#lightbulb"/></svg>
        </button>
        <button type="button" class="icon-btn icon-btn--ghost"
                @click="runScan()" :disabled="scanning || !motifs.length"
                :data-tip="$app.t('motiv.scan.run')" :aria-label="$app.t('motiv.scan.run')">
          <span x-show="scanning" class="spinner"></span>
          <svg x-show="!scanning" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#search"/></svg>
        </button>
        <button type="button" class="icon-btn icon-btn--ghost" @click="fitGraph()"
                :data-tip="$app.t('motiv.graph.fit')" :aria-label="$app.t('motiv.graph.fit')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#scan"/></svg>
        </button>
        <button type="button" class="icon-btn icon-btn--ghost" @click="resetLayout()"
                :data-tip="$app.t('motiv.graph.resetLayout')" :aria-label="$app.t('motiv.graph.resetLayout')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#undo"/></svg>
        </button>
        <button type="button" class="icon-btn icon-btn--ghost"
                :class="{ 'is-active': motivFullscreen }"
                :aria-pressed="motivFullscreen"
                @click="toggleMotivFullscreen()"
                :aria-label="motivFullscreen ? $app.t('motiv.fullscreenExit.tip') : $app.t('motiv.fullscreen.tip')"
                :data-tip="motivFullscreen ? $app.t('motiv.fullscreenExit.tip') : $app.t('motiv.fullscreen.tip')"><svg class="icon" aria-hidden="true"><use :href="motivFullscreen ? '/icons.svg?v=693#minimize-2' : '/icons.svg?v=693#maximize-2'"/></svg></button>
      </div>
    </div>
  </div>

  <!-- Scan-Fortschritt -->
  <div class="motiv-progress" x-show="scanning" x-cloak>
    <div class="progress-bar" :style="{ '--progress': scanProgress + '%' }"></div>
  </div>

  <div x-show="errorMessage" class="card-status card-status--error" x-text="errorMessage"></div>

  <!-- KI-Vorschläge (Brainstorm): übernehmen legt Thema/Motiv an, nie im Text -->
  <div class="motiv-suggestions" x-show="suggestions.length" x-cloak>
    <h4 class="motiv-panel-heading" x-text="$app.t('motiv.brainstorm.title')"></h4>
    <div class="motiv-suggestion-list">
      <template x-for="(s, i) in suggestions" :key="i">
        <div class="motiv-suggestion">
          <div class="motiv-sugg-body">
            <span class="badge-source" x-text="$app.t('motiv.brainstorm.typ.' + s.typ)"></span>
            <span class="motiv-sugg-name" x-text="s.name"></span>
            <span class="motiv-sugg-desc" x-text="s.beschreibung" x-show="s.beschreibung"></span>
            <span class="motiv-sugg-triggers" x-show="s.trigger_terms && s.trigger_terms.length"
                  x-text="(s.trigger_terms || []).join(', ')"></span>
          </div>
          <div class="motiv-sugg-actions">
            <div class="motiv-sugg-theme" x-show="s.typ === 'motiv' && themes.length"
                 x-data="combobox($app.t('motiv.motif.themeOptional'), $app.t('motiv.noTheme'))"
                 x-modelable="value" x-model="s.themeIdDraft" x-effect="options = themeOptions()"></div>
            <button type="button" class="btn-compact" @click="adoptSuggestion(s)" x-text="$app.t('motiv.brainstorm.adopt')"></button>
            <button type="button" class="icon-btn icon-btn--ghost" @click="dismissSuggestion(s)"
                    :data-tip="$app.t('motiv.brainstorm.dismiss')" :aria-label="$app.t('motiv.brainstorm.dismiss')">
              <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- KI-Brainstorm-Lauf-Historie: persistierte Läufe pro Buch. Klick lädt die
       Vorschläge zurück ins Panel oben (selectedBrainstormRunId). Wie der Plot-/
       Werkstatt-Run-Verlauf. -->
  <div class="history-bar" x-show="brainstormRuns.length > 0" x-cloak>
    <div class="history-heading" x-text="$app.t('motiv.brainstorm.runs', { count: brainstormRuns.length })"></div>
    <template x-for="r in brainstormRuns" :key="r.id">
      <div class="history-item" :class="{ 'history-item--open': selectedBrainstormRunId === r.id }"
           @click="openBrainstormRun(r)">
        <span class="history-date" x-text="formatRunDate(r.created_at)"></span>
        <span class="tag" x-text="$app.t('motiv.brainstorm.vorschlagCount', { n: r.vorschlag_count })"></span>
        <span x-show="r.model" class="tag" x-text="r.model"></span>
        <span class="history-chevron" :class="{ open: selectedBrainstormRunId === r.id }" aria-hidden="true"></span>
        <button type="button" class="history-item-delete"
                @click.stop="deleteBrainstormRun(r.id)"
                :data-tip="$app.t('common.deleteEntry')"
                :aria-label="$app.t('common.deleteEntry')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#trash"/></svg></button>
      </div>
    </template>
  </div>

  <!-- Anlege-Leiste -->
  <div class="motiv-toolbar">
    <div class="motiv-toolbar-group">
      <input type="text" class="motiv-add-input" x-model="newThemeName" data-spellcheck="spelling"
             :placeholder="$app.t('motiv.theme.namePlaceholder')" @keydown.enter="addTheme()">
      <button type="button" class="btn-compact" @click="addTheme()" :disabled="busy || !newThemeName.trim()" x-text="$app.t('motiv.theme.add')"></button>
    </div>
    <div class="motiv-toolbar-group">
      <input type="text" class="motiv-add-input" x-model="newMotifName" data-spellcheck="spelling"
             :placeholder="$app.t('motiv.motif.namePlaceholder')" @keydown.enter="addMotif()">
      <div class="motiv-theme-select" x-data="combobox($app.t('motiv.motif.themeOptional'), $app.t('motiv.noTheme'))"
           x-modelable="value" x-model="newMotifThemeId" x-effect="options = themeOptions()"></div>
      <button type="button" class="btn-compact" @click="addMotif()" :disabled="busy || !newMotifName.trim()" x-text="$app.t('motiv.motif.add')"></button>
    </div>
    <div class="motiv-toolbar-group motiv-layer-toggles">
      <button type="button" class="motiv-layer-btn" :class="{ 'is-active': layerFigures }" @click="toggleLayer('figures')" x-text="$app.t('motiv.layer.figures')"></button>
      <button type="button" class="motiv-layer-btn" :class="{ 'is-active': layerBeats }" @click="toggleLayer('beats')" x-text="$app.t('motiv.layer.beats')"></button>
      <button type="button" class="motiv-layer-btn" :class="{ 'is-active': layerChapters }" @click="toggleLayer('chapters')" x-text="$app.t('motiv.layer.chapters')"></button>
    </div>
  </div>

  <!-- Scan-Status: warnt, wenn die semantische Erkennung aus ist (nur wörtliche
       Trigger), sonst bietet sie Embeddings-Refresh für frische Fundstellen. -->
  <div class="motiv-hint" x-show="!semanticActive()" x-cloak>
    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#alert-triangle"/></svg>
    <span x-text="$app.t('motiv.hint.semanticOff')"></span>
  </div>
  <div class="motiv-hint motiv-hint--action" x-show="semanticActive() && embedIndexStale" x-cloak>
    <span class="motiv-hint-text" x-text="$app.t('motiv.hint.semanticOn')"></span>
    <button type="button" class="btn-compact" @click="refreshEmbedIndex()" :disabled="indexing">
      <span x-show="indexing" class="spinner"></span>
      <span x-text="$app.t('motiv.index.refresh')"></span>
    </button>
  </div>

  <div class="motiv-layout">
    <!-- Konstellations-Graph -->
    <div id="motiv-graph" class="motiv-graph-container" role="img" :aria-label="$app.t('motiv.graph.ariaLabel')"></div>

    <!-- Seitenpanel (nested Partial — HTML-Partial-LOC-Limit) -->
    <div id="partial-motiv-panel"></div>
  </div>

  <!-- @include motiv-graph-menu -->
</div>
