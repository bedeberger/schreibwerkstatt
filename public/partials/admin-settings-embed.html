    <!-- Embed-Tab: Semantische Suche (self-hosted OpenAI-kompatibler /v1/embeddings) -->
    <section x-show="adminSettingsTab === 'embed'" class="admin-settings-section">
      <p class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.embed.hint')"></p>
      <div x-data="settingField({ k: 'embed.enabled', type: 'toggle', base: 'embed.enabled' })"></div>
      <div x-data="settingField({ k: 'embed.host', type: 'url', base: 'embed.host', help: true })"></div>
      <div x-data="settingField({ k: 'embed.model', base: 'embed.model', help: true })"></div>
      <div x-data="settingField({ k: 'embed.dim', type: 'num', base: 'embed.dim', num: { integer: true, min: 64, max: 8192 }, help: true })"></div>
      <div x-data="settingField({ k: 'embed.timeout_ms', type: 'num', base: 'embed.timeoutMs', num: { integer: true, min: 5000, max: 600000 }, help: true })"></div>
      <div x-data="settingField({ k: 'embed.api_key', type: 'password', base: 'embed.apiKey', help: true })"></div>
      <div class="admin-settings-actions">
        <button type="button" @click="adminSettingsTest('embed')" x-text="$app.t('admin.settings.test.embed')"></button>
      </div>
    </section>
