<!-- Figurenübersicht -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/figuren-card.js.
  Fachdaten (figuren) leben in Alpine.store('catalog') und sind via $root
  auflösbar. Graph-Modus + vis-network-Internals wohnen in der Sub.
  figurenFilters + selectedFigurId + Loading/Progress/Status bleiben am Root.
-->
<div class="card card--figuren" x-data="figurenCard" x-show="$app.showFiguresCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('figuren.title')"></span>
      <div class="card-subline" x-show="$app.alleAktualisierenLastRun && !$app.figurenLoading">
        <span class="card-timestamp" x-text="$app.t('common.asOf', { date: $app.alleAktualisierenLastRun })"></span>
      </div>
    </div>
  </div>

  <!-- Fortschritt -->
  <div x-show="$app.figurenProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="{ '--progress': $app.figurenProgress + '%' }"></div>
  </div>
  <div x-show="$app.figurenStatus" class="card-status" x-html="$app.figurenStatus"></div>

  <!-- Leer-Hinweis mit CTA -->
  <div x-show="$app.figuren.length === 0 && !$app.figurenLoading && !$app.figurenStatus" class="card-empty">
    <p class="card-empty-text" x-text="$app.t('common.noAnalysisYet')"></p>
    <button type="button" class="primary card-empty-cta"
            @click="$app.alleAktualisieren()"
            :disabled="$app.alleAktualisierenLoading || !$app.selectedBookId">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=691#rotate-cw"/></svg>
      <span x-text="$app.t('header.updateAll')"></span>
    </button>
  </div>

  <!-- Graph -->
  <div x-show="$app.figuren.length > 0" class="figur-graph-section">

    <!-- Modus-Toggle -->
    <div class="tabs tabs--fullwidth">
      <button type="button" class="tabs-btn" :class="{ 'tabs-btn--active': figurenGraphModus === 'figur' }" @click="setFigurenGraphModus('figur')" x-text="$app.t('figuren.modeGraph')"></button>
      <button type="button" class="tabs-btn" :class="{ 'tabs-btn--active': figurenGraphModus === 'familie' }" :disabled="!figurenHasFamilyEdges()" @click="figurenHasFamilyEdges() && setFigurenGraphModus('familie')" x-text="$app.t('figuren.modeFamilie')"></button>
      <button type="button" class="tabs-btn" :class="{ 'tabs-btn--active': figurenGraphModus === 'soziogramm' }" @click="setFigurenGraphModus('soziogramm')" x-text="$app.t('figuren.modeSoziogramm')"></button>
    </div>

    <!-- Legende (klappbar, Chevron-Stil wie Kontinuität) -->
    <div class="figur-legend-wrap">
      <button type="button"
              class="collapsible-toggle"
              @click="figurenLegendOpen = !figurenLegendOpen"
              :aria-expanded="figurenLegendOpen">
        <span class="history-chevron" :class="{ open: figurenLegendOpen }">›</span>
        <span x-text="$app.t('figuren.legend.toggle')"></span>
      </button>

      <template x-if="figurenLegendOpen && figurenGraphModus !== 'soziogramm'">
        <div class="figur-legend-body">
          <div class="figur-legend">
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--hauptfigur"></span><span x-text="$app.t('figuren.type.hauptfigur')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--antagonist"></span><span x-text="$app.t('figuren.type.antagonist')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--mentor"></span><span x-text="$app.t('figuren.type.mentor')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--nebenfigur"></span><span x-text="$app.t('figuren.type.nebenfigur')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--randfigur"></span><span x-text="$app.t('figuren.type.randfigur')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--andere"></span><span x-text="$app.t('figuren.type.andere')"></span></span>
            <span class="figur-legend-sep" aria-hidden="true"></span>
            <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--eltern"></span><span x-text="$app.t('figuren.edge.eltern')"></span></span>
            <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--geschwister"></span><span x-text="$app.t('figuren.edge.geschwister')"></span></span>
            <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--freund"></span><span x-text="$app.t('figuren.edge.freund')"></span></span>
            <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--feind"></span><span x-text="$app.t('figuren.edge.feind')"></span></span>
            <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--liebesbeziehung"></span><span x-text="$app.t('figuren.edge.liebesbeziehung')"></span></span>
            <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--patronage"></span><span x-text="$app.t('figuren.edge.patronage')"></span></span>
            <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--geschaeft"></span><span x-text="$app.t('figuren.edge.geschaeft')"></span></span>
          </div>
          <div x-show="figurenGraphModus === 'figur'" class="figur-soziogramm-hint" x-text="$app.t('figuren.graph.hint')"></div>
        </div>
      </template>

      <template x-if="figurenLegendOpen && figurenGraphModus === 'soziogramm'">
        <div class="figur-legend-body">
          <div class="figur-legend figur-legend--soziogramm">
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--wirtschaftselite"></span><span x-text="$app.t('figuren.schicht.wirtschaftselite')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--gehobenes_buergertum"></span><span x-text="$app.t('figuren.schicht.gehobenes_buergertum')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--mittelschicht"></span><span x-text="$app.t('figuren.schicht.mittelschicht')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--arbeiterschicht"></span><span x-text="$app.t('figuren.schicht.arbeiterschicht')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--migrantenmilieu"></span><span x-text="$app.t('figuren.schicht.migrantenmilieu')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--prekariat"></span><span x-text="$app.t('figuren.schicht.prekariat')"></span></span>
            <span class="figur-legend-entry"><span class="figur-legend-dot figur-legend-dot--unterwelt"></span><span x-text="$app.t('figuren.schicht.unterwelt')"></span></span>
          </div>
          <div class="figur-soziogramm-hint" x-text="$app.t('figuren.soziogramm.hint')"></div>
        </div>
      </template>
    </div>

    <div class="figuren-graph-wrap" :class="{ 'is-fullscreen': figurenGraphFullscreen }" @keydown.escape.window="figurenGraphFullscreen && toggleFigurenGraphFullscreen()">
      <div class="figuren-graph-toolbar">
        <!-- Kapitel-Filter (alle Graph-Modi) -->
        <div x-show="figurenKapitelListe().length > 0" class="figuren-graph-filter">
          <div x-data="catalogFilter('chapter')"
               x-modelable="value" x-model="figurenGraphKapitel"
               x-effect="options = figurenKapitelListe().map(k => ({value: k, label: k}))"
               @combobox-change="_figurenGraphSetKapitel($event.detail || null)"
></div>
        </div>
        <div class="figuren-graph-toolbar-zoom">
          <button type="button" class="graph-tool-btn" :data-tip="$app.t('graph.zoomIn')" :aria-label="$app.t('graph.zoomIn')" @click="_figurenNetwork && _figurenNetwork.moveTo({ scale: _figurenNetwork.getScale() * 1.3, animation: { duration: 200, easingFunction: 'easeInOutQuad' } })"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#plus"/></svg></button>
          <button type="button" class="graph-tool-btn" :data-tip="$app.t('graph.zoomOut')" :aria-label="$app.t('graph.zoomOut')" @click="_figurenNetwork && _figurenNetwork.moveTo({ scale: _figurenNetwork.getScale() * 0.77, animation: { duration: 200, easingFunction: 'easeInOutQuad' } })"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#minus"/></svg></button>
          <button type="button" class="graph-tool-btn" :data-tip="$app.t('graph.reset')" :aria-label="$app.t('graph.reset')" @click="_figurenNetwork && _figurenNetwork.fit({ animation: { duration: 300, easingFunction: 'easeInOutQuad' } })"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#scan"/></svg></button>
          <button type="button" class="graph-tool-btn" :aria-pressed="figurenGraphFullscreen" :data-tip="figurenGraphFullscreen ? $app.t('graph.fullscreenClose') : $app.t('graph.fullscreen')" :aria-label="figurenGraphFullscreen ? $app.t('graph.fullscreenClose') : $app.t('graph.fullscreen')" @click="toggleFigurenGraphFullscreen()"><svg class="icon" aria-hidden="true"><use :href="figurenGraphFullscreen ? '/icons.svg?v=690#minimize-2' : '/icons.svg?v=690#maximize-2'"/></svg></button>
        </div>
      </div>
      <div id="figuren-graph" class="figuren-graph-container" role="img" :aria-label="$app.t('graph.ariaLabel')"></div>
      <div id="figur-tooltip" class="figur-tooltip"></div>
    </div>
  </div>



  <!-- Figurenliste -->
  <div x-show="$app.figuren.length > 0" class="figur-list-section">
    <div class="figur-list-header">
      <div class="history-heading" x-text="$app.t('figuren.heading')"></div>
    </div>

     <!-- Filter -->
    <div x-show="$app.figuren.length > 0 && figurenKapitelListe().length > 0" class="filter-bar">
      <span class="filter-search-wrap">
        <input type="text" x-model="$app.figurenFilters.suche" :placeholder="$app.t('common.search')" :aria-label="$app.t('common.search')" class="filter-search-input">
        <button type="button" class="search-clear--icon" x-show="$app.figurenFilters.suche" @click="$app.figurenFilters.suche=''" :aria-label="$app.t('search.clear')" :data-tip="$app.t('search.clear')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg></button>
      </span>
      <div x-data="catalogFilter('chapter')"
          x-modelable="value" x-model="$app.figurenFilters.kapitel"
          x-effect="options = figurenKapitelListe().map(k => ({value: k, label: k}))"
          @combobox-change="$app.figurenFilters.seite = ''; $app.selectedFigurId = null"
          >
      </div>
      <div x-data="catalogFilter('page')"
          x-modelable="value" x-model="$app.figurenFilters.seite"
          x-effect="_disabled = !$app.figurenFilters.kapitel || figurenSeitenListe().length === 0; options = figurenSeitenListe().map(s => ({value: s, label: s}))"
          @combobox-change="$app.selectedFigurId = null"
          :class="{'combobox-wrap--disabled': _disabled}"
          >
      </div>
      <span class="filter-count" x-text="filteredFiguren().length + ' / ' + $app.figuren.length"></span>
    </div>

    <template x-for="f in filteredFiguren()" :key="f.id">
      <div>
        <div class="figur-item" :data-figid="f.id" @click="$app.selectedFigurId = $app.selectedFigurId === f.id ? null : f.id;">
          <span class="figur-typ-dot" :class="'figur-typ-dot--' + (f.typ || 'unknown')"></span>
          <span class="figur-name" x-text="f.name"></span>
          <span class="tag" x-text="$app.t('figuren.type.' + f.typ)"></span>
          <span x-show="f.geburtstag" class="tag" x-text="'* ' + f.geburtstag"></span>
          <!-- Kapitel-Badges -->
          <template x-if="f.kapitel?.length">
            <span class="kapitel-badges">
              <span class="kapitel-badge kapitel-badge--primary internal-link" x-text="f.kapitel[0].name" @click.stop="$app.openKapitelByName(f.kapitel[0].name)"></span>
              <template x-if="f.kapitel.length > 1">
                <span class="kapitel-badge kapitel-badge--more" x-text="'+' + (f.kapitel.length - 1)"></span>
              </template>
            </span>
          </template>
          <span class="history-chevron" :class="{ open: $app.selectedFigurId === f.id }">›</span>
        </div>
        <div x-show="$app.selectedFigurId === f.id" class="figur-detail">
          <p x-show="f.beschreibung" x-text="f.beschreibung" class="figur-beschreibung"></p>
          <!-- Rolle / Motivation / Konflikt / Äusseres / Stimme / Hintergrund -->
          <div x-show="f.rolle || f.motivation || f.konflikt || f.aeusseres || f.stimme || f.hintergrund" class="figur-kerninfo">
            <div x-show="f.rolle" class="figur-kerninfo-row">
              <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.rolle') + ' '"></span>
              <span class="figur-detail-value" x-text="f.rolle"></span>
            </div>
            <div x-show="f.motivation" class="figur-kerninfo-row">
              <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.motivation') + ' '"></span>
              <span class="figur-detail-value" x-text="f.motivation"></span>
            </div>
            <div x-show="f.konflikt" class="figur-kerninfo-row">
              <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.konflikt') + ' '"></span>
              <span class="figur-detail-value" x-text="f.konflikt"></span>
            </div>
            <div x-show="f.aeusseres" class="figur-kerninfo-row">
              <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.aeusseres') + ' '"></span>
              <span class="figur-detail-value" x-text="f.aeusseres"></span>
            </div>
            <div x-show="f.stimme" class="figur-kerninfo-row">
              <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.stimme') + ' '"></span>
              <span class="figur-detail-value" x-text="f.stimme"></span>
            </div>
            <div x-show="f.hintergrund" class="figur-kerninfo-row">
              <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.hintergrund') + ' '"></span>
              <span class="figur-detail-value" x-text="f.hintergrund"></span>
            </div>
          </div>
          <!-- Entwicklungsbogen (strukturiert); Fallback flacher entwicklung-String -->
          <div x-show="(f.arc && (f.arc.anfang || f.arc.ende || f.arc.wendepunkte?.length)) || (!f.arc && f.entwicklung)" class="figur-arc">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.arc')"></div>
            <template x-if="f.arc && (f.arc.anfang || f.arc.ende || f.arc.wendepunkte?.length)">
              <div class="figur-arc-body">
                <div x-show="f.arc.anfang" class="figur-kerninfo-row">
                  <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.arcAnfang') + ' '"></span>
                  <span class="figur-detail-value" x-text="f.arc.anfang"></span>
                </div>
                <ol x-show="f.arc.wendepunkte?.length" class="figur-arc-stations">
                  <template x-for="(w, wi) in (f.arc.wendepunkte || [])" :key="wi">
                    <li x-text="w"></li>
                  </template>
                </ol>
                <div x-show="f.arc.ende" class="figur-kerninfo-row">
                  <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.arcEnde') + ' '"></span>
                  <span class="figur-detail-value" x-text="f.arc.ende"></span>
                </div>
              </div>
            </template>
            <template x-if="!f.arc && f.entwicklung">
              <span class="figur-detail-value" x-text="f.entwicklung"></span>
            </template>
          </div>
          <!-- Beruf + Sozialschicht + Präsenz -->
          <div x-show="f.beruf || (f.sozialschicht && f.sozialschicht !== 'andere') || f.praesenz" class="figur-detail-row">
            <span x-show="f.beruf" class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.beruf') + ' '"></span>
            <span x-show="f.beruf" class="figur-detail-value" x-text="f.beruf"></span>
            <span x-show="f.sozialschicht && f.sozialschicht !== 'andere'" class="tag figur-sozialschicht-badge" :class="'figur-schicht-' + f.sozialschicht" x-text="$app.t('figuren.schicht.' + f.sozialschicht)"></span>
            <span x-show="f.praesenz" class="tag figur-praesenz-badge" :class="'figur-praesenz-' + f.praesenz" x-text="$app.t('figuren.praesenz.' + f.praesenz)"></span>
          </div>
          <!-- Wohnadresse -->
          <div x-show="f.wohnadresse" class="figur-detail-row">
            <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.wohnadresse') + ' '"></span>
            <span class="figur-detail-value" x-text="f.wohnadresse"></span>
          </div>
          <!-- Erste Erwähnung -->
          <div x-show="f.erste_erwaehnung" class="figur-detail-row">
            <span class="bewertung-section-title bewertung-section-title--inline" x-text="$app.t('figuren.field.ersteErwaehnung') + ' '"></span>
            <template x-if="f.erste_erwaehnung_page_id">
              <span class="figur-detail-value internal-link" @click.stop="$app.gotoPageById(f.erste_erwaehnung_page_id)" x-text="f.erste_erwaehnung"></span>
            </template>
            <template x-if="!f.erste_erwaehnung_page_id">
              <span class="figur-detail-value" x-text="f.erste_erwaehnung"></span>
            </template>
          </div>
          <!-- Musikgeschmack — abgeleitet aus song_figures-Rollup -->
          <div x-show="$app.songsByFigurId.get(f.id)?.length" class="figur-musikgeschmack">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.musikgeschmack')"></div>
            <div class="figur-tags-row">
              <template x-for="s in ($app.songsByFigurId.get(f.id) || [])" :key="s.id">
                <span class="tag internal-link" @click.stop="$app.openSongById(s.id)" x-text="(s.titel || '') + (s.interpret ? ' — ' + s.interpret : '')"></span>
              </template>
            </div>
          </div>
          <!-- Schlüsselzitate -->
          <div x-show="f.schluesselzitate?.length">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.schluesselzitate')"></div>
            <ul class="bullet-list figur-zitate-list">
              <template x-for="(z, i) in (f.schluesselzitate || [])" :key="i">
                <li class="figur-zitat" x-text="'«' + z + '»'"></li>
              </template>
            </ul>
          </div>
          <!-- Kapitelauftritte -->
          <div class="figur-kapitelauftritte" x-show="f.kapitel?.length > 1">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.kapitelauftritte')"></div>
            <div class="figur-tags-row">
              <template x-for="(k, ki) in (f.kapitel || [])" :key="ki">
                <span class="tag internal-link" @click="$app.figurenFilters.kapitel = k.name; $app.figurenFilters.seite = ''" x-text="ki === 0 ? k.name : k.name + (k.haeufigkeit > 1 ? ' ×' + k.haeufigkeit : '')"></span>
              </template>
            </div>
          </div>
          <div x-show="f.eigenschaften?.length">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.eigenschaften')"></div>
            <ul class="bullet-list figur-eigenschaften-list">
              <template x-for="(e, i) in (f.eigenschaften || [])" :key="i">
                <li x-text="e"></li>
              </template>
            </ul>
          </div>
          <!-- Familie -->
          <div x-show="f.eltern_ids?.length || f.geschwister_ids?.length">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.familie')"></div>
            <div class="figur-tags-row">
              <template x-for="pid in (f.eltern_ids || [])" :key="'e'+pid">
                <span class="tag figur-rel-tag internal-link" :data-tip="$app.t('figuren.rel.parent')" @click.stop="$app.openFigurById(pid)" x-text="'↑ ' + ($app.figurenById.get(pid)?.name || pid)"></span>
              </template>
              <template x-for="sid in (f.geschwister_ids || [])" :key="'s'+sid">
                <span class="tag figur-rel-tag internal-link" :data-tip="$app.t('figuren.rel.sibling')" @click.stop="$app.openFigurById(sid)" x-text="'⇔ ' + ($app.figurenById.get(sid)?.name || sid)"></span>
              </template>
            </div>
          </div>
          <!-- Beziehungen -->
          <div x-show="f.beziehungen?.length">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.beziehungen')"></div>
            <div class="figur-bz-list">
              <template x-for="(bz, i) in (f.beziehungen || [])" :key="i">
                <div class="figur-beziehung-item">
                  <span class="figur-bz-typ" :class="'figur-bz-' + bz.typ" x-text="bz.typ"></span>
                  <span class="figur-bz-name internal-link" @click.stop="$app.openFigurById(bz.figur_id)" x-text="$app.figurenById.get(bz.figur_id)?.name || bz.figur_id"></span>
                  <span x-show="bz.machtverhaltnis && bz.machtverhaltnis !== 0" class="figur-bz-macht" :class="bz.machtverhaltnis > 0 ? 'figur-bz-macht--positiv' : 'figur-bz-macht--negativ'" x-text="bz.machtverhaltnis > 0 ? '↑'.repeat(Math.abs(bz.machtverhaltnis)) : '↓'.repeat(Math.abs(bz.machtverhaltnis))"></span>
                  <span x-show="bz.beschreibung" class="figur-bz-hint" x-text="'– ' + bz.beschreibung"></span>
                  <template x-if="bz.belege?.length">
                    <span class="figur-bz-belege">
                      <template x-for="(bg, bi) in (bz.belege || [])" :key="bi">
                        <span class="figur-bz-beleg internal-link" @click.stop="bg.page_id ? $app.gotoPageById(bg.page_id) : (bg.chapter_id ? $app.gotoChapterById(bg.chapter_id) : $app.gotoStelle(bg.kapitel, bg.seite))" x-text="bg.seite || bg.kapitel" :data-tip="(bg.kapitel || '') + (bg.seite ? ' · ' + bg.seite : '')"></span>
                      </template>
                    </span>
                  </template>
                </div>
              </template>
            </div>
          </div>
          <!-- Lebensereignisse / Zeitstrahl -->
          <div x-show="f.lebensereignisse?.length">
            <div class="bewertung-section-title" x-text="$app.t('figuren.field.zeitstrahl')"></div>
            <div class="global-zeitstrahl-body">
              <template x-for="(ev, i) in (f.lebensereignisse || [])" :key="i">
                <div class="gz-item" :class="ev.typ === 'extern' ? 'gz-item--extern' : ''">
                  <div class="gz-marker" :class="ev.typ === 'extern' ? 'gz-marker--extern' : ''"></div>
                  <div class="gz-content">
                    <div class="gz-datum-row">
                      <span class="gz-datum" x-text="ev.datum"></span>
                      <template x-if="ev.typ === 'extern'">
                        <span class="gz-extern-badge" x-text="$app.t('figuren.external')"></span>
                      </template>
                    </div>
                    <div class="gz-ereignis internal-link" @click="$app.openEreignisseMitFigur(f.id)" x-text="ev.ereignis"></div>
                    <div x-show="ev.kapitel" class="gz-kapitel">
                      <span class="gz-kapitel-link internal-link" @click="$app.gotoStelle(ev.kapitel, null)" x-text="ev.kapitel"></span>
                    </div>
                    <div x-show="ev.seite" class="gz-seite">
                      <span class="internal-link" @click="$app.gotoStelle(ev.kapitel, ev.seite)" x-text="ev.seite"></span>
                    </div>
                    <div x-show="ev.bedeutung" class="gz-bedeutung" x-text="ev.bedeutung"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

</div>
