<!-- Benutzer-Einstellungen -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/user-settings-card.js.
  `showUserSettingsCard` + `toggleUserSettingsCard` im Root, fachlicher State
  (Profil, Default-Präferenzen, Reset-Zone) in dieser Komponente.
-->
<div class="card card--settings" x-data="userSettingsCard" x-show="$app.showUserSettingsCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('profile.title')"></span>
    <div class="card-actions">
      <button type="button" @click="saveUserSettings()" :disabled="userSettingsSaving || userSettingsLoading">
        <span x-show="userSettingsSaving" class="spinner"></span>
        <span x-text="userSettingsSaving ? $app.t('common.saving') : $app.t('common.save')"></span>
      </button>
    </div>
  </div>

  <div x-show="userSettingsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

  <div x-show="!userSettingsLoading" class="card-form-grid">

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.account')"></label>
      <div class="user-settings-profile">
        <div><strong x-text="userSettingsProfile?.name || '—'"></strong></div>
        <div class="muted-msg muted-msg--sm" x-text="userSettingsProfile?.email || ''"></div>
      </div>
    </div>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.uiLanguage')"></label>
      <div class="card-form-field">
        <div class="book-settings-options">
          <label class="book-settings-option">
            <input type="radio" name="us-ui-lang" value="de" :checked="$app.uiLocale === 'de'" @change="$app.changeLocale('de')">
            <span x-text="$app.t('lang.de')"></span>
          </label>
          <label class="book-settings-option">
            <input type="radio" name="us-ui-lang" value="en" :checked="$app.uiLocale === 'en'" @change="$app.changeLocale('en')">
            <span x-text="$app.t('lang.en')"></span>
          </label>
        </div>
        <p class="card-form-field-note" x-text="$app.t('profile.uiLanguageHint')"></p>
      </div>
    </div>

    <p class="card-form-section-divider" x-text="$app.t('profile.newBooksHint')"></p>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.defaultLanguage')"></label>
      <div class="book-settings-options">
        <label class="book-settings-option">
          <input type="radio" name="us-lang" value="" x-model="userSettingsDefaultLanguage" @change="userSettingsDefaultRegion = ''; userSettingsDefaultBuchtyp = ''">
          <span x-text="$app.t('common.notSet')"></span>
        </label>
        <label class="book-settings-option">
          <input type="radio" name="us-lang" value="de" x-model="userSettingsDefaultLanguage" @change="userSettingsDefaultRegion = 'CH'; userSettingsDefaultBuchtyp = ''">
          <span x-text="$app.t('lang.de')"></span>
        </label>
        <label class="book-settings-option">
          <input type="radio" name="us-lang" value="en" x-model="userSettingsDefaultLanguage" @change="userSettingsDefaultRegion = 'US'; userSettingsDefaultBuchtyp = ''">
          <span x-text="$app.t('lang.en')"></span>
        </label>
      </div>
    </div>

    <div class="card-form-row" x-show="userSettingsDefaultLanguage">
      <label class="card-form-label" x-text="$app.t('profile.defaultRegion')"></label>
      <div class="book-settings-options">
        <template x-if="userSettingsDefaultLanguage === 'de'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="CH" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.de.CH')"></span>
            </label>
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="DE" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.de.DE')"></span>
            </label>
          </div>
        </template>
        <template x-if="userSettingsDefaultLanguage === 'en'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="US" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.en.US')"></span>
            </label>
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="GB" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.en.GB')"></span>
            </label>
          </div>
        </template>
      </div>
    </div>

    <div class="card-form-row" x-show="userSettingsDefaultLanguage">
      <label class="card-form-label" x-text="$app.t('profile.defaultBuchtyp')"></label>
      <div x-data="combobox($app.t('profile.defaultBuchtyp'), $app.t('common.notSet'))"
           x-modelable="value" x-model="userSettingsDefaultBuchtyp"
           x-effect="options = userSettingsBuchtypOptions()"
></div>
    </div>

    <p class="card-form-section-divider" x-text="$app.t('profile.editorSection')"></p>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.focusGranularity')"></label>
      <div class="card-form-field">
        <div x-data="combobox($app.t('profile.focusGranularity'))"
             x-modelable="value" x-model="userSettingsFocusGranularity"
             x-effect="options = userSettingsFocusOptions()"
></div>
        <p class="card-form-field-note" x-text="$app.t('profile.focusGranularityHint')"></p>
      </div>
    </div>

    <p class="card-form-saved" x-show="userSettingsSaved" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('profile.savedMsg')"></p>
    <p class="card-form-error" x-show="userSettingsError" x-text="userSettingsError"></p>

    <template x-if="$app.languagetoolEnabled">
      <div class="card-form-row card-form-row--dict">
        <button type="button"
                class="collapsible-toggle"
                @click="dictOpen = !dictOpen"
                :aria-expanded="dictOpen">
          <svg class="icon history-chevron" :class="{ 'is-open': dictOpen }" aria-hidden="true"><use href="/icons.svg#chevron-right"/></svg>
          <span x-text="$app.t('spellcheck.dict.title')"></span>
          <span class="lt-dict-count" x-text="dictEntries.length"></span>
        </button>
        <div class="lt-dict-body" x-show="dictOpen" x-cloak>
          <template x-if="!dictEntries.length">
            <p class="muted-msg muted-msg--sm" x-text="$app.t('spellcheck.dict.empty')"></p>
          </template>
          <template x-if="dictEntries.length">
            <div class="lt-dict-search">
              <input type="search"
                     x-model="dictFilter"
                     :placeholder="$app.t('spellcheck.dict.searchPlaceholder')">
            </div>
          </template>
          <div class="lt-dict-list" x-show="dictEntries.length">
            <template x-for="e in dictEntriesFiltered" :key="e.word + '|' + e.book_id + '|' + e.lang">
              <div class="lt-dict-row">
                <span class="lt-dict-word" x-text="e.word"></span>
                <span class="lt-dict-scope muted-msg muted-msg--sm">
                  <span x-text="e.book_id ? $app.t('spellcheck.dict.scope_book') : $app.t('spellcheck.dict.scope_global')"></span>
                  <span>: </span>
                  <span x-text="e.lang === '*' ? $app.t('spellcheck.dict.scope_lang_any') : e.lang"></span>
                </span>
                <button type="button" class="lt-dict-remove" @click="removeDictEntry(e)" x-text="$app.t('spellcheck.dict.remove')"></button>
              </div>
            </template>
            <template x-if="dictEntries.length && !dictEntriesFiltered.length">
              <p class="muted-msg muted-msg--sm" x-text="$app.t('spellcheck.dict.noMatch')"></p>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- Device-Tokens (native Clients, z.B. Mac-Focus-Writer) -->
    <div class="card-form-row card-form-row--devices">
      <button type="button"
              class="collapsible-toggle"
              @click="deviceTokensOpen = !deviceTokensOpen"
              :aria-expanded="deviceTokensOpen">
        <svg class="icon history-chevron" :class="{ 'is-open': deviceTokensOpen }" aria-hidden="true"><use href="/icons.svg#chevron-right"/></svg>
        <span x-text="$app.t('profile.devices.title')"></span>
        <span class="lt-dict-count" x-text="deviceTokensList.filter(t => !t.revoked_at).length"></span>
      </button>
      <div class="device-tokens-body" x-show="deviceTokensOpen" x-cloak>
        <p class="muted-msg muted-msg--sm" x-text="$app.t('profile.devices.intro')"></p>

        <!-- Plain-Token-Anzeige direkt nach Create (NUR einmal sichtbar) -->
        <div x-show="deviceTokensJustCreated" x-cloak class="success-msg device-tokens-reveal">
          <strong x-text="$app.t('profile.devices.justCreatedTitle')"></strong>
          <p class="muted-msg muted-msg--sm" x-text="$app.t('profile.devices.justCreatedHint')"></p>
          <div class="device-tokens-reveal-row">
            <code class="device-tokens-plain" x-text="deviceTokensJustCreated?.plain_token"></code>
            <button type="button" @click="deviceTokensCopyPlain()"
                    x-text="deviceTokensCopiedAt ? $app.t('common.copied') : $app.t('common.copy')"></button>
            <button type="button" @click="deviceTokensDismissPlain()" x-text="$app.t('common.hide')"></button>
          </div>
        </div>

        <!-- Neues Token erstellen -->
        <div class="device-tokens-create">
          <input type="text" x-model="deviceTokensNewName"
                 :placeholder="$app.t('profile.devices.namePlaceholder')"
                 maxlength="100"
                 @keydown.enter.prevent="deviceTokensCreate()">
          <button type="button" @click="deviceTokensCreate()"
                  :disabled="deviceTokensCreating || !deviceTokensNewName.trim()">
            <span x-show="deviceTokensCreating" class="spinner"></span>
            <span x-text="$app.t('profile.devices.createButton')"></span>
          </button>
        </div>

        <p class="card-form-error" x-show="deviceTokensError" x-text="deviceTokensError"></p>
        <div x-show="deviceTokensLoading" class="muted-msg muted-msg--sm" x-text="$app.t('common.loading')"></div>
        <p x-show="!deviceTokensLoading && deviceTokensList.length === 0"
           class="muted-msg muted-msg--sm" x-text="$app.t('profile.devices.empty')"></p>

        <div class="device-tokens-list" x-show="deviceTokensList.length">
          <template x-for="t in deviceTokensList" :key="t.id">
            <div class="device-tokens-row" :class="t.revoked_at ? 'is-revoked' : ''">
              <div class="device-tokens-row-main">
                <span class="device-tokens-name" x-text="t.device_name"></span>
                <span class="badge"
                      :class="t.revoked_at ? 'badge-err' : (t.expires_at && t.expires_at < new Date().toISOString() ? 'badge-warn' : 'badge-ok')"
                      x-text="t.revoked_at ? $app.t('profile.devices.status.revoked') : (t.expires_at && t.expires_at < new Date().toISOString() ? $app.t('profile.devices.status.expired') : $app.t('profile.devices.status.active'))"></span>
              </div>
              <span class="device-tokens-meta muted-msg muted-msg--sm">
                <span x-text="$app.t('profile.devices.lastUsed') + ': '"></span>
                <span x-text="t.last_used_at ? new Date(t.last_used_at).toLocaleString($app.uiLocale, $app.tzOpts ? $app.tzOpts() : {}) : $app.t('profile.devices.never')"></span>
              </span>
              <button type="button" class="device-tokens-action"
                      x-show="!t.revoked_at" @click="deviceTokensRevoke(t.id)"
                      x-text="$app.t('profile.devices.revokeButton')"></button>
              <button type="button" class="device-tokens-action"
                      x-show="t.revoked_at" @click="deviceTokensDelete(t.id)"
                      x-text="$app.t('profile.devices.deleteButton')"></button>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- macOS-App-Download (schreibwerkstatt-focuseditor) -->
    <div class="card-form-row card-form-row--devices" x-show="macRelease.available" x-cloak>
      <button type="button"
              class="collapsible-toggle"
              @click="macAppOpen = !macAppOpen"
              :aria-expanded="macAppOpen">
        <svg class="icon history-chevron" :class="{ 'is-open': macAppOpen }" aria-hidden="true"><use href="/icons.svg#chevron-right"/></svg>
        <span x-text="$app.t('profile.macApp.title')"></span>
        <span class="lt-dict-count" x-text="macRelease.version"></span>
      </button>
      <div class="device-tokens-body" x-show="macAppOpen" x-cloak>
        <p class="muted-msg muted-msg--sm" x-text="$app.t('profile.macApp.intro')"></p>

        <div class="mac-app-meta muted-msg muted-msg--sm">
          <span x-text="$app.t('profile.macApp.version') + ': ' + macRelease.version"></span>
          <span x-show="macReleaseSizeMb()" x-text="' · ' + macReleaseSizeMb() + ' MB'"></span>
          <span x-show="macRelease.publishedAt"
                x-text="' · ' + new Date(macRelease.publishedAt).toLocaleDateString($app.uiLocale, $app.tzOpts ? $app.tzOpts() : {})"></span>
        </div>

        <p x-show="macRelease.notes" class="mac-app-notes muted-msg muted-msg--sm" x-text="macRelease.notes"></p>

        <div class="mac-app-download">
          <a class="btn-compact" :href="macRelease.dmg?.downloadUrl" :download="macRelease.dmg?.name"
             x-text="$app.t('profile.macApp.download')"></a>
          <span x-show="!macReleaseIsMacPlatform()" class="muted-msg muted-msg--sm"
                x-text="$app.t('profile.macApp.forMacOnly')"></span>
        </div>
      </div>
    </div>

    <!-- App-Version (SSoT: VERSION-Datei, vom Server via /config) -->
    <div class="card-form-row" x-show="$app.appVersion" x-cloak>
      <p class="muted-msg muted-msg--sm">
        <span x-text="$app.t('profile.appVersion') + ': v' + $app.appVersion"></span>
        <span> · </span>
        <a href="https://github.com/bedeberger/schreibwerkstatt"
           target="_blank" rel="noopener noreferrer"
           x-text="$app.t('landing.githubLabel')"></a>
      </p>
    </div>
  </div>
</div>
