<!-- Benutzer-Einstellungen -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/user-settings-card.js.
  `showUserSettingsCard` + `toggleUserSettingsCard` im Root, fachlicher State
  (Profil, Default-Präferenzen, Reset-Zone) in dieser Komponente.
-->
<div class="card card--settings" x-data="userSettingsCard" x-show="$app.showUserSettingsCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('profile.title')"></span>
    <div class="card-actions">
      <button type="button" @click="saveUserSettings()" :disabled="userSettingsSaving || userSettingsLoading">
        <span x-show="userSettingsSaving" class="spinner"></span>
        <span x-text="userSettingsSaving ? $app.t('common.saving') : $app.t('common.save')"></span>
      </button>
    </div>
  </div>

  <div x-show="userSettingsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

  <div x-show="!userSettingsLoading" class="card-form-grid">

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.account')"></label>
      <div class="user-settings-profile">
        <div><strong x-text="userSettingsProfile?.name || '—'"></strong></div>
        <div class="muted-msg muted-msg--sm" x-text="userSettingsProfile?.email || ''"></div>
      </div>
    </div>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.uiLanguage')"></label>
      <div class="card-form-field">
        <div class="book-settings-options">
          <label class="book-settings-option">
            <input type="radio" name="us-ui-lang" value="de" :checked="$app.uiLocale === 'de'" @change="$app.changeLocale('de')">
            <span x-text="$app.t('lang.de')"></span>
          </label>
          <label class="book-settings-option">
            <input type="radio" name="us-ui-lang" value="en" :checked="$app.uiLocale === 'en'" @change="$app.changeLocale('en')">
            <span x-text="$app.t('lang.en')"></span>
          </label>
        </div>
        <p class="card-form-field-note" x-text="$app.t('profile.uiLanguageHint')"></p>
      </div>
    </div>

    <p class="card-form-section-divider" x-text="$app.t('profile.newBooksHint')"></p>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.defaultLanguage')"></label>
      <div class="book-settings-options">
        <label class="book-settings-option">
          <input type="radio" name="us-lang" value="" x-model="userSettingsDefaultLanguage" @change="userSettingsDefaultRegion = ''; userSettingsDefaultBuchtyp = ''">
          <span x-text="$app.t('common.notSet')"></span>
        </label>
        <label class="book-settings-option">
          <input type="radio" name="us-lang" value="de" x-model="userSettingsDefaultLanguage" @change="userSettingsDefaultRegion = 'CH'; userSettingsDefaultBuchtyp = ''">
          <span x-text="$app.t('lang.de')"></span>
        </label>
        <label class="book-settings-option">
          <input type="radio" name="us-lang" value="en" x-model="userSettingsDefaultLanguage" @change="userSettingsDefaultRegion = 'US'; userSettingsDefaultBuchtyp = ''">
          <span x-text="$app.t('lang.en')"></span>
        </label>
      </div>
    </div>

    <div class="card-form-row" x-show="userSettingsDefaultLanguage">
      <label class="card-form-label" x-text="$app.t('profile.defaultRegion')"></label>
      <div class="book-settings-options">
        <template x-if="userSettingsDefaultLanguage === 'de'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="CH" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.de.CH')"></span>
            </label>
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="DE" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.de.DE')"></span>
            </label>
          </div>
        </template>
        <template x-if="userSettingsDefaultLanguage === 'en'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="US" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.en.US')"></span>
            </label>
            <label class="book-settings-option">
              <input type="radio" name="us-region" value="GB" x-model="userSettingsDefaultRegion">
              <span x-text="$app.t('region.en.GB')"></span>
            </label>
          </div>
        </template>
      </div>
    </div>

    <div class="card-form-row" x-show="userSettingsDefaultLanguage">
      <label class="card-form-label" x-text="$app.t('profile.defaultBuchtyp')"></label>
      <div x-data="combobox($app.t('profile.defaultBuchtyp'), $app.t('common.notSet'))"
           x-modelable="value" x-model="userSettingsDefaultBuchtyp"
           x-effect="options = userSettingsBuchtypOptions()"
></div>
    </div>

    <p class="card-form-section-divider" x-text="$app.t('profile.editorSection')"></p>

    <div class="card-form-row">
      <label class="card-form-label" x-text="$app.t('profile.focusGranularity')"></label>
      <div class="card-form-field">
        <div x-data="combobox($app.t('profile.focusGranularity'))"
             x-modelable="value" x-model="userSettingsFocusGranularity"
             x-effect="options = userSettingsFocusOptions()"
></div>
        <p class="card-form-field-note" x-text="$app.t('profile.focusGranularityHint')"></p>
      </div>
    </div>

    <p class="card-form-saved" x-show="userSettingsSaved" x-cloak x-transition.opacity.duration.250ms x-text="$app.t('profile.savedMsg')"></p>
    <p class="card-form-error" x-show="userSettingsError" x-text="userSettingsError"></p>
  </div>
</div>
