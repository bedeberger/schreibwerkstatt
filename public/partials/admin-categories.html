<!-- Admin: Kategorien -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/admin-categories-card.js.
  `showAdminCategoriesCard` + `toggleAdminCategoriesCard` im Root. Nur sichtbar
  bei $store.session.currentUser.role === 'admin'.
-->
<div class="card card--admin-categories" x-data="adminCategoriesCard" x-show="$app.showAdminCategoriesCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('admin.categories.title')"></span>
    <div class="card-actions">
      <button type="button" class="icon-btn icon-btn--ghost" @click="loadAll()" :disabled="loading" :data-tip="$app.t('common.refresh')" :aria-label="$app.t('common.refresh')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg></button>
    </div>
  </div>

  <div x-show="loading" class="muted-msg" x-text="$app.t('common.loading')"></div>
  <p class="card-form-error" x-show="error" x-text="error"></p>

  <div class="card-form-grid" x-show="!loading">

    <section class="admin-pool-section">
      <h3 class="book-settings-stats-title" x-text="$app.t('book.category')"></h3>

      <div class="admin-pool-create">
        <input type="text"
               class="card-form-input"
               x-model="newCategoryName"
               :placeholder="$app.t('admin.cat.namePlaceholder')"
               @keydown.enter.prevent="createCategory()"
               :disabled="busy"
               maxlength="120">
        <button type="button" class="icon-btn icon-btn--ghost" @click="createCategory()" :disabled="busy || !newCategoryName.trim()" :data-tip="$app.t('common.new')" :aria-label="$app.t('common.new')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#plus"/></svg></button>
      </div>

      <p class="muted-msg muted-msg--sm" x-show="categories.length === 0" x-text="$app.t('categories.empty')"></p>
      <div class="table-scroll" x-show="categories.length">
      <table class="admin-pool-table"
             x-data="sortableTable({
               rows: () => categories,
               defaultKey: 'name',
               persistKey: 'admin.categories',
             })">
        <thead>
          <tr>
            <th class="sortable-th" :class="sortClass('name')" :aria-sort="ariaSort('name')"
                @click="sortBy('name')" x-text="$app.t('admin.cat.col.name')"></th>
            <th class="sortable-th" :class="sortClass('slug')" :aria-sort="ariaSort('slug')"
                @click="sortBy('slug')" x-text="$app.t('admin.cat.col.slug')"></th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="cat in sorted" :key="cat.id">
            <tr>
              <td x-text="cat.name"></td>
              <td><code class="muted-msg muted-msg--sm" x-text="cat.slug"></code></td>
              <td class="admin-pool-actions">
                <button type="button" class="icon-btn icon-btn--ghost" @click="renameCategory(cat)" :data-tip="$app.t('admin.cat.rename')" :aria-label="$app.t('admin.cat.rename')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#pencil"/></svg></button>
                <button type="button" class="icon-btn icon-btn--ghost" @click="deleteCategory(cat)" :data-tip="$app.t('common.delete')" :aria-label="$app.t('common.delete')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#trash"/></svg></button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      </div>
    </section>

  </div>
</div>
