<!-- Bearbeitungsmodus: contenteditable. Die Toolbar (Bubble + Slash) lebt
     strukturell NICHT hier drin – sie ist nach <body> teleportiert, damit
     position:fixed nicht vom card-Transform-Kontext eingefangen wird. Sie
     wird separat als partial-editor-toolbar geladen. Die Sub-Komponente
     editorToolbarCard installiert selbst einen delegierten keydown-Listener
     auf dem contenteditable — daher kein @keydown hier.
     Die Page-Editor-Toolbar (Zoom/FitWidth/Fullscreen/HR) lebt im Card-
     Topbar (editor-notebook.html), damit sie an der sticky Topbar haftet
     und permanent sichtbar bleibt — besonders im Vollbild beim Scrollen. -->
<div x-show="editMode && !focusActive" class="page-editor-wrap normal-editor">
  <div class="page-content-view page-content-view--editing"
       :class="{ 'page-content-view--fit-width': pageEditorFitWidth, 'page-content-view--show-marks': pageEditorShowMarks }"
       :style="`--editor-zoom: ${pageEditorZoom}`"
       contenteditable="true"
       :spellcheck="!$app.languagetoolEnabled"
       autocorrect="off"
       autocapitalize="off"
       @input="_markEditDirty()"
       @paste="_onEditPaste($event)"
       @copy="_onEditCopy($event)"
       @cut="_onEditCut($event)"
       @contextmenu="_onEditContextMenu($event)"
       @click="_onEditClick($event)"
       @pointermove="handleMarkPointer($event)"
       @pointerleave="handleMarkPointerLeave($event)"></div>

  <!-- Steuerzeichen-Overlay (Soft-Break-Marken ↵). Read-only Dekorations-
       Schicht über dem contenteditable — Inhalt wird per JS aus den <br>-
       Positionen gezeichnet (format-marks.js), nie editierbar, nie gespeichert.
       <br> lässt sich nicht per CSS dekorieren, daher dieser Overlay-Pfad. -->
  <div class="page-editor-marks-layer" aria-hidden="true" hidden></div>

  <!-- STT-Diktat: schwebender Mic-Button unten rechts im Editorfeld (analog
       zum LanguageTool-Badge oben rechts). Nur sichtbar, wenn Admin STT
       aktiviert hat (sttEnabled = Root-State aus /config). Sprache loest der
       Proxy aus der Buch-Locale auf. -->
  <template x-if="sttEnabled">
    <div class="stt-dock" x-cloak>
      <!-- Live-Status links vom Mic: zwei ruhige Zustaende ohne Sub-Sekunden-
           Flackern — „Hört zu" (Aufnahme laeuft) bzw. „Transkribiert"
           (Segment-Upload, mit Mindest-Standzeit ueber sttBusy). -->
      <span class="stt-status" aria-live="polite"
            x-show="sttRecording || sttBusy"
            :class="sttBusy ? 'is-transcribing' : 'is-listening'"
            x-text="sttBusy ? t('stt.status.transcribing') : t('stt.status.hearing')"></span>
      <button type="button" class="stt-dock-btn"
              :aria-pressed="sttRecording"
              :class="{ 'is-recording': sttRecording, 'is-pending': sttPending }"
              :disabled="sttPending"
              :data-tip="sttRecording ? t('stt.stop') : t('stt.dictate')"
              :aria-label="sttRecording ? t('stt.stop') : t('stt.dictate')"
              @click="toggleSttDictation()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#mic"/></svg>
      </button>
    </div>
  </template>
</div>
