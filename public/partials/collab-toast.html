<template x-if="$store.collab.collabToast">
  <div class="job-toast job-toast--ok job-toast--collab"
       role="status"
       aria-live="polite"
       x-cloak>
    <span class="job-toast-msg"
          x-text="$store.collab.collabToast.currentPage
            ? t('collab.toast.currentPage', { user: $store.collab.collabToast.user || t('edit.conflict.unknownUser') })
            : ($store.collab.collabToast.count && $store.collab.collabToast.count > 1
                ? t('collab.toast.batch', { count: $store.collab.collabToast.count })
                : t('collab.toast.otherPage', {
                    user: $store.collab.collabToast.user || t('edit.conflict.unknownUser'),
                    page: $store.collab.collabToast.pageName || ''
                  }))"></span>
    <button type="button"
            class="job-toast-close"
            :aria-label="t('common.close')"
            @click="_dismissCollabToast()"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#x"/></svg></button>
  </div>
</template>
