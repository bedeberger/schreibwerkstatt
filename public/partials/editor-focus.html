<!-- Focus-Mode-Cardroot (Top-Level): eigener contenteditable-Container,
     lebt als position:fixed-Overlay parallel zu #editor-card (siehe focus-mode.css).
     focusActive=true blendet ihn ein und sortiert ihn über die Card. Focus
     rendert eigenen Header (.focus-editor__topbar); Notebook-Topbar wird im
     focus-host komplett ausgeblendet — beide Editoren sind entkoppelt.

     Smart-Switch in shared/active-editor.js findet diesen Container über
     `.focus-editor.is-active` — solange .is-active fehlt, bleibt der Switch
     No-Op und Sub-Komponenten bedienen den Normal-Container.

     Event-Handler @input/@paste/@contextmenu/@click identisch zum
     Normal-Container, damit Save-/Dirty-/Paste-/Synonyme-Pfade ohne
     Mode-Sonderbehandlung funktionieren. -->
<div x-data="editorFocusCard" class="display-contents">
  <div class="focus-editor" :class="{ 'is-active': focusActive }">
    <!-- Eigener Focus-Header: voll entkoppelt von der Notebook-Topbar. Notebook-
         Topbar wird in #editor-card.focus-host komplett ausgeblendet, Focus-
         Overlay sitzt top:0. Header rendert Titel + Save-Indicator + Live-Counter
         + Save/Exit-Buttons; identisch auf Desktop und Mobile. -->
    <div class="focus-editor__topbar">
      <div class="focus-editor__title-row">
        <span class="focus-editor__title" x-text="$app.currentPage?.name || '–'"></span>
        <span class="focus-editor__subline">
          <span class="save-indicator focus-editor__save-indicator"
                x-show="$app.editMode || $app.lastSavedKind() !== 'none'"
                :class="'save-indicator--' + $app.lastSavedKind()"
                :data-tip="$app.saveIndicatorTip()">
            <span class="save-indicator__dot" aria-hidden="true"></span>
            <span class="save-indicator__text" x-text="$app.saveIndicatorText()"></span>
          </span>
          <span class="focus-live-counter" x-show="$app.editMode">
            <span x-text="$app.t('editor.focus.counterTotal', { words: $app.focusCountWords, chars: $app.focusCountChars })"></span>
            <span class="focus-live-counter--today"
                  x-text="$app.t('editor.focus.counterToday', { wordsDelta: $app.focusCountWordsDelta, charsDelta: $app.focusCountCharsDelta })"></span>
          </span>
        </span>
      </div>
      <div class="focus-editor__actions">
        <button type="button" class="success"
                @click="$app.saveEdit()"
                :disabled="$app.editSaving"
                :data-tip="$app.t('editor.btn.saveEditTitle')">
          <span x-show="$app.editSaving" class="spinner"></span><span x-text="$app.editSaving ? $app.t('common.saving') : $app.t('common.save')"></span>
        </button>
        <button type="button"
                @click="exitFocusMode()"
                :data-tip="$app.t('editor.btn.leaveFocusTitle')"
                x-text="$app.t('editor.btn.leaveFocus')"></button>
      </div>
    </div>
    <div class="focus-editor__content"
         contenteditable="true"
         spellcheck="true"
         autocorrect="off"
         autocapitalize="off"
         @input="_markEditDirty()"
         @paste="_onEditPaste($event)"
         @contextmenu="_onEditContextMenu($event)"
         @click="_onEditClick($event)"
         @pointermove="handleMarkPointer($event)"
         @pointerleave="handleMarkPointerLeave($event)"></div>
  </div>
</div>
