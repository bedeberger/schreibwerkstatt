<!-- Buch-Übersicht (Default-Home) — Sub-Komponente, siehe public/js/cards/book-overview-card.js
     Tile-Templates leben in eigenen Partials (bookoverview-*.html) und werden vom Loader
     in die `<div id="partial-bookoverview-*">`-Container injiziert. Die Tile-Reihenfolge
     hier entspricht der visuellen Reihenfolge im Grid (grid-auto-flow: row dense). -->
<div class="card card--bookoverview book-overview" x-data="bookOverviewCard" x-show="$app.showBookOverviewCard" x-cloak>
  <div class="card-header">
    <div class="card-header-titlebar">
      <span class="card-eyebrow" x-text="$app.selectedBookName"></span>
      <span class="card-title" x-text="$app.t('overview.title')"></span>
    </div>
    <div class="card-actions">
      <button type="button" class="icon-btn icon-btn--ghost" @click="loadBookOverview($store.nav.selectedBookId)" :disabled="overviewLoading"
              :data-tip="$app.t('overview.refresh')" :aria-label="$app.t('overview.refresh')">
        <span x-show="overviewLoading" class="spinner"></span>
        <svg x-show="!overviewLoading" class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg>
      </button>
    </div>
  </div>

  <!-- Loading / Empty -->
  <div x-show="overviewLoading && !overviewLatest()" class="muted-msg muted-msg--spaced" x-text="$app.t('overview.loading')"></div>
  <div x-show="!overviewLoading && !overviewLatest() && (!overviewCoverage || overviewCoverage.total_pages === 0)" class="muted-msg muted-msg--spaced" x-text="$app.t('overview.empty')"></div>

  <!-- Fehlerhinweis: mindestens ein Endpoint ist auch nach Retry ausgefallen.
       Verhindert, dass ein leeres Tile als „keine Daten" fehlgedeutet wird. -->
  <div class="overview-notice" x-show="overviewLoadErrors.length > 0" x-cloak role="status">
    <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#alert-triangle"/></svg>
    <span class="overview-notice-text" x-text="$app.t('overview.loadError')"></span>
    <button type="button" class="btn-compact" @click="loadBookOverview($store.nav.selectedBookId)" :disabled="overviewLoading" x-text="$app.t('overview.refresh')"></button>
  </div>

  <div class="overview-grid" x-show="overviewLatest() || overviewCoverage?.total_pages > 0 || $store.nav.pages.length > 0">
    <div id="partial-bookoverview-snapshot"></div>
    <div id="partial-bookoverview-charts"></div>
    <div id="partial-bookoverview-diary"></div>
    <div id="partial-bookoverview-coverage"></div>
    <div id="partial-bookoverview-review"></div>
    <div id="partial-bookoverview-counts"></div>
    <div id="partial-bookoverview-ortpresence"></div>
    <div id="partial-bookoverview-chapterdist"></div>
    <div id="partial-bookoverview-figpresence"></div>
    <div id="partial-bookoverview-chapter-quality"></div>
    <div id="partial-bookoverview-rueckblick-heatmap"></div>
    <div id="partial-bookoverview-songs"></div>
    <div id="partial-bookoverview-recent"></div>
  </div>
</div>
