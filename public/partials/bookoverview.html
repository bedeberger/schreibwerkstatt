<!-- Buch-Übersicht (Default-Home) — Sub-Komponente, siehe public/js/cards/book-overview-card.js
     Tile-Templates leben in eigenen Partials (bookoverview-*.html) und werden vom Loader
     in die `<div id="partial-bookoverview-*">`-Container injiziert. Die Tile-Reihenfolge
     hier entspricht der visuellen Reihenfolge im Grid (grid-auto-flow: row dense). -->
<div class="card card--bookoverview book-overview" x-data="bookOverviewCard" x-show="$app.showBookOverviewCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('overview.title', { name: $app.selectedBookName })"></span>
    <div class="card-actions">
      <button type="button" @click="loadBookOverview($app.selectedBookId)" :disabled="overviewLoading">
        <span x-show="overviewLoading" class="spinner"></span>
        <span x-text="$app.t('overview.refresh')"></span>
      </button>
    </div>
  </div>

  <!-- Loading / Empty -->
  <div x-show="overviewLoading && !overviewLatest()" class="muted-msg muted-msg--spaced" x-text="$app.t('overview.loading')"></div>
  <div x-show="!overviewLoading && !overviewLatest() && (!overviewCoverage || overviewCoverage.total_pages === 0)" class="muted-msg muted-msg--spaced" x-text="$app.t('overview.empty')"></div>

  <div class="overview-grid" x-show="overviewLatest() || overviewCoverage?.total_pages > 0 || $app.pages.length > 0">
    <div id="partial-bookoverview-snapshot"></div>
    <div id="partial-bookoverview-charts"></div>
    <div id="partial-bookoverview-coverage"></div>
    <div id="partial-bookoverview-review"></div>
    <div id="partial-bookoverview-counts"></div>
    <div id="partial-bookoverview-ortpresence"></div>
    <div id="partial-bookoverview-chapterdist"></div>
    <div id="partial-bookoverview-figpresence"></div>
    <div id="partial-bookoverview-chapter-quality"></div>
    <div id="partial-bookoverview-recent"></div>

    <!-- Quick-Actions: kein Daten-Tile, deshalb eigene Variante (kein Hover-Lift).
         Span small (Buttons brauchen wenig Breite); Dense-Packing füllt Lücken. -->
    <div class="overview-tile overview-tile--actions">
      <div class="overview-tile-label" x-text="$app.t('overview.quickActions')"></div>
      <div class="overview-actions">
        <button type="button" class="btn-compact" @click="$app.toggleBookChatCard()" :disabled="!$app.pages.length" x-text="$app.t('tile.bookchat')"></button>
        <button type="button" class="btn-compact" @click="$app.toggleKontinuitaetCard()" x-text="$app.t('tile.kontinuitaet')"></button>
        <button type="button" class="btn-compact" @click="$app.toggleEreignisseCard()" x-text="$app.t('tile.events')"></button>
        <button type="button" class="btn-compact" @click="$app.toggleBookOrganizerCard()" x-text="$app.t('tile.bookOrganizer')"></button>
        <button type="button" class="btn-compact" @click="$app.alleAktualisieren()" :disabled="$app.alleAktualisierenLoading" x-text="$app.t('palette.action.komplett')"></button>
      </div>
    </div>
  </div>
</div>
