<!-- Buch-Übersicht (Default-Home) — Sub-Komponente, siehe public/js/cards/book-overview-card.js -->
<div class="card book-overview" x-data="bookOverviewCard" x-show="$app.showBookOverviewCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('overview.title', { name: $app.selectedBookName })"></span>
    <div class="card-actions">
      <a class="btn-bookstack-link" target="_blank" rel="noopener"
         x-show="$app.selectedBookUrl"
         :href="$app.selectedBookUrl"
         x-text="$app.t('book.bookstack')"></a>
      <button type="button" @click="loadBookOverview($app.selectedBookId)" :disabled="overviewLoading">
        <span x-show="overviewLoading" class="spinner"></span>
        <span x-text="$app.t('overview.refresh')"></span>
      </button>
    </div>
  </div>

  <!-- Loading / Empty -->
  <div x-show="overviewLoading && !overviewLatest()" class="muted-msg muted-msg--spaced" x-text="$app.t('overview.loading')"></div>
  <div x-show="!overviewLoading && !overviewLatest() && (!overviewCoverage || overviewCoverage.total_pages === 0)" class="muted-msg muted-msg--spaced" x-text="$app.t('overview.empty')"></div>

  <div class="overview-grid" x-show="overviewLatest() || overviewCoverage?.total_pages > 0 || $app.pages.length > 0">

    <!-- HERO: Snapshot mit Hero-Zeichen + Sub-Stats (Reihenfolge: Z → W → S → Kapitel → T) -->
    <template x-if="overviewLatest()">
      <div class="overview-tile overview-tile--hero internal-link"
           @click="_openLengthStats(30, 'chars')"
           :aria-label="$app.t('overview.snapshot') + ': ' + _fmtNum(overviewLatest()?.chars) + ' ' + $app.t('bookstats.unit.z')"
           :data-tip="$app.t('overview.openStats')">
        <div class="overview-tile-label" x-text="$app.t('overview.snapshot')"></div>
        <div class="overview-hero-row">
          <div class="overview-hero-num">
            <span class="overview-hero-value" x-text="_fmtNum(overviewLatest()?.chars)"></span>
            <span class="overview-hero-unit" x-text="$app.t('bookstats.unit.z')"></span>
          </div>
          <div class="overview-substats">
            <div class="overview-substat" x-show="overviewLatest()?.chars > 0"
                 :data-tip="$app.t('bookstats.metric.normseiten')">
              <span class="overview-substat-value" x-text="(Math.round((overviewLatest()?.chars || 0) / 1500 * 10) / 10).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 })"></span>
              <span class="overview-substat-unit" x-text="$app.t('bookstats.unit.ns')"></span>
            </div>
            <div class="overview-substat" x-show="overviewLatest()?.words > 0">
              <span class="overview-substat-value" x-text="_fmtNum(overviewLatest()?.words)"></span>
              <span class="overview-substat-unit" x-text="$app.t('bookstats.unit.w')"></span>
            </div>
            <div class="overview-substat">
              <span class="overview-substat-value" x-text="_fmtNum(overviewLatest()?.page_count)"></span>
              <span class="overview-substat-unit" x-text="$app.t('bookstats.unit.s')"></span>
            </div>
            <div class="overview-substat">
              <span class="overview-substat-value" x-text="_fmtNum(overviewLatest()?.chapter_count)"></span>
              <span class="overview-substat-unit" x-text="$app.t('overview.unit.chapters')"></span>
            </div>
            <div class="overview-substat" x-show="overviewLatest()?.tok > 0">
              <span class="overview-substat-value" x-text="_fmtNum(overviewLatest()?.tok)"></span>
              <span class="overview-substat-unit" x-text="$app.t('bookstats.unit.t')"></span>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- HERO: Sparkline mit Gradient-Fill + farb-codiert + Endpunkt-Marker.
         SVG ist aria-hidden — Trend-Prozent darunter trägt die Info,
         das Tile selbst hat ein zusammenfassendes aria-label. -->
    <template x-if="overviewSparkline().d">
      <div class="overview-tile internal-link"
           @click="_openLengthStats(30, 'chars')"
           :aria-label="$app.t('overview.trend') + ', ' + $app.t('overview.trendDelta', { pct: (overviewSparkline().deltaPct >= 0 ? '+' : '') + overviewSparkline().deltaPct })"
           :data-tip="$app.t('overview.openStats')">
        <div class="overview-tile-label" x-text="$app.t('overview.trend')"></div>
        <div class="overview-sparkline-wrap">
          <svg class="overview-sparkline"
               viewBox="0 0 240 48"
               preserveAspectRatio="none"
               aria-hidden="true">
            <defs>
              <linearGradient :id="$id('sl-grad')" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   :style="'stop-color:' + overviewSparkline().color + ';stop-opacity:0.3'"></stop>
                <stop offset="100%" :style="'stop-color:' + overviewSparkline().color + ';stop-opacity:0'"></stop>
              </linearGradient>
            </defs>
            <path :d="overviewSparkline().area" :fill="'url(#' + $id('sl-grad') + ')'" stroke="none"></path>
            <path :d="overviewSparkline().d" fill="none" :stroke="overviewSparkline().color" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"></path>
            <circle :cx="overviewSparkline().endX" :cy="overviewSparkline().endY" r="2.2" :fill="overviewSparkline().color"></circle>
          </svg>
          <div class="overview-sparkline-hover" aria-hidden="true">
            <template x-for="(p, i) in overviewSparkline().points" :key="(p.iso || '') + ':' + i">
              <div class="overview-sparkline-hover-col" :data-tip="p.label">
                <span class="overview-sparkline-tick" aria-hidden="true"></span>
              </div>
            </template>
          </div>
        </div>
        <div class="overview-trend-meta">
          <span class="overview-trend-pct"
                :class="overviewSparkline().deltaPct > 0 ? 'overview-trend-pct--up'
                      : overviewSparkline().deltaPct < 0 ? 'overview-trend-pct--down' : ''"
                x-text="$app.t('overview.trendDelta', { pct: (overviewSparkline().deltaPct >= 0 ? '+' : '') + overviewSparkline().deltaPct })"></span>
        </div>
      </div>
    </template>

    <!-- 7-Tage-Balken: Mini-Bar-Chart Zeichen-Delta pro Tag -->
    <template x-if="overview7DayCharDelta() !== null">
      <div class="overview-tile internal-link"
           @click="_openLengthStats(7, 'delta_chars')"
           :aria-label="$app.t('overview.last7Days') + ': ' + (overview7DayCharDelta() >= 0 ? '+' : '') + _fmtNum(overview7DayCharDelta()) + ' ' + $app.t('bookstats.unit.z')"
           :data-tip="$app.t('overview.openStats')">
        <div class="overview-tile-label" x-text="$app.t('overview.last7Days')"></div>
        <div class="overview-bars7">
          <template x-for="d in overviewLast7Days()" :key="d.iso">
            <div class="overview-bar7-col" :data-tip="d.label + ': ' + (d.delta >= 0 ? '+' : '') + _fmtNum(d.delta)">
              <div class="overview-bar7-track">
                <div class="overview-bar7-fill"
                     :class="d.delta > 0 ? 'overview-bar7-fill--pos' : d.delta < 0 ? 'overview-bar7-fill--neg' : ''"
                     :style="{ height: Math.round(Math.abs(d.delta) / overviewLast7Max() * 100) + '%' }"></div>
              </div>
              <span class="overview-bar7-label" x-text="d.label"></span>
            </div>
          </template>
        </div>
        <div class="overview-bars7-total">
          <span class="overview-trend-pct"
                :class="overview7DayCharDelta() > 0 ? 'overview-trend-pct--up'
                      : overview7DayCharDelta() < 0 ? 'overview-trend-pct--down' : ''"
                x-text="(overview7DayCharDelta() >= 0 ? '+' : '') + _fmtNum(overview7DayCharDelta()) + ' ' + $app.t('bookstats.unit.z')"></span>
        </div>
      </div>
    </template>

    <!-- Heute-Ring: Tagesziel-Donut, pulsiert bei aktivem Schreibtag.
         Goal aus currentUser.daily_goal_chars (User-Settings), Fallback 1500. -->
    <template x-if="overviewStats && overviewStats.length > 0">
      <div class="overview-tile internal-link"
           @click="_openLengthStats(7, 'delta_chars')"
           :aria-label="$app.t('overview.today.aria', { chars: _fmtNum(overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).chars), goal: _fmtNum(overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).goal), pct: overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).pct })"
           :data-tip="$app.t('overview.openStats')">
        <div class="overview-tile-label" x-text="$app.t('overview.today.title')"></div>
        <div class="overview-donut-row">
          <svg class="overview-donut overview-today-ring"
               :class="{ 'overview-today-ring--active': overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).active, 'overview-today-ring--reached': overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).reached }"
               viewBox="0 0 72 72" aria-hidden="true">
            <circle cx="36" cy="36" :r="overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).r"
                    fill="none" stroke="var(--color-border)" stroke-width="6"></circle>
            <circle cx="36" cy="36" :r="overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).r"
                    fill="none" stroke="var(--color-accent)" stroke-width="6"
                    stroke-linecap="round"
                    :stroke-dasharray="overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).dash + ' ' + overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).gap"
                    transform="rotate(-90 36 36)"></circle>
            <text x="36" y="40" text-anchor="middle" class="overview-donut-text"
                  x-text="overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).pct + '%'"></text>
          </svg>
          <div class="overview-donut-meta">
            <div class="overview-donut-meta-checked"
                 x-show="overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).active"
                 x-text="$app.t('overview.today.meta', { chars: _fmtNum(overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).chars), goal: _fmtNum(overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).goal) })"></div>
            <div class="overview-donut-meta-checked"
                 x-show="!overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).active"
                 x-text="$app.t('overview.today.idle')"></div>
            <div class="overview-donut-meta-checked"
                 x-show="overviewTodayRing($app.currentUser?.daily_goal_chars || 1500).reached"
                 x-text="$app.t('overview.today.goalReached')"></div>
          </div>
        </div>
      </div>
    </template>

    <!-- Schreibstatistiken-Heatmap: 52×7 GitHub-Stil-Grid -->
    <template x-if="overviewStats && overviewStats.length > 0">
      <div class="overview-tile overview-tile--wide internal-link"
           @click="_openLengthStats(365, 'delta_chars')"
           :data-tip="$app.t('overview.openStats')">
        <div class="overview-tile-head">
          <div class="overview-tile-label" x-text="$app.t('overview.streak.title')"></div>
          <div class="overview-streak-meta">
            <span class="overview-streak-stat" x-text="$app.t('overview.streak.current', { n: overviewStreakHeatmap().currentStreak })"></span>
            <span class="overview-streak-stat" x-text="$app.t('overview.streak.longest', { n: overviewStreakHeatmap().longestStreak })"></span>
            <span class="overview-streak-stat" x-text="$app.t('overview.streak.totalActive', { n: overviewStreakHeatmap().totalActiveDays })"></span>
          </div>
        </div>
        <div class="overview-streak-grid" role="img" :aria-label="$app.t('overview.streak.title')">
          <template x-for="(week, wi) in overviewStreakHeatmap().weeks" :key="wi">
            <div class="overview-streak-week">
              <template x-for="(cell, di) in week" :key="di">
                <div class="overview-streak-cell"
                     :class="cell ? ('overview-streak-cell--lvl' + cell.level + (cell.future ? ' overview-streak-cell--future' : '')) : 'overview-streak-cell--empty'"
                     :data-tip="cell && cell.iso
                       ? (cell.delta != null && cell.delta > 0
                           ? $app.t('overview.streak.cellTip', { date: cell.iso, chars: _fmtNum(cell.delta) })
                           : (cell.hasSnapshot ? $app.t('overview.streak.cellTipNoChange', { date: cell.iso }) : $app.t('overview.streak.cellTipNone', { date: cell.iso })))
                       : null"></div>
              </template>
            </div>
          </template>
        </div>
        <div class="overview-streak-legend">
          <span class="overview-streak-legend-label" x-text="$app.t('overview.streak.legend')"></span>
          <span class="overview-streak-cell overview-streak-cell--lvl0"></span>
          <span class="overview-streak-cell overview-streak-cell--lvl1"></span>
          <span class="overview-streak-cell overview-streak-cell--lvl2"></span>
          <span class="overview-streak-cell overview-streak-cell--lvl3"></span>
          <span class="overview-streak-cell overview-streak-cell--lvl4"></span>
        </div>
      </div>
    </template>

    <!-- Lektorat-Coverage als Donut-Ring -->
    <template x-if="overviewCoverage && overviewCoverage.total_pages > 0">
      <div class="overview-tile internal-link"
           @click="$app.toggleFehlerHeatmapCard()"
           :aria-label="$app.t('overview.lektorat') + ': ' + overviewCoverageRing().pct + '%, ' + $app.t('overview.coverageMeta', { checked: (overviewCoverage?.checked_pages ?? 0), total: (overviewCoverage?.total_pages ?? 0) })"
           :data-tip="$app.t('overview.openHeatmap')">
        <div class="overview-tile-label" x-text="$app.t('overview.lektorat')"></div>
        <div class="overview-donut-row">
          <svg class="overview-donut" viewBox="0 0 72 72" aria-hidden="true">
            <circle cx="36" cy="36" :r="overviewCoverageRing().r"
                    fill="none" stroke="var(--color-border)" stroke-width="6"></circle>
            <circle cx="36" cy="36" :r="overviewCoverageRing().r"
                    fill="none" stroke="var(--color-accent)" stroke-width="6"
                    stroke-linecap="round"
                    :stroke-dasharray="overviewCoverageRing().dash + ' ' + overviewCoverageRing().gap"
                    transform="rotate(-90 36 36)"></circle>
            <text x="36" y="40" text-anchor="middle" class="overview-donut-text"
                  x-text="overviewCoverageRing().pct + '%'"></text>
          </svg>
          <div class="overview-donut-meta">
            <div class="overview-donut-meta-checked"
                 x-text="$app.t('overview.coverageMeta', { checked: (overviewCoverage?.checked_pages ?? 0), total: (overviewCoverage?.total_pages ?? 0) })"></div>
          </div>
        </div>
      </div>
    </template>

    <!-- Top-Fehler als horizontale Bars -->
    <template x-if="overviewTopFehler().length > 0">
      <div class="overview-tile internal-link"
           @click="$app.toggleFehlerHeatmapCard()"
           :aria-label="$app.t('overview.topErrors')"
           :data-tip="$app.t('overview.openHeatmap')">
        <div class="overview-tile-label" x-text="$app.t('overview.topErrors')"></div>
        <ul class="overview-error-bars">
          <template x-for="e in overviewTopFehler()" :key="e.typ">
            <li class="overview-error-bar-item">
              <div class="overview-error-bar-head">
                <span class="overview-error-typ" x-text="overviewFehlerLabel(e.typ)"></span>
                <span class="overview-error-count" x-text="_fmtNum(e.count)"></span>
              </div>
              <div class="overview-error-bar-track">
                <div class="overview-error-bar-fill" :style="{ width: e.pct + '%' }"></div>
              </div>
            </li>
          </template>
        </ul>
      </div>
    </template>

    <!-- Letzte Bewertung als 6 Sterne + Trend-Pfeil -->
    <template x-if="overviewLastReview">
      <div class="overview-tile internal-link"
           @click="$app.toggleBookReviewCard()"
           :aria-label="$app.t('overview.lastReview')"
           :data-tip="$app.t('overview.openReview')">
        <div class="overview-tile-label" x-text="$app.t('overview.lastReview')"></div>
        <div class="overview-stars" :aria-label="overviewStarsAriaLabel()">
          <template x-for="(s, i) in overviewStars(overviewLastReview?.review_json?.gesamtnote)" :key="i">
            <span class="overview-star"
                  :class="s.full ? 'overview-star--full' : s.half ? 'overview-star--half' : 'overview-star--empty'"
                  aria-hidden="true">★</span>
          </template>
        </div>
        <div class="overview-review-meta">
          <span class="overview-review-date" x-text="$app.formatDate(overviewLastReview?.reviewed_at)"></span>
          <span class="overview-review-trend" x-show="overviewReviewTrendDisplay()"
                :class="overviewReviewTrend()?.dir === 'up' ? 'overview-trend-pct--up'
                      : overviewReviewTrend()?.dir === 'down' ? 'overview-trend-pct--down' : ''"
                x-text="overviewReviewTrendDisplay()"></span>
        </div>
      </div>
    </template>

    <!-- Figuren: Anzahl + Top-3 als Avatar-Chips -->
    <template x-if="overviewFigurenCount() > 0">
      <div class="overview-tile internal-link"
           @click="$app.toggleFiguresCard()"
           :aria-label="$app.t('tile.figuren') + ': ' + _fmtNum(overviewFigurenCount()) + ' ' + $app.t('overview.unit.figuren')"
           :data-tip="$app.t('tile.figuren.title')">
        <div class="overview-tile-label" x-text="$app.t('tile.figuren')"></div>
        <div class="overview-fig-row">
          <span class="overview-fig-count" x-text="_fmtNum(overviewFigurenCount())"></span>
          <span class="overview-fig-count-unit" x-text="$app.t('overview.unit.figuren')"></span>
        </div>
        <div class="overview-fig-chips" x-show="overviewTopFiguren().length > 0">
          <template x-for="(f, i) in overviewTopFiguren()" :key="f.id">
            <span class="overview-fig-chip"
                  :data-rolle="f.rolle || ''"
                  :data-tip="f.name + (f.mentions > 0 ? ' · ' + f.mentions : '')">
              <span class="overview-fig-avatar"
                    :data-idx="i"
                    x-text="overviewInitials(f.kurzname || f.name)"></span>
              <span class="overview-fig-name" x-text="f.kurzname || f.name"></span>
            </span>
          </template>
        </div>
      </div>
    </template>

    <!-- Szenen: Total + Stacked-Bar Wertungs-Verteilung -->
    <template x-if="overviewSzenenCount() > 0">
      <div class="overview-tile internal-link"
           @click="$app.toggleSzenenCard()"
           :aria-label="$app.t('tile.szenen') + ': ' + _fmtNum(overviewSzenenCount()) + ' ' + $app.t('overview.unit.total')"
           :data-tip="$app.t('tile.szenen.title')">
        <div class="overview-tile-label" x-text="$app.t('tile.szenen')"></div>
        <div class="overview-fig-row">
          <span class="overview-fig-count" x-text="_fmtNum(overviewSzenenCount())"></span>
          <span class="overview-fig-count-unit" x-text="$app.t('overview.unit.total')"></span>
        </div>
        <div class="overview-stacked-bar"
             :data-tip="$app.t('overview.szenenBreakdown', {
               stark: overviewSzenenWertung().stark,
               mittel: overviewSzenenWertung().mittel,
               schwach: overviewSzenenWertung().schwach
             })">
          <div class="overview-stacked-seg overview-stacked-seg--stark"
               :style="{ flex: overviewSzenenWertung().stark }"
               x-show="overviewSzenenWertung().stark > 0"></div>
          <div class="overview-stacked-seg overview-stacked-seg--mittel"
               :style="{ flex: overviewSzenenWertung().mittel }"
               x-show="overviewSzenenWertung().mittel > 0"></div>
          <div class="overview-stacked-seg overview-stacked-seg--schwach"
               :style="{ flex: overviewSzenenWertung().schwach }"
               x-show="overviewSzenenWertung().schwach > 0"></div>
          <div class="overview-stacked-seg overview-stacked-seg--ohne"
               :style="{ flex: overviewSzenenWertung().ohne }"
               x-show="overviewSzenenWertung().ohne > 0"></div>
        </div>
        <div class="overview-stacked-legend">
          <span class="overview-stacked-key overview-stacked-key--stark"
                x-show="overviewSzenenWertung().stark > 0"
                x-text="overviewSzenenWertung().stark + ' ' + $app.t('overview.unit.stark')"></span>
          <span class="overview-stacked-key overview-stacked-key--mittel"
                x-show="overviewSzenenWertung().mittel > 0"
                x-text="overviewSzenenWertung().mittel + ' ' + $app.t('overview.unit.mittel')"></span>
          <span class="overview-stacked-key overview-stacked-key--schwach"
                x-show="overviewSzenenWertung().schwach > 0"
                x-text="overviewSzenenWertung().schwach + ' ' + $app.t('overview.unit.schwach')"></span>
        </div>
      </div>
    </template>

    <!-- Schauplätze: Anzahl + Top-6 als Chips, typ als data-attr für Akzentfarbe -->
    <template x-if="overviewOrteCount() > 0">
      <div class="overview-tile internal-link"
           @click="$app.toggleOrteCard()"
           :aria-label="$app.t('tile.orte') + ': ' + _fmtNum(overviewOrteCount()) + ' ' + $app.t('overview.unit.orte')"
           :data-tip="$app.t('tile.orte.title')">
        <div class="overview-tile-label" x-text="$app.t('tile.orte')"></div>
        <div class="overview-fig-row">
          <span class="overview-fig-count" x-text="_fmtNum(overviewOrteCount())"></span>
          <span class="overview-fig-count-unit" x-text="$app.t('overview.unit.orte')"></span>
        </div>
        <div class="overview-fig-chips" x-show="overviewTopOrte().length > 0">
          <template x-for="o in overviewTopOrte()" :key="o.id">
            <span class="overview-ort-chip"
                  :data-typ="o.typ"
                  :data-tip="o.name + (o.total > 0 ? ' · ' + o.total : '')"
                  @click.stop="$app.openOrtById(o.id)">
              <span class="overview-ort-dot" :data-typ="o.typ" aria-hidden="true"></span>
              <span class="overview-fig-name" x-text="o.name"></span>
            </span>
          </template>
        </div>
      </div>
    </template>

    <!-- Schauplatz-Präsenz-Matrix: Kapitel (Zeilen) × Top-Schauplätze (Spalten).
         Cell-Wert = location_chapters.haeufigkeit. Cell-Intensität = per Spalte
         skaliert. Match primär per chapter_id, Fallback chapter_name.
         Immer medium — Matrix mit Spalten-Header braucht Breite (siehe DESIGN.md). -->
    <template x-if="overviewOrtPresence()">
      <div class="overview-tile overview-tile--medium">
        <div class="overview-tile-label" x-text="$app.t('overview.ortPresence')"></div>
        <div class="overview-presence-wrap">
          <table class="overview-presence-matrix">
            <thead>
              <tr>
                <th></th>
                <template x-for="p in overviewOrtPresence().places" :key="p.id">
                  <th class="overview-presence-col-head"
                      :data-tip="p.name"
                      x-text="p.name"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="row in overviewOrtPresence().rows" :key="row.id">
                <tr>
                  <th class="overview-presence-row-head" :data-tip="row.name" x-text="row.name"></th>
                  <template x-for="cell in row.cells" :key="cell.ortId">
                    <td class="overview-presence-cell"
                        :class="{
                          'overview-presence-cell--empty': cell.value === 0,
                          'internal-link': cell.value > 0
                        }"
                        :style="{ '--cell-pct': cell.pct }"
                        :data-tip="cell.ortName + ' · ' + row.name + ': ' + cell.value"
                        :data-tip="cell.value > 0 ? $app.t('overview.ortPresenceOpen', { ort: cell.ortName, kapitel: row.name }) : ''"
                        @click="cell.value > 0 && $app.openOrtMitKapitel(cell.ortId, row.name)">
                      <span class="overview-presence-fill"></span>
                      <span class="overview-presence-num" x-show="cell.value > 0" x-text="cell.value"></span>
                    </td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- Kapitel-Verteilung: horizontale Bars pro Kapitel (Zeichen relativ).
         Immer medium — Bar + 5 Meta-Zellen brauchen Breite, sonst Stack-Wrap. -->
    <template x-if="overviewChapterDistribution().length > 0">
      <div class="overview-tile overview-tile--medium">
        <div class="overview-tile-head">
          <div class="overview-tile-label" x-text="$app.t('overview.chapterDist')"></div>
          <span class="overview-tile-median"
                x-show="overviewChapterDistribution()[0]?.median > 0"
                x-text="$app.t('overview.medianTick') + ': ' + _fmtNum(Math.round(overviewChapterDistribution()[0]?.median)) + ' ' + $app.t('bookstats.unit.z')"></span>
        </div>
        <ul class="overview-chapter-list">
          <template x-for="ch in overviewChapterDistribution()" :key="ch.id">
            <li class="overview-chapter-row internal-link"
                :class="{ 'overview-chapter-row--max': ch.isMax, 'overview-chapter-row--min': ch.isMin }"
                @click="_openKapitelReview(ch.id)"
                :data-tip="$app.t('overview.chapterReviewOpen', { name: ch.name })">
              <span class="overview-chapter-name" :data-tip="ch.name" x-text="ch.name"></span>
              <div class="overview-chapter-bar-track overview-chapter-bar-track--diverge">
                <div class="overview-chapter-bar-fill"
                     :class="ch.isPositive ? 'overview-chapter-bar-fill--pos' : 'overview-chapter-bar-fill--neg'"
                     :style="{ left: ch.barLeftPct + '%', width: ch.barWidthPct + '%' }"></div>
                <div class="overview-chapter-median-tick"
                     :data-tip="$app.t('overview.medianTick') + ': ' + _fmtNum(ch.median) + ' ' + $app.t('bookstats.unit.z')"></div>
              </div>
              <span class="overview-chapter-meta">
                <span class="overview-chapter-delta"
                      :class="ch.deltaPct > 0 ? 'overview-trend-pct--up' : ch.deltaPct < 0 ? 'overview-trend-pct--down' : ''"
                      x-text="(ch.deltaPct >= 0 ? '+' : '') + ch.deltaPct + '%'"></span>
                <span class="overview-chapter-chars" x-text="_fmtNum(ch.chars) + ' ' + $app.t('bookstats.unit.z')"></span>
                <span class="overview-chapter-ns"
                      :data-tip="$app.t('bookstats.metric.normseiten')"
                      x-text="ch.normseiten.toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + $app.t('bookstats.unit.ns')"></span>
                <span class="overview-chapter-words" x-text="_fmtNum(ch.words) + ' ' + $app.t('bookstats.unit.w')"></span>
                <span class="overview-chapter-pages" x-text="ch.pages + ' ' + $app.t('bookstats.unit.s')"></span>
              </span>
            </li>
          </template>
        </ul>
      </div>
    </template>

    <!-- Figuren-Präsenz-Matrix: Kapitel (Zeilen) × Top-Figuren (Spalten).
         Cell-Wert = Anzahl Szenen pro (Figur, Kapitel). Cell-Intensität = per Spalte skaliert.
         Horizontaler Scroll bei vielen Figuren. Leere Zellen = Figur fehlt im Kapitel.
         Immer medium — Matrix mit Spalten-Header braucht Breite (siehe DESIGN.md). -->
    <template x-if="overviewFigurePresence()">
      <div class="overview-tile overview-tile--medium">
        <div class="overview-tile-label" x-text="$app.t('overview.figPresence')"></div>
        <div class="overview-presence-wrap">
          <table class="overview-presence-matrix">
            <thead>
              <tr>
                <th></th>
                <template x-for="fig in overviewFigurePresence().figures" :key="fig.id">
                  <th class="overview-presence-col-head"
                      :data-tip="fig.name"
                      x-text="fig.name"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="row in overviewFigurePresence().rows" :key="row.id">
                <tr>
                  <th class="overview-presence-row-head" :data-tip="row.name" x-text="row.name"></th>
                  <template x-for="cell in row.cells" :key="cell.figureId">
                    <td class="overview-presence-cell"
                        :class="{
                          'overview-presence-cell--empty': cell.value === 0,
                          'internal-link': cell.value > 0
                        }"
                        :style="{ '--cell-pct': cell.pct }"
                        :data-tip="cell.figureName + ' · ' + row.name + ': ' + cell.value"
                        :data-tip="cell.value > 0 ? $app.t('overview.figPresenceOpen', { figur: cell.figureName, kapitel: row.name }) : ''"
                        @click="cell.value > 0 && $app.openFigurMitKapitel(cell.figureId, row.name)">
                      <span class="overview-presence-fill"></span>
                      <span class="overview-presence-num" x-show="cell.value > 0" x-text="cell.value"></span>
                    </td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- Lektorat-Findings pro Kapitel: aus Heatmap aggregiert. Median, Bar
         und Sort basieren auf der absoluten Anzahl Findings; per1k bleibt
         als Sekundärwert in der Zeilen-Meta sichtbar.
         Klick auf Tile-Header → Fehler-Heatmap; Zeilen sind nicht klickbar
         (Heatmap zeigt eh alles). -->
    <template x-if="overviewChapterFindings().some(c => !c.noCheck)">
      <div class="overview-tile overview-tile--medium internal-link"
           @click="$app.toggleFehlerHeatmapCard()"
           :data-tip="$app.t('overview.openHeatmap')">
        <div class="overview-tile-head">
          <div class="overview-tile-label" x-text="$app.t('overview.chapterFindings')"></div>
          <span class="overview-tile-median"
                x-show="overviewChapterFindings()[0]?.showMedian"
                x-text="$app.t('overview.medianTick') + ': ' + overviewChapterFindings()[0]?.median + ' ' + $app.t('overview.unit.findings')"></span>
        </div>
        <ul class="overview-chapter-list">
          <template x-for="ch in overviewChapterFindings()" :key="ch.id">
            <li class="overview-chapter-row"
                :class="{ 'overview-chapter-row--nocheck': ch.noCheck, 'overview-chapter-row--worst': ch.isWorst, 'overview-chapter-row--best': ch.isBest }">
              <span class="overview-chapter-name" :data-tip="ch.name" x-text="ch.name"></span>
              <div class="overview-chapter-bar-track overview-chapter-bar-track--diverge"
                   x-show="ch.showMedian">
                <div class="overview-chapter-bar-fill"
                     x-show="!ch.noCheck"
                     :class="ch.isAbove ? 'overview-chapter-bar-fill--findings-pos' : 'overview-chapter-bar-fill--findings-neg'"
                     :style="{ left: ch.barLeftPct + '%', width: ch.barWidthPct + '%' }"></div>
                <div class="overview-chapter-median-tick"
                     x-show="!ch.noCheck"
                     :data-tip="$app.t('overview.medianTick') + ': ' + ch.median + ' ' + $app.t('overview.unit.findings')"></div>
              </div>
              <span class="overview-chapter-meta">
                <span class="overview-chapter-delta"
                      x-show="!ch.noCheck && ch.showMedian"
                      :class="ch.deltaPct > 0 ? 'overview-trend-pct--down' : ch.deltaPct < 0 ? 'overview-trend-pct--up' : ''"
                      x-text="(ch.deltaPct >= 0 ? '+' : '') + ch.deltaPct + '%'"></span>
                <span class="overview-chapter-count"
                      x-show="!ch.noCheck"
                      x-text="_fmtNum(ch.count) + ' ' + $app.t('overview.unit.findings')"></span>
                <span class="overview-chapter-nocheck"
                      x-show="ch.noCheck"
                      x-text="$app.t('overview.unit.notChecked')"></span>
              </span>
            </li>
          </template>
        </ul>
      </div>
    </template>

    <!-- Lektoratszeit pro Kapitel: aus /history/lektorat-time per_chapter.
         Tracking läuft, solange checkDone (Prüfmodus) aktiv ist und der Tab
         sichtbar. Sort: Sekunden desc; Diverging-Bar um Median der Sekunden.
         Anzeige als exakte Dauer (h/min/s). Klick → BookStats (Total-Badges). -->
    <template x-if="overviewChapterLektoratTime().some(c => !c.noTime)">
      <div class="overview-tile overview-tile--medium internal-link"
           @click="_openLengthStats(0, 'lektorat_minutes')"
           :data-tip="$app.t('overview.openBookStats')">
        <div class="overview-tile-head">
          <div class="overview-tile-label" x-text="$app.t('overview.chapterLektoratTime')"></div>
          <span class="overview-tile-median"
                x-show="overviewChapterLektoratTime()[0]?.showMedian"
                x-text="$app.t('overview.medianTick') + ': ' + overviewChapterLektoratTime()[0]?.medianLabel"></span>
        </div>
        <ul class="overview-chapter-list">
          <template x-for="ch in overviewChapterLektoratTime()" :key="ch.id ?? '_'">
            <li class="overview-chapter-row"
                :class="{ 'overview-chapter-row--nocheck': ch.noTime, 'overview-chapter-row--worst': ch.isWorst, 'overview-chapter-row--best': ch.isBest }">
              <span class="overview-chapter-name" :data-tip="ch.name" x-text="ch.name"></span>
              <div class="overview-chapter-bar-track overview-chapter-bar-track--diverge"
                   x-show="ch.showMedian">
                <div class="overview-chapter-bar-fill"
                     x-show="!ch.noTime"
                     :class="ch.isAbove ? 'overview-chapter-bar-fill--findings-pos' : 'overview-chapter-bar-fill--findings-neg'"
                     :style="{ left: ch.barLeftPct + '%', width: ch.barWidthPct + '%' }"></div>
                <div class="overview-chapter-median-tick"
                     x-show="!ch.noTime"
                     :data-tip="$app.t('overview.medianTick') + ': ' + ch.medianLabel"></div>
              </div>
              <span class="overview-chapter-meta">
                <span class="overview-chapter-delta"
                      x-show="!ch.noTime && ch.showMedian"
                      :class="ch.deltaPct > 0 ? 'overview-trend-pct--down' : ch.deltaPct < 0 ? 'overview-trend-pct--up' : ''"
                      x-text="(ch.deltaPct >= 0 ? '+' : '') + ch.deltaPct + '%'"></span>
                <span class="overview-chapter-count"
                      x-show="!ch.noTime"
                      x-text="ch.durationLabel"></span>
                <span class="overview-chapter-nocheck"
                      x-show="ch.noTime"
                      x-text="$app.t('overview.unit.notTracked')"></span>
              </span>
            </li>
          </template>
        </ul>
      </div>
    </template>

    <!-- Zuletzt bearbeitet (Zeilen sind individuelle Links).
         Immer medium — Name + Meta-Spalten brauchen Breite. -->
    <template x-if="overviewRecentPages().length > 0">
      <div class="overview-tile overview-tile--medium">
        <div class="overview-tile-label" x-text="$app.t('overview.recent')"></div>
        <ul class="overview-recent-list">
          <template x-for="p in overviewRecentPages()" :key="p.id">
            <li class="overview-recent-item internal-link" @click="$app.selectPage(p)">
              <span class="overview-recent-name" x-text="p.name"></span>
              <span class="overview-recent-meta">
                <span class="overview-recent-chars"
                      x-show="overviewPageChars(p.id) != null"
                      x-text="_fmtNum(overviewPageChars(p.id)) + ' ' + $app.t('bookstats.unit.z')"></span>
                <span class="overview-recent-ns"
                      x-show="overviewPageChars(p.id) != null"
                      :data-tip="$app.t('bookstats.metric.normseiten')"
                      x-text="(Math.round(overviewPageChars(p.id) / 1500 * 10) / 10).toLocaleString($app.uiLocale === 'en' ? 'en-US' : 'de-CH', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + $app.t('bookstats.unit.ns')"></span>
                <span class="overview-recent-chapter" x-show="p.chapterName" :data-tip="p.chapterName" x-text="p.chapterName"></span>
              </span>
            </li>
          </template>
        </ul>
      </div>
    </template>

    <!-- Quick-Actions: kein Daten-Tile, deshalb eigene Variante (kein Hover-Lift).
         Span small (Buttons brauchen wenig Breite); Dense-Packing füllt Lücken. -->
    <div class="overview-tile overview-tile--actions">
      <div class="overview-tile-label" x-text="$app.t('overview.quickActions')"></div>
      <div class="overview-actions">
        <button type="button" class="btn-compact" @click="$app.toggleBookChatCard()" :disabled="!$app.pages.length" x-text="$app.t('tile.bookchat')"></button>
        <button type="button" class="btn-compact" @click="$app.toggleKontinuitaetCard()" x-text="$app.t('tile.kontinuitaet')"></button>
        <button type="button" class="btn-compact" @click="$app.toggleEreignisseCard()" x-text="$app.t('tile.events')"></button>
        <button type="button" class="btn-compact" @click="$app.alleAktualisieren()" :disabled="$app.alleAktualisierenLoading" x-text="$app.t('palette.action.komplett')"></button>
      </div>
    </div>

  </div>
</div>
