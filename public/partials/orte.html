<!-- Schauplätze -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/orte-card.js.
  Fachdaten (orte, szenen, figuren) leben in Alpine.store('catalog');
  orteFilters + selectedOrtId bleiben im Root.
-->
<div class="card card--orte" x-data="orteCard" x-show="$app.showOrteCard" x-cloak>
  <div class="card-header card-header--subline">
    <div class="card-header-titlebar">
      <span class="card-title" x-text="$app.t('orte.title', { name: $app.selectedBookName })"></span>
      <div class="card-subline" x-show="$app.alleAktualisierenLastRun && !orteLoading">
        <span class="card-timestamp" x-text="$app.t('common.asOf', { date: $app.alleAktualisierenLastRun })"></span>
      </div>
    </div>
  </div>

  <div x-show="orteProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="{ '--progress': orteProgress + '%' }"></div>
  </div>
  <div x-show="orteStatus" class="card-status" x-html="orteStatus"></div>

  <div x-show="$app.orte.length === 0 && !orteLoading && !orteStatus" class="card-status" x-text="$app.t('common.noDataYet')"></div>

  <!-- Skeleton während Loading vor erstem Datensatz -->
  <div x-show="orteLoading && $app.orte.length === 0" class="entity-skeleton entity-list--accented" x-cloak>
    <template x-for="i in 6" :key="i">
      <div class="entity-skeleton-row">
        <span class="entity-skeleton-cell entity-skeleton-cell--anchor"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--title"></span>
        <span class="entity-skeleton-cell entity-skeleton-cell--meta"></span>
      </div>
    </template>
  </div>

  <!-- Filter-Leiste -->
  <div x-show="$app.orte.length > 0" class="filter-bar">
    <input type="text" x-model="$app.orteFilters.suche" :placeholder="$app.t('common.search')" :aria-label="$app.t('common.search')" class="filter-search-input">
    <div x-data="combobox($app.t('filter.figur'), $app.t('filter.allFiguren'))"
         x-modelable="value" x-model="$app.orteFilters.figurId"
         x-effect="options = $app.figuren.filter(f => $app.orte.some(o => (o.figuren || []).includes(f.id))).map(f => ({value: f.id, label: f.kurzname || f.name}))"
         >
    </div>
    <div x-data="combobox($app.t('filter.chapter'), $app.t('filter.allChapters'))"
         x-modelable="value" x-model="$app.orteFilters.kapitel"
         x-effect="options = $app.orteKapitelListe().map(k => ({value: k, label: k}))"
         >
    </div>
    <div x-show="$app.szenen.length > 0"
         x-data="combobox($app.t('filter.szene'), $app.t('filter.allSzenen'))"
         x-modelable="value" x-model="$app.orteFilters.szeneId"
         x-effect="options = $app.szenen.map(s => ({value: String(s.id), label: s.titel}))"
         >
    </div>
    <span class="filter-count" x-text="$app.orteFiltered.length + ' / ' + $app.orte.length"></span>
  </div>

  <!-- Ortsliste -->
  <div x-show="$app.orte.length > 0" class="entity-list entity-list--accented ort-list">
    <template x-for="o in $app.orteFiltered" :key="o.id">
      <div>
        <div class="entity-row" :data-ortid="o.id" @click="$app.selectedOrtId = $app.selectedOrtId === o.id ? null : o.id">
          <span class="tag entity-typ-tag" x-text="o.typ || $app.t('orte.typAndere')"></span>
          <span class="entity-row-title" x-text="o.name"></span>
          <span x-show="o.stimmung" class="ort-stimmung" x-text="o.stimmung"></span>
          <template x-if="o.kapitel?.length">
            <span class="kapitel-badges">
              <span class="kapitel-badge kapitel-badge--primary internal-link" @click.stop="$app.openKapitelByName(o.kapitel[0].name)" x-text="o.kapitel[0].name"></span>
              <template x-if="o.kapitel.length > 1">
                <span class="kapitel-badge kapitel-badge--more" x-text="'+' + (o.kapitel.length - 1)"></span>
              </template>
            </span>
          </template>
          <span class="history-chevron" :class="{ open: $app.selectedOrtId === o.id }">›</span>
        </div>
        <div x-show="$app.selectedOrtId === o.id" class="entity-detail">
          <p x-show="o.beschreibung" x-text="o.beschreibung" class="entity-detail-text"></p>
          <div x-show="o.erste_erwaehnung" class="entity-meta-row">
            <span class="entity-meta-label" x-text="$app.t('orte.firstMention')"></span>
            <template x-if="o.erste_erwaehnung_page_id">
              <span class="internal-link" @click.stop="$app.gotoPageById(o.erste_erwaehnung_page_id)" x-text="o.erste_erwaehnung"></span>
            </template>
            <template x-if="!o.erste_erwaehnung_page_id">
              <span x-text="o.erste_erwaehnung"></span>
            </template>
          </div>
          <div x-show="o.figuren?.length > 0" class="entity-meta-row">
            <span class="entity-meta-label" x-text="$app.t('orte.figuren')"></span>
            <template x-for="figId in o.figuren" :key="figId">
              <span class="tag internal-link" @click.stop="$app.openFigurById(figId)" x-text="$app.figurenById.get(figId)?.kurzname || $app.figurenById.get(figId)?.name || figId"></span>
            </template>
          </div>
          <div x-show="o.kapitel?.length > 1" class="entity-meta-row">
            <span class="entity-meta-label" x-text="$app.t('orte.kapitel')"></span>
            <template x-for="k in o.kapitel" :key="k.name">
              <span class="tag internal-link" @click.stop="$app.openKapitelByName(k.name)" x-text="k.name + (k.haeufigkeit > 1 ? ' ×' + k.haeufigkeit : '')"></span>
            </template>
          </div>
          <div x-show="$app.szenen.some(s => (s.ort_ids||[]).includes(o.id))" class="entity-meta-row">
            <span class="entity-meta-label" x-text="$app.t('orte.szenen')"></span>
            <template x-for="s in $app.szenen.filter(s => (s.ort_ids||[]).includes(o.id))" :key="s.id">
              <span class="tag" x-text="s.titel"></span>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
