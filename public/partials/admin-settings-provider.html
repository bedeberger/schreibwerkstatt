    <!-- Provider-Tab: Sub-Tabs pro Provider, aktiver markiert via Badge -->
    <section x-show="adminSettingsTab === 'provider'" class="admin-settings-section">
      <p class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.help.providerChoice')"></p>

      <nav class="admin-settings-subtabs" role="tablist">
        <template x-for="p in ['claude','ollama','openai-compat']" :key="p">
          <button type="button" role="tab"
                  :class="['admin-settings-subtab', adminSettingsProviderSubtab === p ? 'is-active' : '', adminSettingsForm['ai.provider'] === p ? 'is-default-provider' : '']"
                  @click="adminSettingsProviderSubtab = p">
            <span x-text="$app.t('admin.settings.section.' + p)"></span>
            <span x-show="adminSettingsForm['ai.provider'] === p" class="admin-settings-active-badge" x-text="$app.t('admin.settings.provider.active')"></span>
          </button>
        </template>
      </nav>

      <div x-show="adminSettingsProviderSubtab === 'claude'" class="admin-settings-subsection">
        <h4 class="admin-settings-subheading"><span x-text="$app.t('admin.settings.claude.standardTitle')"></span></h4>
        <div x-data="settingField({ k: 'ai.claude.api_key', type: 'password', label: 'admin.settings.label.apiKey' })"></div>
        <div x-data="settingField({ k: 'ai.claude.model', label: 'admin.settings.label.model', ph: 'claude-sonnet-4-6' })"></div>
        <div x-data="settingField({ k: 'ai.claude.context_window', type: 'num', label: 'admin.settings.label.contextWindow', num: { integer: true, min: 8000, max: 2000000 }, help: 'admin.settings.help.contextWindow' })"></div>
        <div x-data="settingField({ k: 'ai.claude.max_tokens_out', type: 'num', label: 'admin.settings.label.maxTokensOut', num: { integer: true, min: 1024, max: 200000 }, help: 'admin.settings.help.maxTokensOut' })"></div>

        <h4 class="admin-settings-subheading"><span x-text="$app.t('admin.settings.claude.komplettTitle')"></span></h4>
        <small class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.claude.komplettIntro')"></small>
        <div x-data="settingField({ k: 'ai.claude.model.komplett', label: 'admin.settings.label.aiClaudeModelKomplett', ph: 'claude-opus-4-8', help: 'admin.settings.help.komplettModel' })"></div>
        <div x-data="settingField({ k: 'ai.claude.model.komplett.extract', label: 'admin.settings.label.aiClaudeModelKomplettExtract', ph: 'claude-sonnet-5', help: 'admin.settings.help.komplettModelExtract' })"></div>
        <div x-data="settingField({ k: 'ai.claude.context_window.komplett', type: 'num', label: 'admin.settings.label.aiClaudeContextWindowKomplett', num: { integer: true, min: 0, max: 2000000 }, help: 'admin.settings.help.komplettContextWindow' })"></div>
        <div x-data="settingField({ k: 'ai.claude.max_tokens_out.komplett', type: 'num', label: 'admin.settings.label.aiClaudeMaxTokensOutKomplett', num: { integer: true, min: 0, max: 200000 }, help: 'admin.settings.help.komplettMaxTokensOut' })"></div>
        <div x-data="settingField({ k: 'ai.claude.timeout_ms.komplett', type: 'num', label: 'admin.settings.label.aiClaudeTimeoutMsKomplett', num: { integer: true, min: 0, max: 3600000 }, help: 'admin.settings.help.komplettTimeoutMs' })"></div>
        <div x-data="settingField({ k: 'ai.claude.effort.komplett', label: 'admin.settings.label.aiClaudeEffortKomplett', ph: 'high', help: 'admin.settings.help.komplettEffort' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.completeness_passes', type: 'num', label: 'admin.settings.label.komplettCompletenessPasses', num: { integer: true, min: 0, max: 3 }, help: 'admin.settings.help.completenessPasses' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.coverage_audit_chapters', type: 'num', label: 'admin.settings.label.komplettCoverageAuditChapters', num: { integer: true, min: 0, max: 20 }, help: 'admin.settings.help.coverageAuditChapters' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.coverage_min_score', type: 'num', label: 'admin.settings.label.komplettCoverageMinScore', num: { step: 0.05, min: 0, max: 1 }, help: 'admin.settings.help.coverageMinScore' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.extract_single_pass_cap', type: 'num', label: 'admin.settings.label.komplettExtractSinglePassCap', num: { integer: true, min: 0, max: 2000000 }, help: 'admin.settings.help.extractSinglePassCap' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.figure_batch_size', type: 'num', label: 'admin.settings.label.komplettFigureBatchSize', num: { integer: true, min: 1, max: 200 }, help: 'admin.settings.help.figureBatchSize' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.scene_backfill_min_chars', type: 'num', label: 'admin.settings.label.komplettSceneBackfillMinChars', num: { integer: true, min: 500, max: 100000 }, help: 'admin.settings.help.sceneBackfillMinChars' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.attribute_check', type: 'toggle', label: 'admin.settings.label.komplettAttributeCheck', help: 'admin.settings.help.attributeCheck' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.coverage_feedback', type: 'toggle', label: 'admin.settings.label.komplettCoverageFeedback', help: 'admin.settings.help.coverageFeedback' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.scene_backfill', type: 'toggle', label: 'admin.settings.label.komplettSceneBackfill', help: 'admin.settings.help.sceneBackfill' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.remap_rescue', type: 'toggle', label: 'admin.settings.label.komplettRemapRescue', help: 'admin.settings.help.remapRescue' })"></div>
        <div x-data="settingField({ k: 'ai.komplett.factcheck', type: 'toggle', label: 'admin.settings.label.komplettFactcheck', help: 'admin.settings.help.factcheck' })"></div>

        <h4 class="admin-settings-subheading"><span x-text="$app.t('admin.settings.claude.bookchatTitle')"></span></h4>
        <small class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.claude.bookchatIntro')"></small>
        <div x-data="settingField({ k: 'ai.claude.model.bookchat', label: 'admin.settings.label.aiClaudeModelBookchat', ph: 'claude-opus-4-8', help: 'admin.settings.help.bookchatModel' })"></div>
        <div x-data="settingField({ k: 'ai.claude.context_window.bookchat', type: 'num', label: 'admin.settings.label.aiClaudeContextWindowBookchat', num: { integer: true, min: 0, max: 2000000 }, help: 'admin.settings.help.bookchatContextWindow' })"></div>
        <div x-data="settingField({ k: 'ai.claude.max_tokens_out.bookchat', type: 'num', label: 'admin.settings.label.aiClaudeMaxTokensOutBookchat', num: { integer: true, min: 0, max: 200000 }, help: 'admin.settings.help.bookchatMaxTokensOut' })"></div>
        <div x-data="settingField({ k: 'ai.claude.timeout_ms.bookchat', type: 'num', label: 'admin.settings.label.aiClaudeTimeoutMsBookchat', num: { integer: true, min: 0, max: 3600000 }, help: 'admin.settings.help.bookchatTimeoutMs' })"></div>

        <h4 class="admin-settings-subheading"><span x-text="$app.t('admin.settings.claude.advancedTitle')"></span></h4>
        <small class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.help.advancedClaude')"></small>
        <div x-data="settingField({ k: 'ai.claude.retry_max', type: 'num', label: 'admin.settings.label.aiClaudeRetryMax', num: { step: 1, min: 0, max: 10 } })"></div>
        <div x-data="settingField({ k: 'ai.claude.timeout_ms', type: 'num', label: 'admin.settings.label.aiClaudeTimeoutMs', num: { step: 1, min: 1000, max: 3600000 } })"></div>
        <div x-data="settingField({ k: 'ai.claude.phase1_concurrency', type: 'num', label: 'admin.settings.label.aiClaudePhase1Concurrency', num: { step: 1, min: 1, max: 16 } })"></div>
      </div>

      <div x-show="adminSettingsProviderSubtab === 'ollama'" class="admin-settings-subsection">
        <div x-data="settingField({ k: 'ai.ollama.host', type: 'url', label: 'admin.settings.label.host', ph: 'http://localhost:11434' })"></div>
        <div x-data="settingField({ k: 'ai.ollama.model', label: 'admin.settings.label.model' })"></div>
        <div x-data="settingField({ k: 'ai.ollama.temperature', type: 'num', label: 'admin.settings.label.temperature', num: { step: 0.01, decimals: 2, min: 0, max: 2 } })"></div>
        <div x-data="settingField({ k: 'ai.ollama.context_window', type: 'num', label: 'admin.settings.label.contextWindow', num: { integer: true, min: 2048, max: 2000000 }, help: 'admin.settings.help.contextWindow' })"></div>
        <div x-data="settingField({ k: 'ai.ollama.max_tokens_out', type: 'num', label: 'admin.settings.label.maxTokensOut', num: { integer: true, min: 512, max: 200000 }, help: 'admin.settings.help.maxTokensOut' })"></div>
        <div x-data="settingField({ k: 'ai.ollama.repeat_penalty', type: 'num', label: 'admin.settings.label.repeatPenalty', num: { step: 0.05, decimals: 2, min: 1, max: 2 }, help: 'admin.settings.help.repeatPenalty' })"></div>
        <div x-data="settingField({ k: 'ai.ollama.think', type: 'toggle', label: 'admin.settings.label.aiThink', help: 'admin.settings.help.think' })"></div>
      </div>

      <div x-show="adminSettingsProviderSubtab === 'openai-compat'" class="admin-settings-subsection">
        <div x-data="settingField({ k: 'ai.openai-compat.host', type: 'url', label: 'admin.settings.label.host', ph: 'http://localhost:8080' })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.model', label: 'admin.settings.label.model' })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.api_key', type: 'password', label: 'admin.settings.label.apiKey', help: 'admin.settings.help.openaiCompatApiKey' })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.temperature', type: 'num', label: 'admin.settings.label.temperature', num: { step: 0.01, decimals: 2, min: 0, max: 2 } })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.context_window', type: 'num', label: 'admin.settings.label.contextWindow', num: { integer: true, min: 2048, max: 2000000 }, help: 'admin.settings.help.contextWindow' })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.max_tokens_out', type: 'num', label: 'admin.settings.label.maxTokensOut', num: { integer: true, min: 512, max: 200000 }, help: 'admin.settings.help.maxTokensOut' })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.repeat_penalty', type: 'num', label: 'admin.settings.label.repeatPenalty', num: { step: 0.05, decimals: 2, min: 1, max: 2 }, help: 'admin.settings.help.repeatPenalty' })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.think', type: 'toggle', label: 'admin.settings.label.aiThink', help: 'admin.settings.help.thinkOpenaiCompat' })"></div>
        <div x-data="settingField({ k: 'ai.openai-compat.max_parallel', type: 'num', label: 'admin.settings.label.maxParallel', num: { integer: true, min: 1, max: 16 }, help: 'admin.settings.help.maxParallelOpenaiCompat' })"></div>
      </div>

      <template x-if="adminSettingsBudget(adminSettingsProviderSubtab)">
        <div class="admin-settings-budget"
             :class="{ 'is-warn': adminSettingsBudget(adminSettingsProviderSubtab).level === 'warn', 'is-bad': adminSettingsBudget(adminSettingsProviderSubtab).level === 'bad' }">
          <strong x-text="$app.t('admin.settings.komplett.title')"></strong>
          <p class="muted-msg muted-msg--sm"
             x-text="$app.t('admin.settings.komplett.derived', adminSettingsBudget(adminSettingsProviderSubtab).f)"></p>
          <p x-show="adminSettingsBudget(adminSettingsProviderSubtab).level !== 'ok'"
             x-text="$app.t('admin.settings.komplett.' + adminSettingsBudget(adminSettingsProviderSubtab).level, adminSettingsBudget(adminSettingsProviderSubtab).f)"></p>
        </div>
      </template>

      <div class="admin-settings-actions">
        <button type="button"
                @click="adminSettingsForm['ai.provider'] = adminSettingsProviderSubtab"
                :disabled="adminSettingsForm['ai.provider'] === adminSettingsProviderSubtab"
                x-text="$app.t('admin.settings.provider.makeActive')"></button>
        <button type="button" @click="adminSettingsTest('provider')" x-text="$app.t('admin.settings.test.connection')"></button>
      </div>
    </section>
