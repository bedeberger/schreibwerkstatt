<!-- Command-Palette: Modal mit Such-Input + gruppierter Feature-/Aktions-/Provider-Liste.
     Nach <body> teleportiert, damit fixed-Overlay nicht von einem
     transformierten Eltern-Container eingefangen wird.
     Alpine.data-Sub — siehe public/js/cards/palette-card.js. -->

<div x-data="paletteCard" class="display-contents">
  <template x-teleport="body">
    <div x-show="paletteOpen" x-cloak
         class="palette-overlay"
         @click="onOverlayClick($event)"
         @keydown.escape.window="if (paletteOpen) closePalette()">
      <div class="palette-panel" role="dialog" aria-modal="true" :aria-label="$app.t('palette.placeholder')">
        <input type="text"
               class="palette-input"
               role="combobox"
               aria-autocomplete="list"
               aria-controls="palette-listbox"
               :aria-activedescendant="activeItemDomId() || null"
               aria-expanded="true"
               x-model="paletteQuery"
               @input="onPaletteInput()"
               @keydown="onPaletteKeydown($event)"
               autocomplete="off"
               autocapitalize="off"
               autocorrect="off"
               spellcheck="false"
               :placeholder="$app.t('palette.placeholder')"
               :aria-label="$app.t('palette.placeholder')">
        <!-- Mode-Pill: zeigt aktiven Suchmodus, sobald ein Prefix erkannt wurde. -->
        <div x-show="paletteCurrentMode()" x-cloak class="palette-mode">
          <template x-if="paletteCurrentMode()">
            <span class="palette-mode-pill">
              <kbd x-text="paletteCurrentMode().prefix"></kbd>
              <span x-text="$app.t('palette.mode.prefixIn', { name: $app.t(paletteCurrentMode().labelKey) })"></span>
            </span>
          </template>
        </div>
        <div class="palette-list" id="palette-listbox" role="listbox">
          <template x-for="section in paletteSections()" :key="section.key">
            <div class="palette-section">
              <div class="palette-section-label" x-text="$app.t(section.labelKey)"></div>
              <template x-for="item in section.items" :key="section.key + ':' + item.key">
                <button type="button"
                        class="palette-item"
                        :id="paletteItemId(section.key, item.key)"
                        :class="{
                          'palette-item--active': paletteIsActive(section.key, item.key),
                          'palette-item--disabled': !item.available,
                        }"
                        :data-tip="!item.available && item.reasonKey ? $app.t(item.reasonKey) : null"
                        @click="activateItem(item)"
                        @mouseenter="onItemHover(section.key, item.key)"
                        role="option"
                        :aria-selected="paletteIsActive(section.key, item.key)"
                        :aria-disabled="!item.available">
                  <span class="palette-item-label" x-html="renderLabelHtml(item)"></span>
                  <span class="palette-item-desc" x-text="renderSubText(item)"></span>
                  <span class="palette-item-preview" x-show="item.snippet" x-html="item.snippet"></span>
                </button>
              </template>
            </div>
          </template>
          <div class="palette-empty"
               x-show="paletteSections().length === 0 && paletteQuery"
               x-text="$app.t('palette.empty')"></div>
        </div>
        <!-- Prefix-Legende: nur sichtbar wenn Suchfeld leer. -->
        <div class="palette-legend" x-show="!paletteQuery" x-cloak>
          <div class="palette-legend-grid">
            <template x-for="row in paletteLegendItems()" :key="row.prefix">
              <span class="palette-legend-row">
                <kbd x-text="row.prefix"></kbd>
                <span x-text="$app.t(row.labelKey)"></span>
              </span>
            </template>
          </div>
        </div>
        <div class="palette-toast" x-show="paletteToast" x-cloak x-text="paletteToast"></div>
      </div>
    </div>
  </template>
</div>
