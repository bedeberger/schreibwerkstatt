    <!-- STT-Tab: Speech-to-Text-Diktat (Notebook-Editor) -->
    <section x-show="adminSettingsTab === 'stt'" class="admin-settings-section">
      <p class="muted-msg muted-msg--sm" x-text="$app.t('admin.settings.stt.hint')"></p>
      <div x-data="settingField({ k: 'stt.enabled', type: 'toggle', base: 'stt.enabled' })"></div>
      <div x-data="settingField({ k: 'stt.host', type: 'url', base: 'stt.host', help: true })"></div>
      <div x-data="settingField({ k: 'stt.model', base: 'stt.model', help: true })"></div>
      <div x-data="settingField({ k: 'stt.api_key', type: 'password', base: 'stt.apiKey', help: true })"></div>
      <div x-data="settingField({ k: 'stt.language', type: 'select', base: 'stt.language', help: true, opts: [{ value: 'de', label: 'Deutsch' }, { value: 'en', label: 'English' }] })"></div>
      <div x-data="settingField({ k: 'stt.temperature', type: 'num', base: 'stt.temperature', num: { step: 0.05, min: 0, max: 1, decimals: 2 }, help: true })"></div>
      <div x-data="settingField({ k: 'stt.upstream_timeout_ms', type: 'num', base: 'stt.upstreamTimeoutMs', num: { integer: true, min: 5000, max: 120000 }, help: true })"></div>
      <div x-data="settingField({ k: 'stt.vad.silence_ms', type: 'num', base: 'stt.vadSilenceMs', num: { integer: true, min: 200, max: 5000 }, help: true })"></div>
      <div x-data="settingField({ k: 'stt.vad.threshold', type: 'num', base: 'stt.vadThreshold', num: { step: 0.001, min: 0, max: 1, decimals: 3 }, help: true })"></div>
      <div x-data="settingField({ k: 'stt.vad.max_segment_s', type: 'num', base: 'stt.vadMaxSegmentS', num: { integer: true, min: 5, max: 120 }, help: true })"></div>
      <div class="admin-settings-actions">
        <button type="button" @click="adminSettingsTest('stt')" x-text="$app.t('admin.settings.test.stt')"></button>
      </div>
    </section>
