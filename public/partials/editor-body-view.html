<!-- Leseansicht (Read-Modus). Der TTS-/Vorlese-Dock lebt hier (nicht im Edit-
     Modus): Proof-Listening liest den gerenderten Seitentext satzweise vor. -->
<div x-show="!editMode" class="page-view-wrap">
  <!-- Aha-Nudge (Erstkontakt): einmaliger Hinweis, der das KI-Lektorat sichtbar
       macht. Nur im Lese-Modus mit Inhalt, solange Lektorat verfügbar ist und
       weder läuft noch Findings offen sind. Dismiss persistiert in localStorage
       (Source of Truth) — Template re-mountet pro Seite und liest neu, zeigt nach
       einmaligem Ausblenden nie wieder. Self-contained, kein Root-State. -->
  <template x-if="renderedPageHtml && canReview() && !currentPageEmpty && !checkLoading && !checkDone">
    <div x-data="{ dismissed: localStorage.getItem('sw:ahaLektorat') === '1', _dismiss(){ this.dismissed = true; try { localStorage.setItem('sw:ahaLektorat', '1'); } catch (e) {} } }"
         x-show="!dismissed" x-cloak class="page-aha" role="note">
      <span class="page-aha__text" x-text="t('page.aha.text')"></span>
      <button type="button" class="page-aha__action" @click="runCheck(); _dismiss()" x-text="t('page.aha.action')"></button>
      <button type="button" class="icon-btn icon-btn--ghost page-aha__close" @click="_dismiss()" :data-tip="t('page.aha.dismiss')" :aria-label="t('page.aha.dismiss')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=694#x"/></svg>
      </button>
    </div>
  </template>

  <div x-show="renderedPageHtml"
       class="page-content-view"
       x-html="renderedPageHtml"
       @click="handleMarkClick($event)"
       @copy="handleViewCopy($event)"
       @pointermove="handleMarkPointer($event)"
       @pointerleave="handleMarkPointerLeave($event)"></div>

  <!-- TTS / Proof-Listening: schwebender Vorlese-Dock unten LINKS über dem
       Seitentext. Liest den Text satzweise vor, markiert den aktuellen Satz.
       Nur sichtbar, wenn Admin TTS aktiviert hat (ttsEnabled = Root-State aus
       /config) und die Seite Inhalt hat. -->
  <template x-if="ttsEnabled">
    <div class="tts-dock" x-show="renderedPageHtml" x-cloak>
      <!-- Status links: „liest" mit Satz-Fortschritt bzw. „pausiert". -->
      <span class="tts-status" aria-live="polite"
            x-show="ttsPlaying"
            :class="ttsPaused ? 'is-paused' : 'is-reading'"
            x-text="ttsPaused ? t('tts.status.paused') : (ttsLoading && !ttsIndex ? t('tts.status.loading') : t('tts.status.reading', { i: ttsIndex, n: ttsTotal }))"></span>
      <!-- Naechster Satz (nur waehrend laufender Wiedergabe). -->
      <button type="button" class="tts-dock-btn tts-dock-btn--sub"
              x-show="ttsPlaying && !ttsPaused"
              :data-tip="t('tts.skip')" :aria-label="t('tts.skip')"
              @click="skipTtsProof()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=694#chevron-last"/></svg>
      </button>
      <!-- Stoppen (nur wenn aktiv). -->
      <button type="button" class="tts-dock-btn tts-dock-btn--sub"
              x-show="ttsPlaying"
              :data-tip="t('tts.stop')" :aria-label="t('tts.stop')"
              @click="stopTtsProof()">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=694#square"/></svg>
      </button>
      <!-- Haupttaste: starten (Kopfhoerer) / pausieren / fortsetzen. -->
      <button type="button" class="tts-dock-btn"
              :aria-pressed="ttsPlaying && !ttsPaused"
              :class="{ 'is-reading': ttsPlaying && !ttsPaused }"
              :data-tip="!ttsPlaying ? t('tts.listen') : (ttsPaused ? t('tts.resume') : t('tts.pause'))"
              :aria-label="!ttsPlaying ? t('tts.listen') : (ttsPaused ? t('tts.resume') : t('tts.pause'))"
              @click="toggleTtsProof()">
        <svg class="icon" aria-hidden="true"><use :href="`/icons.svg?v=694#${!ttsPlaying ? 'headphones' : (ttsPaused ? 'play' : 'pause')}`"/></svg>
      </button>
    </div>
  </template>
</div>

<!-- Lade-Fehler im View-Modus: Seiteninhalt konnte nicht geladen werden
     (Netz-/SW-Cache-Fehler). Sichtbarer Retry statt stiller leerer Seite. -->
<div class="page-load-error"
     x-show="!editMode && currentPage && pageLoadError"
     x-cloak>
  <span class="page-load-error__text" x-text="t('chat.pageLoadFailed')"></span>
  <button type="button" @click="retryLoadPage()"
          :disabled="_retryingPageLoad"
          x-text="t('editor.btn.retryLoad')"></button>
</div>

<div class="page-empty-state"
     x-show="!editMode && currentPage && currentPageEmpty && !pageLoadError && originalHtml !== null"
     x-cloak>
  <span class="page-empty-state__text" x-text="t('editor.emptyPageHint')"></span>
  <template x-if="canEdit()">
    <button type="button" class="danger" @click="deleteCurrentPage()"
            x-text="t('editor.btn.deleteEmptyPage')"></button>
  </template>
</div>
