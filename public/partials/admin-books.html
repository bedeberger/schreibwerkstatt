<!-- Admin: Buecher-Uebersicht + Owner-Zuweisung fuer ownerless Buecher -->
<div class="card card--admin-books" x-data="adminBooksCard" x-show="$app.showAdminBooksCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('admin.books.title')"></span>
    <div class="card-actions">
      <button type="button" class="icon-btn icon-btn--ghost" @click="loadAll()" :disabled="loading" :data-tip="$app.t('common.refresh')" :aria-label="$app.t('common.refresh')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg></button>
    </div>
  </div>

  <div x-show="loading" class="muted-msg" x-text="$app.t('common.loading')"></div>
  <p class="card-form-error" x-show="error" x-text="error"></p>

  <div class="card-form-grid" x-show="!loading">

    <section class="admin-pool-section">
      <h3 class="book-settings-stats-title" x-text="$app.t('admin.books.ownerlessHeading')"></h3>
      <p class="muted-msg muted-msg--sm" x-show="ownerlessBooks().length === 0" x-text="$app.t('admin.books.ownerlessEmpty')"></p>

      <div class="table-scroll" x-show="ownerlessBooks().length">
      <table class="admin-pool-table"
             x-data="sortableTable({
               rows: () => ownerlessBooks(),
               defaultKey: 'book_id',
               persistKey: 'admin.books.ownerless',
               types: { book_id: 'number', acl_count: 'number', chapter_count: 'number',
                        page_count: 'number', chars: 'number', normseiten: 'number', bytes: 'number' },
             })">
        <thead>
          <tr>
            <th class="sortable-th" :class="sortClass('book_id')" :aria-sort="ariaSort('book_id')"
                @click="sortBy('book_id')" x-text="$app.t('admin.books.col.id')"></th>
            <th class="sortable-th" :class="sortClass('name')" :aria-sort="ariaSort('name')"
                @click="sortBy('name')" x-text="$app.t('admin.books.col.name')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('acl_count')" :aria-sort="ariaSort('acl_count')"
                @click="sortBy('acl_count')" x-text="$app.t('admin.books.col.aclCount')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('chapter_count')" :aria-sort="ariaSort('chapter_count')"
                @click="sortBy('chapter_count')" x-text="$app.t('admin.books.col.chapters')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('page_count')" :aria-sort="ariaSort('page_count')"
                @click="sortBy('page_count')" x-text="$app.t('admin.books.col.pages')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('chars')" :aria-sort="ariaSort('chars')"
                @click="sortBy('chars')" x-text="$app.t('admin.books.col.chars')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('normseiten')" :aria-sort="ariaSort('normseiten')"
                @click="sortBy('normseiten')" x-text="$app.t('admin.books.col.normseiten')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('bytes')" :aria-sort="ariaSort('bytes')"
                @click="sortBy('bytes')" :data-tip="$app.t('admin.books.col.bytesTip')" x-text="$app.t('admin.books.col.bytes')"></th>
            <th x-text="$app.t('admin.books.col.assign')"></th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="b in sorted" :key="b.book_id">
            <tr>
              <td><code class="muted-msg muted-msg--sm" x-text="b.book_id"></code></td>
              <td x-text="b.name"></td>
              <td class="admin-pool-num" x-text="b.acl_count"></td>
              <td class="admin-pool-num" x-text="b.chapter_count"></td>
              <td class="admin-pool-num" x-text="b.page_count"></td>
              <td class="admin-pool-num" x-text="fmtChars(b.chars)"></td>
              <td class="admin-pool-num" x-text="fmtNormseiten(b.chars)"></td>
              <td class="admin-pool-num" x-text="fmtBytes(b.bytes)"></td>
              <td>
                <select class="card-form-input"
                        @change="setAssignTarget(b.book_id, $event.target.value)">
                  <option value="" x-text="$app.t('admin.books.selectUser')"></option>
                  <template x-for="u in users" :key="u.email">
                    <option :value="u.email" x-text="u.email"></option>
                  </template>
                </select>
              </td>
              <td class="admin-pool-actions">
                <button type="button"
                        @click="assignOwner(b)"
                        :disabled="busy || !(assignTarget[b.book_id])"
                        x-text="$app.t('admin.books.assignBtn')"></button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      </div>
    </section>

    <section class="admin-pool-section">
      <h3 class="book-settings-stats-title" x-text="$app.t('admin.books.ownedHeading')"></h3>
      <p class="muted-msg muted-msg--sm" x-show="ownedBooks().length === 0" x-text="$app.t('admin.books.ownedEmpty')"></p>

      <div class="table-scroll" x-show="ownedBooks().length">
      <table class="admin-pool-table"
             x-data="sortableTable({
               rows: () => ownedBooks(),
               defaultKey: 'book_id',
               persistKey: 'admin.books.owned',
               types: { book_id: 'number', acl_count: 'number', chapter_count: 'number',
                        page_count: 'number', chars: 'number', normseiten: 'number', bytes: 'number' },
             })">
        <thead>
          <tr>
            <th class="sortable-th" :class="sortClass('book_id')" :aria-sort="ariaSort('book_id')"
                @click="sortBy('book_id')" x-text="$app.t('admin.books.col.id')"></th>
            <th class="sortable-th" :class="sortClass('name')" :aria-sort="ariaSort('name')"
                @click="sortBy('name')" x-text="$app.t('admin.books.col.name')"></th>
            <th class="sortable-th" :class="sortClass('owner_email')" :aria-sort="ariaSort('owner_email')"
                @click="sortBy('owner_email')" x-text="$app.t('admin.books.col.owner')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('acl_count')" :aria-sort="ariaSort('acl_count')"
                @click="sortBy('acl_count')" x-text="$app.t('admin.books.col.aclCount')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('chapter_count')" :aria-sort="ariaSort('chapter_count')"
                @click="sortBy('chapter_count')" x-text="$app.t('admin.books.col.chapters')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('page_count')" :aria-sort="ariaSort('page_count')"
                @click="sortBy('page_count')" x-text="$app.t('admin.books.col.pages')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('chars')" :aria-sort="ariaSort('chars')"
                @click="sortBy('chars')" x-text="$app.t('admin.books.col.chars')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('normseiten')" :aria-sort="ariaSort('normseiten')"
                @click="sortBy('normseiten')" x-text="$app.t('admin.books.col.normseiten')"></th>
            <th class="admin-pool-num sortable-th" :class="sortClass('bytes')" :aria-sort="ariaSort('bytes')"
                @click="sortBy('bytes')" :data-tip="$app.t('admin.books.col.bytesTip')" x-text="$app.t('admin.books.col.bytes')"></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="b in sorted" :key="b.book_id">
            <tr>
              <td><code class="muted-msg muted-msg--sm" x-text="b.book_id"></code></td>
              <td x-text="b.name"></td>
              <td x-text="b.owner_email"></td>
              <td class="admin-pool-num" x-text="b.acl_count"></td>
              <td class="admin-pool-num" x-text="b.chapter_count"></td>
              <td class="admin-pool-num" x-text="b.page_count"></td>
              <td class="admin-pool-num" x-text="fmtChars(b.chars)"></td>
              <td class="admin-pool-num" x-text="fmtNormseiten(b.chars)"></td>
              <td class="admin-pool-num" x-text="fmtBytes(b.bytes)"></td>
            </tr>
          </template>
        </tbody>
      </table>
      </div>
    </section>
  </div>
</div>
