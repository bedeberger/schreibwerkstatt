<!-- Seitenbaum -->
<div class="card card--stacked-actions" :class="{ 'tree-card--loading': treeLoading }">
  <div class="card-header">
    <div class="card-actions">
      <button type="button" @click="loadPages({ source: 'manual' })" x-text="t('sidebar.loadPages')"></button>
      <button type="button" @click="toggleBookOrganizerCard()" :disabled="!selectedBookId" :data-tip="t('tile.bookOrganizer.title')" x-text="t('tile.bookOrganizer')"></button>
      <button type="button" @click="batchCheck()" :disabled="!pages.length" :data-tip="t('sidebar.checkAllTitle')" x-text="t('sidebar.checkAll')"></button>
    </div>
  </div>
  <!-- Suche + Expand/Collapse -->
  <div class="search-wrap sidebar-search-wrap">
    <span class="search-affix">
      <svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#search"/></svg>
      <input type="text" x-model.debounce.200ms="pageSearch" @keydown="onPageSearchKeydown($event)" :placeholder="t('sidebar.searchPage')" :aria-label="t('sidebar.searchPage')" :data-tip="t('sidebar.searchPageTitle')" class="page-search">
      <button type="button" class="search-clear--icon" x-show="pageSearch" @click="pageSearch=''" :aria-label="t('search.clear')" :data-tip="t('search.clear')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#x"/></svg></button>
    </span>
    <div class="btn-group sidebar-action-group">
      <button type="button" class="icon-btn"
              x-show="isTagebuch()"
              :aria-pressed="sidebarMode === 'calendar'"
              @click="toggleSidebarMode()"
              :data-tip="sidebarMode === 'calendar' ? t('sidebar.modeToggle.tree') : t('sidebar.modeToggle.calendar')"
              :aria-label="sidebarMode === 'calendar' ? t('sidebar.modeToggle.tree') : t('sidebar.modeToggle.calendar')">
        <svg class="icon" aria-hidden="true">
          <use :href="sidebarMode === 'calendar' ? '/icons.svg?v=690#list' : '/icons.svg?v=690#calendar'"/>
        </svg>
      </button>
      <button type="button" class="icon-btn"
              x-show="sidebarMode !== 'calendar'"
              @click="setAllChaptersOpen(true)"
              :disabled="!!pageSearch"
              :data-tip="t('sidebar.expandAll')"
              :aria-label="t('sidebar.expandAll')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#chevron-down"/></svg></button>
      <button type="button" class="icon-btn"
              x-show="sidebarMode !== 'calendar'"
              @click="setAllChaptersOpen(false)"
              :disabled="!!pageSearch"
              :data-tip="t('sidebar.collapseAll')"
              :aria-label="t('sidebar.collapseAll')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=690#chevron-up"/></svg></button>
    </div>
  </div>

  <!-- Diary-Calendar — eingebettetes Partial. Lädt nested via _loadPartials. -->
  <div id="partial-sidebar-calendar" x-show="sidebarMode === 'calendar'" x-cloak></div>

  <div x-show="sidebarMode !== 'calendar'" class="display-contents">
  <div x-show="!pageSearch && tokTotals.any" class="tok-totals">
    <span class="tok-badge tok-neutral" x-text="'∑ ' + tokTotals.chars.toLocaleString(_numLocale) + ' ' + t('bookstats.unit.z')"></span>
    <span class="tok-badge tok-neutral" x-text="'∑ ' + tokTotals.normseiten.toLocaleString(_numLocale, { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' ' + t('bookstats.unit.ns')"></span>
    <span class="tok-badge tok-neutral" x-text="'∑ ' + tokTotals.words.toLocaleString(_numLocale) + ' ' + t('bookstats.unit.w')"></span>
    <span class="tok-badge tok-neutral" x-text="'∑ ' + tokTotals.tok.toLocaleString(_numLocale) + ' ' + t('bookstats.unit.t')"></span>
  </div>
  <!-- Batch-Fortschritt -->
  <div x-show="batchLoading || batchStatus" class="batch-wrap">
    <div class="progress-bar-wrap" x-show="batchLoading">
      <div class="progress-bar" :style="{ '--progress': batchProgress + '%' }"></div>
    </div>
    <div class="batch-status" x-html="batchStatus"></div>
  </div>
  <template x-for="item in filteredTree" :key="item.id">
    <div class="tree-chapter"
         :class="{ ['tree-chapter--depth-' + (item.depth || 1)]: true, 'tree-chapter--solo': item.solo }"
         :style="{ '--depth': item.depth || 1 }">
      <div x-show="!item.solo"
           class="tree-chapter-header"
           role="button"
           tabindex="0"
           :aria-expanded="(item.pages.length > 0 || item.hasChildren) ? (item.open ? 'true' : 'false') : null"
           :class="{
             'tree-chapter-header--empty': item.pages.length === 0 && !item.hasChildren,
             'tree-chapter-header--active': showKapitelReviewCard && String(kapitelReviewChapterId) === String(item.id),
             'tree-chapter-header--reviewable': _bookQualifiesForChapterReview() && (item.pages.length > 0 || item.hasChildren),
           }"
           :data-tip="!pageSearch
             ? ((item.pages.length === 0 && !item.hasChildren)
                 ? t('sidebar.emptyChapterTitle', { name: item.name })
                 : (_bookQualifiesForChapterReview() && (item.pages.length > 0 || item.hasChildren) ? t('sidebar.reviewChapterTitle', { name: item.name }) : ''))
             : ''"
           @keydown.enter.prevent="_onChapterHeaderActivate(item)"
           @keydown.space.prevent="_onChapterHeaderActivate(item)"
           @keydown.arrow-right.prevent="if ((item.pages.length > 0 || item.hasChildren) && !item.open) setChapterOpen(item, true)"
           @keydown.arrow-left.prevent="if ((item.pages.length > 0 || item.hasChildren) && item.open) setChapterOpen(item, false)"
           @click="_onChapterHeaderActivate(item)"
           @contextmenu="_openPagetreeContextMenu($event, { kind: 'chapter', id: item.id, name: item.name })">
        <span class="history-chevron" :class="{ open: item.open }" x-show="item.pages.length > 0 || item.hasChildren"
              @click.stop="if (!pageSearch && (item.pages.length > 0 || item.hasChildren)) toggleChapterOpen(item)"></span>
        <span x-text="item.name"></span>
        <span class="tree-chapter-meta">
          <span class="tag" x-show="item.pages.length >= 1" x-text="item.pages.length === 1 ? t('sidebar.pagesCountOne') : t('sidebar.pagesCount', { n: item.pages.length })"></span>
          <template x-if="item.stats">
            <span class="tok-badge tok-neutral"
              x-text="item.stats.badge"
              @mouseenter.stop="_showTokTip($el, item.stats, { _chapterOnly: true })"
              @mouseleave.stop="_hideTokTip()"></span>
          </template>
          <span x-show="!item.solo && chapterIdeenCounts[item.id] > 0"
                class="ideen-count-badge"
                x-text="chapterIdeenCounts[item.id]"
                :data-tip="t('ideen.openCountTitle', { n: chapterIdeenCounts[item.id] })"></span>
        </span>
      </div>
      <div x-show="item.solo || item.open" class="tree-chapter-pages">
        <template x-for="page in item.pages" :key="page.id">
          <div class="page-item"
               :class="{ selected: currentPage?.id === page.id, 'page-item--empty': tokEsts[page.id] && tokEsts[page.id].words === 0, 'page-item--kb-active': _pageSearchActiveId === page.id, 'page-item--remote-edit': recentRemoteEdits.has(page.id) }"
               :data-page-id="page.id" role="button" tabindex="0"
               :aria-current="currentPage?.id === page.id ? 'page' : null"
               :data-tip="recentRemoteEdits.has(page.id) ? t('collab.tree.remoteEditTip') : null"
               @click="selectPage(page); _clearRemoteEditMark(page.id)"
               @contextmenu="_openPagetreeContextMenu($event, { kind: 'page', id: page.id, name: page.name })">
            <span class="page-name">
              <span class="page-status-dot" :class="'page-status-' + pageStatus(page)"
                @mouseenter.stop="_showStatusTip($el, page)"
                @mouseleave.stop="_hideStatusTip()"></span>
              <span x-text="page.name"></span>
              <template x-for="p in presenceFor(page.id)" :key="p.device_id || p.user_email">
                <span class="presence-pip"
                      :class="{ 'presence-pip--self': p.is_self }"
                      :style="`--avatar-hue: ${userAvatarHue(p.user_email)}`"
                      :data-tip="p.is_self
                        ? t('presence.self.editing', { device: p.device_label || t('presence.device.unknown') })
                        : t('collab.presence.editing', { user: p.user_display_name })"
                      x-text="userInitials(p.user_email)"></span>
              </template>
            </span>
            <span x-show="tokEsts[page.id] || ideenCounts[page.id] > 0" class="tok-stats">
              <template x-if="tokEsts[page.id]?.words > 0">
                <span class="tok-stats-wrap">
                  <span class="tok-badge tok-neutral"
                    x-text="tokEsts[page.id].chars >= 1000 ? '~' + Math.round(tokEsts[page.id].chars/1000) + 'k Z' : tokEsts[page.id].chars + ' Z'"
                    @mouseenter.stop="_showTokTip($el, tokEsts[page.id])"
                    @mouseleave.stop="_hideTokTip()"></span>
                </span>
              </template>
              <template x-if="tokEsts[page.id] && tokEsts[page.id].words === 0">
                <span class="tok-badge tok-empty" x-text="t('sidebar.empty')"></span>
              </template>
              <span x-show="ideenCounts[page.id] > 0"
                    class="ideen-count-badge"
                    x-text="ideenCounts[page.id]"
                    :data-tip="t('ideen.openCountTitle', { n: ideenCounts[page.id] })"></span>
            </span>
          </div>
        </template>
      </div>
    </div>
  </template>
  <template x-if="filteredTree.length === 0 && pageSearch">
    <div class="muted-msg muted-msg--sm" x-text="t('sidebar.noPagesFound')"></div>
  </template>
  <template x-if="!pageSearch && selectedBookId && tree.length === 0 && !treeLoading">
    <div class="sidebar-empty-book">
      <div class="muted-msg muted-msg--sm" x-text="t('sidebar.emptyBook')"></div>
      <button type="button" @click="createChapter()" x-text="t('bookOrganizer.newChapter')"></button>
    </div>
  </template>
  </div><!-- /sidebarMode !== 'calendar' -->
</div>

<!-- Pagetree-Rechtsklick-Menü. Position:fixed (viewport-koordinaten). MUSS
     ausserhalb des `.card`-Wrappers stehen: .card hat cardFadeIn-Animation mit
     transform: translateY(0) als Endzustand — ein transform-Ancestor erzeugt
     einen Containing-Block fuer position:fixed (Spec), wodurch das Menue an
     der Karte statt am Viewport ausgerichtet wuerde. State + Handler in
     tree-context-menu.js + app-state.js#navigationState. -->
<div class="context-menu pagetree-context-menu"
     role="menu"
     x-show="pageTreeMenuOpen"
     x-cloak
     :style="{ left: pageTreeMenuPos.left + 'px', top: pageTreeMenuPos.top + 'px' }"
     @click.stop
     @contextmenu.prevent>
  <template x-if="pageTreeMenuTarget">
    <div>
      <div class="context-menu-header" x-text="pageTreeMenuTarget.name"></div>
      <button type="button" role="menuitem" class="context-menu-item"
              @click="pagetreeCtxOpen()"
              x-text="t('pagetreeCtx.open')"></button>
      <button type="button" role="menuitem" class="context-menu-item"
              x-show="pageTreeMenuTarget.kind === 'page'"
              @click="pagetreeCtxEdit()"
              x-text="t('pagetreeCtx.edit')"></button>
      <button type="button" role="menuitem" class="context-menu-item"
              x-show="pageTreeMenuTarget.kind === 'page'"
              @click="pagetreeCtxLektorieren()"
              x-text="t('pagetreeCtx.lektorieren')"></button>
      <div class="context-menu-sep" role="separator"></div>
      <button type="button" role="menuitem" class="context-menu-item"
              @click="pagetreeCtxShare()"
              x-text="t('pagetreeCtx.share')"></button>
      <button type="button" role="menuitem" class="context-menu-item"
              @click="pagetreeCtxExport()"
              x-text="t('pagetreeCtx.export')"></button>
    </div>
  </template>
</div>
