<!-- Admin: Logs -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/admin-logs-card.js.
  `showAdminLogsCard` + `toggleAdminLogsCard` im Root. Nur sichtbar bei
  $app.currentUser.role === 'admin'.
-->
<div class="card card--admin-logs" x-data="adminLogsCard" x-show="$app.showAdminLogsCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('admin.logs.title')"></span>
    <div class="card-actions">
      <button type="button"
              class="admin-logs-livetail"
              :class="adminLogsLiveTail ? 'admin-logs-livetail--on' : ''"
              @click="adminLogsToggleLiveTail()"
              :data-tip="$app.t('admin.logs.liveTail')">
        <svg class="icon" aria-hidden="true"><use href="/icons.svg#radio"></use></svg>
        <span x-text="$app.t('admin.logs.liveTail')"></span>
      </button>
      <button type="button" class="icon-btn icon-btn--ghost" @click="adminLogsClearAndLive()" :disabled="adminLogsLoading" :data-tip="$app.t('common.refresh')" :aria-label="$app.t('common.refresh')"><svg class="icon" aria-hidden="true"><use href="/icons.svg?v=693#rotate-cw"/></svg></button>
    </div>
  </div>

  <!-- Filter-Toolbar -->
  <div class="admin-logs-filter">
    <label class="admin-logs-filter-label">
      <span x-text="$app.t('admin.logs.filter.level')"></span>
      <div x-data="combobox({ placeholder: $app.t('admin.logs.filter.allLevels'), emptyLabel: $app.t('admin.logs.filter.allLevels') })"
           x-modelable="value" x-model="adminLogsFilter.level"
           x-effect="options = adminLogsLevels"></div>
    </label>
    <label class="admin-logs-filter-label">
      <span x-text="$app.t('admin.logs.filter.scope')"></span>
      <div x-data="combobox({ placeholder: $app.t('admin.logs.filter.allScopes'), emptyLabel: $app.t('admin.logs.filter.allScopes') })"
           x-modelable="value" x-model="adminLogsFilter.scope"
           x-effect="options = adminLogsScopeOptions()"></div>
    </label>
    <label class="admin-logs-filter-label">
      <span x-text="$app.t('admin.logs.filter.user')"></span>
      <input type="text" class="card-form-input" x-model.debounce.300ms="adminLogsFilter.user"
             :placeholder="$app.t('admin.logs.filter.userPh')">
    </label>
    <label class="admin-logs-filter-label">
      <span x-text="$app.t('admin.logs.filter.book')"></span>
      <input type="text"
             x-data="numInput({ integer: true, min: 1, grouping: false })"
             x-modelable="value" x-model="adminLogsFilter.book"
             class="card-form-input"
             :placeholder="$app.t('admin.logs.filter.bookPh')">
    </label>
    <label class="admin-logs-filter-label admin-logs-filter-label--wide">
      <span x-text="$app.t('admin.logs.filter.search')"></span>
      <input type="text" class="card-form-input" x-model.debounce.300ms="adminLogsFilter.q"
             :placeholder="$app.t('admin.logs.filter.searchPh')">
    </label>
    <div class="admin-logs-filter-actions">
      <button type="button" class="primary" @click="adminLogsApplyFilter()" :disabled="adminLogsLoading" x-text="$app.t('admin.logs.applyFilter')"></button>
      <button type="button" @click="adminLogsClearAndLive()" :disabled="adminLogsLoading" x-show="adminLogsHasFilter()" x-text="$app.t('admin.logs.clearFilter')"></button>
    </div>
  </div>

  <div x-show="adminLogsError" class="error-msg" x-text="adminLogsError"></div>
  <div x-show="adminLogsRotatedHint" class="muted-msg" x-text="$app.t('admin.logs.rotated')"></div>
  <div x-show="adminLogsStreamError" class="muted-msg" x-text="$app.t('admin.logs.streamError')"></div>

  <!-- Log-Liste -->
  <div class="log-list" x-show="adminLogsEntries.length">
    <template x-for="(e, idx) in adminLogsEntries" :key="adminLogsRowKey(e, idx)">
      <div class="log-row" :class="'log-row--' + e.level">
        <span class="log-row-ts" x-text="adminLogsFmtTs(e.ts)"></span>
        <span class="log-badge" :class="'log-badge--' + e.level" x-text="e.level.toUpperCase()"></span>
        <span class="log-row-scope" x-text="e.scope || '-'"></span>
        <span class="log-row-user" x-text="e.user || '-'"></span>
        <span class="log-row-book" x-text="e.book ? ('#' + e.book) : '-'"></span>
        <span class="log-row-msg" x-text="e.msg"></span>
        <button type="button" class="log-row-toggle"
                x-show="e.stack && e.stack.length"
                @click="adminLogsToggleStack(idx)"
                :aria-expanded="adminLogsExpanded[String(idx)] ? 'true' : 'false'"
                :aria-label="$app.t('admin.logs.toggleStack')">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg#chevron-down"></use></svg>
        </button>
        <pre class="log-stack" x-show="e.stack && adminLogsExpanded[String(idx)]" x-text="(e.stack || []).join('\n')"></pre>
      </div>
    </template>
  </div>

  <div x-show="!adminLogsEntries.length && !adminLogsLoading" class="muted-msg" x-text="$app.t('admin.logs.empty')"></div>

  <!-- Footer: Load-More + Downloads -->
  <div class="admin-logs-footer">
    <button type="button" @click="adminLogsLoadMore()"
            :disabled="adminLogsLoading || !adminLogsHasMore"
            x-show="adminLogsHasMore"
            x-text="$app.t('admin.logs.loadMore')"></button>
    <div class="admin-logs-downloads" x-show="adminLogsFiles.length">
      <span class="muted-msg muted-msg--sm" x-text="$app.t('admin.logs.download')"></span>
      <template x-for="f in adminLogsFiles" :key="f.key">
        <button type="button" class="admin-logs-download-btn" @click="adminLogsDownload(f)">
          <svg class="icon" aria-hidden="true"><use href="/icons.svg#download"></use></svg>
          <span x-text="f.path"></span>
        </button>
      </template>
    </div>
  </div>
</div>
